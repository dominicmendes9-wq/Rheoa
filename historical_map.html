<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rheoa RPG – Historical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-parchment: #f4e4c1;
            --border-dark: #3e2723;
            --accent: #8d6e63;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg-parchment);
            color: #3e2723;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #map-container {
            flex: 1;
            position: relative;
            background: var(--bg-parchment);
        }
        #map { width: 100%; height: 100%; }

        /* Trade route line animation */
        .trade-route-line {
            stroke-dasharray: 10 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -16;
            }
        }

        /* Rest of the styles identical to previous */
        #timeline-panel { /* ... same as before ... */ }
        .timeline-controls { /* ... */ }
        #timeline-slider { /* ... */ }
        #era-label { /* ... */ }
        .ticks-container { /* ... */ }
        .tick { /* ... */ }
        .tick-line { /* ... */ }
        .tick-label { /* ... */ }
        button { /* ... */ }
        #sidebar { /* ... */ }
        .sidebar-close { /* ... */ }
        #sidebar h3 { /* ... */ }
        .action-btn { /* ... */ }
        .region-owner { /* ... */ }
        .cooldown-text { /* ... */ }
        #battle-overlay { /* ... */ }
        #battle-overlay > div { /* ... */ }
        .dice-box { /* ... */ }
        .market-offer, .event-item { /* ... */ }
        hr { /* ... */ }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- battle overlay etc. same as before -->
    <div id="battle-overlay">...</div>
    <div id="map-container">
        <div id="map"></div>
        <div id="sidebar">
            <button class="sidebar-close" onclick="document.getElementById('sidebar').style.display='none'">×</button>
            <h3 id="region-name">Region</h3>
            <p id="region-owner"></p>
            <div id="region-stats"></div>
            <div id="region-army"></div>
            <button class="action-btn" id="btn-recruit" style="display:none;">🛡️ Recruit Army</button>
            <button class="action-btn" id="btn-move" style="display:none;">🚚 Move Army</button>
            <button class="action-btn" id="btn-set-base" style="display:none;">🎯 Set as Attack Base</button>
            <button class="action-btn" id="btn-conquer" style="display:none;">⚔️ Conquer</button>
            <button class="action-btn" id="btn-build" style="display:none;">🏗️ Build</button>
            <button class="action-btn" id="btn-trade" style="display:none;">💰 Trade</button>
            <button class="action-btn" id="btn-route" style="display:none;">🛤️ Manage Trade Routes</button>
            <button class="action-btn" id="btn-events" style="display:none;">📜 Events</button>
            <div id="route-management" style="display:none; margin-top:10px;">
                <button class="action-btn" id="btn-create-route">Create New Route</button>
                <div id="existing-routes"></div>
            </div>
            <p id="action-feedback" class="cooldown-text"></p>

            <hr>
            <h3>📦 Market</h3>
            <div id="market-actions">
                <button class="action-btn" id="btn-show-market">Show Offers</button>
                <button class="action-btn" id="btn-create-offer">Create Offer</button>
            </div>
            <div id="market-view" style="display:none;">
                <div id="trade-list"></div>
                <button class="action-btn" id="btn-close-market" style="background:#666;">Close Market</button>
            </div>
        </div>
    </div>

    <div id="timeline-panel">
        <div class="timeline-controls">
            <span id="era-label">4000 BCE</span>
            <input type="range" id="timeline-slider" min="0" max="80" value="0" step="1">
            <button id="btn-empire-stats">📊 My Empire</button>
            <button onclick="window.location.href='dashboard.html'">← Dashboard</button>
        </div>
        <div id="ticks-container" class="ticks-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        // ... (Supabase init, BASE_YEAR, etc., same as before)

        // Add a layer group for trade routes
        const tradeRouteLayer = L.layerGroup().addTo(map);

        // Helper: compute centroid of a GeoJSON geometry
        function getCentroid(geojson) {
            const geo = L.geoJSON(geojson);
            const bounds = geo.getBounds();
            return bounds.getCenter();
        }

        // Draw trade routes for the current year
        async function loadTradeRoutes() {
            tradeRouteLayer.clearLayers();
            if (!currentTargetYear) return;

            // Fetch all active routes for regions that are alive
            const { data: routes } = await sb
                .from('trade_routes')
                .select('*, from_region:from_region_id(*), to_region:to_region_id(*)')
                .eq('active', true);

            if (!routes) return;

            for (const route of routes) {
                // Check if both regions are alive at current year
                const from = route.from_region;
                const to = route.to_region;
                if (!from || !to) continue;
                if (from.start_year > currentTargetYear || from.end_year < currentTargetYear) continue;
                if (to.start_year > currentTargetYear || to.end_year < currentTargetYear) continue;

                const fromCentroid = getCentroid(from.geojson);
                const toCentroid = getCentroid(to.geojson);
                if (!fromCentroid || !toCentroid) continue;

                const polyline = L.polyline([fromCentroid, toCentroid], {
                    color: '#8B0000',
                    weight: 2,
                    dashArray: '10 6',
                    className: 'trade-route-line'
                }).addTo(tradeRouteLayer);
                polyline.bindTooltip(`${route.resource} route`, { permanent: false });
            }
        }

        // Modify loadYear to also load trade routes after regions
        async function loadYear(targetYear) {
            currentTargetYear = targetYear;
            const { data: era } = await sb.from('historical_eras')
                .select('*').lte('year_start', targetYear).gte('year_end', targetYear).single();
            if (era) {
                currentEraId = era.id;
                document.getElementById('era-label').textContent = `${era.name} (${formatYear(era.year_start)}–${formatYear(era.year_end)})`;
            } else {
                document.getElementById('era-label').textContent = formatYear(targetYear);
            }
            await loadRegions(targetYear);
            await loadTradeRoutes();   // Feature 4
        }

        // Inside openSidebar, add logic for trade route button
        function openSidebar(props) {
            // ... existing code for region-stats, army, etc.
            const isMine = (props.owner_type === 'player' && props.owner_id === player.id);
            // ... set visibility of buttons as before
            document.getElementById('btn-route').style.display = isMine ? 'block' : 'none';
            document.getElementById('route-management').style.display = 'none';
            // ...
        }

        // Button: Manage Trade Routes
        document.getElementById('btn-route').addEventListener('click', async () => {
            const mgmt = document.getElementById('route-management');
            if (mgmt.style.display === 'block') {
                mgmt.style.display = 'none';
                return;
            }
            mgmt.style.display = 'block';
            await loadRoutesForRegion();
        });

        // Load routes from current region
        async function loadRoutesForRegion() {
            const { data: routes } = await sb
                .from('trade_routes')
                .select('*, from_region:from_region_id(name), to_region:to_region_id(name)')
                .or(`from_region_id.eq.${currentRegionId},to_region_id.eq.${currentRegionId}`)
                .eq('active', true);

            const listDiv = document.getElementById('existing-routes');
            if (!routes || routes.length === 0) {
                listDiv.innerHTML = '<p>No active routes from this region.</p>';
                return;
            }
            listDiv.innerHTML = routes.map(r => `
                <div>
                    ${r.from_region.name} ↔ ${r.to_region.name} (${r.resource})
                    <button onclick="deleteRoute('${r.id}')">Remove</button>
                </div>
            `).join('');
        }

        window.deleteRoute = async (routeId) => {
            if (!confirm('Remove this trade route?')) return;
            await sb.rpc('remove_trade_route', { p_route_id: routeId });
            document.getElementById('action-feedback').textContent = 'Route removed';
            await loadRoutesForRegion();
            await loadTradeRoutes(); // update map lines
        };

        // Button: Create New Route
        document.getElementById('btn-create-route').addEventListener('click', async () => {
            const targetYear = currentTargetYear;
            // Fetch other owned regions
            const { data: owned } = await sb
                .from('historical_regions')
                .select('id, name')
                .eq('owner_type', 'player')
                .eq('owner_id', player.id)
                .lte('start_year', targetYear)
                .gte('end_year', targetYear)
                .neq('id', currentRegionId);
            if (!owned || owned.length === 0) {
                alert('You have no other owned regions to connect to.');
                return;
            }
            let list = owned.map(r => `${r.name} (${r.id.slice(0,4)})`).join('\n');
            const destId = prompt(`Choose destination region:\n${list}\n\nEnter region ID:`);
            if (!destId) return;
            const resource = prompt('Resource to trade (food/wood/metal):');
            if (!resource || !['food','wood','metal'].includes(resource)) {
                alert('Invalid resource');
                return;
            }
            const { data, error } = await sb.rpc('create_trade_route', {
                p_from_region_id: currentRegionId,
                p_to_region_id: destId,
                p_resource: resource
            });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message || data.error);
            await loadRoutesForRegion();
            await loadTradeRoutes(); // redraw map lines
        });

        // Need to add showFeedback function if not already there (from previous code)
        function showFeedback(msg) {
            document.getElementById('action-feedback').textContent = msg;
            setTimeout(() => document.getElementById('action-feedback').textContent = '', 4000);
        }

        // Also ensure the init function, ticks, slider, conquest, etc. are all present.
        // ... (Rest of the javascript from Feature 2 should be merged)
    </script>
</body>
</html>
