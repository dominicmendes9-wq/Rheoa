<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rheoa RPG – Historical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-parchment: #f4e4c1;
            --border-dark: #3e2723;
            --accent: #8d6e63;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg-parchment);
            color: #3e2723;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #map-container {
            flex: 1;
            position: relative;
            background: #e8d5b5;  /* parchment tone when no tiles */
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Timeline Panel */
        #timeline-panel {
            background: rgba(255,255,255,0.85);
            border-top: 3px solid var(--border-dark);
            padding: 10px 20px 5px;
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .timeline-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        #timeline-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            background: var(--border-dark);
            border-radius: 4px;
            outline: none;
        }
        #timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #5d4037;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #3e2723;
        }

        #era-label {
            font-weight: bold;
            font-size: 1.2rem;
            min-width: 160px;
            text-align: center;
        }

        /* Ruler ticks */
        .ticks-container {
            display: flex;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 0.7rem;
            color: #5d4037;
            user-select: none;
            margin-top: 5px;
        }
        .tick {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 1px;
            position: relative;
        }
        .tick-line {
            width: 1px;
            height: 8px;
            background: #3e2723;
            margin-bottom: 2px;
        }
        .tick-label {
            white-space: nowrap;
            font-size: 0.6rem;
            cursor: pointer;
            color: #3e2723;
            margin-top: 2px;
        }
        .tick-label.major {
            font-weight: bold;
            font-size: 0.75rem;
        }
        .tick-label:hover {
            text-decoration: underline;
        }

        button {
            background: var(--border-dark);
            color: white;
            border: none;
            padding: 8px 16px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover { background: #5d4037; }

        #sidebar {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 340px;
            max-height: calc(100% - 20px);
            background: rgba(255,255,255,0.95);
            border: 2px solid var(--border-dark);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }
        .sidebar-close {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            color: #3e2723;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .sidebar-close:hover { color: #a00; }

        #sidebar h3 { margin-top: 0; margin-bottom: 5px; padding-right: 20px; }
        .action-btn { display: block; width: 100%; margin-top: 10px; }
        .region-owner { font-size: 0.9rem; margin: 10px 0; }
        .cooldown-text { font-size: 0.8rem; color: #b71c1c; }

        #battle-overlay {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); z-index: 2000;
        }
        #battle-overlay > div {
            position: absolute; top:50%; left:50%;
            transform: translate(-50%,-50%);
            background: white; padding: 30px; border-radius: 15px; text-align: center;
        }
        .dice-box { display: flex; justify-content: center; gap: 50px; font-size: 3rem; margin: 20px 0; }

        .market-offer, .event-item {
            border: 1px solid #ccc; margin: 5px 0; padding: 5px; font-size: 0.9rem;
        }
        hr { margin: 15px 0; border: 0; border-top: 1px solid #8d6e63; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="battle-overlay">
        <div>
            <h2>⚔️ Battle ⚔️</h2>
            <div class="dice-box">
                <div id="attacker-dice">⚅</div>
                <div id="defender-dice">⚅</div>
            </div>
            <p id="battle-message">Rolling...</p>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="sidebar">
            <button class="sidebar-close" onclick="document.getElementById('sidebar').style.display='none'">×</button>
            <h3 id="region-name">Region</h3>
            <p id="region-owner"></p>
            <div id="region-stats"></div>
            <button class="action-btn" id="btn-conquer" style="display:none;">⚔️ Conquer</button>
            <button class="action-btn" id="btn-build" style="display:none;">🏗️ Build</button>
            <button class="action-btn" id="btn-trade" style="display:none;">💰 Trade</button>
            <button class="action-btn" id="btn-events" style="display:none;">📜 Events</button>
            <p id="action-feedback" class="cooldown-text"></p>

            <hr>
            <h3>📦 Market</h3>
            <div id="market-actions">
                <button class="action-btn" id="btn-show-market">Show Offers</button>
                <button class="action-btn" id="btn-create-offer">Create Offer</button>
            </div>
            <div id="market-view" style="display:none;">
                <div id="trade-list"></div>
                <button class="action-btn" id="btn-close-market" style="background:#666;">Close Market</button>
            </div>
        </div>
    </div>

    <div id="timeline-panel">
        <div class="timeline-controls">
            <span id="era-label">4000 BCE</span>
            <input type="range" id="timeline-slider" min="0" max="80" value="0" step="1">
            <button id="btn-empire-stats">📊 My Empire</button>
            <button onclick="window.location.href='dashboard.html'">← Dashboard</button>
        </div>
        <div id="ticks-container" class="ticks-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const SUPABASE_URL = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BASE_YEAR = -4000;
        const TOTAL_STEPS = 80;
        let currentTargetYear = BASE_YEAR;  // will be set from slider
        let currentEraId = null;            // still needed for some functions, but we'll derive from year
        let currentRegionId = null;
        let player = null;

        // Map – no tile layer, just the background color from CSS
        const map = L.map('map', {
            center: [20, 0],
            zoom: 2,
            maxZoom: 8,
            minZoom: 2,
            worldCopyJump: true,
            zoomControl: true
        });

        // Empty tile layer – we just set the background color on the container
        // We add a dummy layer to prevent errors
        L.tileLayer('', { attribution: '' }).addTo(map);  // this does nothing

        let geoJSONLayer = L.geoJSON(null, {
            style: feature => ({
                fillColor: feature.properties.fillColor || '#c8ad7f',
                weight: 2,
                opacity: 1,
                color: '#3e2723',
                fillOpacity: 0.6
            }),
            onEachFeature: (feature, layer) => {
                layer.on('click', () => openSidebar(feature.properties));
            }
        }).addTo(map);

        // ----- Auth & Init -----
        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            const { data: playerData } = await sb.from('players')
                .select('id, username, cash, energy').eq('auth_id', user.id).single();
            if (!playerData) { alert('Player not found'); return; }
            player = playerData;

            const startStep = 50;  // year 1000 CE
            document.getElementById('timeline-slider').value = startStep;
            currentTargetYear = BASE_YEAR + startStep * 100;
            await loadYear(currentTargetYear);
            setupRealtime();
            drawTicks();
        }

        // ----- Ruler Ticks (clickable major, minor lines) -----
        function drawTicks() {
            const container = document.getElementById('ticks-container');
            container.innerHTML = '';
            // Major ticks every 10 steps (1000 years), minor every step (100 years)
            for (let step = 0; step <= TOTAL_STEPS; step++) {
                const isMajor = (step % 10 === 0);
                const year = BASE_YEAR + step * 100;
                const tickDiv = document.createElement('div');
                tickDiv.className = 'tick';
                tickDiv.innerHTML = `<div class="tick-line" style="height:${isMajor ? 10 : 5}px;"></div>`;
                if (isMajor) {
                    const label = year < 0 ? `${Math.abs(year)} BCE` : `${year} CE`;
                    tickDiv.innerHTML += `<span class="tick-label major" data-step="${step}">${label}</span>`;
                }
                container.appendChild(tickDiv);
            }
            // Add click events to major labels
            document.querySelectorAll('.tick-label.major').forEach(span => {
                span.addEventListener('click', (e) => {
                    const step = parseInt(e.target.getAttribute('data-step'));
                    document.getElementById('timeline-slider').value = step;
                    currentTargetYear = BASE_YEAR + step * 100;
                    loadYear(currentTargetYear);
                });
            });
        }

        // ----- Timeline listener -----
        document.getElementById('timeline-slider').addEventListener('input', async (e) => {
            const step = parseInt(e.target.value);
            currentTargetYear = BASE_YEAR + step * 100;
            await loadYear(currentTargetYear);
        });

        async function loadYear(targetYear) {
            // Update era label using historical_eras
            const { data: era } = await sb.from('historical_eras')
                .select('*').lte('year_start', targetYear).gte('year_end', targetYear).single();
            if (era) {
                currentEraId = era.id;
                document.getElementById('era-label').textContent = `${era.name} (${formatYear(era.year_start)}–${formatYear(era.year_end)})`;
            } else {
                document.getElementById('era-label').textContent = formatYear(targetYear);
            }
            await loadRegions(targetYear);
        }

        function formatYear(y) { return y < 0 ? `${Math.abs(y)} BCE` : `${y} CE`; }

        async function loadRegions(targetYear) {
            const { data: regions, error } = await sb
                .from('historical_regions')
                .select('id, name, geojson, owner_type, owner_id, start_year, end_year')
                .lte('start_year', targetYear)
                .gte('end_year', targetYear);
            if (error) { console.error(error); return; }

            if (!regions || regions.length === 0) {
                geoJSONLayer.clearLayers();
                return;
            }

            const features = regions.map(r => {
                const geo = typeof r.geojson === 'string' ? JSON.parse(r.geojson) : r.geojson;
                let fillColor = '#c8ad7f';
                if (r.owner_type === 'npc') fillColor = '#8d6e63';
                else if (r.owner_type === 'player') fillColor = '#4caf50';
                return {
                    ...geo,
                    properties: {
                        id: r.id,
                        name: r.name,
                        owner_type: r.owner_type,
                        owner_id: r.owner_id,
                        fillColor,
                        start_year: r.start_year,
                        end_year: r.end_year
                    }
                };
            });
            geoJSONLayer.clearLayers();
            geoJSONLayer.addData({ type: 'FeatureCollection', features });
        }

        // ----- Sidebar -----
        function openSidebar(props) {
            currentRegionId = props.id;
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('region-name').textContent = props.name + ` (${formatYear(props.start_year)}–${formatYear(props.end_year)})`;
            const owner = props.owner_type === 'player' ? (props.owner_id === player.id ? 'You' : 'Another Player') :
                          props.owner_type === 'npc' ? 'NPC Civilization' : 'Unclaimed';
            document.getElementById('region-owner').textContent = `Controlled by: ${owner}`;

            const isMine = (props.owner_type === 'player' && props.owner_id === player.id);
            document.getElementById('btn-conquer').style.display = isMine ? 'none' : 'block';
            document.getElementById('btn-build').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-trade').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-events').style.display = 'block';

            document.getElementById('action-feedback').textContent = '';
            document.getElementById('market-view').style.display = 'none';
            document.getElementById('market-actions').style.display = 'block';
            document.getElementById('events-list').classList.add('hidden');
        }

        // ----- Dice Battle -----
        const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
        document.getElementById('btn-conquer').addEventListener('click', async () => {
            if (!currentRegionId) return;
            const overlay = document.getElementById('battle-overlay');
            const attDice = document.getElementById('attacker-dice');
            const defDice = document.getElementById('defender-dice');
            const msg = document.getElementById('battle-message');
            overlay.style.display = 'block';
            msg.textContent = 'Rolling...';
            let rollInterval = setInterval(() => {
                attDice.textContent = diceFaces[Math.floor(Math.random()*6)];
                defDice.textContent = diceFaces[Math.floor(Math.random()*6)];
            }, 100);

            const { data, error } = await sb.rpc('conquer_region', {
                p_region_id: currentRegionId,
                p_target_year: currentTargetYear
            });
            clearInterval(rollInterval);
            if (error) {
                msg.textContent = 'Error: ' + error.message;
            } else if (data.success) {
                msg.textContent = 'Victory! Region conquered!';
                attDice.textContent = '⚅'; defDice.textContent = '⚁';
            } else {
                msg.textContent = 'Defeat! ' + (data.error || '');
                attDice.textContent = '⚀'; defDice.textContent = '⚅';
            }
            setTimeout(() => { overlay.style.display = 'none'; loadYear(currentTargetYear); }, 2000);
        });

        document.getElementById('btn-build').addEventListener('click', async () => {
            const building = prompt('What to build? (outpost/fortress/market)');
            if (!building) return;
            const { data, error } = await sb.rpc('build_structure', {
                p_region_id: currentRegionId,
                p_building_type: building
            });
            showFeedback(error ? error.message : data.message || data.error);
        });

        // ----- Trade -----
        document.getElementById('btn-trade').addEventListener('click', async () => {
            const resource = prompt('Resource type (food, wood, metal):');
            if (!resource) return;
            const quantity = parseInt(prompt('Quantity:'));
            const price = parseInt(prompt('Price per unit:'));
            if (!resource || !quantity || !price) return;
            const { data, error } = await sb.rpc('create_trade_offer', {
                p_region_id: currentRegionId,
                p_resource: resource,
                p_quantity: quantity,
                p_price: price
            });
            if (error) { showFeedback(error.message); return; }
            showFeedback('Trade offer listed!');
            if (document.getElementById('market-view').style.display === 'block') loadMarket();
        });

        // ----- Market Panel -----
        document.getElementById('btn-show-market').addEventListener('click', async () => {
            document.getElementById('market-view').style.display = 'block';
            document.getElementById('market-actions').style.display = 'none';
            await loadMarket();
        });
        document.getElementById('btn-close-market').addEventListener('click', () => {
            document.getElementById('market-view').style.display = 'none';
            document.getElementById('market-actions').style.display = 'block';
        });
        document.getElementById('btn-create-offer').addEventListener('click', () => {
            document.getElementById('btn-trade').click();
        });

        async function loadMarket() {
            const { data: offers } = await sb.from('era_trade_offers')
                .select('*, listing_player:players(username)')
                .eq('active', true)
                .order('created_at', { ascending: false })
                .limit(50);
            const list = document.getElementById('trade-list');
            if (!offers || offers.length === 0) {
                list.innerHTML = '<p>No offers yet.</p>';
                return;
            }
            list.innerHTML = offers.map(o => `
                <div class="market-offer">
                    <strong>${o.resource}</strong> x${o.quantity} @ $${o.price_per_unit}<br>
                    Seller: ${o.listing_player?.username || 'Unknown'}<br>
                    <button onclick="buyOffer('${o.id}')">Buy 1</button>
                </div>
            `).join('');
        }

        window.buyOffer = async function(offerId) {
            const { data, error } = await sb.rpc('buy_trade_offer', { p_offer_id: offerId });
            if (error) { alert(error.message); return; }
            if (data.success) {
                alert('Purchased!');
                loadMarket();
            } else {
                alert(data.error || 'Purchase failed');
            }
        };

        // ----- Historical Events -----
        document.getElementById('btn-events').addEventListener('click', async () => {
            const eventsDiv = document.getElementById('events-list');
            if (!eventsDiv.classList.contains('hidden')) {
                eventsDiv.classList.add('hidden');
                return;
            }
            if (!currentEraId) return;
            const { data: events } = await sb.from('historical_events')
                .select('*')
                .eq('era_id', currentEraId)
                .order('created_at', { ascending: false });
            if (!events || events.length === 0) {
                eventsDiv.innerHTML = '<p>No events recorded for this era.</p>';
            } else {
                eventsDiv.innerHTML = events.map(e => `
                    <div class="event-item">
                        <strong>${e.title}</strong> (${e.description})<br>
                        Effect: ${JSON.stringify(e.effect)}
                    </div>
                `).join('');
            }
            eventsDiv.classList.remove('hidden');
        });

        function showFeedback(msg) {
            document.getElementById('action-feedback').textContent = msg;
            setTimeout(() => document.getElementById('action-feedback').textContent = '', 4000);
        }

        // ----- Realtime -----
        function setupRealtime() {
            sb.channel('historical-regions')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'historical_regions',
                }, () => {
                    if (currentTargetYear) loadYear(currentTargetYear);
                })
                .subscribe();
        }

        document.getElementById('btn-empire-stats').addEventListener('click', async () => {
            const { data } = await sb.rpc('get_empire_stats', { p_player_id: player.id });
            alert(`Total Regions: ${data.total_regions}\nArmy: ${data.army}\nGold: ${data.gold}`);
        });

        init();
    </script>
</body>
</html>
