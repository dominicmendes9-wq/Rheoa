<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Dashboard</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #f8f8f0; color: #222; padding: 20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .stat-card { border:2px solid black; border-radius:10px; padding:15px; margin:10px; display:inline-block; width:200px; text-align:center; vertical-align:top; }
    button { padding:8px 12px; margin:5px; border-radius:5px; cursor:pointer; }
    #xpBarContainer { width: 300px; background:#ccc; border:1px solid #999; border-radius:10px; margin:5px auto; }
    #xpBar { width:0%; height:20px; background:#9c27b0; border-radius:10px; }
    #feedback { margin-top:15px; font-weight:bold; text-align:center; }
    .boost { color: green; font-weight:bold; }
  </style>
</head>
<body>

<h1>Dashboard</h1>

<div id="stats"></div>
<div id="xpBarContainer"><div id="xpBar"></div></div>
<div id="feedback"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="goTo('jobs.html')">Jobs</button>
  <button onclick="goTo('crime.html')">Crime</button>
  <button onclick="goTo('inventory.html')">Inventory</button>
  <button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;

// 🌟 LOAD PLAYER
async function loadPlayer() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.getElementById("stats").innerText="Player not found"; return; }
  player = playerData;

  renderStats();
}

// 🎨 RENDER STATS
function renderStats() {
  const statsDiv = document.getElementById("stats");

  statsDiv.innerHTML = `
    <div class="stat-card">Username<br><b>${player.username}</b></div>
    <div class="stat-card">💰 Cash<br><b>₹${player.cash}</b></div>
    <div class="stat-card">⭐ XP<br><b>${player.xp}</b></div>
    <div class="stat-card">⚡ Energy<br><b>${player.energy}</b></div>
    <div class="stat-card">❤️ Health<br><b>${player.health || 100}</b></div>
    <div class="stat-card">🍽️ Hunger<br><b>${player.hunger || 100}</b></div>
    <div class="stat-card">😊 Happiness<br><b>${player.happiness || 100}</b></div>
    <div class="stat-card boost">⚡ Boost: ${player.success_boost || 0}%</div>
  `;

  renderXPBar();
}

// 🟪 RENDER XP BAR
function renderXPBar() {
  const nextLevelXP = Math.pow(player.level,2)*100;
  const prevLevelXP = Math.pow(player.level-1,2)*100;
  const progress = ((player.xp - prevLevelXP)/(nextLevelXP - prevLevelXP))*100;
  document.getElementById("xpBar").style.width = progress+'%';
}

// 🔄 LOGOUT
async function logout() {
  await sb.auth.signOut();
  window.location.href="index.html";
}

// 🔗 NAVIGATION
function goTo(page) { window.location.href = page; }

// AUTO REFRESH STATS EVERY 5s
setInterval(async () => {
  if (!player) return;
  const { data: playerData } = await sb.from('players').select('*').eq('id', player.id).single();
  if (playerData) {
    player = playerData;
    renderStats();
  }
}, 5000);

loadPlayer();
</script>

</body>
</html>
