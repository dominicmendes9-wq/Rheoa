<!DOCTYPE html>
<html>
<head>
    <title>Meu Perfil - Rheoa RPG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2ff;
            font-family: 'Verdana', 'Geneva', sans-serif;
            padding: 20px;
        }
        .orkut-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #9cb2d1;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-header {
            background: #e1e9f5;
            padding: 10px 15px;
            border-bottom: 1px solid #9cb2d1;
            font-weight: bold;
            color: #1a3b6e;
            font-size: 1.1rem;
        }
        .card-content {
            padding: 15px;
        }
        .profile-header {
            background: linear-gradient(135deg, #1e5799 0%, #2b6fae 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .avatar {
            font-size: 5rem;
            background: rgba(255,255,255,0.2);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-info {
            flex: 1;
        }
        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .error-box {
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1e5799;
            text-decoration: none;
        }
        button {
            background: #1e5799;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="orkut-container">
    <div id="profileView">
        <div class="card">
            <div class="card-content">Carregando...</div>
        </div>
    </div>
    <a href="dashboard.html" class="back-link">← Voltar ao Dashboard</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Supabase client
const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

// Global error handler to display errors on page
window.onerror = function(msg, url, line, col, error) {
    document.getElementById('profileView').innerHTML = `
        <div class="card">
            <div class="card-header">Erro JavaScript</div>
            <div class="error-box">${msg}<br>Linha: ${line}</div>
        </div>
    `;
    return false;
};

async function loadCurrentUser() {
    try {
        // Check if user is logged in
        const { data: { user }, error: userError } = await sb.auth.getUser();
        if (userError) throw new Error(`Auth error: ${userError.message}`);
        if (!user) {
            document.getElementById('profileView').innerHTML = `
                <div class="card">
                    <div class="card-header">Não autenticado</div>
                    <div class="card-content">Você precisa estar logado. <a href="index.html">Fazer login</a></div>
                </div>
            `;
            return;
        }
        
        // Fetch player data
        const { data: player, error: playerError } = await sb
            .from('players')
            .select('*')
            .eq('auth_id', user.id)
            .single();
        
        if (playerError) throw new Error(`Player fetch error: ${playerError.message}`);
        if (!player) throw new Error('Player not found in database');
        
        // Success - show profile
        document.getElementById('profileView').innerHTML = `
            <div class="card">
                <div class="card-header">✅ Depuração</div>
                <div class="card-content">
                    <p><strong>Usuário logado:</strong> ${player.username}</p>
                    <p><strong>ID:</strong> ${player.id}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Nível:</strong> ${player.level}</p>
                    <p><strong>Cash:</strong> ₹${player.cash}</p>
                    <button onclick="location.href='profile.html?id=' + '${player.id}'">Ver meu perfil completo</button>
                </div>
            </div>
        `;
        
        // Optionally, redirect to full profile if no ID in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.has('id')) {
            window.location.href = `profile.html?id=${player.id}`;
        }
    } catch (err) {
        document.getElementById('profileView').innerHTML = `
            <div class="card">
                <div class="card-header">Erro ao carregar</div>
                <div class="error-box">${err.message}</div>
            </div>
        `;
        console.error(err);
    }
}

loadCurrentUser();
</script>
</body>
</html>
