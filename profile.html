        /* ─── Tomato delivery overlay ─── */

<div class="container">
    <div class="top-bar">
        <a href="dashboard.html" class="back-link">← Dashboard</a>
        <div class="theme-switcher" id="themeSwitcher">
            <button data-theme="default" class="theme-btn active">✨ Aurora</button>

    <div id="profileView"></div>
</div>

<!-- Tomato delivery overlay -->
<div id="delivery-overlay">
    <div id="delivery-boy">
        <img src="https://i.ibb.co/F4L9WcNP/Delivery-Boy.gif" alt="Delivery Boy">

</div>
<img id="tomato-gif" src="https://i.ibb.co/VpW57Vwh/Tomato.gif" alt="Tomato">

<script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // SUPABASE INIT
    const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
    const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
    const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentPlayer = null;
    let profileOwner = null;
    let friendships = [];
    let testimonials = [];
    let pendingRequests = [];
    let profileViews = [];
    let searchResults = [];
    let profileViewCount = 0;

    // ── Subscription cache ──
    let tierBenefits = {};
    let tierInfo = {};

    // ── Comment collapse state ──
    let commentCollapsed = {};

    // ── Event listener management ──
    let containerClickHandler = null;

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Helper: fetch tier info
    async function fetchTierInfo(tier) {
        const { data, error } = await sb
            .from('subscription_benefits')
            .select('*')
            .eq('tier', tier)
            .single();
        if (error || !data) {
            return {
                tier: tier,
                display_name: tier.charAt(0).toUpperCase() + tier.slice(1),
                features: {},
                color_hex: '#888',
                badge_icon: '🟢'
            };
        }
        return data;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // THEME
    function setTheme(themeName) {
        const body = document.body;
        body.classList.remove('theme-dusk', 'theme-meadow');
        if (themeName === 'dusk') body.classList.add('theme-dusk');
        else if (themeName === 'meadow') body.classList.add('theme-meadow');
        localStorage.setItem('rheoa_theme', themeName);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
        });
    }
    function initTheme() {
        const saved = localStorage.getItem('rheoa_theme');
        if (saved === 'dusk') setTheme('dusk');
        else if (saved === 'meadow') setTheme('meadow');
        else setTheme('default');
        document.getElementById('themeSwitcher')?.addEventListener('click', (e) => {
            const btn = e.target.closest('.theme-btn');
            if (!btn) return;
            setTheme(btn.getAttribute('data-theme'));
        });
    }

    function showToast(msg, type = 'info') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (type === 'error') toast.style.background = '#f44336';
        else if (type === 'success') toast.style.background = '#4CAF50';
        else toast.style.background = 'var(--accent)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // TOMATO FUNCTIONS
async function refillTomatoes() {
    try {
        const { data, error } = await sb.rpc('refill_tomatoes');
        if (error) throw error;
        if (data && data.length > 0) {
            const result = data[0];
            if (result.success && result.new_tomatoes !== null) {
                if (currentPlayer) currentPlayer.tomatoes = result.new_tomatoes;
            }
        }
        // Always update button
        updateTomatoButton();
        // Fallback: fetch directly to ensure we have latest
        const { data: playerData } = await sb
            .from('players')
            .select('tomatoes')
            .eq('id', currentPlayer.id)
            .single();
        if (playerData && currentPlayer) {
            currentPlayer.tomatoes = playerData.tomatoes;
            updateTomatoButton();
        }
    } catch (e) {
        console.warn('Refill error:', e);
        // Fallback fetch
        const { data: playerData } = await sb
            .from('players')
            .select('tomatoes')
            .eq('id', currentPlayer.id)
            .single();
        if (playerData && currentPlayer) {
            currentPlayer.tomatoes = playerData.tomatoes;
            updateTomatoButton();
        }
    }
}

async function sendTomato(receiverId) {
    try {
        const { data, error } = await sb.rpc('send_tomato', { p_receiver_id: receiverId });
        if (error) throw error;
        if (data && data.length > 0) {
            const result = data[0];
            if (result.success) {
                const remaining = result.remaining_tomatoes;
                showToast(`🍅 1 tomato sent! ${remaining} remaining in stock.`, 'success');
                if (currentPlayer) currentPlayer.tomatoes = remaining;
                updateTomatoButton();
            } else {
                showToast(`❌ ${result.message}`, 'error');
            }
        } else {
            showToast('Unexpected response from server', 'error');
        }
    } catch (e) {
        console.error('Send tomato error:', e);
        showToast('Error sending tomato: ' + e.message, 'error');
        await refillTomatoes();
    }
}

function updateTomatoButton() {
    const btn = document.getElementById('tomatoBtn');
    if (btn) {
        const count = currentPlayer?.tomatoes ?? 0;
        btn.innerHTML = `🍅 Throw Tomato (${count})`;
        btn.disabled = count <= 0;
    }
}
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TOMATO DELIVERY – with robust logging and fallback
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

async function checkAndShowDeliveries() {
    if (!currentPlayer) {
        console.warn('checkAndShowDeliveries: No currentPlayer');
        return;
    }
    console.log('🔍 Checking deliveries for player:', currentPlayer.id);
    try {
        const { data, error } = await sb.rpc('get_pending_deliveries', { p_player_id: currentPlayer.id });
        if (error) throw error;
        console.log('📦 Pending deliveries:', data);
        if (data && data.length > 0) {
            const delivery = data[0];
            showToast('📦 You have a tomato delivery!', 'info');
            // Wait a moment, then run animation
            setTimeout(async () => {
                try {
                    await runDeliveryAnimation(delivery.id);
                    // Mark as shown (but not yet received) after animation starts
                    await sb.rpc('accept_tomato_delivery', { p_delivery_id: delivery.id });
                } catch (animError) {
                    console.error('Animation error:', animError);
                    showToast('⚠️ Delivery arrived but animation failed. Check console.', 'error');
                }
            }, 1000);
        } else {
            console.log('No pending deliveries.');
        }
    } catch (e) {
        console.error('Delivery check error:', e);
        showToast('Error checking deliveries: ' + e.message, 'error');
    }
}

function runDeliveryAnimation(deliveryId) {
    return new Promise((resolve, reject) => {
        try {
            const overlay = document.getElementById('delivery-overlay');
            const boy = document.getElementById('delivery-boy');
            const bubble = document.getElementById('delivery-bubble');
            const tomatoGif = document.getElementById('tomato-gif');

            // Check if elements exist
            if (!overlay || !boy || !bubble || !tomatoGif) {
                console.error('Missing delivery elements:', { overlay, boy, bubble, tomatoGif });
                reject('Missing DOM elements');
                return;
            }

            console.log('Delivery elements found, starting animation.');

            // Reset positions
            boy.style.left = '-200px';
            boy.classList.remove('delivery-exit');
            bubble.style.display = 'none';
            tomatoGif.style.display = 'none';
            overlay.style.pointerEvents = 'auto';

            // Remove old boy-bubble
            const oldBubble = document.getElementById('boy-bubble');
            if (oldBubble) oldBubble.remove();

            // Move boy to center
            setTimeout(() => {
                boy.style.left = 'calc(50% - 100px)';
                console.log('🚚 Boy at center');
            }, 100);

            // Show speech bubble after he stops
            setTimeout(() => {
                bubble.style.display = 'block';
                console.log('💬 Bubble shown');
            }, 2500);

            // Click handler for bubble
            const acceptHandler = () => {
                bubble.style.display = 'none';
                tomatoGif.style.display = 'block';
                console.log('🍅 Tomato gif shown');

                // Boy says "hehehehe"
                const boyBubble = document.createElement('div');
                boyBubble.id = 'boy-bubble';
                boyBubble.textContent = 'hehehehe';
                boy.parentNode.appendChild(boyBubble);

                // After 3 seconds, boy moves to right
                setTimeout(() => {
                    boy.classList.add('delivery-exit');
                    if (boyBubble.parentNode) boyBubble.remove();
                    console.log('🚚 Boy exiting right');
                    setTimeout(() => {
                        tomatoGif.style.display = 'none';
                        overlay.style.pointerEvents = 'none';
                        boy.style.left = '-200px';
                        boy.classList.remove('delivery-exit');
                        resolve();
                    }, 2200);
                }, 3000);
            };

            bubble.removeEventListener('click', acceptHandler);
            bubble.addEventListener('click', acceptHandler);

        } catch (err) {
            console.error('runDeliveryAnimation error:', err);
            reject(err);
        }
    });
}

async function refillTomatoes() {
    try {
        const { data, error } = await sb.rpc('refill_tomatoes');
        if (error) throw error;
        if (data && data.length > 0) {
            const result = data[0];
            if (result.success) {
                if (currentPlayer) currentPlayer.tomatoes = result.new_tomatoes;
                updateTomatoButton();
            } else {
                // If no refill, result.new_tomatoes might have current count
                if (result.new_tomatoes !== undefined && currentPlayer) {
                    currentPlayer.tomatoes = result.new_tomatoes;
                    updateTomatoButton();
                }
            }
        }
        // Fallback: fetch directly
        const { data: playerData } = await sb
            .from('players')
            .select('tomatoes')
            .eq('id', currentPlayer.id)
            .single();
        if (playerData && currentPlayer) {
            currentPlayer.tomatoes = playerData.tomatoes;
            updateTomatoButton();
        }
    } catch (e) {
        console.warn('Refill error:', e);
        // Fallback fetch
        const { data: playerData } = await sb
            .from('players')
            .select('tomatoes')
            .eq('id', currentPlayer.id)
            .single();
        if (playerData && currentPlayer) {
            currentPlayer.tomatoes = playerData.tomatoes;
            updateTomatoButton();
        }
    }
}

async function sendTomato(receiverId) {
    try {
        const { data, error } = await sb.rpc('send_tomato', { p_receiver_id: receiverId });
        if (error) throw error;
        if (data && data.length > 0) {
            const result = data[0];
            if (result.success) {
                const remaining = result.remaining_tomatoes;
                showToast(`🍅 1 tomato sent! ${remaining} remaining in stock.`, 'success');
                if (currentPlayer) currentPlayer.tomatoes = remaining;
                updateTomatoButton();
            } else {
                showToast(`❌ ${result.message}`, 'error');
                if (result.remaining_tomatoes !== undefined && currentPlayer) {
                    currentPlayer.tomatoes = result.remaining_tomatoes;
                    updateTomatoButton();
                }
            }
        } else {
            showToast('Unexpected response from server', 'error');
        }
    } catch (e) {
        console.error('Send tomato error:', e);
        showToast('Error sending tomato: ' + e.message, 'error');
        // Refresh count
        await refillTomatoes();
    }
}

    async function loadTestimonialsWithReactionsAndComments() {
        const { data: rawTestimonials, error: tError } = await sb
            .from('testimonials')
            .select('*, author:author_id(*)')
            .eq('profile_id', profileOwner.id)
            .eq('is_visible', true)
            .order('created_at', { ascending: false });
        if (tError) { console.error(tError); testimonials = []; return; }
        if (!rawTestimonials || rawTestimonials.length === 0) {
            testimonials = [];
            return;
        }

        const testimonialIds = rawTestimonials.map(t => t.id);

        const { data: reactions, error: rError } = await sb
            .from('testimonial_reactions')
            .select('*')
            .in('testimonial_id', testimonialIds);
        if (rError) console.error(rError);

        const { data: comments, error: cError } = await sb
            .from('testimonial_comments')
            .select('*, user:user_id(*)')
            .in('testimonial_id', testimonialIds)
            .order('depth', { ascending: true })
            .order('created_at', { ascending: true });
        if (cError) console.error(cError);

        testimonials = rawTestimonials.map(t => {
            const tReactions = (reactions || []).filter(r => r.testimonial_id === t.id);
            const tComments = (comments || []).filter(c => c.testimonial_id === t.id);
            const reactionCounts = {};
            const userReaction = tReactions.find(r => r.user_id === currentPlayer?.id);
            tReactions.forEach(r => { reactionCounts[r.reaction_type] = (reactionCounts[r.reaction_type] || 0) + 1; });
            const commentMap = {};
            const roots = [];
            tComments.forEach(c => {
                commentMap[c.id] = { ...c, children: [], is_deleted: c.is_deleted || false };
            });
            tComments.forEach(c => {
                if (c.parent_id && commentMap[c.parent_id]) {
                    commentMap[c.parent_id].children.push(commentMap[c.id]);
                } else {
                    roots.push(commentMap[c.id]);
                }
            });
            return {
                ...t,
                reactions: tReactions,
                reactionCounts,
                userReaction: userReaction || null,
                commentTree: roots,
                commentCount: tComments.length,
            };
        });
    }

            } else if (action === 'edit-scrap') {
                editTestimonial(testimonialId);
            } else if (action === 'delete-scrap') {
                deleteTestimonial(testimonialId);
            }
        };
        container.addEventListener('click', containerClickHandler);

        // Cancel reply
        if (container._cancelListener) {
            container.removeEventListener('click', container._cancelListener);
        }
        container._cancelListener = function(e) {
            const target = e.target.closest('[data-action="cancel-reply"]');
            if (!target) return;
            const parentId = target.dataset.parentId;
            if (parentId) hideReplyForm(parentId);
        };
        container.addEventListener('click', container._cancelListener);
    }

    function buildTestimonialCard(t, canComment) {
        const isCollapsed = commentCollapsed[t.id] || false;
        const reactionsHtml = buildReactionsHtml(t);
        const commentsHtml = buildCommentsHtml(t.commentTree, t.id);
        const collapseAllText = isCollapsed ? 'Expand' : 'Collapse';

        const isAuthor = currentPlayer && currentPlayer.id === t.author_id;
        const isProfileOwner = currentPlayer && currentPlayer.id === profileOwner.id;
        const showScrapActions = isAuthor || isProfileOwner;

        return `
            <div class="testimonial-card" data-testimonial-id="${t.id}" id="testimonial-${t.id}">
                <div class="flex-between">
                    <strong>${escapeHtml(t.author.username)}</strong>
                    <span style="font-size:0.7rem;">${new Date(t.created_at).toLocaleString()}</span>
                </div>
                <div style="margin: 10px 0;">${escapeHtml(t.content)}</div>
                ${reactionsHtml}
                <div>
                    <span class="comment-toggle" data-action="toggle-comments" data-testimonial-id="${t.id}">💬 ${t.commentCount} comments</span>
                    <span class="collapse-all-btn" data-action="collapse-all" data-testimonial-id="${t.id}">${collapseAllText}</span>
                </div>
                ${showScrapActions ? `
                    <div class="scrap-actions">
                        <button data-action="edit-scrap" data-testimonial-id="${t.id}">✏️ Edit</button>
                        <button data-action="delete-scrap" data-testimonial-id="${t.id}">🗑️ Delete</button>
                    </div>
                ` : ''}
                <div class="comments-section ${isCollapsed ? 'collapsed' : ''}" id="comments-${t.id}">
                    <div class="comment-tree" id="comment-tree-${t.id}">
                        ${commentsHtml}
                    </div>
                    ${canComment ? `
                        <div class="add-comment-form">
                            <textarea id="comment-input-${t.id}" placeholder="Write a comment..." rows="2"></textarea>
                            <div class="comment-actions">
                                <button data-action="submit-comment" data-testimonial-id="${t.id}">Post comment</button>
                            </div>
                        </div>
                    ` : `
                        <div style="font-size:0.8rem; color:var(--text-muted); margin-top:8px;">
                            You must be the author or a friend to comment.
                        </div>
                    `}
                </div>
            </div>
        `;
    }

    function buildReactionsHtml(t) {
        const emojis = ['👍', '👎', '🤣', '🤬', '🎉', '💝'];
        const userReaction = t.userReaction ? t.userReaction.reaction_type : null;
        const counts = t.reactionCounts || {};
        let html = '<div class="reaction-bar">';
        emojis.forEach(emoji => {
            const count = counts[emoji] || 0;
            const isActive = userReaction === emoji;
            html += `
                <button class="reaction-btn ${isActive ? 'active' : ''}" data-action="reaction" data-testimonial-id="${t.id}" data-reaction="${emoji}">
                    ${emoji} <span class="count">${count}</span>
                </button>
            `;
        });
        html += '</div>';
        return html;
    }

    function buildCommentsHtml(commentNodes, testimonialId, depth = 0) {
        if (!commentNodes || commentNodes.length === 0) return '';
        let html = '';
        commentNodes.forEach(node => {
            const isDeleted = node.is_deleted;
            const authorName = node.user ? escapeHtml(node.user.username) : 'Unknown';
            const time = new Date(node.created_at).toLocaleString();
            const content = isDeleted ? '<span class="deleted-comment">[Comment removed]</span>' : escapeHtml(node.content);
            const childHtml = buildCommentsHtml(node.children, testimonialId, depth + 1);

            html += `
                <div class="comment-item" style="margin-left: ${depth * 20}px;">
                    <div class="comment-header">
                        <span class="comment-author">${authorName}</span>
                        <span class="comment-time">${time}</span>
                    </div>
                    <div class="comment-content">${content}</div>
                    ${!isDeleted ? `
                        <div class="comment-actions">
                            <button data-action="show-reply" data-parent-id="${node.id}" data-testimonial-id="${testimonialId}">Reply</button>
                        </div>
                        <div class="reply-form" id="reply-form-${node.id}">
                            <textarea id="reply-input-${node.id}" placeholder="Write a reply..." rows="2"></textarea>
                            <div class="reply-actions">
                                <button data-action="submit-reply" data-parent-id="${node.id}" data-testimonial-id="${testimonialId}">Reply</button>
                                <button data-action="cancel-reply" data-parent-id="${node.id}">Cancel</button>
                            </div>
                        </div>
                    ` : ''}
                    ${childHtml}
                </div>
            `;
        });
        return html;
    }

    // ── Reaction toggle ──
    async function toggleReaction(testimonialId, reaction) {
        if (!currentPlayer) return showToast('Please log in to react');
        try {
            const existing = testimonials.find(t => t.id === testimonialId)?.userReaction;
            if (existing && existing.reaction_type === reaction) {
                const { error } = await sb
                    .from('testimonial_reactions')
                    .delete()
                    .eq('testimonial_id', testimonialId)
                    .eq('user_id', currentPlayer.id);
                if (error) throw error;
            } else {
                if (existing) {
                    await sb
                        .from('testimonial_reactions')
                        .delete()
                        .eq('testimonial_id', testimonialId)
                        .eq('user_id', currentPlayer.id);
                }
                const { error } = await sb
                    .from('testimonial_reactions')
                    .insert({
                        testimonial_id: testimonialId,
                        user_id: currentPlayer.id,
                        reaction_type: reaction
                    });
                if (error) throw error;
            }
            await loadTestimonialsWithReactionsAndComments();
            await renderTestimonialsWithReactionsAndComments();
        } catch (error) {
            console.error('Reaction error:', error);
            showToast('Error updating reaction: ' + error.message, 'error');
        }
    }

    // ── Toggle comments ──
    function toggleComments(testimonialId) {
        const section = document.getElementById(`comments-${testimonialId}`);
        if (!section) return;
        const isCollapsed = section.classList.toggle('collapsed');
        commentCollapsed[testimonialId] = isCollapsed;
        const toggleBtn = document.querySelector(`[data-action="toggle-comments"][data-testimonial-id="${testimonialId}"]`);
        if (toggleBtn) toggleBtn.textContent = isCollapsed ? 'Expand comments' : 'Collapse comments';
        const collapseBtn = document.querySelector(`[data-action="collapse-all"][data-testimonial-id="${testimonialId}"]`);
        if (collapseBtn) collapseBtn.textContent = isCollapsed ? 'Expand' : 'Collapse';
    }

    function toggleAllComments(testimonialId) {
        const section = document.getElementById(`comments-${testimonialId}`);
        if (!section) return;
        const isCollapsed = section.classList.toggle('collapsed');
        commentCollapsed[testimonialId] = isCollapsed;
        const toggleBtn = document.querySelector(`[data-action="toggle-comments"][data-testimonial-id="${testimonialId}"]`);
        if (toggleBtn) toggleBtn.textContent = isCollapsed ? 'Expand comments' : 'Collapse comments';
        const collapseBtn = document.querySelector(`[data-action="collapse-all"][data-testimonial-id="${testimonialId}"]`);
        if (collapseBtn) collapseBtn.textContent = isCollapsed ? 'Expand' : 'Collapse';
    }

    function showReplyForm(parentId) {
        const form = document.getElementById(`reply-form-${parentId}`);
        if (form) form.style.display = 'block';
    }

    function hideReplyForm(parentId) {
        const form = document.getElementById(`reply-form-${parentId}`);
        if (form) {
            form.style.display = 'none';
            const input = document.getElementById(`reply-input-${parentId}`);
            if (input) input.value = '';
        }
    }

    async function submitComment(testimonialId, parentId) {
        if (!currentPlayer) return showToast('Please log in to comment');
        let content;
        let inputId;
        if (parentId) {
            inputId = `reply-input-${parentId}`;
        } else {
            inputId = `comment-input-${testimonialId}`;
        }
        const input = document.getElementById(inputId);
        if (!input) return;
        content = input.value.trim();
        if (!content) return showToast('Comment cannot be empty');

        let depth = 0;
        if (parentId) {
            const parentComment = await sb
                .from('testimonial_comments')
                .select('depth')
                .eq('id', parentId)
                .single();
            if (parentComment.data) depth = parentComment.data.depth + 1;
        }

        try {
            const { data, error } = await sb
                .from('testimonial_comments')
                .insert({
                    testimonial_id: testimonialId,
                    parent_id: parentId || null,
                    user_id: currentPlayer.id,
                    content: content,
                    depth: depth,
                })
                .select();
            if (error) throw error;
            input.value = '';
            if (parentId) hideReplyForm(parentId);
            await loadTestimonialsWithReactionsAndComments();
            await renderTestimonialsWithReactionsAndComments();
            showToast('Comment posted', 'success');
        } catch (error) {
            console.error('Comment error:', error);
            showToast('Error posting comment: ' + error.message, 'error');
        }
    }

    // ── Edit testimonial ──
    async function editTestimonial(testimonialId) {
        const testimonial = testimonials.find(t => t.id === testimonialId);
        if (!testimonial) return;
        const newContent = prompt('Edit your scrap:', testimonial.content);
        if (newContent === null || newContent === testimonial.content) return;
        try {
            const { error } = await sb
                .from('testimonials')
                .update({ content: newContent, updated_at: new Date() })
                .eq('id', testimonialId);
            if (error) throw error;
            showToast('Scrap updated', 'success');
            await loadTestimonialsWithReactionsAndComments();
            await renderTestimonialsWithReactionsAndComments();
        } catch (error) {
            console.error('Edit error:', error);
            showToast('Error updating scrap', 'error');
        }
    }

    // ── Delete testimonial ──
    async function deleteTestimonial(testimonialId) {
        if (!confirm('Delete this scrap?')) return;
        try {
            const { error } = await sb
                .from('testimonials')
                .delete()
                .eq('id', testimonialId);
            if (error) throw error;
            showToast('Scrap deleted', 'success');
            await loadTestimonialsWithReactionsAndComments();
            await renderTestimonialsWithReactionsAndComments();
        } catch (error) {
            console.error('Delete error:', error);
            showToast('Error deleting scrap', 'error');
        }
    }

    // ── Render pending requests ──
    function renderPendingRequests() {
        const container = document.getElementById('requestsList');
        if (!container) return;
        if (!pendingRequests.length) { container.innerHTML = '<div class="empty-state">No pending friend requests.</div>'; return; }
        container.innerHTML = pendingRequests.map(req => `
            <div class="friend-card">
                <div class="friend-avatar">${req.requester.avatar_url || '👤'}</div>
                <div><strong>${escapeHtml(req.requester.username)}</strong><br>
                <button onclick="acceptFriendRequestById('${req.id}')">Accept</button> <button class="decline" onclick="declineFriendRequestById('${req.id}')">Decline</button></div>
            </div>
        `).join('');
    }

    function renderVisitors() {
        const container = document.getElementById('visitorsList');
        if (!container) return;
        if (!profileViews.length) { container.innerHTML = '<div class="empty-state">👀 No visitors yet.</div>'; return; }
        container.innerHTML = profileViews.slice(0,8).map(v => `
            <div class="friend-card">
                <div class="friend-avatar">${v.viewer?.avatar_url || '👀'}</div>
                <div><strong>${escapeHtml(v.viewer?.username || 'wanderer')}</strong><div style="font-size:0.7rem;">${new Date(v.viewed_at).toLocaleString()}</div></div>
            </div>
        `).join('');
    }

    // ──────────────────────────────────────
    // API actions
    async function sendFriendRequest(targetId) {
        const { error } = await sb.from('friendships').insert({ requester_id: currentPlayer.id, addressee_id: targetId, status: 'pending' });
        error ? showToast(error.message, 'error') : (showToast('Request sent!', 'success'), await loadProfile(profileOwner.id));
    }
    async function acceptFriendRequest() {
        const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
        error ? showToast(error.message, 'error') : (showToast('Friend added!', 'success'), await loadProfile(profileOwner.id));
    }
    async function declineFriendRequest() {
        const { error } = await sb.from('friendships').delete().eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
        error ? showToast(error.message, 'error') : (showToast('Declined', 'info'), await loadProfile(profileOwner.id));
    }
    async function acceptFriendRequestById(requestId) {
        const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('id', requestId);
        error ? showToast(error.message, 'error') : (showToast('Friend added!', 'success'), await loadProfile(profileOwner.id));
    }
    async function declineFriendRequestById(requestId) {
        const { error } = await sb.from('friendships').delete().eq('id', requestId);
        error ? showToast(error.message, 'error') : (showToast('Request declined', 'info'), await loadProfile(profileOwner.id));
    }
    async function removeFriend(friendId) {
        if (!confirm('Remove friend?')) return;
        const { error } = await sb.from('friendships').delete().or(`and(requester_id.eq.${currentPlayer.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentPlayer.id})`);
        error ? showToast(error.message, 'error') : (showToast('Friend removed', 'info'), await loadProfile(profileOwner.id));
    }
    async function addTestimonial() {
        const content = document.getElementById('scrapContent')?.value.trim();
        if (!content) return showToast('Write something...');
        const { error } = await sb.from('testimonials').insert({ profile_id: profileOwner.id, author_id: currentPlayer.id, content, is_visible: true });
        if (error) showToast(error.message, 'error');
        else {
            showToast('Scrap posted!', 'success');
            document.getElementById('scrapContent').value = '';
            await loadTestimonialsWithReactionsAndComments();
            await renderTestimonialsWithReactionsAndComments();
        }
    }
    async function updateProfile() {
        const bio = document.getElementById('bioInput')?.value;
        const location = document.getElementById('locationInput')?.value;
        const country = document.getElementById('countryInput')?.value;
        const gender = document.getElementById('genderInput')?.value;
        const avatar_url = document.getElementById('avatarUrlInput')?.value;
        const is_public = document.getElementById('privacyToggle')?.checked;
        const updateData = { bio, location, country, gender, is_public };
        if (tierBenefits.custom_avatar && avatar_url !== undefined) updateData.avatar_url = avatar_url;
        const { error } = await sb.from('players').update(updateData).eq('id', currentPlayer.id);
        error ? showToast(error.message, 'error') : (showToast('Profile updated', 'success'), await loadProfile(currentPlayer.id));
    }
    function viewProfile(userId) { window.location.href = `profile.html?id=${userId}`; }
    async function searchUsers() {
        const username = document.getElementById('searchUsername')?.value.trim() || '';
        const gender = document.getElementById('searchGender')?.value;
        const location = document.getElementById('searchLocation')?.value.trim();
        const country = document.getElementById('searchCountry')?.value.trim();
        let query = sb.from('players').select('id, username, avatar_url, gender, location, country').neq('id', currentPlayer.id);
        if (username) query = query.ilike('username', `%${username}%`);
        if (gender) query = query.eq('gender', gender);
        if (location) query = query.ilike('location', `%${location}%`);
        if (country) query = query.ilike('country', `%${country}%`);
        const { data, error } = await query.limit(50);
        if (error) return showToast(error.message, 'error');
        const friendIds = friendships.map(f => f.requester_id === currentPlayer.id ? f.addressee_id : f.requester_id);
        searchResults = (data||[]).map(u => ({...u, isFriend: friendIds.includes(u.id)}));
        const container = document.getElementById('searchResultsGrid');
        if (!container) return;
        if (!searchResults.length) { container.innerHTML = '<div class="empty-state">No adventurers found.</div>'; return; }
        container.innerHTML = searchResults.map(u => `
            <div class="result-card">
                <div class="result-avatar">${u.avatar_url || '🧙'}</div>
                <div>
                    <strong>${escapeHtml(u.username)}</strong>
                    <div style="font-size:0.7rem;">${escapeHtml(u.gender||'')} ${escapeHtml(u.location||'')}</div>
                    ${u.isFriend ? '<button disabled>✓ Friend</button>' : `<button onclick="sendFriendRequest('${u.id}')">➕ Add</button>`}
                    <button onclick="viewProfile('${u.id}')">View</button>
                </div>
            </div>
        `).join('');
    }
    async function resetSearch() {
        document.getElementById('searchUsername') && (document.getElementById('searchUsername').value = '');
        document.getElementById('searchGender') && (document.getElementById('searchGender').value = '');
        document.getElementById('searchLocation') && (document.getElementById('searchLocation').value = '');
        document.getElementById('searchCountry') && (document.getElementById('searchCountry').value = '');
        const container = document.getElementById('searchResultsGrid');
        if (container) container.innerHTML = '';
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    initTheme();
    loadCurrentUser();
</script>
</body>
</html>
