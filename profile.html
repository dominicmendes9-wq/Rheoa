<!DOCTYPE html>
<html>
<head>
    <title>My Profile - Rheoa RPG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2ff;
            font-family: 'Verdana', 'Geneva', sans-serif;
            padding: 20px;
        }
        .orkut-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #9cb2d1;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-header {
            background: #e1e9f5;
            padding: 10px 15px;
            border-bottom: 1px solid #9cb2d1;
            font-weight: bold;
            color: #1a3b6e;
            font-size: 1.1rem;
        }
        .card-content {
            padding: 15px;
        }
        .profile-header {
            background: linear-gradient(135deg, #1e5799 0%, #2b6fae 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .avatar {
            font-size: 5rem;
            background: rgba(255,255,255,0.2);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-info {
            flex: 1;
        }
        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .profile-location {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .profile-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .friend-avatar, .suggestion-avatar, .result-avatar {
            font-size: 2rem;
            background: #e1e9f5;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .friends-grid, .suggestions-grid, .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .friend-card, .suggestion-card, .result-card {
            background: #f9f9ff;
            border: 1px solid #d4e0ee;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .testimonial-card {
            background: #f9f9ff;
            border: 1px solid #d4e0ee;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }
        .testimonial-author {
            font-weight: bold;
            color: #1a3b6e;
        }
        .testimonial-text {
            font-size: 0.9rem;
            margin: 8px 0;
            line-height: 1.4;
        }
        .testimonial-date {
            font-size: 0.7rem;
            color: #666;
        }
        button, .btn {
            background: #1e5799;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        button.decline { background: #a94442; }
        button.secondary { background: #6c757d; }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }
        .search-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 120px;
        }
        .filter-group label {
            font-size: 0.8rem;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }
        .scrap-form {
            background: #f9f9ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .online-status {
            color: #4caf50;
            font-size: 0.7rem;
            display: inline-block;
            margin-left: 5px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1e5799;
            text-decoration: none;
        }
        hr {
            margin: 15px 0;
            border-color: #d4e0ee;
        }
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; }
            .friends-grid, .suggestions-grid, .results-grid { grid-template-columns: 1fr; }
            .search-filters { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="orkut-container">
    <div id="profileView"></div>
    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Supabase client
const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentPlayer = null;
let profileOwner = null;
let friendships = [];
let testimonials = [];
let pendingRequests = [];
let profileViews = [];
let suggestions = [];
let searchResults = [];

function showToast(msg) {
    const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
    document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000);
}

async function loadCurrentUser() {
    try {
        const { data: { user }, error: userError } = await sb.auth.getUser();
        if (userError) throw new Error(userError.message);
        if (!user) { window.location.href = 'index.html'; return; }
        
        const { data: player, error: playerError } = await sb
            .from('players')
            .select('*')
            .eq('auth_id', user.id)
            .single();
        if (playerError) throw new Error(playerError.message);
        if (!player) throw new Error('Player not found');
        
        currentPlayer = player;
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        if (targetId && targetId !== currentPlayer.id) {
            await loadProfile(targetId);
        } else {
            await loadProfile(currentPlayer.id);
        }
    } catch (err) {
        document.getElementById('profileView').innerHTML = `
            <div class="card">
                <div class="card-header">Error</div>
                <div class="card-content">${err.message}</div>
            </div>
        `;
        console.error(err);
    }
}

async function loadProfile(playerId) {
    const { data: player, error } = await sb.from('players').select('*').eq('id', playerId).single();
    if (error || !player) {
        document.getElementById('profileView').innerHTML = '<div class="card"><div class="card-content">Profile not found</div></div>';
        return;
    }
    profileOwner = player;
    
    // Record view (if not yourself)
    if (currentPlayer && profileOwner.id !== currentPlayer.id) {
        await sb.from('profile_views').upsert({
            profile_id: profileOwner.id,
            viewer_id: currentPlayer.id,
            viewed_at: new Date(),
            view_date: new Date().toISOString().split('T')[0]
        }, { onConflict: 'profile_id,viewer_id,view_date' });
    }
    
    await loadFriendships();
    await loadTestimonials();
    await loadPendingRequests();
    await loadProfileViews();
    await loadSuggestions();
    renderProfile();
}

async function loadFriendships() {
    const { data } = await sb.from('friendships')
        .select('*, requester:requester_id(*), addressee:addressee_id(*)')
        .or(`requester_id.eq.${profileOwner.id},addressee_id.eq.${profileOwner.id}`)
        .eq('status', 'accepted');
    friendships = data || [];
}

async function loadTestimonials() {
    const { data } = await sb.from('testimonials')
        .select('*, author:author_id(*)')
        .eq('profile_id', profileOwner.id)
        .eq('is_visible', true)
        .order('created_at', { ascending: false });
    testimonials = data || [];
}

async function loadPendingRequests() {
    if (profileOwner.id !== currentPlayer?.id) return;
    const { data } = await sb.from('friendships')
        .select('*, requester:requester_id(*)')
        .eq('addressee_id', currentPlayer.id)
        .eq('status', 'pending');
    pendingRequests = data || [];
}

async function loadProfileViews() {
    if (profileOwner.id !== currentPlayer?.id) return;
    const { data } = await sb.from('profile_views')
        .select('*, viewer:viewer_id(*)')
        .eq('profile_id', currentPlayer.id)
        .order('viewed_at', { ascending: false })
        .limit(20);
    profileViews = data || [];
}

// Suggested friends: users who joined in last 15 days
async function loadSuggestions() {
    if (profileOwner.id !== currentPlayer?.id) return;
    const fifteenDaysAgo = new Date();
    fifteenDaysAgo.setDate(fifteenDaysAgo.getDate() - 15);
    
    // Get IDs of existing friends
    const friendIds = friendships.map(f => 
        f.requester_id === currentPlayer.id ? f.addressee_id : f.requester_id
    );
    friendIds.push(currentPlayer.id); // exclude self
    
    const { data } = await sb
        .from('players')
        .select('id, username, avatar_url, gender, country, location, join_date')
        .gte('join_date', fifteenDaysAgo.toISOString())
        .not('id', 'in', `(${friendIds.join(',')})`)
        .limit(12);
    suggestions = data || [];
    renderSuggestions();
}

// Search users (no email)
async function searchUsers() {
    const username = document.getElementById('searchUsername')?.value.trim();
    const gender = document.getElementById('searchGender')?.value;
    const location = document.getElementById('searchLocation')?.value.trim();
    const country = document.getElementById('searchCountry')?.value.trim();
    
    let query = sb.from('players').select('id, username, avatar_url, gender, location, country');
    
    if (username) query = query.ilike('username', `%${username}%`);
    if (gender && gender !== '') query = query.eq('gender', gender);
    if (location) query = query.ilike('location', `%${location}%`);
    if (country) query = query.ilike('country', `%${country}%`);
    
    // Exclude current user and existing friends
    const friendIds = friendships.map(f => 
        f.requester_id === currentPlayer.id ? f.addressee_id : f.requester_id
    );
    friendIds.push(currentPlayer.id);
    if (friendIds.length) {
        query = query.not('id', 'in', `(${friendIds.join(',')})`);
    }
    
    const { data } = await query.limit(30);
    searchResults = data || [];
    renderSearchResults();
}

function renderSuggestions() {
    const container = document.getElementById('suggestionsGrid');
    if (!container) return;
    if (!suggestions.length) {
        container.innerHTML = '<p>No new members in the last 15 days.</p>';
        return;
    }
    container.innerHTML = suggestions.map(u => `
        <div class="suggestion-card">
            <div class="suggestion-avatar">${u.avatar_url || '👤'}</div>
            <div>
                <div><strong>${escapeHtml(u.username)}</strong></div>
                <div style="font-size:0.7rem; color:#666;">${escapeHtml(u.location || '')} ${escapeHtml(u.country || '')}</div>
                <button onclick="sendFriendRequest('${u.id}')">➕ Add Friend</button>
                <button onclick="viewProfile('${u.id}')">View</button>
            </div>
        </div>
    `).join('');
}

function renderSearchResults() {
    const container = document.getElementById('searchResultsGrid');
    if (!container) return;
    if (!searchResults.length) {
        container.innerHTML = '<p>No users found.</p>';
        return;
    }
    container.innerHTML = searchResults.map(u => `
        <div class="result-card">
            <div class="result-avatar">${u.avatar_url || '👤'}</div>
            <div>
                <div><strong>${escapeHtml(u.username)}</strong></div>
                <div style="font-size:0.7rem; color:#666;">${escapeHtml(u.gender || '')} | ${escapeHtml(u.location || '')} ${escapeHtml(u.country || '')}</div>
                <button onclick="sendFriendRequest('${u.id}')">➕ Add Friend</button>
                <button onclick="viewProfile('${u.id}')">View</button>
            </div>
        </div>
    `).join('');
}

function renderProfile() {
    const isOwner = currentPlayer && profileOwner.id === currentPlayer.id;
    const totalFriends = friendships.length;
    const viewCount = profileViews.length;
    
    let headerHtml = `
        <div class="profile-header">
            <div class="avatar">${profileOwner.avatar_url || '👤'}</div>
            <div class="profile-info">
                <div class="profile-name">${escapeHtml(profileOwner.username)}</div>
                <div class="profile-location">${escapeHtml(profileOwner.location || '')} ${escapeHtml(profileOwner.country ? ', ' + profileOwner.country : '')}</div>
                <div class="profile-stats">
                    <div class="stat">⭐ Level ${profileOwner.level}</div>
                    <div class="stat">👥 Friends ${totalFriends}</div>
                    <div class="stat">👁️ Visitors ${viewCount}</div>
                    <div class="stat">📅 Joined ${new Date(profileOwner.join_date).toLocaleDateString()}</div>
                </div>
            </div>
        </div>
    `;
    
    let bioHtml = `<div class="card"><div class="card-header">About Me</div><div class="card-content">${profileOwner.bio || 'This user has not written a description yet.'}</div></div>`;
    if (isOwner) {
        bioHtml = `
            <div class="card">
                <div class="card-header">Edit Profile</div>
                <div class="card-content">
                    <textarea id="bioInput" placeholder="About you...">${profileOwner.bio || ''}</textarea>
                    <input type="text" id="locationInput" placeholder="City" value="${profileOwner.location || ''}">
                    <input type="text" id="countryInput" placeholder="Country" value="${profileOwner.country || ''}">
                    <select id="genderInput">
                        <option value="">Gender</option>
                        <option value="male" ${profileOwner.gender === 'male' ? 'selected' : ''}>Male</option>
                        <option value="female" ${profileOwner.gender === 'female' ? 'selected' : ''}>Female</option>
                        <option value="other" ${profileOwner.gender === 'other' ? 'selected' : ''}>Other</option>
                    </select>
                    <input type="text" id="avatarUrlInput" placeholder="Avatar (emoji or URL)" value="${profileOwner.avatar_url || ''}">
                    <label><input type="checkbox" id="privacyToggle" ${profileOwner.is_public ? 'checked' : ''}> Public profile</label>
                    <button onclick="updateProfile()">Save Changes</button>
                </div>
            </div>
        `;
    }
    
    let friendsHtml = `<div class="card"><div class="card-header">Friends (${totalFriends})</div><div class="card-content"><div class="friends-grid" id="friendsGrid"></div></div></div>`;
    
    let findFriendsHtml = '';
    if (isOwner) {
        findFriendsHtml = `
            <div class="card">
                <div class="card-header">🔍 Find Friends</div>
                <div class="card-content">
                    <div class="search-filters">
                        <div class="filter-group">
                            <label>Username</label>
                            <input type="text" id="searchUsername" placeholder="Username">
                        </div>
                        <div class="filter-group">
                            <label>Gender</label>
                            <select id="searchGender">
                                <option value="">Any</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Location</label>
                            <input type="text" id="searchLocation" placeholder="City">
                        </div>
                        <div class="filter-group">
                            <label>Country</label>
                            <input type="text" id="searchCountry" placeholder="Country">
                        </div>
                        <div class="filter-group">
                            <label>&nbsp;</label>
                            <button onclick="searchUsers()">Search</button>
                        </div>
                    </div>
                    <div id="searchResultsGrid" class="results-grid"></div>
                    <hr>
                    <div><strong>✨ Suggested Friends (New members, last 15 days)</strong></div>
                    <div id="suggestionsGrid" class="suggestions-grid"></div>
                </div>
            </div>
        `;
    }
    
    let testimonialsHtml = `<div class="card"><div class="card-header">📝 Scrapbook</div><div class="card-content">`;
    if (isOwner) {
        testimonialsHtml += `<div class="scrap-form"><textarea id="scrapContent" rows="2" placeholder="Write a scrap to yourself..."></textarea><button onclick="addTestimonial()">Post Scrap</button></div>`;
    } else if (currentPlayer) {
        testimonialsHtml += `<div class="scrap-form"><textarea id="scrapContent" rows="2" placeholder="Leave a scrap for ${escapeHtml(profileOwner.username)}..."></textarea><button onclick="addTestimonial()">Send Scrap</button></div>`;
    }
    testimonialsHtml += `<div id="testimonialsList"></div></div></div>`;
    
    let requestsHtml = '';
    if (isOwner) {
        requestsHtml = `<div class="card"><div class="card-header">📨 Friend Requests</div><div class="card-content" id="requestsList"></div></div>`;
    }
    
    let visitorsHtml = '';
    if (isOwner) {
        visitorsHtml = `<div class="card"><div class="card-header">👁️ Profile Visitors</div><div class="card-content"><div id="visitorsList"></div></div></div>`;
    }
    
    let friendActionHtml = '';
    if (!isOwner && currentPlayer) {
        const isFriend = friendships.some(f => 
            (f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id) ||
            (f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id)
        );
        const pendingSent = friendships.some(f => f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id && f.status === 'pending');
        const pendingReceived = friendships.some(f => f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id && f.status === 'pending');
        let btnHtml = '';
        if (isFriend) btnHtml = '<button disabled>✓ Friends</button>';
        else if (pendingSent) btnHtml = '<button disabled>⏳ Request sent</button>';
        else if (pendingReceived) btnHtml = '<button onclick="acceptFriendRequest()">Accept Friend Request</button> <button onclick="declineFriendRequest()">Decline</button>';
        else btnHtml = `<button onclick="sendFriendRequest('${profileOwner.id}')">➕ Add Friend</button>`;
        friendActionHtml = `<div class="card"><div class="card-header">Friendship</div><div class="card-content">${btnHtml}</div></div>`;
    }
    
    const finalHtml = headerHtml + bioHtml + friendActionHtml + friendsHtml + findFriendsHtml + testimonialsHtml + requestsHtml + visitorsHtml;
    document.getElementById('profileView').innerHTML = finalHtml;
    
    renderFriends();
    renderTestimonials();
    if (isOwner) {
        renderPendingRequests();
        renderVisitors();
        renderSuggestions();
        renderSearchResults(); // initially empty
    }
}

function renderFriends() {
    const container = document.getElementById('friendsGrid');
    if (!container) return;
    if (!friendships.length) { container.innerHTML = '<p>No friends yet.</p>'; return; }
    container.innerHTML = friendships.map(f => {
        const friend = f.requester_id === profileOwner.id ? f.addressee : f.requester;
        return `
            <div class="friend-card">
                <div class="friend-avatar">${friend.avatar_url || '👤'}</div>
                <div>
                    <div><strong>${escapeHtml(friend.username)}</strong> <span class="online-status">●</span></div>
                    <button onclick="viewProfile('${friend.id}')">View Profile</button>
                    ${currentPlayer && currentPlayer.id === profileOwner.id ? `<button class="decline" onclick="removeFriend('${friend.id}')">Remove</button>` : ''}
                </div>
            </div>
        `;
    }).join('');
}

function renderTestimonials() {
    const container = document.getElementById('testimonialsList');
    if (!container) return;
    if (!testimonials.length) { container.innerHTML = '<p>No scraps yet. Be the first to write!</p>'; return; }
    container.innerHTML = testimonials.map(t => `
        <div class="testimonial-card">
            <div class="testimonial-author">${escapeHtml(t.author.username)} wrote:</div>
            <div class="testimonial-text">${escapeHtml(t.content)}</div>
            <div class="testimonial-date">${new Date(t.created_at).toLocaleString()}</div>
            ${currentPlayer && (currentPlayer.id === t.author_id || currentPlayer.id === profileOwner.id) ? `<button class="secondary" onclick="deleteTestimonial('${t.id}')">Delete</button>` : ''}
        </div>
    `).join('');
}

function renderPendingRequests() {
    const container = document.getElementById('requestsList');
    if (!container) return;
    if (!pendingRequests.length) { container.innerHTML = '<p>No pending requests.</p>'; return; }
    container.innerHTML = pendingRequests.map(req => `
        <div class="friend-card">
            <div class="friend-avatar">${req.requester.avatar_url || '👤'}</div>
            <div>
                <strong>${escapeHtml(req.requester.username)}</strong>
                <div>
                    <button onclick="acceptFriendRequestById('${req.id}')">Accept</button>
                    <button class="decline" onclick="declineFriendRequestById('${req.id}')">Decline</button>
                </div>
            </div>
        </div>
    `).join('');
}

function renderVisitors() {
    const container = document.getElementById('visitorsList');
    if (!container) return;
    if (!profileViews.length) { container.innerHTML = '<p>No one has visited your profile yet.</p>'; return; }
    container.innerHTML = profileViews.map(v => `
        <div class="friend-card">
            <div class="friend-avatar">${v.viewer?.avatar_url || '👤'}</div>
            <div>
                <strong>${escapeHtml(v.viewer?.username || 'Unknown')}</strong>
                <div>${new Date(v.viewed_at).toLocaleString()}</div>
            </div>
        </div>
    `).join('');
}

// Friend actions
async function sendFriendRequest(targetId) {
    const { error } = await sb.from('friendships').insert({ requester_id: currentPlayer.id, addressee_id: targetId, status: 'pending' });
    if (error) showToast(error.message);
    else { showToast('Request sent!'); await loadProfile(profileOwner.id); }
}

async function acceptFriendRequest() {
    const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() })
        .eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Friend added!'); await loadProfile(profileOwner.id); }
}

async function declineFriendRequest() {
    const { error } = await sb.from('friendships').delete()
        .eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Request declined'); await loadProfile(profileOwner.id); }
}

async function acceptFriendRequestById(requestId) {
    const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('id', requestId);
    if (error) showToast(error.message);
    else { showToast('Friend added'); await loadProfile(profileOwner.id); }
}

async function declineFriendRequestById(requestId) {
    const { error } = await sb.from('friendships').delete().eq('id', requestId);
    if (error) showToast(error.message);
    else { showToast('Request declined'); await loadProfile(profileOwner.id); }
}

async function removeFriend(friendId) {
    if (!confirm('Remove this friend?')) return;
    const { error } = await sb.from('friendships').delete()
        .or(`and(requester_id.eq.${currentPlayer.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentPlayer.id})`);
    if (error) showToast(error.message);
    else { showToast('Friend removed'); await loadProfile(profileOwner.id); }
}

// Testimonials
async function addTestimonial() {
    const content = document.getElementById('scrapContent').value.trim();
    if (!content) { showToast('Please write something.'); return; }
    const { error } = await sb.from('testimonials').insert({
        profile_id: profileOwner.id,
        author_id: currentPlayer.id,
        content: content,
        is_visible: true
    });
    if (error) showToast(error.message);
    else {
        showToast('Scrap posted!');
        document.getElementById('scrapContent').value = '';
        await loadTestimonials();
        renderTestimonials();
    }
}

async function deleteTestimonial(testimonialId) {
    if (!confirm('Delete this scrap?')) return;
    const { error } = await sb.from('testimonials').delete().eq('id', testimonialId);
    if (error) showToast(error.message);
    else { showToast('Scrap deleted'); await loadTestimonials(); renderTestimonials(); }
}

// Profile update
async function updateProfile() {
    const bio = document.getElementById('bioInput')?.value;
    const location = document.getElementById('locationInput')?.value;
    const country = document.getElementById('countryInput')?.value;
    const gender = document.getElementById('genderInput')?.value;
    const avatar_url = document.getElementById('avatarUrlInput')?.value;
    const is_public = document.getElementById('privacyToggle')?.checked;
    const { error } = await sb.from('players').update({ bio, location, country, gender, avatar_url, is_public }).eq('id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Profile updated'); await loadProfile(currentPlayer.id); }
}

function viewProfile(userId) {
    window.location.href = `profile.html?id=${userId}`;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

loadCurrentUser();
