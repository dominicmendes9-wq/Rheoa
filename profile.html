<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rheoa RPG · Hero Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f4f7fc;
            --card: white;
            --border: #e2edf7;
            --text: #0b2b3d;
            --accent: #2c6e9e;
            --accent-hover: #1e5a82;
            --header-bg: linear-gradient(145deg, #1c3e5c, #2b5a7a);
            --radius-card: 28px;
            --font: 'Inter', sans-serif;
        }
        body.theme-dusk {
            --bg: #0f1722;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --accent: #60a5fa;
            --header-bg: linear-gradient(145deg, #0f172a, #1e293b);
        }
        body.theme-meadow {
            --bg: #eef4e6;
            --card: #ffffffea;
            --border: #cbd5b0;
            --text: #2c2b26;
            --accent: #4b6b3e;
            --header-bg: linear-gradient(145deg, #2b5e3b, #4a7c59);
        }
        body {
            background: var(--bg);
            font-family: var(--font);
            padding: 24px 20px;
            color: var(--text);
            transition: all 0.2s;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }
        .back-link {
            background: var(--card);
            padding: 8px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: var(--accent);
            border: 1px solid var(--border);
        }
        .theme-switch {
            display: flex;
            gap: 6px;
            background: var(--card);
            padding: 4px;
            border-radius: 60px;
            border: 1px solid var(--border);
        }
        .theme-btn {
            background: transparent;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            transition: 0.2s;
        }
        .theme-btn.active { background: var(--accent); color: white; }
        .profile-hero {
            background: var(--header-bg);
            border-radius: var(--radius-card);
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .cover-area {
            height: 180px;
            background-size: cover;
            background-position: center;
            background-color: #2c3e4e;
        }
        .hero-content {
            padding: 0 28px 28px 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-end;
            margin-top: -40px;
            position: relative;
            z-index: 2;
        }
        .avatar-large {
            width: 110px;
            height: 110px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 4px solid var(--card);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .hero-text h1 { font-size: 2rem; margin-bottom: 6px; color: white; text-shadow: 0 1px 2px black; }
        .hero-text p { color: #eef2ff; }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .stat-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: white;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 28px;
        }
        @media (max-width: 900px) { .grid-2col { grid-template-columns: 1fr; } }
        .card {
            background: var(--card);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            margin-bottom: 28px;
            overflow: hidden;
        }
        .card-header {
            padding: 18px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 1.2rem;
        }
        .card-content { padding: 20px 24px; }
        .friend-grid, .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .friend-card, .result-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .avatar-small {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
        }
        button, .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.75rem;
        }
        button.decline { background: #9e2d2d; }
        .testimonial-item, .scrap-item {
            padding: 16px;
            border-left: 3px solid var(--accent);
            background: var(--bg);
            border-radius: 20px;
            margin-bottom: 14px;
        }
        .online { color: #2ecc71; font-size: 0.7rem; }
        .offline { color: #95a5a6; }
        .meter {
            height: 8px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }
        .meter-fill { height: 100%; background: var(--accent); width: 0%; }
        .rating-buttons { display: flex; gap: 8px; margin-top: 6px; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 999;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <a href="dashboard.html" class="back-link">← Dashboard</a>
        <div class="theme-switch" id="themeSwitch">
            <button data-theme="default" class="theme-btn active">✨ Aurora</button>
            <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
            <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
        </div>
    </div>
    <div id="profileRoot"></div>
</div>

<script>
    // ----------------------------- SUPABASE -----------------------------
    const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
    const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
    const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentPlayer = null, profileOwner = null;
    let friendships = [];          // all accepted + pending
    let acceptedFriends = [];
    let testimonials = [];
    let scraps = [];               // separate scrapbook (temporary wall)
    let pendingIncoming = [];
    let profileViewsTotal = 0;
    let mutualFriendsList = [];
    let ratings = {};              // { targetId: { trustworthy, cool, funny } }

    // Helper
    function showToast(msg) {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    // Theme
    function setTheme(theme) {
        document.body.classList.remove('theme-dusk', 'theme-meadow');
        if (theme === 'dusk') document.body.classList.add('theme-dusk');
        if (theme === 'meadow') document.body.classList.add('theme-meadow');
        localStorage.setItem('rheoa_theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === theme);
        });
    }

    // ----------------------------- AUTH & DATA LOAD -----------------------------
    async function loadCurrentUser() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) { window.location.href = 'index.html'; return; }
        let { data: player } = await sb.from('players').select('*').eq('auth_id', user.id).single();
        if (!player) {
            const { data: fallback } = await sb.from('players').select('*').eq('email', user.email).single();
            if (fallback) player = fallback;
            else {
                const { data: newP } = await sb.from('players').insert({ username: user.email.split('@')[0], email: user.email, auth_id: user.id, join_date: new Date() }).select().single();
                player = newP;
            }
        }
        currentPlayer = player;
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        if (targetId && targetId !== currentPlayer.id) await loadProfile(targetId);
        else await loadProfile(currentPlayer.id);
    }

    async function loadProfile(playerId) {
        let { data: player } = await sb.from('players').select('*').eq('id', playerId).single();
        if (!player) { document.getElementById('profileRoot').innerHTML = '<div class="card"><div class="card-content">Hero not found</div></div>'; return; }
        profileOwner = player;

        // Record view
        if (currentPlayer && currentPlayer.id !== profileOwner.id) {
            await sb.from('profile_views').upsert({ profile_id: profileOwner.id, viewer_id: currentPlayer.id, viewed_at: new Date(), view_date: new Date().toISOString().split('T')[0] }, { onConflict: 'profile_id,viewer_id,view_date' });
        }

        // Load ALL friendships (pending + accepted) for this profile owner
        const { data: allFriendships } = await sb.from('friendships')
            .select('*, requester:requester_id(*), addressee:addressee_id(*)')
            .or(`requester_id.eq.${profileOwner.id},addressee_id.eq.${profileOwner.id}`);
        friendships = allFriendships || [];
        acceptedFriends = friendships.filter(f => f.status === 'accepted');
        pendingIncoming = friendships.filter(f => f.addressee_id === profileOwner.id && f.status === 'pending' && f.requester_id !== currentPlayer?.id);

        // Load testimonials (permanent) and scraps (temporary wall)
        const { data: allTest } = await sb.from('testimonials').select('*, author:author_id(*)').eq('profile_id', profileOwner.id).eq('is_visible', true).order('created_at', { ascending: false });
        testimonials = (allTest || []).filter(t => t.type !== 'scrap');
        scraps = (allTest || []).filter(t => t.type === 'scrap');

        // Profile views count (real total)
        const { count } = await sb.from('profile_views').select('*', { count: 'exact', head: true }).eq('profile_id', profileOwner.id);
        profileViewsTotal = count || 0;

        // Mutual friends
        if (currentPlayer && currentPlayer.id !== profileOwner.id) {
            const myFriendIds = acceptedFriends.filter(f => f.requester_id === currentPlayer.id ? f.addressee_id : f.requester_id).map(f => f.requester_id === currentPlayer.id ? f.addressee_id : f.requester_id);
            const theirFriendIds = acceptedFriends.filter(f => f.requester_id === profileOwner.id ? f.addressee_id : f.requester_id).map(f => f.requester_id === profileOwner.id ? f.addressee_id : f.requester_id);
            mutualFriendsList = myFriendIds.filter(id => theirFriendIds.includes(id));
        }

        // Load ratings (only if viewer is friend)
        if (currentPlayer && acceptedFriends.some(f => (f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id) || (f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id))) {
            const { data: ratingData } = await sb.from('friend_ratings').select('*').eq('rater_id', currentPlayer.id).eq('rated_id', profileOwner.id).maybeSingle();
            if (ratingData) ratings = ratingData;
        }

        renderProfile();
    }

    // ----------------------------- RENDER (RPG ENHANCED) -----------------------------
    function renderProfile() {
        const isOwner = currentPlayer?.id === profileOwner.id;
        const totalFriends = acceptedFriends.length;
        const mutualCount = mutualFriendsList.length;
        const lastSeen = profileOwner.last_seen ? new Date(profileOwner.last_seen) : null;
        const isOnline = lastSeen && (new Date() - lastSeen) < 5 * 60 * 1000;

        // Profile strength
        const fields = [profileOwner.bio, profileOwner.avatar_url, profileOwner.cover_url, profileOwner.location, profileOwner.country, profileOwner.gender, profileOwner.xp, profileOwner.gold];
        const filled = fields.filter(f => f && f.toString().trim()).length;
        const strength = Math.min(100, Math.floor((filled / 9) * 100));

        // Hero HTML
        let coverStyle = profileOwner.cover_url ? `url(${profileOwner.cover_url})` : `linear-gradient(145deg, #1e3c5a, #2b5a7a)`;
        let avatarHtml = profileOwner.avatar_url?.startsWith('http') ? `<img src="${profileOwner.avatar_url}" alt="avatar">` : (profileOwner.avatar_url || '🧙');
        let heroHtml = `
            <div class="profile-hero">
                <div class="cover-area" style="background-image: ${coverStyle}; background-size: cover;"></div>
                <div class="hero-content">
                    <div class="avatar-large">${avatarHtml}</div>
                    <div class="hero-text">
                        <h1>${escapeHtml(profileOwner.username)} ${isOnline ? '<span class="online">● Online</span>' : '<span class="offline">● Offline</span>'}</h1>
                        <p>${escapeHtml(profileOwner.location || 'Unknown Realm')} ${profileOwner.country ? ', ' + escapeHtml(profileOwner.country) : ''}</p>
                        <div class="stats-row">
                            <span class="stat-badge">⚡ Lv.${profileOwner.level || 1}</span>
                            <span class="stat-badge">❤️ ${profileOwner.xp || 0} XP</span>
                            <span class="stat-badge">💰 ${profileOwner.gold || 0} Gold</span>
                            <span class="stat-badge">🔋 ${profileOwner.energy || 100} Energy</span>
                            <span class="stat-badge">👥 ${totalFriends} friends</span>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Left column
        let leftCol = `
            <div class="card">
                <div class="card-header">📜 About the Hero</div>
                <div class="card-content">
                    ${isOwner ? `
                        <textarea id="bioInput" rows="3" placeholder="Biography...">${profileOwner.bio || ''}</textarea>
                        <input type="text" id="coverInput" placeholder="Cover image URL" value="${profileOwner.cover_url || ''}">
                        <input type="text" id="avatarInput" placeholder="Avatar URL or emoji" value="${profileOwner.avatar_url || ''}">
                        <input type="text" id="locationInput" placeholder="Location" value="${profileOwner.location || ''}">
                        <input type="text" id="countryInput" placeholder="Country" value="${profileOwner.country || ''}">
                        <input type="number" id="xpInput" placeholder="XP" value="${profileOwner.xp || 0}">
                        <input type="number" id="goldInput" placeholder="Gold" value="${profileOwner.gold || 0}">
                        <input type="text" id="weaponInput" placeholder="Weapon" value="${profileOwner.weapon || ''}">
                        <input type="text" id="armorInput" placeholder="Armor" value="${profileOwner.armor || ''}">
                        <input type="text" id="petInput" placeholder="Pet" value="${profileOwner.pet || ''}">
                        <input type="text" id="houseInput" placeholder="Homestead" value="${profileOwner.house || ''}">
                        <button onclick="updateProfile()">💾 Save RPG Profile</button>
                    ` : `<p>${profileOwner.bio || 'This adventurer keeps their past secret.'}</p>
                         ${profileOwner.weapon ? `<p>⚔️ Weapon: ${escapeHtml(profileOwner.weapon)}</p>` : ''}
                         ${profileOwner.armor ? `<p>🛡️ Armor: ${escapeHtml(profileOwner.armor)}</p>` : ''}
                         ${profileOwner.pet ? `<p>🐉 Pet: ${escapeHtml(profileOwner.pet)}</p>` : ''}
                         ${profileOwner.house ? `<p>🏠 Homestead: ${escapeHtml(profileOwner.house)}</p>` : ''}
                    `}
                    <div class="meter"><div class="meter-fill" style="width: ${strength}%;"></div></div>
                    <small>Profile Strength ${strength}%</small>
                </div>
            </div>
        `;

        // Friend action + mutual friends + rating
        if (!isOwner && currentPlayer) {
            const isFriend = acceptedFriends.some(f => (f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id) || (f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id));
            const pendingSent = friendships.some(f => f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id && f.status === 'pending');
            const pendingReceived = friendships.some(f => f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id && f.status === 'pending');
            let actionBtn = '';
            if (isFriend) actionBtn = '<button disabled>✓ Friends</button>';
            else if (pendingSent) actionBtn = '<button disabled>⏳ Request sent</button>';
            else if (pendingReceived) actionBtn = `<button onclick="acceptFriendRequest()">✅ Accept</button> <button onclick="declineFriendRequest()" class="decline">Decline</button>`;
            else actionBtn = `<button onclick="sendFriendRequest('${profileOwner.id}')">➕ Add Friend</button>`;

            leftCol += `
                <div class="card">
                    <div class="card-header">🤝 Friendship</div>
                    <div class="card-content">
                        ${actionBtn}
                        ${mutualCount > 0 ? `<p style="margin-top:10px;">🔗 ${mutualCount} mutual friend(s)</p>` : ''}
                        ${isFriend ? `
                            <div class="rating-buttons">
                                <button onclick="rateFriend('trustworthy')" class="${ratings.trustworthy ? 'active' : ''}">🤝 Trustworthy</button>
                                <button onclick="rateFriend('cool')" class="${ratings.cool ? 'active' : ''}">😎 Cool</button>
                                <button onclick="rateFriend('funny')" class="${ratings.funny ? 'active' : ''}">😂 Funny</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Visitors & pending requests (owner)
        if (isOwner) {
            leftCol += `<div class="card"><div class="card-header">👁️ Visitors (${profileViewsTotal})</div><div class="card-content" id="visitorsList">Loading...</div></div>`;
            leftCol += `<div class="card"><div class="card-header">📨 Friend Requests</div><div class="card-content" id="requestsList"></div></div>`;
        }

        // Right column: Friends, Achievements, Scrapbook + Testimonials
        let rightCol = `
            <div class="card"><div class="card-header">👥 Companions (${totalFriends})</div><div class="card-content"><div id="friendsGrid" class="friend-grid"></div></div></div>
            <div class="card"><div class="card-header">🏆 Achievements</div><div class="card-content"><div id="achievementsList"></div></div></div>
            <div class="card"><div class="card-header">📝 Testimonials</div><div class="card-content"><div id="testimonialsList"></div>${isOwner ? `<textarea id="testimonialContent" rows="2" placeholder="Write a testimonial..."></textarea><button onclick="addTestimonial(false)">💬 Post Testimonial</button>` : ''}</div></div>
            <div class="card"><div class="card-header">📌 Scrapbook (Wall)</div><div class="card-content"><div id="scrapsList"></div>${(isOwner || currentPlayer) ? `<textarea id="scrapContent" rows="2" placeholder="Write something on the wall..."></textarea><button onclick="addTestimonial(true)">✍️ Post Scrap</button>` : ''}</div></div>
        `;

        document.getElementById('profileRoot').innerHTML = heroHtml + `<div class="grid-2col"><div>${leftCol}</div><div>${rightCol}</div></div>`;

        // Render dynamic lists
        renderFriends();
        renderTestimonialsAndScraps();
        renderAchievements();
        if (isOwner) {
            renderPendingRequests();
            loadVisitors();
        }
    }

    async function renderFriends() {
        const container = document.getElementById('friendsGrid');
        if (!container) return;
        if (!acceptedFriends.length) { container.innerHTML = '<div class="card-content">No companions yet.</div>'; return; }
        container.innerHTML = acceptedFriends.map(f => {
            const friend = f.requester_id === profileOwner.id ? f.addressee : f.requester;
            const friendLast = friend.last_seen ? new Date(friend.last_seen) : null;
            const isOnlineNow = friendLast && (new Date() - friendLast) < 5*60000;
            return `
                <div class="friend-card">
                    <div class="avatar-small">${friend.avatar_url?.startsWith('http') ? `<img src="${friend.avatar_url}" style="width:100%;">` : (friend.avatar_url || '🧝')}</div>
                    <div><strong>${escapeHtml(friend.username)}</strong> ${isOnlineNow ? '🟢' : '⚫'}<br><button onclick="viewProfile('${friend.id}')">View</button></div>
                </div>
            `;
        }).join('');
    }

    function renderTestimonialsAndScraps() {
        const testContainer = document.getElementById('testimonialsList');
        const scrapContainer = document.getElementById('scrapsList');
        if (testContainer) testContainer.innerHTML = testimonials.map(t => `<div class="testimonial-item"><strong>${escapeHtml(t.author.username)}</strong> <span style="font-size:0.7rem;">${new Date(t.created_at).toLocaleString()}</span><br>${escapeHtml(t.content)}<br>❤️ ${t.likes || 0} <button onclick="likeTestimonial('${t.id}')">Like</button></div>`).join('') || '<p>No testimonials yet.</p>';
        if (scrapContainer) scrapContainer.innerHTML = scraps.map(s => `<div class="testimonial-item"><strong>${escapeHtml(s.author.username)}</strong> scrawled:<br>${escapeHtml(s.content)}<br><small>${new Date(s.created_at).toLocaleString()}</small></div>`).join('') || '<p>The wall is empty.</p>';
    }

    function renderAchievements() {
        const container = document.getElementById('achievementsList');
        if (!container) return;
        const achieves = [
            { name: 'First Steps', earned: profileOwner.level >= 1 },
            { name: 'Dragon Slayer', earned: profileOwner.xp > 500 },
            { name: 'Social Butterfly', earned: acceptedFriends.length >= 5 }
        ];
        container.innerHTML = `<div class="friend-grid">${achieves.map(a => `<div class="friend-card">${a.earned ? '🏆' : '🔒'} ${a.name}</div>`).join('')}</div>`;
    }

    async function loadVisitors() {
        const { data } = await sb.from('profile_views').select('*, viewer:viewer_id(*)').eq('profile_id', currentPlayer.id).order('viewed_at', { ascending: false }).limit(10);
        const container = document.getElementById('visitorsList');
        if (container) container.innerHTML = (data || []).map(v => `<div class="friend-card"><div class="avatar-small">👤</div><div>${escapeHtml(v.viewer?.username || 'anonymous')}<br><small>${new Date(v.viewed_at).toLocaleString()}</small></div></div>`).join('') || '<p>No visitors yet.</p>';
    }

    function renderPendingRequests() {
        const container = document.getElementById('requestsList');
        if (!container) return;
        if (!pendingIncoming.length) { container.innerHTML = '<p>No pending requests</p>'; return; }
        container.innerHTML = pendingIncoming.map(req => `
            <div class="friend-card"><div class="avatar-small">👤</div><div><strong>${escapeHtml(req.requester.username)}</strong><br><button onclick="acceptFriendRequestById('${req.id}')">Accept</button> <button onclick="declineFriendRequestById('${req.id}')" class="decline">Decline</button></div></div>
        `).join('');
    }

    // ----------------------------- ACTIONS (fixed bugs) -----------------------------
    async function sendFriendRequest(targetId) {
        const { error } = await sb.from('friendships').insert({ requester_id: currentPlayer.id, addressee_id: targetId, status: 'pending' });
        if (error) showToast(error.message);
        else { showToast('Request sent!'); await loadProfile(profileOwner.id); }
    }
    async function acceptFriendRequest() {
        await sb.from('friendships').update({ status: 'accepted' }).eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
        showToast('Friend added'); await loadProfile(profileOwner.id);
    }
    async function declineFriendRequest() {
        await sb.from('friendships').delete().eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
        showToast('Declined'); await loadProfile(profileOwner.id);
    }
    async function acceptFriendRequestById(id) {
        await sb.from('friendships').update({ status: 'accepted' }).eq('id', id);
        showToast('Accepted'); await loadProfile(profileOwner.id);
    }
    async function declineFriendRequestById(id) {
        await sb.from('friendships').delete().eq('id', id);
        showToast('Declined'); await loadProfile(profileOwner.id);
    }
    async function rateFriend(type) {
        const update = { [type]: true };
        const { error } = await sb.from('friend_ratings').upsert({ rater_id: currentPlayer.id, rated_id: profileOwner.id, ...update }, { onConflict: 'rater_id,rated_id' });
        if (!error) showToast(`Rated ${type}!`);
    }
    async function addTestimonial(isScrap = false) {
        const content = document.getElementById(isScrap ? 'scrapContent' : 'testimonialContent')?.value.trim();
        if (!content) return showToast('Write something');
        const { error } = await sb.from('testimonials').insert({ profile_id: profileOwner.id, author_id: currentPlayer.id, content, is_visible: true, type: isScrap ? 'scrap' : 'testimonial', likes: 0 });
        if (error) showToast(error.message);
        else { showToast('Posted!'); document.getElementById(isScrap ? 'scrapContent' : 'testimonialContent').value = ''; await loadProfile(profileOwner.id); }
    }
    async function updateProfile() {
        const updates = {
            bio: document.getElementById('bioInput')?.value,
            cover_url: document.getElementById('coverInput')?.value,
            avatar_url: document.getElementById('avatarInput')?.value,
            location: document.getElementById('locationInput')?.value,
            country: document.getElementById('countryInput')?.value,
            xp: parseInt(document.getElementById('xpInput')?.value) || 0,
            gold: parseInt(document.getElementById('goldInput')?.value) || 0,
            weapon: document.getElementById('weaponInput')?.value,
            armor: document.getElementById('armorInput')?.value,
            pet: document.getElementById('petInput')?.value,
            house: document.getElementById('houseInput')?.value,
        };
        await sb.from('players').update(updates).eq('id', currentPlayer.id);
        showToast('Profile saved!'); await loadProfile(currentPlayer.id);
    }
    function viewProfile(id) { window.location.href = `profile.html?id=${id}`; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // Theme init
    document.getElementById('themeSwitch')?.addEventListener('click', e => {
        const btn = e.target.closest('.theme-btn');
        if (btn) setTheme(btn.dataset.theme);
    });
    setTheme(localStorage.getItem('rheoa_theme') || 'default');
    loadCurrentUser();
</script>
</body>
</html>
