<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rheoa RPG · Profile Canvas</title>
    <!-- Google Fonts for clean typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== THEME VARIABLES (default: AURORA) ========== */
        :root {
            /* Aurora (default) */
            --bg-body: #f0f4fa;
            --card-bg: #ffffff;
            --card-border: rgba(148, 163, 184, 0.2);
            --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --header-bg: linear-gradient(135deg, #1e2f5e 0%, #1a4b7a 100%);
            --header-text: #ffffff;
            --accent: #2c6e9e;
            --accent-hover: #1f5480;
            --btn-primary: #2c6e9e;
            --btn-primary-hover: #1f5480;
            --btn-secondary: #475569;
            --btn-ghost: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #334155;
            --border-light: #e2e8f0;
            --card-header-bg: #f8fafc;
            --avatar-bg: #e0f2fe;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --border-radius-card: 24px;
            --border-radius-element: 16px;
            --transition: all 0.2s ease;
        }

        /* Theme 2: DUSK (dark / charcoal) */
        body.theme-dusk {
            --bg-body: #0f1722;
            --card-bg: #1e293b;
            --card-border: rgba(51, 65, 85, 0.6);
            --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            --header-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --header-text: #e2e8f0;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #2563eb;
            --btn-secondary: #334155;
            --btn-ghost: #334155;
            --text-main: #f1f5f9;
            --text-muted: #cbd5e1;
            --border-light: #334155;
            --card-header-bg: #0f172a;
            --avatar-bg: #334155;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Theme 3: MEADOW (earthy green / warm) */
        body.theme-meadow {
            --bg-body: #eef4e6;
            --card-bg: #ffffffea;
            --card-border: #cbd5b0;
            --card-shadow: 0 12px 24px rgba(60, 70, 40, 0.08);
            --header-bg: linear-gradient(135deg, #2b5e3b 0%, #4a7c59 100%);
            --header-text: #fef9e6;
            --accent: #4b6b3e;
            --accent-hover: #3a5530;
            --btn-primary: #4b6b3e;
            --btn-primary-hover: #3a5530;
            --btn-secondary: #7f6b4a;
            --btn-ghost: #e9e1c7;
            --text-main: #2c2b26;
            --text-muted: #5b5a4c;
            --border-light: #d9d2b0;
            --card-header-bg: #fef6e0;
            --avatar-bg: #e2e9cf;
            --font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font-family);
            padding: 28px 20px;
            transition: background 0.25s, color 0.2s;
            color: var(--text-main);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding: 0 8px;
        }
        .back-link {
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: var(--accent);
            border: 1px solid var(--border-light);
            transition: var(--transition);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(2px);
        }
        .back-link:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .theme-switcher {
            display: flex;
            gap: 12px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(4px);
        }
        .theme-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            font-family: var(--font-family);
        }
        .theme-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .theme-btn:hover:not(.active) {
            background: var(--btn-ghost);
            color: var(--text-main);
        }

        /* profile grid layout */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 28px;
            margin-bottom: 28px;
        }
        @media (max-width: 900px) {
            .profile-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            body {
                padding: 16px;
            }
        }

        /* card style */
        .card-modern {
            background: var(--card-bg);
            border-radius: var(--border-radius-card);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(0px);
        }
        .card-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
        }
        .card-header-modern {
            padding: 18px 24px;
            background: var(--card-header-bg);
            border-bottom: 1px solid var(--border-light);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-content-modern {
            padding: 20px 24px;
        }

        /* profile hero */
        .profile-hero {
            background: var(--header-bg);
            border-radius: var(--border-radius-card);
            padding: 28px 32px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            align-items: center;
            color: var(--header-text);
            box-shadow: var(--card-shadow);
        }
        .hero-avatar {
            font-size: 5.2rem;
            background: rgba(255,255,255,0.15);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.3);
        }
        .hero-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .stats-badge {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 14px;
        }
        .stat-pill {
            background: rgba(255,255,255,0.18);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        /* friend / result cards */
        .friends-grid, .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 16px;
            margin-top: 4px;
        }
        .friend-card, .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }
        .friend-avatar, .result-avatar {
            font-size: 2.2rem;
            background: var(--avatar-bg);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button, .btn-custom {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-family);
        }
        button.decline, .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
        }
        button.decline:hover {
            background: #c2410c;
            color: white;
            border-color: #c2410c;
        }
        button:hover {
            background: var(--btn-primary-hover);
            transform: scale(0.98);
        }
        .testimonial-card {
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0 16px;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: var(--font-family);
            transition: 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44,110,158,0.2);
        }
        .search-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 120px;
        }
        .filter-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        hr {
            margin: 20px 0;
            border-color: var(--border-light);
        }
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .online-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: 6px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .empty-state {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            background: var(--card-header-bg);
            border-radius: 24px;
        }
    </style>
    <script>
  // Activity tracking – call every 15 seconds
  async function sendHeartbeat() {
    const sb = window.supabase?.createClient?.(
      "https://mtiwodvsrwvrujbhmmrn.supabase.co",
      "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
    );
    if (!sb) return;
    const pageName = window.location.pathname.split('/').pop() || 'dashboard';
    // Optional: get IP / user-agent (can be omitted)
    try {
      await sb.rpc('update_player_activity', {
        p_current_page: pageName,
        p_ip: null,
        p_user_agent: navigator.userAgent
      });
    } catch(e) { console.warn("Heartbeat failed", e); }
  }
  // Send immediately and then every 15 seconds
  sendHeartbeat();
  setInterval(sendHeartbeat, 15000);
</script>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <a href="dashboard.html" class="back-link">← Dashboard</a>
        <div class="theme-switcher" id="themeSwitcher">
            <button data-theme="default" class="theme-btn active">✨ Aurora</button>
            <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
            <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
        </div>
    </div>
    <div id="profileView"></div>
</div>

<script>
    // ======================== SUPABASE INIT ==========================
    const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
    const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
    const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentPlayer = null;
    let profileOwner = null;
    let friendships = [];
    let testimonials = [];
    let pendingRequests = [];
    let profileViews = [];
    let searchResults = [];

    // ======================== THEME SYSTEM ==========================
    function setTheme(themeName) {
        const body = document.body;
        body.classList.remove('theme-dusk', 'theme-meadow');
        if (themeName === 'dusk') body.classList.add('theme-dusk');
        else if (themeName === 'meadow') body.classList.add('theme-meadow');
        localStorage.setItem('rheoa_theme', themeName);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            if (btn.getAttribute('data-theme') === themeName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    function initTheme() {
        const saved = localStorage.getItem('rheoa_theme');
        if (saved === 'dusk') setTheme('dusk');
        else if (saved === 'meadow') setTheme('meadow');
        else setTheme('default');
        document.getElementById('themeSwitcher')?.addEventListener('click', (e) => {
            const btn = e.target.closest('.theme-btn');
            if (!btn) return;
            const theme = btn.getAttribute('data-theme');
            if (theme === 'default') setTheme('default');
            else if (theme === 'dusk') setTheme('dusk');
            else if (theme === 'meadow') setTheme('meadow');
        });
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ======================== AUTH & LOADING ==========================
    async function loadCurrentUser() {
        try {
            const { data: { user }, error: userError } = await sb.auth.getUser();
            if (userError) throw new Error(userError.message);
            if (!user) { window.location.href = 'index.html'; return; }
            
            let { data: player, error: playerError } = await sb
                .from('players')
                .select('*')
                .eq('auth_id', user.id)
                .single();
            
            if (playerError || !player) {
                const { data: playerByEmail } = await sb
                    .from('players')
                    .select('*')
                    .eq('email', user.email)
                    .single();
                if (playerByEmail) {
                    player = playerByEmail;
                    await sb.from('players').update({ auth_id: user.id }).eq('id', player.id);
                } else {
                    const { data: newPlayer, error: createError } = await sb
                        .from('players')
                        .insert({
                            username: user.email?.split('@')[0] || 'Player_' + user.id.slice(0,6),
                            email: user.email,
                            auth_id: user.id,
                            join_date: new Date(),
                            last_seen: new Date()
                        })
                        .select()
                        .single();
                    if (createError) throw new Error(createError.message);
                    player = newPlayer;
                }
            }
            currentPlayer = player;
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId && targetId !== currentPlayer.id) await loadProfile(targetId);
            else await loadProfile(currentPlayer.id);
        } catch (err) {
            document.getElementById('profileView').innerHTML = `<div class="card-modern"><div class="card-header-modern">⚠️ Error</div><div class="card-content-modern">${err.message}</div></div>`;
        }
    }

    async function loadProfile(playerId) {
        const { data: player, error } = await sb.from('players').select('*').eq('id', playerId).single();
        if (error || !player) {
            document.getElementById('profileView').innerHTML = '<div class="card-modern"><div class="card-content-modern">Profile not found</div></div>';
            return;
        }
        profileOwner = player;
        if (currentPlayer && profileOwner.id !== currentPlayer.id) {
            await sb.from('profile_views').upsert({
                profile_id: profileOwner.id,
                viewer_id: currentPlayer.id,
                viewed_at: new Date(),
                view_date: new Date().toISOString().split('T')[0]
            }, { onConflict: 'profile_id,viewer_id,view_date' });
        }
        await loadFriendships();
        await loadTestimonials();
        await loadPendingRequests();
        await loadProfileViews();
        renderProfileLayout();
    }

    async function loadFriendships() {
        const { data } = await sb.from('friendships')
            .select('*, requester:requester_id(*), addressee:addressee_id(*)')
            .or(`requester_id.eq.${profileOwner.id},addressee_id.eq.${profileOwner.id}`)
            .eq('status', 'accepted');
        friendships = data || [];
    }
    async function loadTestimonials() {
        const { data } = await sb.from('testimonials')
            .select('*, author:author_id(*)')
            .eq('profile_id', profileOwner.id)
            .eq('is_visible', true)
            .order('created_at', { ascending: false });
        testimonials = data || [];
    }
    async function loadPendingRequests() {
        if (profileOwner.id !== currentPlayer?.id) return;
        const { data } = await sb.from('friendships')
            .select('*, requester:requester_id(*)')
            .eq('addressee_id', currentPlayer.id)
            .eq('status', 'pending');
        pendingRequests = data || [];
    }
    async function loadProfileViews() {
        if (profileOwner.id !== currentPlayer?.id) return;
        const { data } = await sb.from('profile_views')
            .select('*, viewer:viewer_id(*)')
            .eq('profile_id', currentPlayer.id)
            .order('viewed_at', { ascending: false })
            .limit(20);
        profileViews = data || [];
    }

    // ======================== RENDER ENHANCED LAYOUT =================
    function renderProfileLayout() {
        const isOwner = currentPlayer && profileOwner.id === currentPlayer.id;
        const totalFriends = friendships.length;
        const viewCount = profileViews.length;

        // Hero section
        let heroHtml = `
            <div class="profile-hero">
                <div class="hero-avatar">${profileOwner.avatar_url || '🧙'}</div>
                <div class="hero-info">
                    <h1>${escapeHtml(profileOwner.username)}</h1>
                    <div>📍 ${escapeHtml(profileOwner.location || 'Unknown realm')} ${profileOwner.country ? ', ' + escapeHtml(profileOwner.country) : ''}</div>
                    <div class="stats-badge">
                        <span class="stat-pill">⚡ Lv.${profileOwner.level || 1}</span>
                        <span class="stat-pill">👥 ${totalFriends} friends</span>
                        <span class="stat-pill">👁️ ${viewCount} visits</span>
                        <span class="stat-pill">📅 joined ${new Date(profileOwner.join_date).toLocaleDateString()}</span>
                    </div>
                </div>
            </div>
        `;

        // Left column content
        let leftColumn = `<div class="card-modern"><div class="card-header-modern">📖 About ${isOwner ? 'me' : escapeHtml(profileOwner.username)}</div><div class="card-content-modern">`;
        if (isOwner) {
            leftColumn += `
                <textarea id="bioInput" placeholder="Tell your story..." rows="3">${profileOwner.bio || ''}</textarea>
                <input type="text" id="locationInput" placeholder="City / Realm" value="${profileOwner.location || ''}">
                <input type="text" id="countryInput" placeholder="Country" value="${profileOwner.country || ''}">
                <select id="genderInput"><option value="">Gender</option><option value="male" ${profileOwner.gender==='male'?'selected':''}>Male</option><option value="female" ${profileOwner.gender==='female'?'selected':''}>Female</option><option value="other" ${profileOwner.gender==='other'?'selected':''}>Other</option></select>
                <input type="text" id="avatarUrlInput" placeholder="Avatar emoji/url" value="${profileOwner.avatar_url || ''}">
                <label><input type="checkbox" id="privacyToggle" ${profileOwner.is_public ? 'checked' : ''}> 🌍 Public profile</label>
                <button onclick="updateProfile()" style="margin-top: 12px;">💾 Save changes</button>
            `;
        } else {
            leftColumn += `<p>${profileOwner.bio || 'This adventurer keeps secrets...'}</p>`;
        }
        leftColumn += `</div></div>`;

        // Friendship block if not owner
        if (!isOwner && currentPlayer) {
            const isFriend = friendships.some(f => (f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id) || (f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id));
            const pendingSent = friendships.some(f => f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id && f.status === 'pending');
            const pendingReceived = friendships.some(f => f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id && f.status === 'pending');
            let btnHtml = '';
            if (isFriend) btnHtml = '<button disabled style="background:#6b7280;">✓ Friends</button>';
            else if (pendingSent) btnHtml = '<button disabled>⏳ Request sent</button>';
            else if (pendingReceived) btnHtml = '<button onclick="acceptFriendRequest()">✅ Accept request</button> <button onclick="declineFriendRequest()" class="decline">❌ Decline</button>';
            else btnHtml = `<button onclick="sendFriendRequest('${profileOwner.id}')">➕ Send friend request</button>`;
            leftColumn += `<div class="card-modern" style="margin-top: 20px;"><div class="card-header-modern">🤝 Friendship</div><div class="card-content-modern">${btnHtml}</div></div>`;
        }

        // Visitors (owner only)
        if (isOwner) {
            leftColumn += `<div class="card-modern" style="margin-top: 20px;"><div class="card-header-modern">👁️ Recent visitors</div><div class="card-content-modern"><div id="visitorsList"></div></div></div>`;
        }
        // pending requests for owner
        if (isOwner) {
            leftColumn += `<div class="card-modern" style="margin-top: 20px;"><div class="card-header-modern">📨 Friend requests</div><div class="card-content-modern"><div id="requestsList"></div></div></div>`;
        }

        // Right column
        let rightColumn = `<div class="card-modern"><div class="card-header-modern">👥 Companions (${totalFriends})</div><div class="card-content-modern"><div id="friendsGrid" class="friends-grid"></div></div></div>`;
        
        // Find friends (owner only)
        if (isOwner) {
            rightColumn += `
                <div class="card-modern" style="margin-top: 24px;">
                    <div class="card-header-modern">🔍 Discover heroes</div>
                    <div class="card-content-modern">
                        <div class="search-filters">
                            <div class="filter-group"><label>Username</label><input type="text" id="searchUsername" placeholder="Username"></div>
                            <div class="filter-group"><label>Gender</label><select id="searchGender"><option value="">Any</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div>
                            <div class="filter-group"><label>Location</label><input type="text" id="searchLocation" placeholder="City"></div>
                            <div class="filter-group"><label>Country</label><input type="text" id="searchCountry" placeholder="Country"></div>
                            <div class="filter-group"><button onclick="searchUsers()">🔎 Search</button> <button onclick="resetSearch()" style="background:#6c757d;">⟳ Reset</button></div>
                        </div>
                        <div id="searchResultsGrid" class="results-grid"></div>
                    </div>
                </div>
            `;
        }

        // Scrapbook section (testimonials)
        rightColumn += `<div class="card-modern" style="margin-top: 24px;"><div class="card-header-modern">📝 Scrapbook · whispers</div><div class="card-content-modern">`;
        if (isOwner) {
            rightColumn += `<div class="scrap-form"><textarea id="scrapContent" rows="2" placeholder="Write something on your wall..."></textarea><button onclick="addTestimonial()">✍️ Post scrap</button></div>`;
        } else if (currentPlayer) {
            rightColumn += `<div class="scrap-form"><textarea id="scrapContent" rows="2" placeholder="Leave a kind note for ${escapeHtml(profileOwner.username)}..."></textarea><button onclick="addTestimonial()">📨 Send scrap</button></div>`;
        }
        rightColumn += `<div id="testimonialsList" style="margin-top: 20px;"></div></div></div>`;

        const finalHtml = heroHtml + `<div class="profile-grid"><div class="left-panel">${leftColumn}</div><div class="right-panel">${rightColumn}</div></div>`;
        document.getElementById('profileView').innerHTML = finalHtml;

        // re-render dynamic lists
        renderFriends();
        renderTestimonials();
        if (isOwner) {
            renderPendingRequests();
            renderVisitors();
        }
    }

    function renderFriends() {
        const container = document.getElementById('friendsGrid');
        if (!container) return;
        if (!friendships.length) { container.innerHTML = '<div class="empty-state">✨ No friends yet. Venture together!</div>'; return; }
        container.innerHTML = friendships.map(f => {
            const friend = f.requester_id === profileOwner.id ? f.addressee : f.requester;
            return `
                <div class="friend-card">
                    <div class="friend-avatar">${friend.avatar_url || '🧝'}</div>
                    <div style="flex:1"><strong>${escapeHtml(friend.username)}</strong> <span class="online-status"></span><br>
                    <button onclick="viewProfile('${friend.id}')" style="margin-top:6px;">View profile</button>
                    ${currentPlayer && currentPlayer.id === profileOwner.id ? `<button class="decline" onclick="removeFriend('${friend.id}')" style="margin-left:6px;">Remove</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderTestimonials() {
        const container = document.getElementById('testimonialsList');
        if (!container) return;
        if (!testimonials.length) { container.innerHTML = '<div class="empty-state">💬 No scraps yet. Start the conversation!</div>'; return; }
        container.innerHTML = testimonials.map(t => `
            <div class="testimonial-card" id="testimonial-${t.id}">
                <div class="flex-between"><strong>${escapeHtml(t.author.username)}</strong> <span style="font-size:0.7rem;">${new Date(t.created_at).toLocaleString()}</span></div>
                <div style="margin: 10px 0;">${escapeHtml(t.content)}</div>
                <div style="display:flex; gap:10px; justify-content:flex-end;">
                    ${currentPlayer && currentPlayer.id === t.author_id ? `<button class="btn-outline" onclick="editTestimonial('${t.id}', '${escapeHtml(t.content).replace(/'/g, "\\'")}')">✏️ Edit</button>` : ''}
                    ${currentPlayer && (currentPlayer.id === t.author_id || currentPlayer.id === profileOwner.id) ? `<button class="decline" onclick="deleteTestimonial('${t.id}')">🗑️ Delete</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderPendingRequests() {
        const container = document.getElementById('requestsList');
        if (!container) return;
        if (!pendingRequests.length) { container.innerHTML = '<div class="empty-state">No pending friend requests.</div>'; return; }
        container.innerHTML = pendingRequests.map(req => `
            <div class="friend-card">
                <div class="friend-avatar">${req.requester.avatar_url || '👤'}</div>
                <div><strong>${escapeHtml(req.requester.username)}</strong><br>
                <button onclick="acceptFriendRequestById('${req.id}')">Accept</button> <button class="decline" onclick="declineFriendRequestById('${req.id}')">Decline</button></div>
            </div>
        `).join('');
    }

    function renderVisitors() {
        const container = document.getElementById('visitorsList');
        if (!container) return;
        if (!profileViews.length) { container.innerHTML = '<div class="empty-state">👀 No visitors yet.</div>'; return; }
        container.innerHTML = profileViews.slice(0,8).map(v => `
            <div class="friend-card">
                <div class="friend-avatar">${v.viewer?.avatar_url || '👀'}</div>
                <div><strong>${escapeHtml(v.viewer?.username || 'wanderer')}</strong><div style="font-size:0.7rem;">${new Date(v.viewed_at).toLocaleString()}</div></div>
            </div>
        `).join('');
    }

    // === API actions (unchanged but needed) ===
    async function sendFriendRequest(targetId) { const { error } = await sb.from('friendships').insert({ requester_id: currentPlayer.id, addressee_id: targetId, status: 'pending' }); error ? showToast(error.message) : (showToast('Request sent!'), await loadProfile(profileOwner.id)); }
    async function acceptFriendRequest() { const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id); error ? showToast(error.message) : (showToast('Friend added!'), await loadProfile(profileOwner.id)); }
    async function declineFriendRequest() { const { error } = await sb.from('friendships').delete().eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id); error ? showToast(error.message) : (showToast('Declined'), await loadProfile(profileOwner.id)); }
    async function acceptFriendRequestById(requestId) { const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('id', requestId); error ? showToast(error.message) : (showToast('Friend added!'), await loadProfile(profileOwner.id)); }
    async function declineFriendRequestById(requestId) { const { error } = await sb.from('friendships').delete().eq('id', requestId); error ? showToast(error.message) : (showToast('Request declined'), await loadProfile(profileOwner.id)); }
    async function removeFriend(friendId) { if(!confirm('Remove friend?')) return; const { error } = await sb.from('friendships').delete().or(`and(requester_id.eq.${currentPlayer.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentPlayer.id})`); error ? showToast(error.message) : (showToast('Friend removed'), await loadProfile(profileOwner.id)); }
    async function addTestimonial() { const content = document.getElementById('scrapContent')?.value.trim(); if(!content) return showToast('Write something...'); const { error } = await sb.from('testimonials').insert({ profile_id: profileOwner.id, author_id: currentPlayer.id, content, is_visible: true }); if(error) showToast(error.message); else { showToast('Scrap posted!'); document.getElementById('scrapContent').value = ''; await loadTestimonials(); renderTestimonials(); } }
    async function updateProfile() { const bio = document.getElementById('bioInput')?.value; const location = document.getElementById('locationInput')?.value; const country = document.getElementById('countryInput')?.value; const gender = document.getElementById('genderInput')?.value; const avatar_url = document.getElementById('avatarUrlInput')?.value; const is_public = document.getElementById('privacyToggle')?.checked; const { error } = await sb.from('players').update({ bio, location, country, gender, avatar_url, is_public }).eq('id', currentPlayer.id); error ? showToast(error.message) : (showToast('Profile updated'), await loadProfile(currentPlayer.id)); }
    function viewProfile(userId) { window.location.href = `profile.html?id=${userId}`; }
    async function searchUsers() { const username = document.getElementById('searchUsername')?.value.trim() || ''; const gender = document.getElementById('searchGender')?.value; const location = document.getElementById('searchLocation')?.value.trim(); const country = document.getElementById('searchCountry')?.value.trim(); let query = sb.from('players').select('id, username, avatar_url, gender, location, country').neq('id', currentPlayer.id); if(username) query = query.ilike('username', `%${username}%`); if(gender) query = query.eq('gender', gender); if(location) query = query.ilike('location', `%${location}%`); if(country) query = query.ilike('country', `%${country}%`); const { data, error } = await query.limit(50); if(error) return showToast(error.message); const friendIds = friendships.map(f => f.requester_id === currentPlayer.id ? f.addressee_id : f.requester_id); searchResults = (data||[]).map(u => ({...u, isFriend: friendIds.includes(u.id)})); const container = document.getElementById('searchResultsGrid'); if(!container) return; if(!searchResults.length) { container.innerHTML = '<div class="empty-state">No adventurers found.</div>'; return; } container.innerHTML = searchResults.map(u => `<div class="result-card"><div class="result-avatar">${u.avatar_url || '🧙'}</div><div><strong>${escapeHtml(u.username)}</strong><div style="font-size:0.7rem;">${escapeHtml(u.gender||'')} ${escapeHtml(u.location||'')}</div>${u.isFriend ? '<button disabled>✓ Friend</button>' : `<button onclick="sendFriendRequest('${u.id}')">➕ Add</button>`}<button onclick="viewProfile('${u.id}')">View</button></div></div>`).join(''); }
    async function resetSearch() { document.getElementById('searchUsername') && (document.getElementById('searchUsername').value = ''); document.getElementById('searchGender') && (document.getElementById('searchGender').value = ''); document.getElementById('searchLocation') && (document.getElementById('searchLocation').value = ''); document.getElementById('searchCountry') && (document.getElementById('searchCountry').value = ''); const container = document.getElementById('searchResultsGrid'); if(container) container.innerHTML = ''; }
    async function editTestimonial(id, oldContent) { const newContent = prompt('Edit scrap:', oldContent); if(newContent && newContent !== oldContent) { const { error } = await sb.from('testimonials').update({ content: newContent, updated_at: new Date() }).eq('id', id); if(error) showToast(error.message); else { showToast('Updated!'); await loadTestimonials(); renderTestimonials(); } } }
    async function deleteTestimonial(id) { if(!confirm('Delete this scrap?')) return; const { error } = await sb.from('testimonials').delete().eq('id', id); if(error) showToast(error.message); else { showToast('Deleted'); await loadTestimonials(); renderTestimonials(); } }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    initTheme();
    loadCurrentUser();
</script>
</body>
</html>
