<!DOCTYPE html>
<html>
<head>
    <title>My Profile - Rheoa RPG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        .profile-card { background: white; border-radius: 20px; border: 2px solid #9c27b0; overflow: hidden; margin-bottom: 30px; }
        .profile-header { background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%); color: white; padding: 30px; text-align: center; }
        .avatar { font-size: 5rem; background: rgba(255,255,255,0.2); width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .profile-name { font-size: 2rem; margin-bottom: 5px; }
        .profile-stats { display: flex; justify-content: center; gap: 30px; margin-top: 15px; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat-label { font-size: 0.8rem; opacity: 0.8; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }
        .profile-content { padding: 20px; }
        .section-title { font-size: 1.3rem; margin-bottom: 15px; color: #9c27b0; border-bottom: 2px solid #9c27b0; padding-bottom: 5px; }
        .friends-grid, .viewers-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .friend-card, .viewer-card { background: #f5f5f5; border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .friend-avatar, .viewer-avatar { font-size: 2rem; }
        .friend-info, .viewer-info { flex: 1; }
        .friend-name, .viewer-name { font-weight: bold; }
        .friend-actions button, .viewer-time { font-size: 0.8rem; }
        button { background: #4CAF50; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
        button.decline { background: #f44336; }
        button.cancel { background: #999; }
        input, textarea { width: 100%; padding: 8px; margin: 8px 0; font-family: inherit; border: 1px solid #ccc; border-radius: 5px; }
        .back-btn { display: block; width: 200px; margin: 20px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; }
        .toggle-privacy { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; }
        @media (max-width: 600px) { .profile-stats { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
<div class="container">
    <div id="profileView"></div>
    <button class="back-btn" onclick="goToDashboard()">← Back to Dashboard</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
    "https://mtiwodvsrwvrujbhmmrn.supabase.co",
    "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;
let profilePlayer = null; // could be different if viewing someone else
let friendships = [];
let friendRequests = [];
let profileViews = [];

function showToast(msg) {
    const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
    document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000);
}

async function loadCurrentUser() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    const { data: player } = await sb.from('players').select('*').eq('auth_id', user.id).single();
    if (!player) { window.location.href = 'index.html'; return; }
    currentPlayer = player;
    
    // Check URL param ?id=... for viewing another profile
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');
    if (targetId && targetId !== currentPlayer.id) {
        await loadProfile(targetId);
    } else {
        await loadProfile(currentPlayer.id);
    }
}

async function loadProfile(playerId) {
    // Fetch player data
    const { data: player, error } = await sb.from('players').select('*').eq('id', playerId).single();
    if (error || !player) { document.getElementById('profileView').innerHTML = '<p>Profile not found</p>'; return; }
    profilePlayer = player;
    
    // Record view (if viewing someone else)
    if (currentPlayer && profilePlayer.id !== currentPlayer.id) {
        await sb.from('profile_views').upsert({
            profile_id: profilePlayer.id,
            viewer_id: currentPlayer.id,
            viewed_at: new Date()
        }, { onConflict: 'profile_id,viewer_id,date(viewed_at)' });
    }
    
    await loadFriendships();
    await loadFriendRequests();
    await loadProfileViews();
    renderProfile();
}

async function loadFriendships() {
    const { data } = await sb.from('friendships')
        .select('*, requester:requester_id(*), addressee:addressee_id(*)')
        .or(`requester_id.eq.${profilePlayer.id},addressee_id.eq.${profilePlayer.id}`)
        .eq('status', 'accepted');
    friendships = data || [];
}

async function loadFriendRequests() {
    if (profilePlayer.id !== currentPlayer?.id) return;
    const { data } = await sb.from('friendships')
        .select('*, requester:requester_id(*)')
        .eq('addressee_id', currentPlayer.id)
        .eq('status', 'pending');
    friendRequests = data || [];
    renderFriendRequests();
}

async function loadProfileViews() {
    if (profilePlayer.id !== currentPlayer?.id) return;
    const { data } = await sb.from('profile_views')
        .select('*, viewer:viewer_id(*)')
        .eq('profile_id', currentPlayer.id)
        .order('viewed_at', { ascending: false })
        .limit(20);
    profileViews = data || [];
    renderViewers();
}

function renderProfile() {
    const isOwnProfile = currentPlayer && profilePlayer.id === currentPlayer.id;
    const totalFriends = friendships.length;
    const viewCount = profileViews.length;
    
    let bioHtml = `<div><strong>Bio:</strong> ${profilePlayer.bio || 'No bio yet'}</div>`;
    if (isOwnProfile) {
        bioHtml = `
            <div class="toggle-privacy">
                <label>Public profile: </label>
                <input type="checkbox" id="privacyToggle" ${profilePlayer.is_public ? 'checked' : ''}>
                <button onclick="updateProfile()">Update Profile</button>
            </div>
            <textarea id="bioInput" placeholder="Write something about yourself...">${profilePlayer.bio || ''}</textarea>
            <input type="text" id="locationInput" placeholder="Location" value="${profilePlayer.location || ''}">
            <input type="text" id="avatarUrlInput" placeholder="Avatar emoji or URL" value="${profilePlayer.avatar_url || ''}">
        `;
    }
    
    const html = `
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">${profilePlayer.avatar_url || '👤'}</div>
                <div class="profile-name">${escapeHtml(profilePlayer.username)}</div>
                <div class="profile-stats">
                    <div class="stat"><div class="stat-label">Level</div><div class="stat-value">${profilePlayer.level}</div></div>
                    <div class="stat"><div class="stat-label">Friends</div><div class="stat-value">${totalFriends}</div></div>
                    <div class="stat"><div class="stat-label">Profile Views</div><div class="stat-value">${viewCount}</div></div>
                    <div class="stat"><div class="stat-label">Joined</div><div class="stat-value">${new Date(profilePlayer.join_date).toLocaleDateString()}</div></div>
                </div>
            </div>
            <div class="profile-content">
                <div class="section-title">📝 About</div>
                ${bioHtml}
                
                <div class="section-title">👥 Friends (${totalFriends})</div>
                <div class="friends-grid" id="friendsGrid"></div>
                
                ${isOwnProfile ? `<div class="section-title">🔍 Find Friends</div>
                <div class="search-bar"><input type="text" id="searchFriend" placeholder="Search by username..."><button onclick="searchUsers()">Search</button></div>
                <div id="searchResults"></div>
                
                <div class="section-title">📨 Friend Requests</div>
                <div id="requestsList"></div>
                
                <div class="section-title">👁️ Who viewed your profile</div>
                <div class="viewers-list" id="viewersList"></div>` : 
                `<div id="friendAction"></div>`}
            </div>
        </div>
    `;
    document.getElementById('profileView').innerHTML = html;
    
    renderFriends();
    if (isOwnProfile) {
        renderFriendRequests();
        renderViewers();
        document.getElementById('privacyToggle').addEventListener('change', updateProfile);
    } else {
        renderFriendAction();
    }
}

function renderFriends() {
    const container = document.getElementById('friendsGrid');
    if (!friendships.length) { container.innerHTML = '<p>No friends yet.</p>'; return; }
    container.innerHTML = friendships.map(f => {
        const friend = f.requester_id === profilePlayer.id ? f.addressee : f.requester;
        return `
            <div class="friend-card">
                <div class="friend-avatar">${friend.avatar_url || '👤'}</div>
                <div class="friend-info">
                    <div class="friend-name">${escapeHtml(friend.username)}</div>
                    <div class="friend-actions">
                        <button onclick="viewProfile('${friend.id}')">View</button>
                        ${currentPlayer && currentPlayer.id === profilePlayer.id ? `<button class="decline" onclick="removeFriend('${friend.id}')">Remove</button>` : ''}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function renderFriendAction() {
    const container = document.getElementById('friendAction');
    if (!container) return;
    // Check if already friends
    const isFriend = friendships.some(f => 
        (f.requester_id === currentPlayer.id && f.addressee_id === profilePlayer.id) ||
        (f.addressee_id === currentPlayer.id && f.requester_id === profilePlayer.id)
    );
    if (isFriend) {
        container.innerHTML = '<button disabled>✓ Already friends</button>';
        return;
    }
    // Check pending request
    const pendingSent = friendships.some(f => f.requester_id === currentPlayer.id && f.addressee_id === profilePlayer.id && f.status === 'pending');
    const pendingReceived = friendships.some(f => f.addressee_id === currentPlayer.id && f.requester_id === profilePlayer.id && f.status === 'pending');
    if (pendingSent) {
        container.innerHTML = '<button disabled>⏳ Request sent</button>';
    } else if (pendingReceived) {
        container.innerHTML = '<button onclick="acceptFriendRequest()">Accept Friend Request</button> <button onclick="declineFriendRequest()">Decline</button>';
    } else {
        container.innerHTML = `<button onclick="sendFriendRequest('${profilePlayer.id}')">➕ Add Friend</button>`;
    }
}

async function sendFriendRequest(targetId) {
    const { error } = await sb.from('friendships').insert({ requester_id: currentPlayer.id, addressee_id: targetId, status: 'pending' });
    if (error) showToast(error.message);
    else { showToast('Friend request sent!'); renderFriendAction(); }
}

async function acceptFriendRequest() {
    const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() })
        .eq('requester_id', profilePlayer.id).eq('addressee_id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Friend added!'); await loadProfile(profilePlayer.id); }
}

async function declineFriendRequest() {
    const { error } = await sb.from('friendships').delete()
        .eq('requester_id', profilePlayer.id).eq('addressee_id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Request declined'); await loadProfile(profilePlayer.id); }
}

async function removeFriend(friendId) {
    if (!confirm('Remove this friend?')) return;
    const { error } = await sb.from('friendships').delete()
        .or(`and(requester_id.eq.${currentPlayer.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentPlayer.id})`);
    if (error) showToast(error.message);
    else { showToast('Friend removed'); await loadProfile(profilePlayer.id); }
}

async function searchUsers() {
    const term = document.getElementById('searchFriend').value.trim();
    if (!term) return;
    const { data } = await sb.from('players').select('id, username, avatar_url').ilike('username', `%${term}%`).limit(10);
    const container = document.getElementById('searchResults');
    if (!data.length) { container.innerHTML = '<p>No users found</p>'; return; }
    container.innerHTML = data.map(u => `
        <div class="friend-card">
            <div class="friend-avatar">${u.avatar_url || '👤'}</div>
            <div class="friend-info">
                <div class="friend-name">${escapeHtml(u.username)}</div>
                <button onclick="viewProfile('${u.id}')">View Profile</button>
            </div>
        </div>
    `).join('');
}

function renderFriendRequests() {
    const container = document.getElementById('requestsList');
    if (!container) return;
    if (!friendRequests.length) { container.innerHTML = '<p>No pending requests</p>'; return; }
    container.innerHTML = friendRequests.map(req => `
        <div class="friend-card">
            <div class="friend-avatar">${req.requester.avatar_url || '👤'}</div>
            <div class="friend-info">
                <div class="friend-name">${escapeHtml(req.requester.username)}</div>
                <div>
                    <button onclick="acceptRequest('${req.id}')">Accept</button>
                    <button class="decline" onclick="declineRequest('${req.id}')">Decline</button>
                </div>
            </div>
        </div>
    `).join('');
}

async function acceptRequest(requestId) {
    const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('id', requestId);
    if (error) showToast(error.message);
    else { showToast('Friend added'); await loadFriendRequests(); await loadFriendships(); renderFriends(); }
}

async function declineRequest(requestId) {
    const { error } = await sb.from('friendships').delete().eq('id', requestId);
    if (error) showToast(error.message);
    else { showToast('Request declined'); await loadFriendRequests(); }
}

function renderViewers() {
    const container = document.getElementById('viewersList');
    if (!container) return;
    if (!profileViews.length) { container.innerHTML = '<p>No one has viewed your profile yet</p>'; return; }
    container.innerHTML = profileViews.map(view => `
        <div class="viewer-card">
            <div class="viewer-avatar">${view.viewer?.avatar_url || '👤'}</div>
            <div class="viewer-info">
                <div class="viewer-name">${escapeHtml(view.viewer?.username || 'Unknown')}</div>
                <div class="viewer-time">${new Date(view.viewed_at).toLocaleString()}</div>
            </div>
        </div>
    `).join('');
}

async function updateProfile() {
    const isPublic = document.getElementById('privacyToggle')?.checked;
    const bio = document.getElementById('bioInput')?.value;
    const location = document.getElementById('locationInput')?.value;
    const avatar_url = document.getElementById('avatarUrlInput')?.value;
    const { error } = await sb.from('players').update({ bio, location, avatar_url, is_public: isPublic }).eq('id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Profile updated'); await loadProfile(currentPlayer.id); }
}

function viewProfile(userId) {
    window.location.href = `profile.html?id=${userId}`;
}

function goToDashboard() {
    window.location.href = 'dashboard.html';
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

loadCurrentUser();
</script>
</body>
</html>
