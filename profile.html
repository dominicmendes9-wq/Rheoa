<!DOCTYPE html>
<html>
<head>
    <title>Meu Perfil - Rheoa RPG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2ff;
            font-family: 'Verdana', 'Geneva', sans-serif;
            padding: 20px;
        }
        .orkut-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        /* Orkut style cards */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #9cb2d1;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-header {
            background: #e1e9f5;
            padding: 10px 15px;
            border-bottom: 1px solid #9cb2d1;
            font-weight: bold;
            color: #1a3b6e;
            font-size: 1.1rem;
        }
        .card-content {
            padding: 15px;
        }
        /* Profile header */
        .profile-header {
            background: linear-gradient(135deg, #1e5799 0%, #2b6fae 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .avatar {
            font-size: 5rem;
            background: rgba(255,255,255,0.2);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-info {
            flex: 1;
        }
        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .profile-location {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .profile-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .friend-avatar {
            font-size: 2rem;
            background: #e1e9f5;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .friends-grid, .testimonials-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .friend-card, .testimonial-card {
            background: #f9f9ff;
            border: 1px solid #d4e0ee;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .testimonial-card {
            flex-direction: column;
            align-items: flex-start;
        }
        .testimonial-author {
            font-weight: bold;
            color: #1a3b6e;
        }
        .testimonial-text {
            font-size: 0.9rem;
            margin: 8px 0;
            line-height: 1.4;
        }
        .testimonial-date {
            font-size: 0.7rem;
            color: #666;
        }
        button, .btn {
            background: #1e5799;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        button.decline { background: #a94442; }
        button.secondary { background: #6c757d; }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }
        .scrap-form {
            background: #f9f9ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .online-status {
            color: #4caf50;
            font-size: 0.7rem;
            display: inline-block;
            margin-left: 5px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1e5799;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; }
            .friends-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="orkut-container">
    <div id="profileView"></div>
    <a href="dashboard.html" class="back-link">← Voltar ao Dashboard</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Supabase client
const sb = window.supabase.createClient(
    "https://mtiwodvsrwvrujbhmmrn.supabase.co",
    "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;
let profileOwner = null;
let friendships = [];
let testimonials = [];
let pendingRequests = [];
let profileViews = [];

function showToast(msg) {
    const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
    document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000);
}

async function loadCurrentUser() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    const { data: player } = await sb.from('players').select('*').eq('auth_id', user.id()).single();
    if (!player) { window.location.href = 'index.html'; return; }
    currentPlayer = player;
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');
    if (targetId && targetId !== currentPlayer.id) {
        await loadProfile(targetId);
    } else {
        await loadProfile(currentPlayer.id);
    }
}

async function loadProfile(playerId) {
    const { data: player, error } = await sb.from('players').select('*').eq('id', playerId).single();
    if (error || !player) { document.getElementById('profileView').innerHTML = '<div class="card"><div class="card-content">Perfil não encontrado</div></div>'; return; }
    profileOwner = player;
    
    // Record view (if not yourself)
    if (currentPlayer && profileOwner.id !== currentPlayer.id) {
        await sb.from('profile_views').upsert({
            profile_id: profileOwner.id,
            viewer_id: currentPlayer.id,
            viewed_at: new Date(),
            view_date: new Date().toISOString().split('T')[0]
        }, { onConflict: 'profile_id,viewer_id,view_date' });
    }
    
    await loadFriendships();
    await loadTestimonials();
    await loadPendingRequests();
    await loadProfileViews();
    renderProfile();
}

async function loadFriendships() {
    const { data } = await sb.from('friendships')
        .select('*, requester:requester_id(*), addressee:addressee_id(*)')
        .or(`requester_id.eq.${profileOwner.id},addressee_id.eq.${profileOwner.id}`)
        .eq('status', 'accepted');
    friendships = data || [];
}

async function loadTestimonials() {
    const { data } = await sb.from('testimonials')
        .select('*, author:author_id(*)')
        .eq('profile_id', profileOwner.id)
        .eq('is_visible', true)
        .order('created_at', { ascending: false });
    testimonials = data || [];
}

async function loadPendingRequests() {
    if (profileOwner.id !== currentPlayer?.id) return;
    const { data } = await sb.from('friendships')
        .select('*, requester:requester_id(*)')
        .eq('addressee_id', currentPlayer.id)
        .eq('status', 'pending');
    pendingRequests = data || [];
}

async function loadProfileViews() {
    if (profileOwner.id !== currentPlayer?.id) return;
    const { data } = await sb.from('profile_views')
        .select('*, viewer:viewer_id(*)')
        .eq('profile_id', currentPlayer.id)
        .order('viewed_at', { ascending: false })
        .limit(20);
    profileViews = data || [];
}

function renderProfile() {
    const isOwner = currentPlayer && profileOwner.id === currentPlayer.id;
    const totalFriends = friendships.length;
    const viewCount = profileViews.length;
    
    // Build header
    let headerHtml = `
        <div class="profile-header">
            <div class="avatar">${profileOwner.avatar_url || '👤'}</div>
            <div class="profile-info">
                <div class="profile-name">${escapeHtml(profileOwner.username)}</div>
                <div class="profile-location">${escapeHtml(profileOwner.location || '')} ${escapeHtml(profileOwner.country ? ', ' + profileOwner.country : '')}</div>
                <div class="profile-stats">
                    <div class="stat">⭐ Level ${profileOwner.level}</div>
                    <div class="stat">👥 Amigos ${totalFriends}</div>
                    <div class="stat">👁️ Visitantes ${viewCount}</div>
                    <div class="stat">📅 Desde ${new Date(profileOwner.join_date).toLocaleDateString()}</div>
                </div>
            </div>
        </div>
    `;
    
    // Bio & edit form
    let bioHtml = `<div class="card"><div class="card-header">Sobre mim</div><div class="card-content">${profileOwner.bio || 'Este usuário ainda não escreveu uma descrição.'}</div></div>`;
    if (isOwner) {
        bioHtml = `
            <div class="card">
                <div class="card-header">Editar perfil</div>
                <div class="card-content">
                    <textarea id="bioInput" placeholder="Sobre você...">${profileOwner.bio || ''}</textarea>
                    <input type="text" id="locationInput" placeholder="Cidade" value="${profileOwner.location || ''}">
                    <input type="text" id="countryInput" placeholder="País" value="${profileOwner.country || ''}">
                    <select id="genderInput">
                        <option value="">Gênero</option>
                        <option value="male" ${profileOwner.gender === 'male' ? 'selected' : ''}>Masculino</option>
                        <option value="female" ${profileOwner.gender === 'female' ? 'selected' : ''}>Feminino</option>
                        <option value="other" ${profileOwner.gender === 'other' ? 'selected' : ''}>Outro</option>
                    </select>
                    <input type="text" id="avatarUrlInput" placeholder="Avatar (emoji ou URL)" value="${profileOwner.avatar_url || ''}">
                    <label><input type="checkbox" id="privacyToggle" ${profileOwner.is_public ? 'checked' : ''}> Perfil público</label>
                    <button onclick="updateProfile()">Salvar alterações</button>
                </div>
            </div>
        `;
    }
    
    // Friends section
    let friendsHtml = `<div class="card"><div class="card-header">Amigos (${totalFriends})</div><div class="card-content"><div class="friends-grid" id="friendsGrid"></div></div></div>`;
    
    // Scrapbook (testimonials)
    let testimonialsHtml = `<div class="card"><div class="card-header">📝 Scrapbook</div><div class="card-content">`;
    if (isOwner) {
        testimonialsHtml += `<div class="scrap-form"><textarea id="scrapContent" rows="2" placeholder="Escreva um scrap para você mesmo..."></textarea><button onclick="addTestimonial()">Postar scrap</button></div>`;
    } else if (currentPlayer) {
        testimonialsHtml += `<div class="scrap-form"><textarea id="scrapContent" rows="2" placeholder="Deixe um scrap para ${escapeHtml(profileOwner.username)}..."></textarea><button onclick="addTestimonial()">Enviar scrap</button></div>`;
    }
    testimonialsHtml += `<div id="testimonialsList"></div></div></div>`;
    
    // Friend requests (only for owner)
    let requestsHtml = '';
    if (isOwner) {
        requestsHtml = `<div class="card"><div class="card-header">📨 Pedidos de amizade</div><div class="card-content" id="requestsList"></div></div>`;
    }
    
    // Profile visitors (only for owner)
    let visitorsHtml = '';
    if (isOwner) {
        visitorsHtml = `<div class="card"><div class="card-header">👁️ Quem visitou meu perfil</div><div class="card-content"><div id="visitorsList"></div></div></div>`;
    }
    
    // Friend action (if viewing someone else)
    let friendActionHtml = '';
    if (!isOwner && currentPlayer) {
        const isFriend = friendships.some(f => 
            (f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id) ||
            (f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id)
        );
        const pendingSent = friendships.some(f => f.requester_id === currentPlayer.id && f.addressee_id === profileOwner.id && f.status === 'pending');
        const pendingReceived = friendships.some(f => f.addressee_id === currentPlayer.id && f.requester_id === profileOwner.id && f.status === 'pending');
        let btnHtml = '';
        if (isFriend) btnHtml = '<button disabled>✓ Amigos</button>';
        else if (pendingSent) btnHtml = '<button disabled>⏳ Pedido enviado</button>';
        else if (pendingReceived) btnHtml = '<button onclick="acceptFriendRequest()">Aceitar amizade</button> <button onclick="declineFriendRequest()">Recusar</button>';
        else btnHtml = `<button onclick="sendFriendRequest('${profileOwner.id}')">➕ Adicionar amigo</button>`;
        friendActionHtml = `<div class="card"><div class="card-header">Amizade</div><div class="card-content">${btnHtml}</div></div>`;
    }
    
    const finalHtml = headerHtml + bioHtml + friendActionHtml + friendsHtml + testimonialsHtml + requestsHtml + visitorsHtml;
    document.getElementById('profileView').innerHTML = finalHtml;
    
    renderFriends();
    renderTestimonials();
    if (isOwner) {
        renderPendingRequests();
        renderVisitors();
    }
}

function renderFriends() {
    const container = document.getElementById('friendsGrid');
    if (!container) return;
    if (!friendships.length) { container.innerHTML = '<p>Nenhum amigo ainda.</p>'; return; }
    container.innerHTML = friendships.map(f => {
        const friend = f.requester_id === profileOwner.id ? f.addressee : f.requester;
        return `
            <div class="friend-card">
                <div class="friend-avatar">${friend.avatar_url || '👤'}</div>
                <div>
                    <div><strong>${escapeHtml(friend.username)}</strong> <span class="online-status">●</span></div>
                    <button onclick="viewProfile('${friend.id}')">Ver perfil</button>
                    ${currentPlayer && currentPlayer.id === profileOwner.id ? `<button class="decline" onclick="removeFriend('${friend.id}')">Remover</button>` : ''}
                </div>
            </div>
        `;
    }).join('');
}

function renderTestimonials() {
    const container = document.getElementById('testimonialsList');
    if (!container) return;
    if (!testimonials.length) { container.innerHTML = '<p>Nenhum scrap ainda. Seja o primeiro a escrever!</p>'; return; }
    container.innerHTML = testimonials.map(t => `
        <div class="testimonial-card">
            <div class="testimonial-author">${escapeHtml(t.author.username)} disse:</div>
            <div class="testimonial-text">${escapeHtml(t.content)}</div>
            <div class="testimonial-date">${new Date(t.created_at).toLocaleString()}</div>
            ${currentPlayer && (currentPlayer.id === t.author_id || currentPlayer.id === profileOwner.id) ? `<button class="secondary" onclick="deleteTestimonial('${t.id}')">Excluir</button>` : ''}
        </div>
    `).join('');
}

function renderPendingRequests() {
    const container = document.getElementById('requestsList');
    if (!container) return;
    if (!pendingRequests.length) { container.innerHTML = '<p>Nenhum pedido pendente.</p>'; return; }
    container.innerHTML = pendingRequests.map(req => `
        <div class="friend-card">
            <div class="friend-avatar">${req.requester.avatar_url || '👤'}</div>
            <div>
                <strong>${escapeHtml(req.requester.username)}</strong>
                <div>
                    <button onclick="acceptFriendRequestById('${req.id}')">Aceitar</button>
                    <button class="decline" onclick="declineFriendRequestById('${req.id}')">Recusar</button>
                </div>
            </div>
        </div>
    `).join('');
}

function renderVisitors() {
    const container = document.getElementById('visitorsList');
    if (!container) return;
    if (!profileViews.length) { container.innerHTML = '<p>Ninguém visitou seu perfil ainda.</p>'; return; }
    container.innerHTML = profileViews.map(v => `
        <div class="friend-card">
            <div class="friend-avatar">${v.viewer?.avatar_url || '👤'}</div>
            <div>
                <strong>${escapeHtml(v.viewer?.username || 'Desconhecido')}</strong>
                <div>${new Date(v.viewed_at).toLocaleString()}</div>
            </div>
        </div>
    `).join('');
}

// Friend actions
async function sendFriendRequest(targetId) {
    const { error } = await sb.from('friendships').insert({ requester_id: currentPlayer.id, addressee_id: targetId, status: 'pending' });
    if (error) showToast(error.message);
    else { showToast('Pedido enviado!'); await loadProfile(profileOwner.id); }
}

async function acceptFriendRequest() {
    const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() })
        .eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Amigo adicionado!'); await loadProfile(profileOwner.id); }
}

async function declineFriendRequest() {
    const { error } = await sb.from('friendships').delete()
        .eq('requester_id', profileOwner.id).eq('addressee_id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Pedido recusado'); await loadProfile(profileOwner.id); }
}

async function acceptFriendRequestById(requestId) {
    const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date() }).eq('id', requestId);
    if (error) showToast(error.message);
    else { showToast('Amigo adicionado'); await loadProfile(profileOwner.id); }
}

async function declineFriendRequestById(requestId) {
    const { error } = await sb.from('friendships').delete().eq('id', requestId);
    if (error) showToast(error.message);
    else { showToast('Pedido recusado'); await loadProfile(profileOwner.id); }
}

async function removeFriend(friendId) {
    if (!confirm('Remover este amigo?')) return;
    const { error } = await sb.from('friendships').delete()
        .or(`and(requester_id.eq.${currentPlayer.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentPlayer.id})`);
    if (error) showToast(error.message);
    else { showToast('Amigo removido'); await loadProfile(profileOwner.id); }
}

// Testimonials (scraps)
async function addTestimonial() {
    const content = document.getElementById('scrapContent').value.trim();
    if (!content) { showToast('Digite um scrap.'); return; }
    const { error } = await sb.from('testimonials').insert({
        profile_id: profileOwner.id,
        author_id: currentPlayer.id,
        content: content,
        is_visible: true
    });
    if (error) showToast(error.message);
    else {
        showToast('Scrap enviado!');
        document.getElementById('scrapContent').value = '';
        await loadTestimonials();
        renderTestimonials();
    }
}

async function deleteTestimonial(testimonialId) {
    if (!confirm('Excluir este scrap?')) return;
    const { error } = await sb.from('testimonials').delete().eq('id', testimonialId);
    if (error) showToast(error.message);
    else { showToast('Scrap excluído'); await loadTestimonials(); renderTestimonials(); }
}

// Profile update
async function updateProfile() {
    const bio = document.getElementById('bioInput')?.value;
    const location = document.getElementById('locationInput')?.value;
    const country = document.getElementById('countryInput')?.value;
    const gender = document.getElementById('genderInput')?.value;
    const avatar_url = document.getElementById('avatarUrlInput')?.value;
    const is_public = document.getElementById('privacyToggle')?.checked;
    const { error } = await sb.from('players').update({ bio, location, country, gender, avatar_url, is_public }).eq('id', currentPlayer.id);
    if (error) showToast(error.message);
    else { showToast('Perfil atualizado'); await loadProfile(currentPlayer.id); }
}

function viewProfile(userId) {
    window.location.href = `profile.html?id=${userId}`;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

loadCurrentUser();
</script>
</body>
</html>
