<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rheoa RPG - Jobs</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 30px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      animation: fadeInDown 0.6s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      padding: 10px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .job-card { 
      border: 2px solid black; 
      border-radius: 12px; 
      padding: 20px; 
      background: white;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      height: fit-content;
      min-height: 420px;
      width: 100%;
      position: relative;
      animation: cardFadeIn 0.5s ease-out;
      cursor: pointer;
    }

    .job-card:nth-child(odd) {
      animation: cardFadeInLeft 0.5s ease-out;
    }

    .job-card:nth-child(even) {
      animation: cardFadeInRight 0.5s ease-out;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes cardFadeInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes cardFadeInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .job-card.locked {
      opacity: 0.8;
      background: #f5f5f5;
      border-color: #999;
    }
    
    .job-card:hover:not(.locked) {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    
    .level-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #2196F3, #1976D2);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      animation: pulse 2s infinite;
    }
    
    .level-badge.locked {
      background: linear-gradient(135deg, #f44336, #d32f2f);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .job-card h3 {
      font-size: 1.4rem;
      margin-bottom: 15px;
      text-align: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
      padding-right: 70px;
      color: #333;
    }
    
    .job-details {
      flex-grow: 1;
      margin-bottom: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
    }
    
    .job-details p {
      margin: 12px 0;
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #eee;
      padding-bottom: 5px;
    }
    
    .job-details p:last-child {
      border-bottom: none;
    }
    
    .job-details p span {
      font-weight: bold;
      min-width: 90px;
      text-align: right;
    }
    
    .salary { color: #4CAF50; font-size: 1.1rem; }
    .xp { color: #9c27b0; font-size: 1.1rem; }
    .energy { color: #2196F3; }
    .energy-warning { color: #f44336; font-weight: bold; animation: blink 1s infinite; }
    .cooldown-badge { color: #ff9800; }
    .level-req { color: #2196F3; }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .button-container {
      margin-top: auto;
      width: 100%;
    }
    
    button {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #2196F3;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 52px;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    button:hover::after:not(:disabled) {
      width: 300px;
      height: 300px;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
    }
    
    button.cooldown {
      background: linear-gradient(135deg, #ff9800, #f57c00);
    }
    
    button.need-energy {
      background: linear-gradient(135deg, #f44336, #d32f2f);
    }
    
    button.level-locked {
      background: linear-gradient(135deg, #9c27b0, #7b1fa2);
    }
    
    button:disabled {
      cursor: not-allowed;
      opacity: 0.9;
    }
    
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      background: #666;
      min-height: 48px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Toast Notification Styles - Using shared */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    
    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
    }
    
    /* Stats summary */
    .stats-summary {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px auto 30px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      border: 2px solid black;
      max-width: 1000px;
      flex-wrap: wrap;
      animation: slideInDown 0.5s ease-out;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .stat-item {
      text-align: center;
      min-width: 90px;
      padding: 10px;
      border-radius: 8px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
    }

    .stat-item:hover {
      background: #f5f5f5;
      transform: scale(1.05);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 5px;
    }
    
    .stat-value {
      font-size: 1.3rem;
      font-weight: bold;
    }
    
    .stat-warning {
      position: absolute;
      top: -5px;
      right: -5px;
      font-size: 1rem;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    /* Realtime status */
    .realtime-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 15px;
      background: rgba(0,0,0,0.8);
      color: white;
      border-radius: 30px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9997;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      animation: slideInRight 0.5s ease-out;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4CAF50;
      animation: pulse 2s infinite;
    }
    
    /* Scroll to top button */
    .scroll-top {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      display: none;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: all 0.2s;
      z-index: 1000;
      animation: fadeInScale 0.3s ease-out;
    }

    .scroll-top:hover {
      transform: scale(1.1);
      background: #764ba2;
    }

    .scroll-top.visible {
      display: flex;
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .loading, .error-message {
      text-align: center;
      padding: 60px;
      color: #666;
      font-size: 1.2rem;
      grid-column: 1 / -1;
      background: white;
      border-radius: 12px;
      border: 2px dashed #ccc;
    }
    
    .bonus-badge {
      background: linear-gradient(135deg, #9c27b0, #7b1fa2);
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-left: 8px;
      animation: pulse 2s infinite;
    }
    
    /* Energy regen indicator */
    .regen-timer {
      font-size: 0.9rem;
      color: #666;
      margin-top: 5px;
      margin-bottom: 15px;
      text-align: center;
      padding: 8px;
      background: rgba(33, 150, 243, 0.1);
      border-radius: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      animation: pulse 2s infinite;
    }
    
    /* Filter bar */
    .filter-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 10px 20px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
    
    .filter-btn.active {
      background: #667eea;
      color: white;
    }
    
    .filter-btn:hover {
      background: #764ba2;
      color: white;
    }
    
    /* Progress bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2, #2196F3, #4CAF50);
      z-index: 1001;
      transition: width 0.1s;
    }
    
    /* Stat warning colors */
    .stat-warning-badge {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-left: 5px;
    }
    
    .badge-warning {
      background: #ff9800;
      animation: pulse 1s infinite;
    }
    
    .badge-danger {
      background: #f44336;
      animation: pulse 0.5s infinite;
    }
    
    .badge-healthy {
      background: #4CAF50;
    }
    
    /* Job count */
    .job-count {
      background: #f0f0f0;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.9rem;
      margin-left: 10px;
    }
    
    @media (max-width: 600px) {
      body { padding: 10px; }
      
      .jobs-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .job-card {
        padding: 15px;
        min-height: 400px;
      }
      
      .job-card h3 {
        font-size: 1.2rem;
        padding-right: 60px;
      }
      
      .job-details p {
        margin: 10px 0;
        font-size: 0.95rem;
      }
      
      .job-details p span {
        min-width: 80px;
      }
      
      .back-button {
        width: 100%;
      }
      
      .stats-summary {
        gap: 10px;
        padding: 15px;
      }
      
      .stat-item {
        min-width: 70px;
        padding: 5px;
      }
      
      .stat-value {
        font-size: 1rem;
      }
      
      .realtime-status {
        bottom: 10px;
        right: 10px;
        padding: 5px 10px;
        font-size: 0.75rem;
      }
      
      .scroll-top {
        bottom: 10px;
        left: 10px;
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
      
      button {
        min-height: 48px;
        font-size: 1rem;
      }
      
      .level-badge {
        font-size: 0.75rem;
        padding: 4px 8px;
      }
      
      .regen-timer {
        font-size: 0.8rem;
        margin-bottom: 10px;
      }
      
      .filter-container {
        flex-direction: column;
        padding: 0 10px;
      }
      
      .filter-btn {
        width: 100%;
      }
    }

    /* Print styles */
    @media print {
      .back-button, .realtime-status, .scroll-top, .filter-container {
        display: none !important;
      }
      
      .job-card {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #000;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<!-- Reading progress bar -->
<div class="reading-progress" id="readingProgress"></div>

<!-- Scroll to top button -->
<button class="scroll-top" onclick="scrollToTop()" id="scrollTopBtn" aria-label="Scroll to top">↑</button>

<canvas id="confetti-canvas"></canvas>
<div class="toast-container" id="toast-container"></div>

<!-- Realtime Status Indicator -->
<div class="realtime-status" id="realtimeStatus">
  <span class="status-dot"></span>
  <span id="realtimeText">Live Updates Active</span>
</div>

<h1>💼 Available Jobs <span class="job-count" id="jobCount">0</span></h1>

<!-- Filter Bar -->
<div class="filter-container">
  <button class="filter-btn active" onclick="filterJobs('all')" id="filterAll">📋 All Jobs</button>
  <button class="filter-btn" onclick="filterJobs('available')" id="filterAvailable">✅ Available</button>
  <button class="filter-btn" onclick="filterJobs('locked')" id="filterLocked">🔒 Locked</button>
  <button class="filter-btn" onclick="filterJobs('cooldown')" id="filterCooldown">⏳ On Cooldown</button>
</div>

<!-- Player Stats Summary -->
<div id="playerStats" class="stats-summary" style="display: none;"></div>

<!-- Energy Regen Timer -->
<div id="regenTimer" class="regen-timer"></div>

<!-- Decay Info -->
<div id="decayInfo" class="regen-timer" style="color: #ff9800; display: none;"></div>

<div id="jobs" class="jobs-grid">
  <div class="loading">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading available jobs...</p>
    </div>
  </div>
</div>

<button class="back-button" onclick="goBack()">← Back to Dashboard</button>

<!-- Include shared utilities -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="toast.js"></script>
<script src="loading.js"></script>
<script src="error-handler.js"></script>

<script>
// Initialize Supabase client
const sb = window.supabaseClient;

let player = null;
let jobs = [];
let confettiAnimation = null;
let playerChannel = null;
let jobsChannel = null;
let cooldownInterval = null;
let regenInterval = null;
let decayCheckInterval = null;
let isUpdating = false;
let jobCooldowns = new Map();
let currentFilter = 'all';

// Page initialization
document.addEventListener('DOMContentLoaded', async function() {
    await initializePage();
    setupScrollToTop();
    setupReadingProgress();
    setupKeyboardNavigation();
});

// Initialize page
async function initializePage() {
    return ErrorHandler.withErrorHandling(async () => {
        // Check authentication
        const user = await getCurrentUser();
        if (!user) {
            showToast('Please log in to view jobs', 'warning', 3000);
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
            return;
        }

        // Load player data
        player = await getCurrentPlayer();
        if (!player) {
            showToast('Player data not found', 'error');
            return;
        }

        // Apply stat decay on load
        await applyStatDecay();
        
        // Regenerate energy on load
        await regenerateEnergy();
        
        // Load jobs
        await loadJobs();
        
        // Setup realtime
        setupRealtimeSubscriptions();
        
        // Start timers
        startCooldownTimer();
        startRegenTimer();
        startDecayChecker();

        // Show welcome toast
        showToast(`Ready to work, ${player.username || 'Commander'}? Stats decay over time - stay balanced! ⚖️`, 'info', 5000);

        // Update job count
        updateJobCount();

    }, null, 'Failed to initialize jobs page');
}

// STAT DECAY FUNCTIONS
async function applyStatDecay() {
    return ErrorHandler.withErrorHandling(async () => {
        if (!player) return;

        const { data, error } = await sb.rpc('decay_player_stats');
        
        if (error) throw error;
        
        if (data.success && data.decay_applied) {
            // Update local player data
            player.hunger = data.new_hunger;
            player.happiness = data.new_happiness;
            
            // Show warnings based on stat levels
            if (data.new_hunger < 30 && data.new_hunger > 10) {
                showToast('⚠️ You are getting hungry! Time to eat something!', 'warning');
            } else if (data.new_hunger <= 10) {
                showToast('🔴 CRITICAL: You are starving! Eat immediately!', 'error');
            }
            
            if (data.new_happiness < 30 && data.new_happiness > 10) {
                showToast('😔 Your happiness is low! Have some fun!', 'warning');
            } else if (data.new_happiness <= 10) {
                showToast('🔴 CRITICAL: You are depressed! Cheer up!', 'error');
            }
            
            // Update the display
            updatePlayerStats();
            
            // Update decay info
            const decayInfo = document.getElementById('decayInfo');
            decayInfo.style.display = 'block';
            decayInfo.textContent = `⏰ Stats decayed - Hunger: ${data.new_hunger}, Happiness: ${data.new_happiness}`;
            setTimeout(() => {
                decayInfo.style.display = 'none';
            }, 5000);
        }
    }, null, 'Error applying stat decay');
}

// Get stat warning indicator
function getStatWarning(value, type) {
    if (type === 'hunger' || type === 'happiness') {
        if (value <= 10) return '🔴';
        if (value <= 30) return '⚠️';
    }
    if (type === 'health') {
        if (value <= 20) return '🏥';
        if (value <= 50) return '🤕';
    }
    return '';
}

// ENERGY REGENERATION FUNCTIONS
async function regenerateEnergy() {
    return ErrorHandler.withErrorHandling(async () => {
        if (!player) return;

        const { data, error } = await sb.rpc('regenerate_energy');
        
        if (error) throw error;
        
        if (data.success && data.energy_added > 0) {
            // Update local player data
            player.energy = data.new_energy;
            updatePlayerStats();
            showToast(`⚡ +${data.energy_added} energy regenerated!`, 'info', 2000);
            updateCooldowns(); // Update button states
            
            // Update realtime text
            document.getElementById('realtimeText').textContent = 'Energy regenerated';
            setTimeout(() => {
                document.getElementById('realtimeText').textContent = 'Live Updates Active';
            }, 2000);
        }
    }, null, 'Error regenerating energy');
}

async function updateRegenInfo() {
    return ErrorHandler.withErrorHandling(async () => {
        if (!player) return;

        const { data, error } = await sb.rpc('get_energy_regen_info');
        
        if (error) throw error;
        
        if (data.success) {
            const timerEl = document.getElementById('regenTimer');
            if (data.energy_to_regenerate > 0) {
                timerEl.textContent = `⏳ Next energy in ${data.seconds_to_next_regen}s (${data.energy_to_regenerate} available)`;
            } else if (player.energy < 100) {
                timerEl.textContent = `⏳ Next energy in ${data.seconds_to_next_regen}s`;
            } else {
                timerEl.textContent = `✨ Energy full (100/100)`;
            }
        }
    }, null, 'Error getting regen info');
}

// Update player stats display
function updatePlayerStats() {
    if (!player) return;
    
    const statsDiv = document.getElementById('playerStats');
    statsDiv.style.display = 'flex';
    
    const hungerWarning = getStatWarning(player.hunger || 100, 'hunger');
    const happinessWarning = getStatWarning(player.happiness || 100, 'happiness');
    const healthWarning = getStatWarning(player.health || 100, 'health');

    statsDiv.innerHTML = `
        <div class="stat-item" onclick="filterJobsByStat('energy')" title="Click to filter jobs you can afford energy-wise">
            <div class="stat-label">💰 Cash</div>
            <div class="stat-value">₹${player.cash.toLocaleString()}</div>
        </div>
        <div class="stat-item" onclick="filterJobsByStat('energy')" title="Click to filter jobs you can afford energy-wise">
            <div class="stat-label">⚡ Energy</div>
            <div class="stat-value">${player.energy}/100</div>
            ${player.energy < 30 ? '<span class="stat-warning">⚠️</span>' : ''}
        </div>
        <div class="stat-item">
            <div class="stat-label">⭐ Level</div>
            <div class="stat-value">${player.level}</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">❤️ Health</div>
            <div class="stat-value">${player.health || 100} ${healthWarning}</div>
        </div>
        <div class="stat-item" onclick="showHungerTips()" title="Click for hunger tips">
            <div class="stat-label">🍽️ Hunger</div>
            <div class="stat-value">${player.hunger || 100} ${hungerWarning}</div>
        </div>
        <div class="stat-item" onclick="showHappinessTips()" title="Click for happiness tips">
            <div class="stat-label">😊 Happiness</div>
            <div class="stat-value">${player.happiness || 100} ${happinessWarning}</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">⭐ Boost</div>
            <div class="stat-value">${player.success_boost || 0}%</div>
        </div>
    `;
    
    // Update regen info
    updateRegenInfo();
}

// Show hunger tips
function showHungerTips() {
    showToast('🍽️ Eat food items from your inventory to reduce hunger!', 'info', 4000);
}

// Show happiness tips
function showHappinessTips() {
    showToast('😊 Use entertainment items to boost happiness!', 'info', 4000);
}

// Set up realtime subscriptions
function setupRealtimeSubscriptions() {
    if (!player) return;
    
    // Subscribe to player changes
    if (playerChannel) playerChannel.unsubscribe();
    
    playerChannel = sb
        .channel('player-updates')
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'players',
                filter: `id=eq.${player.id}`
            },
            (payload) => {
                const oldLevel = player.level;
                player = payload.new;
                updatePlayerStats();
                
                if (player.level > oldLevel) {
                    showToast(`🎉 LEVEL UP! You are now level ${player.level}!`, 'success', 4000);
                    startConfetti();
                    setTimeout(stopConfetti, 3000);
                    
                    // Update realtime text
                    document.getElementById('realtimeText').textContent = 'Level Up!';
                    setTimeout(() => {
                        document.getElementById('realtimeText').textContent = 'Live Updates Active';
                    }, 3000);
                }
                
                updateCooldowns();
                filterJobs(currentFilter); // Re-apply filter
            }
        )
        .subscribe();

    // Subscribe to job cooldown changes
    jobsChannel = sb
        .channel('job-cooldowns')
        .on(
            'postgres_changes',
            {
                event: '*',
                schema: 'public',
                table: 'player_jobs',
                filter: `player_id=eq.${player.id}`
            },
            (payload) => {
                if (payload.new && payload.new.job_id) {
                    updateJobCooldownFromPayload(payload.new);
                }
                updateCooldowns();
                filterJobs(currentFilter); // Re-apply filter
                
                // Update realtime text
                document.getElementById('realtimeText').textContent = 'Cooldowns updated';
                setTimeout(() => {
                    document.getElementById('realtimeText').textContent = 'Live Updates Active';
                }, 2000);
            }
        )
        .subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                document.getElementById('realtimeStatus').style.opacity = '1';
            }
        });
}

// Update cooldown from realtime payload
function updateJobCooldownFromPayload(data) {
    if (data.next_available) {
        const now = new Date();
        const next = new Date(data.next_available);
        const remaining = Math.max(0, Math.ceil((next - now) / 1000));
        jobCooldowns.set(data.job_id, remaining);
    } else {
        jobCooldowns.delete(data.job_id);
    }
}

// Get cooldown from cache
function getJobCooldown(jobId) {
    return jobCooldowns.get(jobId) || 0;
}

// Check if player meets level requirement
function meetsLevelRequirement(jobMinLevel) {
    return player && player.level >= jobMinLevel;
}

// Check if job is available
function isJobAvailable(job) {
    if (!player) return false;
    const meetsLevel = meetsLevelRequirement(job.min_level);
    const hasEnergy = player.energy >= job.energy_cost;
    const remaining = getJobCooldown(job.id);
    return meetsLevel && hasEnergy && remaining === 0;
}

// Update button states only
function updateCooldowns() {
    if (!player) return;
    
    const jobCards = document.querySelectorAll('.job-card');
    if (jobCards.length === 0) return;
    
    jobCards.forEach(card => {
        const jobId = card.dataset.jobId;
        const minLevel = parseInt(card.dataset.minLevel);
        const energyCost = parseInt(card.dataset.energyCost);
        
        if (!jobId) return;
        
        const meetsLevel = meetsLevelRequirement(minLevel);
        const remaining = jobCooldowns.get(jobId) || 0;
        const hasEnergy = player.energy >= energyCost;
        const button = card.querySelector('button');
        
        // Update card appearance based on level requirement
        if (!meetsLevel) {
            card.classList.add('locked');
        } else {
            card.classList.remove('locked');
        }
        
        if (button) {
            if (!meetsLevel) {
                button.disabled = true;
                button.classList.add('level-locked');
                button.classList.remove('cooldown', 'need-energy');
                button.textContent = `🔒 Need Level ${minLevel}`;
            } else if (remaining > 0) {
                button.disabled = true;
                button.classList.add('cooldown');
                button.classList.remove('need-energy', 'level-locked');
                button.textContent = `⏳ Wait ${remaining}s`;
            } else if (!hasEnergy) {
                button.disabled = true;
                button.classList.add('need-energy');
                button.classList.remove('cooldown', 'level-locked');
                button.textContent = '⚡ Need Energy';
            } else {
                button.disabled = false;
                button.classList.remove('cooldown', 'need-energy', 'level-locked');
                button.textContent = '💼 Work';
            }
        }
    });
}

// Build job card HTML
function buildJobCard(job) {
    const remaining = jobCooldowns.get(job.id) || 0;
    const xpBonus = Math.floor((player?.success_boost || 0) * job.xp_reward / 100);
    const totalXp = job.xp_reward + xpBonus;
    const hasEnergy = player?.energy >= job.energy_cost;
    const meetsLevel = meetsLevelRequirement(job.min_level);
    
    let buttonClass = '';
    let buttonText = '';
    
    if (!meetsLevel) {
        buttonClass = 'level-locked';
        buttonText = `🔒 Need Level ${job.min_level}`;
    } else if (remaining > 0) {
        buttonClass = 'cooldown';
        buttonText = `⏳ Wait ${remaining}s`;
    } else if (!hasEnergy) {
        buttonClass = 'need-energy';
        buttonText = '⚡ Need Energy';
    } else {
        buttonText = '💼 Work';
    }
    
    return `
        <div class="job-card ${!meetsLevel ? 'locked' : ''}" 
             data-job-id="${job.id}" 
             data-energy-cost="${job.energy_cost}"
             data-min-level="${job.min_level}"
             onclick="showJobDetails('${job.id}')">
            <span class="level-badge ${!meetsLevel ? 'locked' : ''}">
                ${!meetsLevel ? '🔒' : '📋'} Lvl ${job.min_level}+
            </span>
            <h3 title="${job.name}">${job.name}</h3>
            <div class="job-details">
                <p>💰 Salary <span class="salary">₹${job.salary.toLocaleString()}</span></p>
                <p>⭐ Base XP <span class="xp">${job.xp_reward} XP</span></p>
                ${xpBonus > 0 ? `<p>✨ Bonus <span class="xp">+${xpBonus} XP <span class="bonus-badge">Boost!</span></span></p>` : ''}
                <p>⚡ Energy Cost <span class="${!hasEnergy && meetsLevel ? 'energy-warning' : 'energy'}">${job.energy_cost}</span></p>
                <p>📊 Total XP <span class="xp">${totalXp} XP</span></p>
                <p>⏱️ Cooldown <span class="cooldown-badge">${job.cooldown_seconds}s</span></p>
            </div>
            <div class="button-container">
                <button id="jobBtn-${job.id}" 
                        onclick="attemptJob('${job.id}'); event.stopPropagation()"
                        class="${buttonClass}"
                        ${!meetsLevel || remaining > 0 || !hasEnergy ? 'disabled' : ''}>
                    ${buttonText}
                </button>
            </div>
        </div>
    `;
}

// Show job details in toast
function showJobDetails(jobId) {
    const job = jobs.find(j => j.id === jobId);
    if (!job) return;
    
    const xpBonus = Math.floor((player?.success_boost || 0) * job.xp_reward / 100);
    const totalXp = job.xp_reward + xpBonus;
    
    showToast(`
        📋 ${job.name}
        Level Required: ${job.min_level}
        Salary: ₹${job.salary.toLocaleString()}
        XP: ${job.xp_reward} (${totalXp} with boost)
        Energy: ${job.energy_cost}
        Cooldown: ${job.cooldown_seconds}s
    `, 'info', 5000);
}

// Load jobs
async function loadJobs() {
    return ErrorHandler.withErrorHandling(async () => {
        if (isUpdating) return;

        const { data: jobsData, error } = await sb
            .from('jobs')
            .select('*')
            .order('min_level')
            .order('salary', { ascending: false });
            
        if (error) throw error;
        
        if (!jobsData || jobsData.length === 0) {
            document.getElementById("jobs").innerHTML = '<div class="empty-message">No jobs available</div>';
            return;
        }
        
        jobs = jobsData;

        // Load cooldowns for all jobs
        jobCooldowns.clear();
        const { data: cooldowns, error: cooldownError } = await sb
            .from('player_jobs')
            .select('job_id, next_available')
            .eq('player_id', player.id);

        if (cooldownError) throw cooldownError;

        if (cooldowns) {
            const now = new Date();
            cooldowns.forEach(j => {
                if (j.next_available) {
                    const next = new Date(j.next_available);
                    const remaining = Math.max(0, Math.ceil((next - now) / 1000));
                    jobCooldowns.set(j.job_id, remaining);
                }
            });
        }

        displayJobs();
        updateJobCount();

    }, 'jobs', 'Error loading jobs');
}

// Display jobs based on current filter
function displayJobs() {
    const jobsDiv = document.getElementById("jobs");
    let filteredJobs = jobs;
    
    switch(currentFilter) {
        case 'available':
            filteredJobs = jobs.filter(job => isJobAvailable(job));
            break;
        case 'locked':
            filteredJobs = jobs.filter(job => !meetsLevelRequirement(job.min_level));
            break;
        case 'cooldown':
            filteredJobs = jobs.filter(job => jobCooldowns.get(job.id) > 0);
            break;
    }

    if (filteredJobs.length === 0) {
        jobsDiv.innerHTML = `<div class="empty-message">No ${currentFilter} jobs found</div>`;
        return;
    }

    jobsDiv.innerHTML = filteredJobs.map(job => buildJobCard(job)).join('');
}

// Filter jobs
function filterJobs(filter) {
    currentFilter = filter;
    
    // Update active button
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(`filter${filter.charAt(0).toUpperCase() + filter.slice(1)}`).classList.add('active');
    
    displayJobs();
    showToast(`Showing: ${filter} jobs`, 'info', 1500);
}

// Filter jobs by stat
function filterJobsByStat(stat) {
    if (stat === 'energy') {
        const affordableJobs = jobs.filter(job => job.energy_cost <= player.energy);
        const jobsDiv = document.getElementById("jobs");
        jobsDiv.innerHTML = affordableJobs.map(job => buildJobCard(job)).join('');
        showToast(`Showing jobs you can afford (${player.energy} energy)`, 'info', 3000);
    }
}

// Update job count
function updateJobCount() {
    document.getElementById('jobCount').textContent = jobs.length;
}

// Attempt job
async function attemptJob(jobId) {
    return ErrorHandler.withErrorHandling(async () => {
        if (!player || isUpdating) return;

        // Find the job
        const job = jobs.find(j => j.id === jobId);
        if (!job) return;

        // Check level requirement
        if (player.level < job.min_level) {
            showToast(`🔒 Need level ${job.min_level} to work this job!`, 'warning');
            return;
        }

        // Check local cache first for immediate feedback
        const cachedCooldown = jobCooldowns.get(jobId) || 0;
        if (cachedCooldown > 0) {
            showToast(`⏳ Please wait ${cachedCooldown} seconds before working again!`, 'error');
            return;
        }

        isUpdating = true;
        
        // Update button to loading state
        const button = document.getElementById(`jobBtn-${jobId}`);
        if (button) {
            button.disabled = true;
            button.textContent = '⏳ Working...';
        }

        // Call the database function
        const { data, error } = await sb.rpc('attempt_job', {
            p_job_id: jobId
        });

        if (error) throw error;

        if (!data.success) {
            // Handle error cases
            switch (data.error) {
                case 'On cooldown':
                    jobCooldowns.set(jobId, Math.ceil(data.cooldown_remaining));
                    showToast(`⏳ Please wait ${Math.ceil(data.cooldown_remaining)}s`, 'error');
                    break;
                case 'Not enough energy':
                    showToast(`❌ Need ${data.energy_needed} energy (you have ${data.energy_current})`, 'error');
                    break;
                case 'Level too low':
                    showToast(`🔒 Need level ${data.required_level} (you are level ${data.current_level})`, 'warning');
                    break;
                default:
                    showToast(`❌ ${data.error}`, 'error');
            }
            return;
        }

        // Update local player data with response
        player.cash = data.new_cash;
        player.xp = data.new_xp;
        player.energy = data.new_energy;
        player.level = data.new_level;
        
        // Apply stat decay after job
        await applyStatDecay();
        
        // Update player stats display
        updatePlayerStats();
        
        // Update cooldown cache
        jobCooldowns.set(jobId, data.cooldown_seconds);
        
        // Show result toast
        showToast(`✅ Worked! +₹${data.cash_change.toLocaleString()} | +${data.xp_change} XP`, 'success');
        
        // Show level up if applicable
        if (data.leveled_up) {
            showToast(`🎉 LEVEL UP! You are now level ${data.new_level}!`, 'success', 4000);
            startConfetti();
            setTimeout(stopConfetti, 3000);
        }

        // Update the job card button immediately
        updateCooldowns();
        filterJobs(currentFilter); // Re-apply filter

        // Update realtime text
        document.getElementById('realtimeText').textContent = 'Job completed';
        setTimeout(() => {
            document.getElementById('realtimeText').textContent = 'Live Updates Active';
        }, 2000);

    }, null, 'Error processing job');
}

// Confetti system
function startConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    const particles = [];
    const colors = ['#f44336', '#4CAF50', '#2196F3', '#FFC107', '#9C27B0', '#FF9800'];
    
    for (let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 8 + 3,
            speed: Math.random() * 4 + 2,
            angle: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360
        });
    }
    
    function animate() {
        if (!ctx) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let anyVisible = false;
        particles.forEach(p => {
            p.y += p.speed;
            p.x += Math.sin(p.angle) * 0.5;
            p.rotation += 2;
            
            if (p.y < canvas.height + 50) {
                anyVisible = true;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
        });
        
        if (anyVisible) {
            confettiAnimation = requestAnimationFrame(animate);
        }
    }
    
    animate();
}

function stopConfetti() {
    if (confettiAnimation) {
        cancelAnimationFrame(confettiAnimation);
        confettiAnimation = null;
    }
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Cooldown countdown timer
function startCooldownTimer() {
    cooldownInterval = setInterval(() => {
        if (!player || isUpdating) return;
        
        // Update all cooldowns in cache
        let needsUpdate = false;
        for (let [jobId, remaining] of jobCooldowns.entries()) {
            if (remaining > 0) {
                jobCooldowns.set(jobId, remaining - 1);
                needsUpdate = true;
            } else {
                jobCooldowns.delete(jobId);
            }
        }
        
        // Update UI if any cooldowns changed
        if (needsUpdate) {
            updateCooldowns();
            if (currentFilter === 'cooldown' || currentFilter === 'available') {
                displayJobs();
            }
        }
    }, 1000);
}

// Start energy regeneration timer (check every 10 seconds)
function startRegenTimer() {
    regenInterval = setInterval(async () => {
        if (player && player.energy < 100) {
            await regenerateEnergy();
        }
        updateRegenInfo();
    }, 10000); // Check every 10 seconds
}

// Check for stat decay every 5 minutes
function startDecayChecker() {
    decayCheckInterval = setInterval(async () => {
        if (player) {
            await applyStatDecay();
        }
    }, 300000); // Check every 5 minutes
}

// Scroll to top functionality
function setupScrollToTop() {
    const scrollBtn = document.getElementById('scrollTopBtn');
    
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            scrollBtn.classList.add('visible');
        } else {
            scrollBtn.classList.remove('visible');
        }
    });
}

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}

// Reading progress bar
function setupReadingProgress() {
    const progressBar = document.getElementById('readingProgress');
    
    window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        progressBar.style.width = scrolled + '%';
    });
}

// Keyboard navigation
function setupKeyboardNavigation() {
    document.addEventListener('keydown', (e) => {
        // 1,2,3,4 for filters
        if (e.key === '1') {
            e.preventDefault();
            filterJobs('all');
        } else if (e.key === '2') {
            e.preventDefault();
            filterJobs('available');
        } else if (e.key === '3') {
            e.preventDefault();
            filterJobs('locked');
        } else if (e.key === '4') {
            e.preventDefault();
            filterJobs('cooldown');
        }
        
        // R to refresh
        if (e.key === 'r' || e.key === 'R') {
            if (!e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                showToast('Refreshing...', 'info', 1000);
                loadJobs();
            }
        }
        
        // Esc to reset filter
        if (e.key === 'Escape') {
            filterJobs('all');
        }
    });
}

// Navigation
function goBack() {
    showToast('Returning to dashboard...', 'info', 1000);
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 500);
}

// Clean up on page unload
window.addEventListener('beforeunload', () => {
    if (playerChannel) playerChannel.unsubscribe();
    if (jobsChannel) jobsChannel.unsubscribe();
    if (cooldownInterval) clearInterval(cooldownInterval);
    if (regenInterval) clearInterval(regenInterval);
    if (decayCheckInterval) clearInterval(decayCheckInterval);
});

// Export functions for global use
window.attemptJob = attemptJob;
window.goBack = goBack;
window.scrollToTop = scrollToTop;
window.filterJobs = filterJobs;
window.filterJobsByStat = filterJobsByStat;
window.showJobDetails = showJobDetails;
window.showHungerTips = showHungerTips;
window.showHappinessTips = showHappinessTips;
