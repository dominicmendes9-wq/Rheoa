<!DOCTYPE html>
<html>
<head>
  <title>Jobs</title>
</head>
<body>

<h1>Jobs</h1>

<div id="jobs"></div>
<hr>
<div id="status"></div>

<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;

// 🔥 Load player + jobs
async function loadJobs() {
  const { data: { user } } = await sb.auth.getUser();

  console.log("USER:", user);

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // 🔍 Get player
  let { data: player, error: pError } = await sb
    .from('players')
    .select('*')
    .eq('auth_id', user.id)
    .single();

  console.log("PLAYER:", player, pError);

  if (!player) {
    document.getElementById("jobs").innerText = "Player not found!";
    return;
  }

  currentPlayer = player;

  // ⚡ ENERGY REGEN (fixed)
  if (currentPlayer.energy < 100) {
    let newEnergy = currentPlayer.energy + 1;

    await sb.from('players')
      .update({ energy: newEnergy })
      .eq('id', currentPlayer.id);

    currentPlayer.energy = newEnergy;
  }

  // 🔍 Get jobs
  let { data: jobs, error } = await sb.from('jobs').select('*');

  console.log("JOBS:", jobs, error);

  if (error) {
    document.getElementById("jobs").innerText = "Error loading jobs!";
    return;
  }

  if (!jobs || jobs.length === 0) {
    document.getElementById("jobs").innerText = "No jobs found!";
    return;
  }

  // 🎨 Render jobs
  let html = "";

  jobs.forEach(job => {
    html += `
      <div style="border:2px solid black; margin:10px; padding:10px; border-radius:10px;">
        <h3>${job.name}</h3>
        <p>💰 ₹${job.salary} | ⚡ ${job.energy_cost} | ⭐ ${job.xp_reward}</p>
        <button onclick="work('${job.id}', ${job.salary}, ${job.energy_cost}, ${job.xp_reward})">
          Work
        </button>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

// 💼 Work function
async function work(jobId, salary, energyCost, xpReward) {

  const now = new Date();

  // 🔍 Get last worked safely
  let { data: jobData, error: jobError } = await sb
    .from('player_jobs')
    .select('*')
    .eq('player_id', currentPlayer.id)
    .eq('job_id', jobId)
    .maybeSingle();

  // ⏱️ COOLDOWN = 30 sec
  if (jobData && jobData.last_worked) {
    let last = new Date(jobData.last_worked);
    let diff = (now - last) / 1000;

    if (diff < 30) {
      alert("⏳ Wait " + Math.ceil(30 - diff) + " seconds");
      return;
    }
  }

  // ⚡ Energy check
  if (currentPlayer.energy < energyCost) {
    alert("Not enough energy!");
    return;
  }

  // 💰 Calculations
  let newCash = currentPlayer.cash + salary;
  let newEnergy = currentPlayer.energy - energyCost;
  let newXP = currentPlayer.xp + xpReward;

  // 📈 Level formula
  let newLevel = Math.floor(Math.sqrt(newXP / 100)) + 1;

  // 🔄 Update player
  await sb.from('players').update({
    cash: newCash,
    energy: newEnergy,
    xp: newXP,
    level: newLevel
  }).eq('id', currentPlayer.id);

  // 💾 Update cooldown
  if (jobData) {
    await sb.from('player_jobs')
      .update({ last_worked: now })
      .eq('id', jobData.id);
  } else {
    await sb.from('player_jobs').insert({
      player_id: currentPlayer.id,
      job_id: jobId,
      last_worked: now
    });
  }

  document.getElementById("status").innerText =
    `💼 Worked! +₹${salary} | -${energyCost}⚡ | +${xpReward}XP`;

  loadJobs(); // 🔄 Refresh
}

// 🔙 Back button
function goBack() {
  window.location.href = "dashboard.html";
}

// 🚀 Start
loadJobs();
</script>

</body>
</html>
