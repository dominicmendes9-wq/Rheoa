<!DOCTYPE html>
<html>
<head>
  <title>Jobs</title>
</head>
<body>

<h1>Jobs</h1>

<div id="jobs"></div>
<hr>
<div id="status"></div>

<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;

// 🔥 Load player + jobs
async function loadJobs() {
  const { data: { user } } = await sb.auth.getUser();

  console.log("USER:", user);

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  let { data: player, error: pError } = await sb
    .from('players')
    .select('*')
    .eq('auth_id', user.id)
    .single();

  console.log("PLAYER:", player, pError);

  currentPlayer = player;

  let { data: jobs, error } = await sb.from('jobs').select('*');

  console.log("JOBS:", jobs, error);

  if (error) {
    document.getElementById("jobs").innerText = "Error loading jobs!";
    return;
  }

  if (!jobs || jobs.length === 0) {
    document.getElementById("jobs").innerText = "No jobs found!";
    return;
  }

  let html = "";

  jobs.forEach(job => {
    html += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <h3>${job.name}</h3>
        <p>💰 Salary: ${job.salary}</p>
        <p>⚡ Energy Cost: ${job.energy_cost}</p>
        <p>⭐ XP: ${job.xp_reward}</p>
        <button onclick="work('${job.id}', ${job.salary}, ${job.energy_cost}, ${job.xp_reward})">
          Work
        </button>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

// 💼 Work function
async function work(jobId, salary, energyCost, xpReward) {

  const now = new Date();

  // 🔍 check last worked
  let { data: jobData } = await sb
    .from('player_jobs')
    .select('*')
    .eq('player_id', currentPlayer.id)
    .eq('job_id', jobId)
    .single();

  // ⏱️ COOLDOWN = 30 seconds
  if (jobData && jobData.last_worked) {
    let last = new Date(jobData.last_worked);
    let diff = (now - last) / 1000;

    if (diff < 30) {
      alert("⏳ Wait " + Math.ceil(30 - diff) + " seconds");
      return;
    }
  }

  // ⚡ energy check
  if (currentPlayer.energy < energyCost) {
    alert("Not enough energy!");
    return;
  }

  // 💰 calculations
  let newCash = currentPlayer.cash + salary;
  let newEnergy = currentPlayer.energy - energyCost;
  let newXP = currentPlayer.xp + xpReward;

  // 📈 level calculation
  let newLevel = Math.floor(Math.sqrt(newXP / 100)) + 1;

  // 🔄 update player
  await sb.from('players').update({
    cash: newCash,
    energy: newEnergy,
    xp: newXP,
    level: newLevel
  }).eq('id', currentPlayer.id);

  // 💾 update cooldown
  if (jobData) {
    await sb.from('player_jobs')
      .update({ last_worked: now })
      .eq('id', jobData.id);
  } else {
    await sb.from('player_jobs').insert({
      player_id: currentPlayer.id,
      job_id: jobId,
      last_worked: now
    });
  }

  document.getElementById("status").innerText =
    `💼 Worked! +₹${salary} | -${energyCost}⚡ | +${xpReward}XP`;

  loadJobs();
}
</script>

</body>
</html>
