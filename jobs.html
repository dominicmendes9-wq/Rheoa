<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Jobs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Variables & Themes ─── */
    :root {
      --bg-body: #f0f4fa;
      --card-bg: #fff;
      --card-border: rgba(148,163,184,0.2);
      --card-shadow: 0 12px 30px rgba(0,0,0,0.05);
      --header-bg: linear-gradient(135deg,#1e2f5e 0%,#1a4b7a 100%);
      --header-text: #fff;
      --accent: #2c6e9e;
      --accent-hover: #1f5480;
      --btn-primary: #2c6e9e;
      --btn-primary-hover: #1f5480;
      --btn-secondary: #475569;
      --btn-ghost: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #334155;
      --border-light: #e2e8f0;
      --card-header-bg: #f8fafc;
      --avatar-bg: #e0f2fe;
      --font-family: 'Inter', system-ui, sans-serif;
      --border-radius-card: 24px;
      --transition: all 0.2s ease;
      --color-success: #16a34a;
      --color-warning: #f59e0b;
      --color-danger: #dc2626;
      --color-energy: #2563eb;
      --color-xp: #7c3aed;
      --color-cash: #16a34a;
      --color-level: #f59e0b;
    }

    body.theme-dusk {
      --bg-body: #0f1722;
      --card-bg: #1e293b;
      --card-border: rgba(51,65,85,0.6);
      --card-shadow: 0 15px 35px rgba(0,0,0,0.3);
      --header-bg: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      --header-text: #e2e8f0;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-secondary: #334155;
      --btn-ghost: #334155;
      --text-main: #f1f5f9;
      --text-muted: #cbd5e1;
      --border-light: #334155;
      --card-header-bg: #0f172a;
      --avatar-bg: #334155;
    }

    body.theme-meadow {
      --bg-body: #eef4e6;
      --card-bg: #ffffffea;
      --card-border: #cbd5b0;
      --card-shadow: 0 12px 24px rgba(60,70,40,0.08);
      --header-bg: linear-gradient(135deg,#2b5e3b 0%,#4a7c59 100%);
      --header-text: #fef9e6;
      --accent: #4b6b3e;
      --accent-hover: #3a5530;
      --btn-primary: #4b6b3e;
      --btn-primary-hover: #3a5530;
      --btn-secondary: #7f6b4a;
      --btn-ghost: #e9e1c7;
      --text-main: #2c2b26;
      --text-muted: #5b5a4c;
      --border-light: #d9d2b0;
      --card-header-bg: #fef6e0;
      --avatar-bg: #e2e9cf;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-family);
      color: var(--text-main);
      padding: 28px 20px;
      transition: background .25s, color .2s;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }

    /* ─── Top Bar ─── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding: 0 8px;
    }
    .back-link {
      background: var(--card-bg);
      padding: 8px 18px;
      border-radius: 60px;
      text-decoration: none;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--border-light);
      transition: var(--transition);
      font-size: .9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(2px);
    }
    .back-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .theme-switcher, .font-switcher {
      display: flex;
      gap: 6px;
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      backdrop-filter: blur(4px);
      align-items: center;
    }
    .theme-btn, .font-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: .8rem;
      cursor: pointer;
      transition: .2s;
      color: var(--text-muted);
      font-family: var(--font-family);
    }
    .theme-btn.active, .font-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .theme-btn:hover:not(.active), .font-btn:hover:not(.active) {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .font-btn {
      font-size: .75rem;
      padding: 4px 12px;
    }

    /* ─── Page Title ─── */
    h1 {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-main);
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-style: italic;
    }

    /* ─── Player Stats ─── */
    .player-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--header-bg);
      color: var(--header-text);
      padding: 15px 25px;
      border-radius: var(--border-radius-card);
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .stat-group { display: flex; gap: 30px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-label { font-size: 0.8rem; opacity: 0.9; }
    .stat-value { font-size: 1.3rem; font-weight: bold; }

    .stat-warning { color: var(--color-warning); }
    .stat-danger { color: var(--color-danger); }

    /* ─── Progress Bars ─── */
    .progress-container {
      max-width: 500px;
      margin: 0 auto 30px;
      padding: 0 15px;
    }
    .progress-label {
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar-bg {
      width: 100%;
      height: 20px;
      background: var(--border-light);
      border-radius: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 40px;
      transition: width 0.3s ease;
    }
    .progress-xp { background: var(--color-xp); }
    .progress-energy { background: var(--color-energy); }
    .progress-energy.low { background: var(--color-danger); }
    .progress-energy.mid { background: var(--color-warning); }

    .regen-timer {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* ─── Jobs Grid ─── */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .job-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 20px;
      transition: var(--transition);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .job-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    .job-card.locked {
      opacity: 0.7;
      filter: grayscale(0.3);
    }
    .job-card .level-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent);
      color: white;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .job-card.locked .level-badge {
      background: var(--text-muted);
    }

    .job-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .job-icon {
      font-size: 2.2rem;
      line-height: 1;
      width: 48px;
      text-align: center;
    }
    .job-name {
      font-size: 1.3rem;
      font-weight: 600;
      flex: 1;
    }
    .job-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin: 12px 0;
      font-size: 0.95rem;
    }
    .job-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .job-detail .label { color: var(--text-muted); font-weight: 500; }
    .job-detail .value { font-weight: 600; }
    .job-detail .value.salary { color: var(--color-cash); }
    .job-detail .value.xp { color: var(--color-xp); }
    .job-detail .value.energy { color: var(--color-energy); }
    .job-detail .value.energy-warning { color: var(--color-danger); }
    .job-detail .value.cooldown { color: var(--color-warning); }
    .job-detail .value.level { color: var(--color-level); }

    .job-card .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-family: var(--font-family);
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      margin-top: auto;
      text-align: center;
    }
    .btn-primary { background: var(--btn-primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--btn-primary-hover); transform: scale(1.01); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-cooldown { background: var(--color-warning); color: white; }
    .btn-cooldown:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-energy { background: var(--color-danger); color: white; }
    .btn-energy:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-locked { background: var(--text-muted); color: white; cursor: not-allowed; }

    /* ─── Realtime Status ─── */
    .realtime-status {
      position: fixed;
      bottom: 12px;
      right: 12px;
      padding: 6px 14px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 40px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 9997;
      backdrop-filter: blur(4px);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-success);
      animation: pulse 2s infinite;
    }

    /* ─── Toast ─── */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      font-weight: 500;
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      max-width: 400px;
      word-wrap: break-word;
      backdrop-filter: blur(4px);
    }
    .toast.success { background: var(--color-success); }
    .toast.error { background: var(--color-danger); }
    .toast.info { background: var(--btn-primary); }
    .toast.warning { background: var(--color-warning); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ─── Loading / Empty ─── */
    .loading, .empty-message {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid var(--border-light);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ─── Back Button ─── */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: var(--font-family);
      font-weight: 600;
      border: none;
      border-radius: 60px;
      background: var(--btn-secondary);
      color: white;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }
    .back-button:hover { background: #1e293b; transform: scale(1.02); }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      body { padding: 16px; }
      .player-stats { flex-direction: column; text-align: center; }
      .stat-group { justify-content: center; }
      .jobs-grid { grid-template-columns: 1fr; }
      .job-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="container">
  <!-- Top Bar -->
  <div class="top-bar">
    <a href="dashboard.html" class="back-link">← Dashboard</a>
    <div class="controls">
      <div class="theme-switcher" id="themeSwitcher">
        <button data-theme="default" class="theme-btn active">✨ Aurora</button>
        <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
        <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
      </div>
      <div class="font-switcher" id="fontSwitcher">
        <button data-font="inter" class="font-btn active">Inter</button>
        <button data-font="monospace" class="font-btn">Courier</button>
        <button data-font="serif" class="font-btn">Georgia</button>
      </div>
    </div>
  </div>

  <h1>💼 Available Jobs</h1>
  <div class="subtitle">Work to earn cash and experience</div>

  <!-- Player Stats -->
  <div id="playerStats" class="player-stats" style="display: none;"></div>

  <!-- Energy & XP Progress -->
  <div class="progress-container" id="progressContainer" style="display: none;">
    <div class="progress-label">
      <span>Level Progress</span>
      <span id="levelDisplay">Level 1</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill progress-xp" id="xpBar" style="width:0%"></div>
    </div>

    <div class="progress-label" style="margin-top: 16px;">
      <span>Energy <span id="energyRegenBadge">⚡ +1/min</span></span>
      <span id="energyDisplay">100/100</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill progress-energy" id="energyBar" style="width:100%"></div>
    </div>
    <div class="regen-timer" id="regenTimer"></div>
  </div>

  <!-- Decay Info -->
  <div id="decayInfo" class="regen-timer" style="color: var(--color-warning);"></div>

  <!-- Jobs Grid -->
  <div id="jobs" class="jobs-grid">
    <div class="loading"><div class="spinner"></div><p>Loading jobs...</p></div>
  </div>

  <button class="back-button" onclick="goBack()">← Back to Dashboard</button>
</div>

<!-- Realtime Status -->
<div class="realtime-status" id="realtimeStatus">
  <span class="status-dot"></span>
  <span>Live Updates Active</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const sb = window.supabase.createClient(
    "https://mtiwodvsrwvrujbhmmrn.supabase.co",
    "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
  );

  // ─── Utilities ────────────────────────────────────────────
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  function showToast(message, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      setTimeout(() => {
        if (toast.parentNode) container.removeChild(toast);
      }, 300);
    }, duration);
  }

  // ─── Theme & Font ──────────────────────────────────────
  function setTheme(themeName) {
    const body = document.body;
    body.classList.remove('theme-dusk', 'theme-meadow');
    if (themeName === 'dusk') body.classList.add('theme-dusk');
    else if (themeName === 'meadow') body.classList.add('theme-meadow');
    localStorage.setItem('jobs_theme', themeName);
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
    });
  }

  function setFont(fontName) {
    const root = document.documentElement;
    if (fontName === 'inter') root.style.setProperty('--font-family', "'Inter', system-ui, sans-serif");
    else if (fontName === 'monospace') root.style.setProperty('--font-family', "'Courier New', monospace");
    else if (fontName === 'serif') root.style.setProperty('--font-family', "'Georgia', serif");
    localStorage.setItem('jobs_font', fontName);
    document.querySelectorAll('.font-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-font') === fontName);
    });
  }

  function initThemeAndFont() {
    const savedTheme = localStorage.getItem('jobs_theme') || 'default';
    setTheme(savedTheme);
    const savedFont = localStorage.getItem('jobs_font') || 'inter';
    setFont(savedFont);
    document.getElementById('themeSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.theme-btn');
      if (btn) setTheme(btn.getAttribute('data-theme'));
    });
    document.getElementById('fontSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.font-btn');
      if (btn) setFont(btn.getAttribute('data-font'));
    });
  }

  // ─── Player & Jobs State ──────────────────────────────
  let player = null;
  let jobs = [];
  let jobCooldowns = new Map();
  let isUpdating = false;
  let playerChannel = null;
  let jobsChannel = null;
  let cooldownInterval = null;
  let regenInterval = null;
  let decayCheckInterval = null;

  // ─── Player Stats & Decay ──────────────────────────────
  async function applyStatDecay() {
    if (!player) return;
    try {
      const { data, error } = await sb.rpc('decay_player_stats');
      if (error) throw error;
      if (data.success && data.decay_applied) {
        player.hunger = data.new_hunger;
        player.happiness = data.new_happiness;
        updatePlayerStats();
        if (data.new_hunger < 30 || data.new_happiness < 30) {
          showToast('⚠️ Stats decayed! Check your hunger/happiness.', 'warning');
        }
      }
    } catch (err) {
      console.error('Stat decay error:', err);
    }
  }

  async function regenerateEnergy() {
    if (!player) return;
    try {
      const { data, error } = await sb.rpc('regenerate_energy');
      if (error) throw error;
      if (data.success && data.energy_added > 0) {
        player.energy = data.new_energy;
        updatePlayerStats();
        showToast(`⚡ +${data.energy_added} energy regenerated!`, 'info', 2000);
        updateCooldowns();
      }
    } catch (err) {
      console.error('Energy regen error:', err);
    }
  }

  async function updateRegenInfo() {
    if (!player) return;
    try {
      const { data, error } = await sb.rpc('get_energy_regen_info');
      if (error) throw error;
      if (data.success) {
        const timerEl = document.getElementById('regenTimer');
        if (data.energy_to_regenerate > 0) {
          timerEl.textContent = `⏳ Next energy in ${data.seconds_to_next_regen}s (${data.energy_to_regenerate} available)`;
        } else if (player.energy < 100) {
          timerEl.textContent = `⏳ Next energy in ${data.seconds_to_next_regen}s`;
        } else {
          timerEl.textContent = '✨ Energy full';
        }
      }
    } catch (err) {
      console.error('Regen info error:', err);
    }
  }

  function getStatWarning(value, type) {
    if (type === 'hunger' || type === 'happiness') {
      if (value <= 10) return 'danger';
      if (value <= 30) return 'warning';
    }
    if (type === 'health') {
      if (value <= 20) return 'danger';
      if (value <= 50) return 'warning';
    }
    return '';
  }

  function updatePlayerStats() {
    if (!player) return;
    const statsDiv = document.getElementById('playerStats');
    statsDiv.style.display = 'flex';
    const hungerWarn = getStatWarning(player.hunger || 100, 'hunger');
    const happinessWarn = getStatWarning(player.happiness || 100, 'happiness');
    const healthWarn = getStatWarning(player.health || 100, 'health');

    statsDiv.innerHTML = `
      <div class="stat-group">
        <div class="stat">
          <div class="stat-label">💰 Cash</div>
          <div class="stat-value">₹${player.cash.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="stat-label">⚡ Energy</div>
          <div class="stat-value">${player.energy}/100</div>
        </div>
        <div class="stat">
          <div class="stat-label">⭐ Level</div>
          <div class="stat-value">${player.level}</div>
        </div>
        <div class="stat">
          <div class="stat-label">❤️ Health</div>
          <div class="stat-value ${healthWarn === 'danger' ? 'stat-danger' : healthWarn === 'warning' ? 'stat-warning' : ''}">${player.health || 100}</div>
        </div>
        <div class="stat">
          <div class="stat-label">🍽️ Hunger</div>
          <div class="stat-value ${hungerWarn === 'danger' ? 'stat-danger' : hungerWarn === 'warning' ? 'stat-warning' : ''}">${player.hunger || 100}</div>
        </div>
        <div class="stat">
          <div class="stat-label">😊 Happiness</div>
          <div class="stat-value ${happinessWarn === 'danger' ? 'stat-danger' : happinessWarn === 'warning' ? 'stat-warning' : ''}">${player.happiness || 100}</div>
        </div>
        <div class="stat">
          <div class="stat-label">⭐ Boost</div>
          <div class="stat-value">${player.success_boost || 0}%</div>
        </div>
      </div>
    `;

    // Update XP bar
    const nextLevelXP = Math.pow(player.level, 2) * 100;
    const prevLevelXP = Math.pow(player.level - 1, 2) * 100;
    const xpProgress = ((player.xp - prevLevelXP) / (nextLevelXP - prevLevelXP)) * 100;
    document.getElementById('xpBar').style.width = Math.min(100, Math.max(0, xpProgress)) + '%';
    document.getElementById('levelDisplay').textContent = `Level ${player.level}`;

    // Update Energy bar
    const energyPercent = (player.energy / 100) * 100;
    const energyBar = document.getElementById('energyBar');
    energyBar.style.width = Math.min(100, Math.max(0, energyPercent)) + '%';
    energyBar.className = 'progress-bar-fill progress-energy' + (player.energy < 20 ? ' low' : player.energy < 50 ? ' mid' : '');
    document.getElementById('energyDisplay').textContent = `${player.energy}/100`;

    // Update regen info
    updateRegenInfo();
    document.getElementById('progressContainer').style.display = 'block';
  }

  // ─── Jobs Cooldowns ──────────────────────────────────────
  function updateCooldowns() {
    if (!player) return;
    document.querySelectorAll('.job-card').forEach(card => {
      const jobId = card.dataset.jobId;
      const minLevel = parseInt(card.dataset.minLevel);
      const energyCost = parseInt(card.dataset.energyCost);
      if (!jobId) return;

      const meetsLevel = player.level >= minLevel;
      const remaining = jobCooldowns.get(jobId) || 0;
      const hasEnergy = player.energy >= energyCost;
      const btn = card.querySelector('.btn');

      if (!meetsLevel) {
        btn.className = 'btn btn-locked';
        btn.textContent = `🔒 Level ${minLevel}`;
        btn.disabled = true;
        card.classList.add('locked');
      } else if (remaining > 0) {
        btn.className = 'btn btn-cooldown';
        btn.textContent = `⏳ ${remaining}s`;
        btn.disabled = true;
        card.classList.remove('locked');
      } else if (!hasEnergy) {
        btn.className = 'btn btn-energy';
        btn.textContent = '⚡ Need Energy';
        btn.disabled = true;
        card.classList.remove('locked');
      } else {
        btn.className = 'btn btn-primary';
        btn.textContent = '💼 Work';
        btn.disabled = false;
        card.classList.remove('locked');
      }
    });
  }

  // ─── Load Jobs ──────────────────────────────────────────
  async function loadJobs() {
    if (isUpdating) return;
    isUpdating = true;

    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return window.location.href = "index.html";

      const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
      if (!playerData) {
        document.getElementById('jobs').innerHTML = '<div class="empty-message">Player not found</div>';
        return;
      }

      player = playerData;
      await applyStatDecay();
      await regenerateEnergy();
      updatePlayerStats();

      if (!playerChannel) setupRealtimeSubscriptions();

      const { data: jobsData } = await sb.from('jobs').select('*').order('salary', { ascending: true });
      jobs = jobsData || [];

      // Load cooldowns
      jobCooldowns.clear();
      const { data: cooldowns } = await sb
        .from('player_jobs')
        .select('job_id, next_available')
        .eq('player_id', player.id);

      if (cooldowns) {
        const now = new Date();
        cooldowns.forEach(c => {
          if (c.next_available) {
            const next = new Date(c.next_available);
            const remaining = Math.max(0, Math.ceil((next - now) / 1000));
            jobCooldowns.set(c.job_id, remaining);
          }
        });
      }

      const jobsDiv = document.getElementById('jobs');
      if (!jobs.length) {
        jobsDiv.innerHTML = '<div class="empty-message">No jobs available</div>';
        return;
      }

      const icons = {
        'Street Sweeper': '🧹',
        'Delivery Boy': '📦',
        'Cashier': '💳',
        'Warehouse Worker': '📦',
        'Security Guard': '🛡️',
        'Taxi Driver': '🚕',
        'Construction Foreman': '🏗️',
        'Private Investigator': '🔍',
        'Hitman': '🔫',
        'Crime Lord': '👑'
      };

      jobsDiv.innerHTML = jobs.map(job => {
        const remaining = jobCooldowns.get(job.id) || 0;
        const hasEnergy = player.energy >= job.energy_cost;
        const meetsLevel = player.level >= job.min_level;
        const icon = icons[job.name] || '💼';

        const lockedClass = !meetsLevel ? 'locked' : '';
        let btnClass = 'btn btn-primary';
        let btnText = '💼 Work';
        let btnDisabled = false;

        if (!meetsLevel) {
          btnClass = 'btn btn-locked';
          btnText = `🔒 Level ${job.min_level}`;
          btnDisabled = true;
        } else if (remaining > 0) {
          btnClass = 'btn btn-cooldown';
          btnText = `⏳ ${remaining}s`;
          btnDisabled = true;
        } else if (!hasEnergy) {
          btnClass = 'btn btn-energy';
          btnText = '⚡ Need Energy';
          btnDisabled = true;
        }

        return `
          <div class="job-card ${lockedClass}" data-job-id="${job.id}" data-min-level="${job.min_level}" data-energy-cost="${job.energy_cost}">
            <span class="level-badge ${!meetsLevel ? 'locked' : ''}">${!meetsLevel ? '🔒' : '📋'} Lvl ${job.min_level}</span>
            <div class="job-header">
              <span class="job-icon">${icon}</span>
              <span class="job-name">${escapeHtml(job.name)}</span>
            </div>
            <div class="job-details">
              <div class="job-detail"><span class="label">💰 Salary</span><span class="value salary">₹${job.salary.toLocaleString()}</span></div>
              <div class="job-detail"><span class="label">⭐ XP</span><span class="value xp">${job.xp_reward}</span></div>
              <div class="job-detail"><span class="label">⚡ Energy</span><span class="value energy ${!hasEnergy && meetsLevel ? 'energy-warning' : ''}">${job.energy_cost}</span></div>
              <div class="job-detail"><span class="label">⏱️ Cooldown</span><span class="value cooldown">${job.cooldown_seconds}s</span></div>
            </div>
            <button class="${btnClass}" onclick="attemptJob('${job.id}')" ${btnDisabled ? 'disabled' : ''}>
              ${btnText}
            </button>
          </div>
        `;
      }).join('');

      updateCooldowns();
    } catch (err) {
      console.error('Error loading jobs:', err);
      document.getElementById('jobs').innerHTML = '<div class="empty-message">Error loading jobs. Please refresh.</div>';
      showToast('Error loading jobs', 'error');
    } finally {
      isUpdating = false;
    }
  }

  // ─── Attempt Job ────────────────────────────────────────
  async function attemptJob(jobId) {
    if (!player || isUpdating) return;

    const job = jobs.find(j => j.id === jobId);
    if (!job) return;

    if (player.level < job.min_level) {
      showToast(`🔒 Need level ${job.min_level}`, 'warning');
      return;
    }

    const cachedCooldown = jobCooldowns.get(jobId) || 0;
    if (cachedCooldown > 0) {
      showToast(`⏳ Wait ${cachedCooldown}s`, 'error');
      return;
    }

    isUpdating = true;

    try {
      const { data, error } = await sb.rpc('attempt_job', { p_job_id: jobId });
      if (error) throw error;

      if (!data.success) {
        switch (data.error) {
          case 'On cooldown':
            jobCooldowns.set(jobId, Math.ceil(data.cooldown_remaining));
            showToast(`⏳ Wait ${Math.ceil(data.cooldown_remaining)}s`, 'error');
            break;
          case 'Not enough energy':
            showToast(`⚡ Need ${data.energy_needed} energy (have ${data.energy_current})`, 'error');
            break;
          case 'Level too low':
            showToast(`🔒 Need level ${data.required_level} (you are ${data.current_level})`, 'warning');
            break;
          default:
            showToast(`❌ ${data.error}`, 'error');
        }
        return;
      }

      // Update player
      player.cash = data.new_cash;
      player.xp = data.new_xp;
      player.energy = data.new_energy;
      player.level = data.new_level;
      await applyStatDecay();
      updatePlayerStats();

      jobCooldowns.set(jobId, data.cooldown_seconds);

      showToast(`✅ Worked! +₹${data.cash_change.toLocaleString()} | +${data.xp_change} XP`, 'success');

      if (data.leveled_up) {
        showToast(`🎉 LEVEL UP! You are now level ${data.new_level}!`, 'success', 5000);
        startConfetti();
        setTimeout(stopConfetti, 3000);
      }

      updateCooldowns();

    } catch (err) {
      console.error('Attempt job error:', err);
      showToast('Error processing job', 'error');
    } finally {
      isUpdating = false;
    }
  }

  // ─── Confetti (simple) ──────────────────────────────────
  let confettiInterval = null;
  function startConfetti() {
    const colors = ['#f44336', '#4CAF50', '#2196F3', '#FFC107', '#9C27B0', '#FF9800'];
    const container = document.body;
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.style.cssText = `
        position: fixed; top: -10px; left: ${Math.random() * 100}vw;
        width: ${Math.random() * 8 + 4}px; height: ${Math.random() * 8 + 4}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        pointer-events: none; z-index: 99998;
        opacity: ${Math.random() * 0.8 + 0.2};
        transform: rotate(${Math.random() * 360}deg);
        animation: confettiFall ${Math.random() * 2 + 2}s linear forwards;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  }
  function stopConfetti() {}

  // ─── Realtime Subscriptions ────────────────────────────
  function setupRealtimeSubscriptions() {
    if (!player) return;
    if (playerChannel) playerChannel.unsubscribe();
    playerChannel = sb
      .channel('player-changes')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'players',
        filter: `id=eq.${player.id}`
      }, (payload) => {
        const oldLevel = player.level;
        player = payload.new;
        updatePlayerStats();
        if (player.level > oldLevel) {
          showToast(`🎉 LEVEL UP! Now level ${player.level}!`, 'success', 4000);
          startConfetti();
          setTimeout(stopConfetti, 3000);
        }
        updateCooldowns();
      })
      .subscribe();

    if (jobsChannel) jobsChannel.unsubscribe();
    jobsChannel = sb
      .channel('job-cooldowns')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'player_jobs',
        filter: `player_id=eq.${player.id}`
      }, (payload) => {
        if (payload.new && payload.new.job_id) {
          const now = new Date();
          const next = payload.new.next_available ? new Date(payload.new.next_available) : null;
          const remaining = next ? Math.max(0, Math.ceil((next - now) / 1000)) : 0;
          if (remaining > 0) jobCooldowns.set(payload.new.job_id, remaining);
          else jobCooldowns.delete(payload.new.job_id);
          updateCooldowns();
        }
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          document.getElementById('realtimeStatus').style.opacity = '1';
        }
      });
  }

  // ─── Timers ──────────────────────────────────────────────
  function startCooldownTimer() {
    if (cooldownInterval) clearInterval(cooldownInterval);
    cooldownInterval = setInterval(() => {
      if (!player || isUpdating) return;
      let needsUpdate = false;
      for (let [jobId, remaining] of jobCooldowns) {
        if (remaining > 0) {
          jobCooldowns.set(jobId, remaining - 1);
          needsUpdate = true;
        } else {
          jobCooldowns.delete(jobId);
        }
      }
      if (needsUpdate) updateCooldowns();
    }, 1000);
  }

  function startRegenTimer() {
    if (regenInterval) clearInterval(regenInterval);
    regenInterval = setInterval(async () => {
      if (player && player.energy < 100) {
        await regenerateEnergy();
      }
      updateRegenInfo();
    }, 10000);
  }

  function startDecayChecker() {
    if (decayCheckInterval) clearInterval(decayCheckInterval);
    decayCheckInterval = setInterval(async () => {
      if (player) await applyStatDecay();
    }, 300000);
  }

  // ─── Navigation ──────────────────────────────────────────
  function goBack() { window.location.href = 'dashboard.html'; }

  // ─── Init ────────────────────────────────────────────────
  initThemeAndFont();
  loadJobs();
  startCooldownTimer();
  startRegenTimer();
  startDecayChecker();

  // Clean up on unload
  window.addEventListener('beforeunload', () => {
    if (playerChannel) playerChannel.unsubscribe();
    if (jobsChannel) jobsChannel.unsubscribe();
    if (cooldownInterval) clearInterval(cooldownInterval);
    if (regenInterval) clearInterval(regenInterval);
    if (decayCheckInterval) clearInterval(decayCheckInterval);
  });

  // Welcome toast
  setTimeout(() => {
    if (player) {
      showToast(`Ready to work, ${player.username}? Stats decay over time – stay balanced! ⚖️`, 'info', 5000);
    }
  }, 1000);
</script>
</body>
