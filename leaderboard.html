<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Leaderboards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #333;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Category Tabs */
    .leaderboard-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    
    .tab-btn:hover {
      background: #333;
      color: white;
    }
    
    .tab-btn.active {
      background: #333;
      color: white;
    }
    
    .tab-btn.crimes.active { background: #f44336; border-color: #f44336; }
    .tab-btn.jobs.active { background: #2196F3; border-color: #2196F3; }
    .tab-btn.cash.active { background: #4CAF50; border-color: #4CAF50; }
    .tab-btn.level.active { background: #9c27b0; border-color: #9c27b0; }
    .tab-btn.success.active { background: #ff9800; border-color: #ff9800; }
    
    /* Leaderboard Container */
    .leaderboard-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border: 3px solid black;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    /* Leaderboard Header */
    .leaderboard-header {
      display: grid;
      grid-template-columns: 80px 1fr 120px;
      background: #333;
      color: white;
      padding: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    /* Leaderboard Row */
    .leaderboard-row {
      display: grid;
      grid-template-columns: 80px 1fr 120px;
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      align-items: center;
      transition: background 0.2s;
    }
    
    .leaderboard-row:hover {
      background: #f5f5f5;
    }
    
    .leaderboard-row.current-player {
      background: #e3f2fd;
      border-left: 5px solid #2196F3;
      font-weight: bold;
    }
    
    .rank {
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    .rank-1 { color: #FFD700; } /* Gold */
    .rank-2 { color: #C0C0C0; } /* Silver */
    .rank-3 { color: #CD7F32; } /* Bronze */
    
    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .player-avatar {
      width: 30px;
      height: 30px;
      background: #9c27b0;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .player-name {
      font-size: 1rem;
    }
    
    .player-name .current-badge {
      background: #2196F3;
      color: white;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 8px;
    }
    
    .stat-value {
      font-weight: bold;
      text-align: right;
    }
    
    .stat-value.crimes { color: #f44336; }
    .stat-value.jobs { color: #2196F3; }
    .stat-value.cash { color: #4CAF50; }
    .stat-value.level { color: #9c27b0; }
    .stat-value.success { color: #ff9800; }
    
    /* Player Stats Summary */
    .player-stats {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border: 2px solid black;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    
    .player-stat-item {
      text-align: center;
    }
    
    .player-stat-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .player-stat-value {
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    /* Loading Spinner */
    .loading-spinner {
      text-align: center;
      padding: 60px;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #9c27b0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    /* Refresh Button */
    .refresh-btn {
      display: block;
      margin: 20px auto;
      padding: 8px 16px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
    
    .refresh-btn:hover {
      background: #f57c00;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    
    @media (max-width: 600px) {
      .leaderboard-header {
        grid-template-columns: 50px 1fr 80px;
        font-size: 0.9rem;
      }
      
      .leaderboard-row {
        grid-template-columns: 50px 1fr 80px;
        padding: 10px;
        font-size: 0.9rem;
      }
      
      .player-avatar {
        width: 25px;
        height: 25px;
        font-size: 0.8rem;
      }
      
      .tab-btn {
        padding: 8px 15px;
        font-size: 0.9rem;
      }
      
      .player-stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

<h1>🏆 Leaderboards</h1>
<div class="subtitle">Who's the biggest criminal mastermind?</div>

<!-- Category Tabs -->
<div class="leaderboard-tabs">
  <button class="tab-btn crimes active" onclick="switchLeaderboard('crimes')">🔫 Most Crimes</button>
  <button class="tab-btn jobs" onclick="switchLeaderboard('jobs')">💼 Most Jobs</button>
  <button class="tab-btn cash" onclick="switchLeaderboard('cash')">💰 Richest</button>
  <button class="tab-btn level" onclick="switchLeaderboard('level')">⭐ Highest Level</button>
  <button class="tab-btn success" onclick="switchLeaderboard('success')">🎯 Best Success Rate</button>
</div>

<!-- Player's Stats Summary -->
<div id="playerStats" class="player-stats" style="display: none;"></div>

<!-- Leaderboard Container -->
<div id="leaderboardContainer" class="leaderboard-container">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <p>Loading leaderboard...</p>
  </div>
</div>

<!-- Refresh Button -->
<button class="refresh-btn" onclick="loadLeaderboard(currentCategory)">🔄 Refresh</button>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);
// XSS protection – turns dangerous characters into safe text
function escapeHtml(str) {
    if (!str) return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
let currentPlayer = null;
let currentCategory = 'crimes';
let leaderboardData = [];

// Load current player
async function loadCurrentPlayer() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    
    const { data: player } = await sb
      .from('players')
      .select('*')
      .eq('auth_id', user.id)
      .single();
    
    if (player) {
      currentPlayer = player;
      updatePlayerStats();
    }
  } catch (error) {
    console.error('Error loading player:', error);
  }
}

// Update player stats display
function updatePlayerStats() {
  if (!currentPlayer) return;
  
  const statsDiv = document.getElementById('playerStats');
  statsDiv.style.display = 'grid';
  
  // Find player's rank in current category
  const playerRank = leaderboardData.findIndex(p => p.player_id === currentPlayer.id) + 1;
  
  statsDiv.innerHTML = `
    <div class="player-stat-item">
      <div class="player-stat-label">Your Rank</div>
      <div class="player-stat-value">#${playerRank || '?'}</div>
    </div>
    <div class="player-stat-item">
      <div class="player-stat-label">Username</div>
      <div class="player-stat-value">${currentPlayer.username}</div>
    </div>
    <div class="player-stat-item">
      <div class="player-stat-label">Level</div>
      <div class="player-stat-value">${currentPlayer.level}</div>
    </div>
    <div class="player-stat-item">
      <div class="player-stat-label">Cash</div>
      <div class="player-stat-value">₹${currentPlayer.cash.toLocaleString()}</div>
    </div>
  `;
}

// Switch leaderboard category
function switchLeaderboard(category) {
  currentCategory = category;
  
  // Update active tab
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  loadLeaderboard(category);
}

// Load leaderboard data
async function loadLeaderboard(category) {
  const container = document.getElementById('leaderboardContainer');
  container.innerHTML = `
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading leaderboard...</p>
    </div>
  `;
  
  try {
    let query = sb.from('leaderboard_stats').select('*');
    
    // Order by the selected category
    switch(category) {
      case 'crimes':
        query = query.order('total_crimes', { ascending: false });
        break;
      case 'jobs':
        query = query.order('total_jobs', { ascending: false });
        break;
      case 'cash':
        query = query.order('total_cash_earned', { ascending: false });
        break;
      case 'level':
        query = query.order('current_level', { ascending: false });
        break;
      case 'success':
        query = query.order('crime_success_rate', { ascending: false });
        break;
    }
    
    query = query.limit(100); // Top 100 players
    
    const { data, error } = await query;
    
    if (error) throw error;
    
    leaderboardData = data || [];
    renderLeaderboard(category, leaderboardData);
    
  } catch (error) {
    console.error('Error loading leaderboard:', error);
    container.innerHTML = `
      <div class="empty-state">
        <p>❌ Error loading leaderboard</p>
        <button class="refresh-btn" onclick="loadLeaderboard('${category}')">Try Again</button>
      </div>
    `;
  }
}

// Render leaderboard
function renderLeaderboard(category, data) {
  const container = document.getElementById('leaderboardContainer');
  
  if (!data || data.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>No data available yet</p>
      </div>
    `;
    return;
  }
  
  let headerTitle = '';
  let valueClass = '';
  
  switch(category) {
    case 'crimes':
      headerTitle = 'Total Crimes';
      valueClass = 'crimes';
      break;
    case 'jobs':
      headerTitle = 'Total Jobs';
      valueClass = 'jobs';
      break;
    case 'cash':
      headerTitle = 'Total Cash';
      valueClass = 'cash';
      break;
    case 'level':
      headerTitle = 'Level';
      valueClass = 'level';
      break;
    case 'success':
      headerTitle = 'Success Rate';
      valueClass = 'success';
      break;
  }
  
  let html = `
    <div class="leaderboard-header">
      <div>Rank</div>
      <div>Player</div>
      <div style="text-align: right;">${headerTitle}</div>
    </div>
  `;
  
  data.forEach((player, index) => {
    const rank = index + 1;
    const isCurrentPlayer = currentPlayer && player.player_id === currentPlayer.id;
    let rankClass = '';
    
    if (rank === 1) rankClass = 'rank-1';
    else if (rank === 2) rankClass = 'rank-2';
    else if (rank === 3) rankClass = 'rank-3';
    
    let value = '';
    switch(category) {
      case 'crimes':
        value = player.total_crimes.toLocaleString();
        break;
      case 'jobs':
        value = player.total_jobs.toLocaleString();
        break;
      case 'cash':
        value = '₹' + player.total_cash_earned.toLocaleString();
        break;
      case 'level':
        value = player.current_level;
        break;
      case 'success':
        value = player.crime_success_rate.toFixed(1) + '%';
        break;
    }
    
    html += `
      <div class="leaderboard-row ${isCurrentPlayer ? 'current-player' : ''}">
        <div class="rank ${rankClass}">#${rank}</div>
        <div class="player-info">
          <div class="player-avatar">${player.username.charAt(0).toUpperCase()}</div>
          <div class="player-name">
            ${escapeHtml(player.username)}
            ${isCurrentPlayer ? '<span class="current-badge">You</span>' : ''}
          </div>
        </div>
        <div class="stat-value ${valueClass}">${value}</div>
      </div>
    `;
  });
  
  container.innerHTML = html;
  
  // Update player stats with new rank
  updatePlayerStats();
}

// Navigation
function goToDashboard() {
  window.location.href = "dashboard.html";
}

// Auto-refresh every 60 seconds
setInterval(() => {
  if (currentCategory) {
    loadLeaderboard(currentCategory);
  }
}, 60000);

// Initialize
async function init() {
  await loadCurrentPlayer();
  await loadLeaderboard('crimes');
}

init();
</script>

</body>
</html>
