<!DOCTYPE html>
<html>
<head>
  <title>Explore Map</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #f0f0f8; color: #222; padding: 20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .location-card, .discovery-card {
      border:2px solid black; border-radius:10px; padding:10px; margin:10px; display:inline-block; width:200px; text-align:center; vertical-align:top;
    }
    button { padding:6px 10px; margin:5px; border-radius:5px; cursor:pointer; }
    #discoveries { margin-top:20px; }
  </style>
</head>
<body>

<h1>Map & Discoveries</h1>

<div id="locations"></div>

<h2>Items in Selected Location</h2>
<div id="discoveries">Select a location to explore</div>

<br>
<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;

// 🌟 INIT
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.getElementById("locations").innerText="Player not found"; return; }
  currentPlayer = playerData;

  loadLocations();
}

// 🌍 LOAD LOCATIONS
async function loadLocations() {
  const { data, error } = await sb.from('map_locations').select('*').order('location_name');
  if (error || !data) { document.getElementById("locations").innerText="Error loading locations"; return; }

  let html = "";
  data.forEach(loc => {
    html += `
      <div class="location-card">
        <b>${loc.location_name}</b><br>
        Type: ${loc.location_type || "N/A"}<br>
        Unlock Level: ${loc.unlock_level || 1}<br>
        <button onclick="selectLocation('${loc.location_id}', '${loc.location_name}')">Explore</button>
      </div>
    `;
  });

  document.getElementById("locations").innerHTML = html;
}

// 🔎 SELECT LOCATION
async function selectLocation(locationId, locationName) {
  document.getElementById("discoveries").innerHTML = `<h3>Exploring ${locationName}...</h3>`;

  // Get discoveries for this location
  const { data: discoveries, error } = await sb.from('map_discoveries')
    .select('discovery_id, item_id, items_master(item_name, item_category, description)')
    .eq('location_id', locationId);

  if (error || !discoveries || discoveries.length === 0) {
    document.getElementById("discoveries").innerHTML = "No items found in this location.";
    return;
  }

  let html = "";
  for (let d of discoveries) {
    const chance = Math.random() * 100;
    // spawn probability check
    const { data: disc } = await sb.from('map_discoveries').select('spawn_probability').eq('discovery_id', d.discovery_id).single();
    const spawnRate = disc?.spawn_probability || 100;
    if (chance <= spawnRate) {
      html += `
        <div class="discovery-card">
          <b>${d.items_master.item_name}</b><br>
          Category: ${d.items_master.item_category || "N/A"}<br>
          ${d.items_master.description || ""}
          <br>
          <button onclick="collectItem('${d.item_id}', '${locationId}', '${d.discovery_id}')">Collect</button>
        </div>
      `;
    }
  }

  if (html === "") html = "No items spawned this time. Try again later!";
  document.getElementById("discoveries").innerHTML = html;
}

// 🏆 COLLECT ITEM
async function collectItem(itemId, locationId, discoveryId) {
  // Add to player inventory
  const { data: existing } = await sb.from('player_items')
    .select('*')
    .eq('player_id', currentPlayer.id)
    .eq('item_id', itemId)
    .maybeSingle();

  if (existing) {
    await sb.from('player_items').update({ quantity: existing.quantity + 1 }).eq('id', existing.id);
  } else {
    await sb.from('player_items').insert({ player_id: currentPlayer.id, item_id: itemId, quantity: 1 });
  }

  // Log exploration
  await sb.from('explore_log').insert({
    player_id: currentPlayer.id,
    location_id: locationId,
    reward_item_id: itemId,
    reward_cash: 0
  });

  alert("Item collected!");
  selectLocation(locationId); // refresh discoveries
}

// 🔙 BACK
function goBack() {
  window.location.href="dashboard.html";
}

init();
</script>

</body>
</html>
