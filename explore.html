<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Map & Discoveries</title>
  <style>
    body { font-family: 'Courier New', monospace; background:#f8f8f0; color:#222; padding:20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .location-card, .item-card { border:2px solid black; padding:10px; margin:10px; border-radius:10px; display:inline-block; vertical-align:top; width:200px; }
    button { padding:6px 10px; margin-top:5px; border-radius:5px; cursor:pointer; }
    #status { margin-top:15px; font-weight:bold; text-align:center; }
  </style>
</head>
<body>

<h1>Map & Discoveries</h1>

<div id="locations"></div>
<hr>
<h2>Items in Selected Location</h2>
<div id="discoveredItems"></div>
<hr>
<div id="status"></div>
<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;
let selectedLocation = null;

// 🌟 INIT
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.body.innerText="Player not found"; return; }
  player = playerData;

  loadLocations();
}

// 🗺️ LOAD MAP LOCATIONS
async function loadLocations() {
  const { data, error } = await sb.from('map_locations').select('*');

  if (error || !data) {
    document.getElementById("locations").innerText = "Error loading locations";
    return;
  }

  let html = "";
  data.forEach(loc => {
    html += `
      <div class="location-card">
        <b>${loc.location_name}</b><br>
        Type: ${loc.location_type}<br>
        Unlock Level: ${loc.unlock_level}<br>
        <button onclick="selectLocation('${loc.location_id}')">Visit</button>
      </div>
    `;
  });

  document.getElementById("locations").innerHTML = html;
}

// 📍 SELECT LOCATION
async function selectLocation(locationId) {
  const { data: loc } = await sb.from('map_locations').select('*').eq('location_id', locationId).single();
  selectedLocation = loc;

  document.getElementById("status").innerText = `Visiting ${loc.location_name}...`;
  loadDiscoveries(locationId);
}

// 🎁 LOAD DISCOVERIES
async function loadDiscoveries(locationId) {
  const { data, error } = await sb
    .from('map_discoveries')
    .select(`
      discovery_id,
      cash_reward,
      spawn_probability,
      items_master(id, item_name, item_category, base_price, rarity, description)
    `)
    .eq('location_id', locationId);

  const container = document.getElementById("discoveredItems");
  container.innerHTML = "";

  if (error || !data || data.length === 0) {
    container.innerText = "No items found here.";
    return;
  }

  let html = "";
  data.forEach(item => {
    const chance = Math.random() * 100;
    if (chance <= item.spawn_probability) {
      html += `
        <div class="item-card">
          <b>${item.items_master.item_name}</b><br>
          Category: ${item.items_master.item_category}<br>
          Base Price: ₹${item.items_master.base_price}<br>
          Rarity: ${item.items_master.rarity}<br>
          ${item.items_master.description ? "Desc: " + item.items_master.description + "<br>" : ""}
          Cash Reward: ₹${item.cash_reward}<br>
          <button onclick="collectItem('${item.items_master.id}', ${item.cash_reward})">Collect</button>
        </div>
      `;
    }
  });

  container.innerHTML = html;
}

// 🏆 COLLECT ITEM
async function collectItem(itemId, cashReward) {
  if (!player || !selectedLocation) return;

  // Add item to player inventory
  const { data: existing } = await sb
    .from('player_items')
    .select('*')
    .eq('player_id', player.id)
    .eq('item_id', itemId)
    .maybeSingle();

  if (existing) {
    await sb.from('player_items')
      .update({ quantity: existing.quantity + 1 })
      .eq('id', existing.id);
  } else {
    await sb.from('player_items').insert({
      player_id: player.id,
      item_id: itemId,
      quantity: 1
    });
  }

  // Give cash reward
  player.cash += cashReward;
  await sb.from('players').update({ cash: player.cash }).eq('id', player.id);

  // Log in explore_log
  await sb.from('explore_log').insert({
    player_id: player.id,
    location_id: selectedLocation.location_id,
    reward_item_id: itemId,
    reward_cash: cashReward,
    timestamp: new Date()
  });

  document.getElementById("status").innerText = `Collected item! +₹${cashReward}`;
  loadDiscoveries(selectedLocation.location_id);
}

// 🔙 BACK BUTTON
function goBack() { window.location.href = "dashboard.html"; }

init();
</script>

</body>
</html>
