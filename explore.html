<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Explore</title>
  <style>
    body { font-family: 'Courier New', monospace; background:#f0f0f8; color:#222; padding:20px; }
    h1, h2 { text-align:center; }
    select, button { padding:8px 12px; margin:5px; border-radius:5px; cursor:pointer; }
    .item-card { border:2px solid black; border-radius:8px; padding:10px; margin:10px; display:inline-block; width:180px; vertical-align:top; text-align:center; }
    #items { margin-top:20px; text-align:center; }
  </style>
</head>
<body>

<h1>Explore the World</h1>

<h2>Select Location</h2>
<select id="locationSelect">
  <option value="">-- Choose Location --</option>
</select>

<div id="items">
  <h2>Items in Selected Location</h2>
  <div id="itemCards">Select a location to view items...</div>
</div>

<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;

// 🚀 INIT
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) return alert("Player not found");
  player = playerData;

  loadLocations();
}

// 🌍 LOAD LOCATIONS
async function loadLocations() {
  const { data: locations, error } = await sb.from('map_locations').select('*').order('location_name');
  if (error) return document.getElementById("itemCards").innerText = "Error loading locations";

  const select = document.getElementById("locationSelect");
  locations.forEach(loc => {
    const opt = document.createElement("option");
    opt.value = loc.location_id;
    opt.text = loc.location_name;
    select.appendChild(opt);
  });

  select.addEventListener("change", () => {
    if (select.value) {
      loadItemsInLocation(select.value);
    } else {
      document.getElementById("itemCards").innerText = "Select a location to view items...";
    }
  });
}

// 🛒 LOAD ITEMS IN LOCATION
async function loadItemsInLocation(locationId) {
  const { data, error } = await sb.from('map_discoveries')
    .select(`
      discovery_id,
      cash_reward,
      spawn_probability,
      items_master:items_master!map_discoveries_item_id_fkey (id, item_name, description, image_url)
    `)
    .eq('location_id', locationId);

  const container = document.getElementById("itemCards");
  container.innerHTML = "";

  if (error) {
    container.innerText = "Error loading items";
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    container.innerText = "No items found in this location.";
    return;
  }

  data.forEach(d => {
    const card = document.createElement("div");
    card.className = "item-card";
    card.innerHTML = `
      <b>${d.items_master.item_name}</b><br>
      ${d.items_master.description || ""}<br>
      Cash Reward: ₹${d.cash_reward}<br>
      Spawn Probability: ${(d.spawn_probability*100).toFixed(0)}%<br>
      ${d.items_master.image_url ? `<img src="${d.items_master.image_url}" width="100">` : ""}
    `;
    container.appendChild(card);
  });
}

// 🔙 BACK BUTTON
function goBack() { window.location.href="dashboard.html"; }

init();
</script>

</body>
</html>
