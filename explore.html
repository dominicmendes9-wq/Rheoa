<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Mini Map Explore</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #f0f0f8; color: #222; padding: 20px; }
    h1 { text-align:center; margin-bottom:20px; }
    #map { display: grid; grid-template-columns: repeat(5, 120px); grid-gap: 15px; justify-content:center; margin-bottom:30px; }
    .location-icon { border:2px solid #444; border-radius:10px; padding:15px; text-align:center; cursor:pointer; background:#9c27b0; color:white; transition: transform 0.2s; }
    .location-icon:hover { transform: scale(1.1); background:#7b1fa2; }
    #status { text-align:center; font-weight:bold; margin-bottom:20px; }
    #history { max-height:300px; overflow-y:auto; border:1px solid #999; padding:10px; background:#eee; border-radius:10px; }
    .history-card { border-bottom:1px solid #bbb; padding:5px; font-size:0.9em; }
    button { padding:6px 12px; border-radius:5px; cursor:pointer; margin-top:10px; }
  </style>
</head>
<body>

<h1>Explore Mini Map</h1>
<div id="map"></div>
<div id="status"></div>

<h2>📰 Exploration History</h2>
<div id="history"></div>

<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;
let locations = [];

// 🌟 INIT
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.getElementById("status").innerText="Player not found"; return; }
  player = playerData;

  await loadMapLocations();
  await loadHistory();
}

// 🌍 LOAD MAP LOCATIONS
async function loadMapLocations() {
  const { data, error } = await sb.from('map_locations').select('*').order('location_name');
  if (error || !data) { document.getElementById("status").innerText="No locations found"; return; }
  locations = data;

  const mapDiv = document.getElementById("map");
  mapDiv.innerHTML = "";

  locations.forEach(loc => {
    const btn = document.createElement('div');
    btn.className = 'location-icon';
    btn.innerHTML = `<b>${loc.location_name}</b><br>${loc.location_type || ''}`;
    btn.onclick = () => explore(loc.location_id);
    mapDiv.appendChild(btn);
  });
}

// 🎲 EXPLORE LOCATION
async function explore(locationId) {
  if (!player) return;

  const { data: discoveries } = await sb.from('map_discoveries')
    .select('*, items_master(id, item_name)')
    .eq('location_id', locationId)
    .lte('level_required', player.level);

  if (!discoveries || discoveries.length === 0) {
    alert("Nothing to discover here.");
    return;
  }

  const discovered = discoveries.find(d => Math.random() < parseFloat(d.spawn_probability));
  let rewardItemId = null, rewardItemName = '', rewardCash = 0;

  if (discovered) {
    rewardItemId = discovered.item_id;
    rewardItemName = discovered.items_master.item_name;
    rewardCash = discovered.cash_reward || 0;

    const { data: existing } = await sb.from('player_items')
      .select('*')
      .eq('player_id', player.id)
      .eq('item_id', rewardItemId)
      .maybeSingle();

    if (existing) {
      await sb.from('player_items').update({ quantity: existing.quantity + 1 }).eq('id', existing.id);
    } else {
      await sb.from('player_items').insert({ player_id: player.id, item_id: rewardItemId, quantity: 1 });
    }
  }

  player.cash += rewardCash;
  await sb.from('players').update({ cash: player.cash }).eq('id', player.id);

  await sb.from('explore_log').insert({
    player_id: player.id,
    location_id: locationId,
    reward_item_id: rewardItemId,
    reward_cash: rewardCash
  });

  let locName = locations.find(l => l.location_id === locationId)?.location_name || locationId;
  let msg = `Explored ${locName}!`;
  if (rewardItemName) msg += ` Found item: ${rewardItemName}`;
  if (rewardCash) msg += ` | Cash: ₹${rewardCash}`;
  document.getElementById("status").innerText = msg;

  loadHistory();
}

// 📰 LOAD HISTORY
async function loadHistory() {
  const { data, error } = await sb.from('explore_log')
    .select('*, map_locations(location_name), items_master(item_name)')
    .eq('player_id', player.id)
    .order('timestamp', { ascending: false })
    .limit(50);

  if (error) { document.getElementById("history").innerText="Error loading history"; return; }

  let html = "";
  data.forEach(h => {
    const locName = h.map_locations?.location_name || '-';
    const itemName = h.items_master?.item_name || '-';
    html += `<div class="history-card">${locName} | Item: ${itemName} | Cash: ₹${h.reward_cash || 0} | ${new Date(h.timestamp).toLocaleString()}</div>`;
  });

  document.getElementById("history").innerHTML = html;
}

// 🔙 BACK BUTTON
function goBack() { window.location.href="dashboard.html"; }

window.init = init;
init();
</script>
</body>
</html>
