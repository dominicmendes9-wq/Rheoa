<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Explore</title>
  <style>
    body { font-family: 'Courier New', monospace; background:#f8f8f0; padding:20px; }
    h1, h2 { text-align:center; }
    .location { border:2px solid black; margin:10px; padding:10px; border-radius:10px; }
    .item { border:1px solid #333; padding:5px; margin:5px; border-radius:5px; display:inline-block; }
    button { padding:5px 10px; margin:5px; cursor:pointer; }
  </style>
</head>
<body>

<h1>Map & Discoveries</h1>

<div id="locations"></div>
<hr>
<h2>Items in Selected Location</h2>
<div id="items">Select a location...</div>

<button onclick="goBack()">Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;

// Load player info
async function loadPlayer() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.getElementById("locations").innerText="Player not found"; return; }
  currentPlayer = playerData;

  loadLocations();
}

// Load map locations
async function loadLocations() {
  const { data: locations } = await sb.from('map_locations').select('*').order('location_name');
  if (!locations || locations.length===0) {
    document.getElementById("locations").innerText = "No locations found";
    return;
  }

  let html = '';
  locations.forEach(loc => {
    html += `<div class="location">
      <b>${loc.location_name}</b><br>
      ${loc.description}<br>
      <button onclick="showItems('${loc.location_id}')">Explore</button>
    </div>`;
  });

  document.getElementById("locations").innerHTML = html;
}

// Show items in a location
async function showItems(locationId) {
  document.getElementById("items").innerText = "Loading...";

  // fetch discoveries + join items_master
  const { data, error } = await sb.from('map_discoveries')
    .select(`
      discovery_id,
      item_id,
      items_master (item_name, item_category, rarity, description)
    `)
    .eq('location_id', locationId);

  if (error) {
    document.getElementById("items").innerText = "Error loading items";
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("items").innerText = "No items found in this location";
    return;
  }

  let html = '';
  data.forEach(d => {
    html += `<div class="item">
      <b>${d.items_master.item_name}</b><br>
      Category: ${d.items_master.item_category}<br>
      Rarity: ${d.items_master.rarity}<br>
      ${d.items_master.description || ''}
      <br>
      <button onclick="collectItem('${d.discovery_id}')">Collect</button>
    </div>`;
  });

  document.getElementById("items").innerHTML = html;
}

// Collect item logic
async function collectItem(discoveryId) {
  const now = new Date();
  // Fetch discovery
  const { data: discovery } = await sb.from('map_discoveries').select('*').eq('discovery_id', discoveryId).single();
  if (!discovery) return alert("Discovery not found");

  // TODO: Apply probability, player level check, inventory insert
  alert("You collected: " + discovery.item_id);
}

// Go back
function goBack() {
  window.location.href = "dashboard.html";
}

loadPlayer();
</script>

</body>
</html>
