<!DOCTYPE html>
<html>
<head>
  <title>Explore & Discoveries</title>
  <style>
    body { font-family: 'Courier New', monospace; background:#f8f8f0; color:#222; padding:20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .location-card, .discovery-card {
      border:2px solid black;
      border-radius:10px;
      padding:10px;
      margin:10px;
      display:inline-block;
      vertical-align:top;
      width:220px;
      text-align:center;
    }
    button { padding:8px 12px; margin:5px; cursor:pointer; border-radius:5px; }
    #discoveries { margin-top:20px; }
  </style>
</head>
<body>

<h1>Map & Discoveries</h1>

<div id="locations">Loading locations...</div>

<div id="discoveries"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="goBack()">Back to Dashboard</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;
let selectedLocation = null;

// 🌟 INIT
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.getElementById("locations").innerText="Player not found"; return; }
  player = playerData;

  loadLocations();
}

// 🗺️ LOAD MAP LOCATIONS
async function loadLocations() {
  const { data, error } = await sb.from('map_locations').select('*').order('location_name');
  if (error) { document.getElementById("locations").innerText="Error loading locations"; return; }

  if (!data || data.length === 0) {
    document.getElementById("locations").innerText="No locations found";
    return;
  }

  let html = "";
  data.forEach(loc => {
    html += `
      <div class="location-card">
        <b>${loc.location_name}</b><br>
        Type: ${loc.location_type}<br>
        <button onclick="selectLocation('${loc.location_id}', '${loc.location_name}')">Explore</button>
      </div>
    `;
  });

  document.getElementById("locations").innerHTML = html;
  document.getElementById("discoveries").innerHTML = "";
}

// 🔍 SELECT LOCATION
async function selectLocation(locationId, locationName) {
  selectedLocation = locationId;
  document.getElementById("discoveries").innerHTML = `<h3>Items in ${locationName}</h3>Loading...`;

  const { data, error } = await sb
    .from('map_discoveries')
    .select(`
      discovery_id,
      cash_reward,
      spawn_probability,
      items_master (id, item_name, item_category, description)
    `)
    .eq('location_id', locationId);

  if (error) {
    document.getElementById("discoveries").innerText="Error loading discoveries";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("discoveries").innerHTML=`<h3>No items found in ${locationName}</h3>`;
    return;
  }

  let html = `<h3>Items in ${locationName}</h3>`;
  data.forEach(d => {
    html += `
      <div class="discovery-card">
        <b>${d.items_master.item_name}</b><br>
        Category: ${d.items_master.item_category}<br>
        ${d.items_master.description || ''}<br>
        Cash Reward: ₹${d.cash_reward}<br>
        Spawn Probability: ${d.spawn_probability}%
      </div>
    `;
  });

  document.getElementById("discoveries").innerHTML = html;
}

// 🔙 BACK
function goBack() { window.location.href="dashboard.html"; }

init();
</script>

</body>
</html>
