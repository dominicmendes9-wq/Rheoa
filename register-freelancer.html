<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Registration - Rheoa RPG</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        label, input, select, textarea { display: block; width: 100%; margin-bottom: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px; cursor: pointer; }
        .back-btn { display: block; width: 200px; margin: 30px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Freelancer Registration</h1>
        <p>You must join via the referral link: <strong>https://web3.okx.com/join/RHEOA</strong> (click first, then come back)</p>
        <input type="hidden" id="referralToken" value="RHEOA">
        <label>Name:</label><input type="text" id="name">
        <label>Email:</label><input type="email" id="email">
        <label>Age:</label><input type="number" id="age">
        <label>Gender:</label>
        <select id="gender"><option>male</option><option>female</option><option>other</option></select>
        <label>Country:</label><input type="text" id="country">
        <label>Bio:</label><textarea id="bio" rows="3"></textarea>
        <label>BEP-20 Wallet Address:</label><input type="text" id="wallet" placeholder="0x...">
        <button onclick="register()">Register</button>
        <div id="status"></div>
    </div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        async function register() {
            const data = {
                p_name: document.getElementById('name').value,
                p_email: document.getElementById('email').value,
                p_age: parseInt(document.getElementById('age').value),
                p_gender: document.getElementById('gender').value,
                p_country: document.getElementById('country').value,
                p_bio: document.getElementById('bio').value,
                p_wallet_address: document.getElementById('wallet').value,
                p_referral_token: document.getElementById('referralToken').value
            };
            if (!data.p_name || !data.p_email || !data.p_wallet_address) {
                alert('Please fill all required fields');
                return;
            }
            const { data: result, error } = await sb.rpc('register_freelancer', data);
            if (error) {
                document.getElementById('status').innerText = 'Error: ' + error.message;
                return;
            }
            if (result.success) {
                alert('Registration successful! Please check your email to verify.');
                window.location.href = 'freelancer-dashboard.html';
            } else {
                document.getElementById('status').innerText = result.error;
            }
        }
    </script>
</body>
</html>
