<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Dashboard - Rheoa RPG</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .status { padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .online { background: #e8f5e8; color: green; }
        .busy { background: #fff3e0; color: orange; }
        .offline { background: #ffebee; color: red; }
        button { background: #2196F3; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 5px; }
        .back-btn { display: block; width: 200px; margin: 30px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
        .order-details { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .chat-area { border: 1px solid #ddd; border-radius: 8px; margin-top: 20px; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 10px; background: #fafafa; }
        .chat-message { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        .message-sender { font-weight: bold; }
        .message-time { font-size: 0.7rem; color: #666; margin-left: 10px; }
        .message-text { margin-top: 3px; }
        .chat-input { display: flex; gap: 10px; padding: 10px; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 8px; }
        .chat-input button { padding: 8px 15px; }
        .summary { display: flex; gap: 20px; margin-bottom: 20px; }
        .summary-card { background: #e3f2fd; padding: 15px; border-radius: 8px; text-align: center; flex: 1; }
        .summary-card h3 { margin: 0; color: #2196F3; }
        .summary-card p { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        .past-orders { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 15px; }
        .past-orders summary { font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .past-order { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        .revision-badge { background: #ff9800; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadein 0.5s; }
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Freelancer Dashboard</h1>
        <div id="profile"></div>
        <div id="statusDisplay" class="status"></div>
        <div class="summary">
            <div class="summary-card"><h3>💰 Total Earned</h3><p id="totalEarned">$0</p></div>
            <div class="summary-card"><h3>📦 In‑Hand Value</h3><p id="inHandValue">$0</p></div>
        </div>
        <div id="currentOrder"></div>
        <div id="queuePosition"></div>
        <hr>
        <h3>My Templates</h3>
        <div id="myTemplates"></div>
        <button onclick="showCreateTemplate()">Create New Template</button>
        <div id="createTemplateForm" style="display:none; margin-top:20px;">
            <h4>New Template</h4>
            <input type="text" id="title" placeholder="Title"><br>
            <textarea id="desc" placeholder="Description"></textarea><br>
            <input type="number" id="price" placeholder="Price (USDT)"><br>
            <input type="text" id="category" placeholder="Category"><br>
            <input type="text" id="previewUrl" placeholder="Preview Image URL"><br>
            <button onclick="createTemplate()">Create</button>
            <button onclick="cancelCreateTemplate()">Cancel</button>
        </div>
        <div class="past-orders">
            <details>
                <summary>📜 Past Orders (click to expand)</summary>
                <div id="pastOrdersList"></div>
            </details>
        </div>
    </div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let currentFreelancer = null;
        let currentOrder = null;
        let chatSubscription = null;

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function loadFreelancer() {
            const email = prompt("Enter your registered email:");
            if (!email) return;
            const { data, error } = await sb.from('freelancers').select('*').eq('email', email).single();
            if (error) {
                alert('Freelancer not found');
                return;
            }
            currentFreelancer = data;
            renderDashboard();
            subscribeToOrderAssignments();
            await loadCurrentOrder();
            await loadPastOrders();
        }

        async function loadPastOrders() {
            const { data, error } = await sb
                .from('freelance_orders')
                .select('*, freelance_templates(title, price)')
                .eq('freelancer_id', currentFreelancer.id)
                .in('status', ['completed', 'released', 'cancelled'])
                .order('created_at', { ascending: false });
            if (error) console.error(error);
            else renderPastOrders(data);
        }

        function renderPastOrders(orders) {
            const container = document.getElementById('pastOrdersList');
            if (!orders.length) {
                container.innerHTML = '<p>No past orders.</p>';
                return;
            }
            container.innerHTML = orders.map(order => `
                <div class="past-order">
                    <strong>${order.freelance_templates?.title || 'Template'}</strong><br>
                    Amount: $${order.amount} (payout $${order.freelancer_payout})<br>
                    Status: ${order.status}<br>
                    Completed: ${order.completed_at ? new Date(order.completed_at).toLocaleString() : 'N/A'}
                </div>
            `).join('');
        }

        async function renderDashboard() {
            document.getElementById('profile').innerHTML = `
                <h3>Welcome, ${currentFreelancer.name}</h3>
                <p>Wallet: ${currentFreelancer.wallet_address}</p>
                <p>Status: ${currentFreelancer.status}</p>
                <button onclick="setStatus('online')">Go Online</button>
                <button onclick="setStatus('offline')">Go Offline</button>
            `;

            const statusDiv = document.getElementById('statusDisplay');
            statusDiv.className = `status ${currentFreelancer.status}`;
            statusDiv.innerHTML = `You are currently <strong>${currentFreelancer.status}</strong>.`;

            // Calculate totals
            const { data: allOrders } = await sb.from('freelance_orders').select('amount, freelancer_payout, status').eq('freelancer_id', currentFreelancer.id);
            const totalEarned = allOrders?.filter(o => o.status === 'released').reduce((s, o) => s + o.freelancer_payout, 0) || 0;
            const inHand = allOrders?.filter(o => o.status === 'assigned' || o.status === 'revision').reduce((s, o) => s + o.freelancer_payout, 0) || 0;
            document.getElementById('totalEarned').innerText = `$${totalEarned.toFixed(2)}`;
            document.getElementById('inHandValue').innerText = `$${inHand.toFixed(2)}`;

            // Queue position
            const { data: onlineList } = await sb.from('freelancers').select('id').eq('status', 'online').order('updated_at');
            const index = onlineList.findIndex(f => f.id === currentFreelancer.id);
            if (index >= 0) {
                document.getElementById('queuePosition').innerHTML = `<p>Your position in queue: ${index + 1}</p>`;
            } else {
                document.getElementById('queuePosition').innerHTML = '<p>You are not in the queue (offline or busy). Go online to enter queue.</p>';
            }

            // My templates
            const { data: templates } = await sb.from('freelance_templates').select('*').eq('freelancer_id', currentFreelancer.id);
            const templateList = document.getElementById('myTemplates');
            if (!templates.length) {
                templateList.innerHTML = '<p>No templates uploaded yet.</p>';
            } else {
                templateList.innerHTML = templates.map(t => `
                    <div style="border:1px solid #ccc; margin:5px; padding:5px;">
                        <strong>${t.title}</strong> - $${t.price}<br>
                        ${t.description}<br>
                        <button onclick="deleteTemplate('${t.id}')">Delete</button>
                    </div>
                `).join('');
            }
        }

        async function setStatus(status) {
            const { data, error } = await sb.rpc('update_freelancer_status', { p_status: status, p_email: currentFreelancer.email });
            if (error || !data.success) {
                alert(error?.message || data?.error);
            } else {
                currentFreelancer.status = status;
                renderDashboard();
            }
        }

        async function loadCurrentOrder() {
            const { data: order, error } = await sb
                .from('freelance_orders')
                .select('*, freelance_templates(title, price)')
                .eq('freelancer_id', currentFreelancer.id)
                .in('status', ['assigned', 'revision'])
                .maybeSingle();
            if (error) {
                console.error(error);
                return;
            }
            if (order) {
                currentOrder = order;
                renderCurrentOrder();
                subscribeToChat(order.id);
            } else {
                currentOrder = null;
                document.getElementById('currentOrder').innerHTML = '<p>No active order.</p>';
                if (chatSubscription) chatSubscription.unsubscribe();
            }
        }

        function renderCurrentOrder() {
            if (!currentOrder) return;
            const template = currentOrder.freelance_templates;
            const isRevision = currentOrder.status === 'revision';
            document.getElementById('currentOrder').innerHTML = `
                <div class="order-details">
                    <h3>Current Order ${isRevision ? '<span class="revision-badge">Revision Required</span>' : ''}</h3>
                    <p><strong>Template:</strong> ${template.title}</p>
                    <p><strong>Amount:</strong> $${currentOrder.amount} USDT (you will get $${currentOrder.freelancer_payout})</p>
                    <p><strong>Employer Email:</strong> ${currentOrder.employer_email}</p>
                    <p><strong>Instructions:</strong> ${currentOrder.customization_data?.instructions || 'None'}</p>
                    ${isRevision ? '<p style="color:orange;">⚠️ This order needs revision. Please check employer feedback in chat.</p>' : ''}
                    <div>
                        <button onclick="completeOrder()">Mark as Completed</button>
                        ${!isRevision ? `<button onclick="passOrder()">Pass to Next Freelancer</button>` : ''}
                    </div>
                </div>
                <div class="chat-area">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Type your message...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            `;
        }

        async function completeOrder() {
            const { data, error } = await sb.rpc('complete_order', { p_order_id: currentOrder.id, p_email: currentFreelancer.email });
            if (error || !data.success) {
                alert(error?.message || data?.error);
            } else {
                alert('Order marked as completed. Awaiting employer confirmation.');
                await loadCurrentOrder();
                await loadPastOrders();
                renderDashboard();
            }
        }

        async function passOrder() {
            if (!confirm('Pass this order to the next available freelancer?')) return;
            const { data, error } = await sb.rpc('pass_order', { p_order_id: currentOrder.id, p_freelancer_email: currentFreelancer.email });
            if (error || !data.success) {
                alert(error?.message || data?.error);
            } else {
                alert('Order passed to next freelancer.');
                await loadCurrentOrder();
                renderDashboard();
            }
        }

        function subscribeToOrderAssignments() {
            const channel = sb.channel(`freelancer-${currentFreelancer.id}`);
            channel
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'freelance_orders',
                    filter: `freelancer_id=eq.${currentFreelancer.id}`
                }, (payload) => {
                    if ((payload.new.status === 'assigned' || payload.new.status === 'revision') && (!currentOrder || currentOrder.id !== payload.new.id)) {
                        showToast('🔔 New job assigned or revision requested! Check your current order.');
                        loadCurrentOrder();
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') console.log('Subscribed to freelance_orders updates');
                });
        }

        async function subscribeToChat(orderId) {
            if (chatSubscription) chatSubscription.unsubscribe();
            chatSubscription = sb
                .channel(`order-messages-${orderId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'freelance_order_messages',
                    filter: `order_id=eq.${orderId}`
                }, (payload) => {
                    addMessageToChat(payload.new);
                })
                .subscribe();
            loadChatMessages(orderId);
        }

        async function loadChatMessages(orderId) {
            const { data, error } = await sb
                .from('freelance_order_messages')
                .select('*')
                .eq('order_id', orderId)
                .order('created_at', { ascending: true });
            if (error) console.error(error);
            else data.forEach(addMessageToChat);
        }

        function addMessageToChat(msg) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const senderLabel = msg.sender_type === 'freelancer' ? `Freelancer (${currentFreelancer.name})` : `Employer (${currentOrder.employer_email})`;
            const time = new Date(msg.created_at).toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `
                <div class="message-sender">${senderLabel} <span class="message-time">${time}</span></div>
                <div class="message-text">${escapeHtml(msg.message)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentOrder) return;
            const { error } = await sb.from('freelance_order_messages').insert({
                order_id: currentOrder.id,
                sender_type: 'freelancer',
                sender_id: currentFreelancer.id,
                message: text
            });
            if (error) console.error(error);
            else input.value = '';
        }

        // Template management
        function showCreateTemplate() {
            document.getElementById('createTemplateForm').style.display = 'block';
        }
        function cancelCreateTemplate() {
            document.getElementById('createTemplateForm').style.display = 'none';
        }
        async function createTemplate() {
            const template = {
                freelancer_id: currentFreelancer.id,
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                price: parseFloat(document.getElementById('price').value),
                category: document.getElementById('category').value,
                preview_url: document.getElementById('previewUrl').value,
                customization_options: {}
            };
            const { error } = await sb.from('freelance_templates').insert(template);
            if (error) alert(error.message);
            else {
                alert('Template created');
                cancelCreateTemplate();
                renderDashboard();
            }
        }
        async function deleteTemplate(templateId) {
            if (!confirm('Delete this template?')) return;
            const { error } = await sb.from('freelance_templates').delete().eq('id', templateId);
            if (error) alert(error.message);
            else renderDashboard();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadFreelancer();
    </script>
</body>
</html>
