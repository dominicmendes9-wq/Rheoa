<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rheoa RPG – Historical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-parchment: #f4e4c1; --border-dark: #3e2723; --accent: #8d6e63; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', 'Times New Roman', serif; background: var(--bg-parchment); color: #3e2723; height: 100vh; display: flex; flex-direction: column; }
        #map-container { flex: 1; position: relative; background: var(--bg-parchment); }
        #map { width: 100%; height: 100%; }
        #timeline-panel { background: rgba(255,255,255,0.85); border-top: 3px solid var(--border-dark); padding: 10px 20px 5px; display: flex; flex-direction: column; gap: 0; position: relative; }
        .timeline-controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        #timeline-slider { flex: 1; -webkit-appearance: none; height: 8px; background: var(--border-dark); border-radius: 4px; outline: none; }
        #timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #5d4037; border-radius: 50%; cursor: pointer; border: 2px solid #3e2723; }
        #era-label { font-weight: bold; font-size: 1.2rem; min-width: 160px; text-align: center; }
        .ticks-container { display: flex; justify-content: space-between; padding: 0 12px; font-size: 0.7rem; color: #5d4037; user-select: none; margin-top: 5px; }
        .tick { display: flex; flex-direction: column; align-items: center; width: 1px; position: relative; }
        .tick-line { width: 1px; height: 8px; background: #3e2723; margin-bottom: 2px; }
        .tick-label { white-space: nowrap; font-size: 0.6rem; cursor: pointer; color: #3e2723; margin-top: 2px; }
        .tick-label.major { font-weight: bold; font-size: 0.75rem; }
        .tick-label:hover { text-decoration: underline; }
        button { background: var(--border-dark); color: white; border: none; padding: 8px 16px; font-family: inherit; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #5d4037; }
        #sidebar { position: absolute; top: 10px; right: 10px; width: 360px; max-height: calc(100% - 20px); background: rgba(255,255,255,0.95); border: 2px solid var(--border-dark); border-radius: 8px; padding: 15px; overflow-y: auto; display: none; z-index: 1000; }
        .sidebar-close { position: absolute; top: 5px; right: 10px; background: none; border: none; font-size: 1.4rem; font-weight: bold; color: #3e2723; cursor: pointer; padding: 0; line-height: 1; }
        .sidebar-close:hover { color: #a00; }
        #sidebar h3 { margin-top: 0; margin-bottom: 5px; padding-right: 20px; }
        .action-btn { display: block; width: 100%; margin-top: 10px; }
        .region-owner { font-size: 0.9rem; margin: 10px 0; }
        .cooldown-text { font-size: 0.8rem; color: #b71c1c; }
        #battle-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 2000; }
        #battle-overlay > div { position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); background: white; padding: 30px; border-radius: 15px; text-align: center; }
        .dice-box { display: flex; justify-content: center; gap: 50px; font-size: 3rem; margin: 20px 0; }
        .market-offer, .event-item, .route-item, .tech-item, .building-item { border: 1px solid #ccc; margin: 5px 0; padding: 5px; font-size: 0.9rem; }
        hr { margin: 15px 0; border: 0; border-top: 1px solid #8d6e63; }
        .hidden { display: none; }
        .trade-route-line { stroke-dasharray: 10 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }
        .ai-btn { background: #4CAF50; }
        .ai-btn:hover { background: #45a049; }
        .modal { display: none; position: fixed; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 3000; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 400px; border-radius: 10px; max-height: 70vh; overflow-y: auto; }
        .history-item { border-bottom: 1px solid #ccc; padding: 5px 0; }
    </style>
</head>
<body>
    <div id="battle-overlay">
        <div>
            <h2>⚔️ Battle ⚔️</h2>
            <div class="dice-box">
                <div id="attacker-dice">⚅</div>
                <div id="defender-dice">⚅</div>
            </div>
            <p id="battle-message">Rolling...</p>
        </div>
    </div>

    <div id="diplomacy-modal" class="modal">
        <div class="modal-content">
            <h2>📨 Diplomacy</h2>
            <div id="diplomacy-content"></div>
            <button onclick="document.getElementById('diplomacy-modal').style.display='none'" style="margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h2>📜 Empire History</h2>
            <div id="history-content"></div>
            <button onclick="document.getElementById('history-modal').style.display='none'" style="margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="sidebar">
            <button class="sidebar-close" onclick="document.getElementById('sidebar').style.display='none'">×</button>
            <h3 id="region-name">Region</h3>
            <p id="region-owner"></p>
            <input type="hidden" id="diplomacy-target" value="">
            <div id="region-stats"></div>
            <div id="region-army"></div>
            <div id="region-buildings"></div>
            <button class="action-btn" id="btn-recruit" style="display:none;">🛡️ Recruit Army</button>
            <button class="action-btn" id="btn-move" style="display:none;">🚚 Move Army</button>
            <button class="action-btn" id="btn-set-base" style="display:none;">🎯 Set as Attack Base</button>
            <button class="action-btn" id="btn-conquer" style="display:none;">⚔️ Conquer</button>
            <button class="action-btn" id="btn-build" style="display:none;">🏗️ Build</button>
            <button class="action-btn" id="btn-trade" style="display:none;">💰 Trade</button>
            <button class="action-btn" id="btn-route" style="display:none;">🛤️ Manage Trade Routes</button>
            <div id="route-management" style="display:none; margin-top:10px;">
                <button class="action-btn" id="btn-create-route">Create New Route</button>
                <div id="existing-routes"></div>
            </div>
            <button class="action-btn" id="btn-tech" style="display:none;">🧪 Tech Tree</button>
            <div id="tech-tree" style="display:none; margin-top:10px;"></div>
            <button class="action-btn" id="btn-diplomacy" style="display:none;">🤝 Diplomacy</button>
            <div id="diplomacy-panel" style="display:none; margin-top:10px;"></div>
            <button class="action-btn" id="btn-events" style="display:none;">📜 Events</button>
            <p id="action-feedback" class="cooldown-text"></p>

            <hr>
            <h3>📦 Market</h3>
            <div id="market-actions">
                <button class="action-btn" id="btn-show-market">Show Offers</button>
                <button class="action-btn" id="btn-create-offer">Create Offer</button>
            </div>
            <div id="market-view" style="display:none;">
                <div id="trade-list"></div>
                <button class="action-btn" id="btn-close-market" style="background:#666;">Close Market</button>
            </div>
        </div>
    </div>

    <div id="timeline-panel">
        <div class="timeline-controls">
            <span id="era-label">4000 BCE</span>
            <input type="range" id="timeline-slider" min="0" max="80" value="0" step="1">
            <button id="btn-empire-stats">📊 My Empire</button>
            <button id="btn-npc-turn" class="ai-btn">⚙️ Run NPC Turn</button>
            <button id="btn-open-diplomacy">📨 Diplomacy</button>
            <button id="btn-open-history">📜 Empire History</button>
            <button onclick="window.location.href='dashboard.html'">← Dashboard</button>
        </div>
        <div id="ticks-container" class="ticks-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const SUPABASE_URL = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BASE_YEAR = -4000;
        const TOTAL_STEPS = 80;
        let currentTargetYear = BASE_YEAR;
        let currentEraId = null;
        let currentRegionId = null;
        let player = null;
        let attackBaseRegionId = null;
        let allies = [];

        const map = L.map('map', { center: [20, 0], zoom: 2, maxZoom: 8, minZoom: 2, worldCopyJump: true, zoomControl: true });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap contributors &copy; CARTO', subdomains: 'abcd', maxZoom: 19 }).addTo(map);

        let geoJSONLayer = L.geoJSON(null, {
            style: feature => {
                const isAlly = allies.includes(feature.properties.owner_id) && feature.properties.owner_type === 'player';
                return {
                    fillColor: feature.properties.fillColor || '#c8ad7f',
                    weight: isAlly ? 3 : 2,
                    opacity: 1,
                    color: isAlly ? '#2196F3' : '#3e2723',
                    fillOpacity: 0.6
                };
            },
            onEachFeature: (feature, layer) => { layer.on('click', () => openSidebar(feature.properties)); }
        }).addTo(map);

        const tradeRouteLayer = L.layerGroup().addTo(map);
        const buildingMarkersLayer = L.layerGroup().addTo(map);

        function getCentroid(geojson) { const geo = L.geoJSON(geojson); return geo.getBounds().getCenter(); }

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            const { data: playerData } = await sb.from('players').select('id, username, cash, energy').eq('auth_id', user.id).single();
            if (!playerData) { alert('Player not found'); return; }
            player = playerData;

            const startStep = 50;
            document.getElementById('timeline-slider').value = startStep;
            currentTargetYear = BASE_YEAR + startStep * 100;
            await loadAllies();
            await loadYear(currentTargetYear);
            setupRealtime();
            drawTicks();
        }

        async function loadAllies() {
            const { data } = await sb.from('alliances').select('player1_id, player2_id').or(`player1_id.eq.${player.id},player2_id.eq.${player.id}`);
            if (!data) { allies = []; return; }
            allies = data.map(a => a.player1_id === player.id ? a.player2_id : a.player1_id);
        }

        function drawTicks() {
            const container = document.getElementById('ticks-container');
            container.innerHTML = '';
            for (let step = 0; step <= TOTAL_STEPS; step++) {
                const isMajor = (step % 10 === 0);
                const year = BASE_YEAR + step * 100;
                const tickDiv = document.createElement('div'); tickDiv.className = 'tick';
                tickDiv.innerHTML = `<div class="tick-line" style="height:${isMajor ? 10 : 5}px;"></div>`;
                if (isMajor) {
                    const label = year < 0 ? `${Math.abs(year)} BCE` : `${year} CE`;
                    tickDiv.innerHTML += `<span class="tick-label major" data-step="${step}">${label}</span>`;
                }
                container.appendChild(tickDiv);
            }
            document.querySelectorAll('.tick-label.major').forEach(span => {
                span.addEventListener('click', (e) => {
                    const step = parseInt(e.target.getAttribute('data-step'));
                    document.getElementById('timeline-slider').value = step;
                    currentTargetYear = BASE_YEAR + step * 100;
                    loadYear(currentTargetYear);
                });
            });
        }

        document.getElementById('timeline-slider').addEventListener('input', async (e) => {
            const step = parseInt(e.target.value);
            currentTargetYear = BASE_YEAR + step * 100;
            await loadYear(currentTargetYear);
        });

        function formatYear(y) { return y < 0 ? `${Math.abs(y)} BCE` : `${y} CE`; }

        async function loadYear(targetYear) {
            currentTargetYear = targetYear;
            const { data: era } = await sb.from('historical_eras').select('*').lte('year_start', targetYear).gte('year_end', targetYear).single();
            if (era) {
                currentEraId = era.id;
                document.getElementById('era-label').textContent = `${era.name} (${formatYear(era.year_start)}–${formatYear(era.year_end)})`;
            } else document.getElementById('era-label').textContent = formatYear(targetYear);
            await loadRegions(targetYear);
            await loadTradeRoutes();
            await loadBuildings();
        }

        async function loadRegions(targetYear) {
            const { data: regions } = await sb.from('historical_regions')
                .select('id, name, geojson, owner_type, owner_id, start_year, end_year, population, resources, army')
                .lte('start_year', targetYear).gte('end_year', targetYear);
            if (!regions || regions.length === 0) { geoJSONLayer.clearLayers(); return; }
            const features = regions.map(r => {
                const geo = typeof r.geojson === 'string' ? JSON.parse(r.geojson) : r.geojson;
                let fillColor = '#c8ad7f'; if (r.owner_type === 'npc') fillColor = '#8d6e63'; else if (r.owner_type === 'player') fillColor = '#4caf50';
                return { ...geo, properties: { id: r.id, name: r.name, owner_type: r.owner_type, owner_id: r.owner_id, fillColor, start_year: r.start_year, end_year: r.end_year, population: r.population, resources: r.resources, army: r.army } };
            });
            geoJSONLayer.clearLayers();
            geoJSONLayer.addData({ type: 'FeatureCollection', features });
        }

        async function loadTradeRoutes() {
            tradeRouteLayer.clearLayers();
            if (!currentTargetYear) return;
            const { data: routes } = await sb.from('trade_routes').select('*, from_region:from_region_id(*), to_region:to_region_id(*)').eq('active', true);
            if (!routes) return;
            for (const route of routes) {
                const from = route.from_region, to = route.to_region;
                if (!from || !to) continue;
                if (from.start_year > currentTargetYear || from.end_year < currentTargetYear) continue;
                if (to.start_year > currentTargetYear || to.end_year < currentTargetYear) continue;
                const fromCentroid = getCentroid(from.geojson), toCentroid = getCentroid(to.geojson);
                if (!fromCentroid || !toCentroid) continue;
                L.polyline([fromCentroid, toCentroid], { color: '#8B0000', weight: 2, dashArray: '10 6', className: 'trade-route-line' }).addTo(tradeRouteLayer).bindTooltip(`${route.resource} route`, { permanent: false });
            }
        }

        async function loadBuildings() {
            buildingMarkersLayer.clearLayers();
            if (!currentTargetYear) return;
            const { data: buildings } = await sb
                .from('era_buildings')
                .select('*, region:region_id(*)')
                .filter('region.start_year', 'lte', currentTargetYear)
                .filter('region.end_year', 'gte', currentTargetYear);
            if (!buildings) return;
            const buildingIcons = { outpost: { emoji: '🛡️', color: '#2196F3' }, fortress: { emoji: '🏰', color: '#f44336' }, market: { emoji: '📦', color: '#4CAF50' } };
            for (const b of buildings) {
                if (!b.region || !b.region.geojson) continue;
                const centroid = getCentroid(b.region.geojson);
                if (!centroid) continue;
                const iconDef = buildingIcons[b.building_type] || { emoji: '🏗️', color: '#888' };
                L.marker(centroid, { icon: L.divIcon({ className: 'building-icon', html: `<div style="background:${iconDef.color}; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:14px;">${iconDef.emoji}</div>`, iconSize: [24,24], iconAnchor: [12,12] }) }).addTo(buildingMarkersLayer).bindTooltip(`${b.building_type} (Lvl ${b.level})`, { permanent: false });
            }
        }

        function openSidebar(props) {
            currentRegionId = props.id;
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('region-name').textContent = props.name + ` (${formatYear(props.start_year)}–${formatYear(props.end_year)})`;
            const owner = props.owner_type === 'player' ? (props.owner_id === player.id ? 'You' : 'Another Player') : props.owner_type === 'npc' ? 'NPC Civilization' : 'Unclaimed';
            document.getElementById('region-owner').textContent = `Controlled by: ${owner}`;
            document.getElementById('diplomacy-target').value = props.owner_type === 'player' ? props.owner_id : '';

            const pop = props.population ? props.population.toLocaleString() : '0';
            const resources = props.resources || {};
            const food = resources.food || 0, wood = resources.wood || 0, metal = resources.metal || 0;
            document.getElementById('region-stats').innerHTML = `<p>👥 Population: <strong>${pop}</strong></p><p>🌾 Food: ${food} &nbsp; 🪵 Wood: ${wood} &nbsp; ⛏️ Metal: ${metal}</p>`;
            document.getElementById('region-army').innerHTML = `<p>⚔️ Army: <strong>${props.army || 0}</strong></p>`;

            const isMine = (props.owner_type === 'player' && props.owner_id === player.id);
            const isOtherPlayer = props.owner_type === 'player' && props.owner_id !== player.id;
            document.getElementById('btn-recruit').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-move').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-set-base').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-build').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-trade').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-route').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-tech').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-diplomacy').style.display = isOtherPlayer ? 'block' : 'none';
            document.getElementById('diplomacy-panel').style.display = 'none';

            const canAttack = !isMine && attackBaseRegionId != null;
            document.getElementById('btn-conquer').style.display = canAttack ? 'block' : 'none';
            document.getElementById('btn-events').style.display = 'block';
            document.getElementById('action-feedback').textContent = '';
            document.getElementById('market-view').style.display = 'none'; document.getElementById('market-actions').style.display = 'block';
            document.getElementById('route-management').style.display = 'none';
            document.getElementById('tech-tree').style.display = 'none';

            loadRegionBuildings(props.id);
        }

        async function loadRegionBuildings(regionId) {
            const { data: buildings } = await sb.from('era_buildings').select('*').eq('region_id', regionId);
            const div = document.getElementById('region-buildings');
            if (!buildings || buildings.length === 0) { div.innerHTML = '<p>No buildings constructed.</p>'; }
            else { div.innerHTML = '<strong>🏗️ Buildings:</strong><br>' + buildings.map(b => `<div class="building-item">${b.building_type} (Lvl ${b.level})</div>`).join(''); }
        }

        // ---- NPC AI ----
        document.getElementById('btn-npc-turn').addEventListener('click', async () => {
            const btn = document.getElementById('btn-npc-turn');
            btn.disabled = true; btn.textContent = '⏳ Processing...';
            const { data, error } = await sb.rpc('npc_ai_tick', { p_target_year: currentTargetYear });
            btn.disabled = false; btn.textContent = '⚙️ Run NPC Turn';
            if (error) { alert('AI Error: ' + error.message); return; }
            if (data.success) { showFeedback(data.message); loadYear(currentTargetYear); }
            else alert(data.error);
        });

        // ---- Tech Tree ----
        document.getElementById('btn-tech').addEventListener('click', async () => {
            const techDiv = document.getElementById('tech-tree');
            if (techDiv.style.display === 'block') { techDiv.style.display = 'none'; return; }
            techDiv.style.display = 'block';
            if (!currentEraId) return;
            const { data: techs } = await sb.from('technologies').select('*').eq('era_id', currentEraId);
            const { data: researched } = await sb.from('player_technologies').select('technology_id').eq('player_id', player.id);
            const researchedIds = researched ? researched.map(r => r.technology_id) : [];
            if (!techs || techs.length === 0) { techDiv.innerHTML = '<p>No technologies available.</p>'; return; }
            techDiv.innerHTML = techs.map(t => {
                const researched = researchedIds.includes(t.id);
                let costStr = [];
                if (t.cost_food > 0) costStr.push(`${t.cost_food} food`);
                if (t.cost_wood > 0) costStr.push(`${t.cost_wood} wood`);
                if (t.cost_metal > 0) costStr.push(`${t.cost_metal} metal`);
                if (t.cost_gold > 0) costStr.push(`${t.cost_gold} gold`);
                return `<div class="tech-item"><strong>${t.name}</strong> ${researched ? '(✓ Researched)' : ''}<br>${t.description}<br>Bonus: ${t.bonus_type} +${t.bonus_value}x<br>Cost: ${costStr.join(', ') || 'None'}<br>${!researched ? `<button onclick="researchTech('${t.id}')">Research</button>` : ''}</div>`;
            }).join('');
        });

        window.researchTech = async (techId) => {
            const { data, error } = await sb.rpc('research_technology', { p_technology_id: techId });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message || data.error);
            document.getElementById('btn-tech').click(); document.getElementById('btn-tech').click();
            loadYear(currentTargetYear);
        };

        // ---- Army ----
        document.getElementById('btn-recruit').addEventListener('click', async () => {
            const qty = prompt('How many troops to recruit? (10 food + 5 gold each)');
            if (!qty) return;
            const { data, error } = await sb.rpc('recruit_army', { p_region_id: currentRegionId, p_quantity: parseInt(qty) });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message || data.error);
            loadYear(currentTargetYear);
        });
        document.getElementById('btn-move').addEventListener('click', async () => {
            const targetYear = currentTargetYear;
            const { data: owned } = await sb.from('historical_regions').select('id, name, army').eq('owner_type', 'player').eq('owner_id', player.id).lte('start_year', targetYear).gte('end_year', targetYear).neq('id', currentRegionId);
            if (!owned || owned.length === 0) { alert('No other regions to move to.'); return; }
            let list = owned.map(r => `${r.name} (ID:${r.id.slice(0,4)}) - Army: ${r.army}`).join('\n');
            const destId = prompt(`Choose destination:\n${list}\n\nRegion ID:`);
            if (!destId) return;
            const qty = prompt('How many troops?');
            if (!qty) return;
            const { data, error } = await sb.rpc('move_army', { p_from_region_id: currentRegionId, p_to_region_id: destId, p_quantity: parseInt(qty) });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message || data.error);
            loadYear(currentTargetYear);
        });
        document.getElementById('btn-set-base').addEventListener('click', () => {
            attackBaseRegionId = currentRegionId;
            document.getElementById('action-feedback').textContent = `Base set to: ${document.getElementById('region-name').textContent}`;
        });

        // ---- Conquer ----
        document.getElementById('btn-conquer').addEventListener('click', async () => {
            if (!attackBaseRegionId) { alert('Set an attack base first.'); return; }
            const overlay = document.getElementById('battle-overlay');
            const attDice = document.getElementById('attacker-dice'), defDice = document.getElementById('defender-dice');
            const msg = document.getElementById('battle-message');
            overlay.style.display = 'block'; msg.textContent = 'Rolling...';
            let rollInterval = setInterval(() => {
                attDice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
                defDice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
            }, 100);
            const { data, error } = await sb.rpc('attack_region', { p_target_region_id: currentRegionId, p_source_region_id: attackBaseRegionId, p_target_year: currentTargetYear });
            clearInterval(rollInterval);
            if (error) msg.textContent = 'Error: ' + error.message;
            else if (data.success) {
                let victoryMsg = 'Victory! Region conquered!';
                if (data.triggered_event) {
                    victoryMsg += `\n📜 ${data.triggered_event.title}: ${data.triggered_event.description}`;
                    const targetRegion = await sb.from('historical_regions').select('geojson').eq('id', currentRegionId).single();
                    if (targetRegion) {
                        const centroid = getCentroid(targetRegion.geojson);
                        const marker = L.marker(centroid, { icon: L.divIcon({className:'event-marker', html:`<div style="background:#d4a017; color:white; padding:2px 6px; border-radius:12px; font-size:0.8rem;">📜</div>`, iconSize:[20,20], iconAnchor:[10,10]}) }).addTo(map);
                        marker.bindTooltip(data.triggered_event.title, {permanent:true}).openTooltip();
                        setTimeout(() => map.removeLayer(marker), 8000);
                    }
                }
                msg.textContent = victoryMsg;
                attDice.textContent = '⚅'; defDice.textContent = '⚁';
            } else {
                msg.textContent = 'Defeat! ' + (data.error || '');
                attDice.textContent = '⚀'; defDice.textContent = '⚅';
            }
            setTimeout(() => { overlay.style.display = 'none'; loadYear(currentTargetYear); }, 3000);
        });

        document.getElementById('btn-build').addEventListener('click', async () => {
            const building = prompt('What to build? (outpost/fortress/market)');
            if (!building) return;
            const { data, error } = await sb.rpc('build_structure', { p_region_id: currentRegionId, p_building_type: building });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message || data.error);
            loadYear(currentTargetYear);
            loadRegionBuildings(currentRegionId);
        });

        // ---- Trade Offers ----
        document.getElementById('btn-trade').addEventListener('click', async () => {
            const resource = prompt('Resource (food/wood/metal):');
            if (!resource) return;
            const quantity = parseInt(prompt('Quantity:')), price = parseInt(prompt('Price per unit:'));
            if (!resource || !quantity || !price) return;
            const { data, error } = await sb.rpc('create_trade_offer', { p_region_id: currentRegionId, p_resource: resource, p_quantity: quantity, p_price: price });
            if (error) { showFeedback(error.message); return; }
            showFeedback('Trade offer listed!');
            if (document.getElementById('market-view').style.display === 'block') loadMarket();
        });
        document.getElementById('btn-show-market').addEventListener('click', async () => {
            document.getElementById('market-view').style.display = 'block'; document.getElementById('market-actions').style.display = 'none';
            await loadMarket();
        });
        document.getElementById('btn-close-market').addEventListener('click', () => {
            document.getElementById('market-view').style.display = 'none'; document.getElementById('market-actions').style.display = 'block';
        });
        document.getElementById('btn-create-offer').addEventListener('click', () => document.getElementById('btn-trade').click());
        async function loadMarket() {
            const { data: offers } = await sb.from('era_trade_offers').select('*, listing_player:players(username)').eq('active', true).order('created_at', { ascending: false }).limit(50);
            const list = document.getElementById('trade-list');
            if (!offers || offers.length === 0) { list.innerHTML = '<p>No offers yet.</p>'; return; }
            list.innerHTML = offers.map(o => `<div class="market-offer"><strong>${o.resource}</strong> x${o.quantity} @ $${o.price_per_unit}<br>Seller: ${o.listing_player?.username || 'Unknown'}<br><button onclick="buyOffer('${o.id}')">Buy 1</button></div>`).join('');
        }
        window.buyOffer = async (offerId) => {
            const { data, error } = await sb.rpc('buy_trade_offer', { p_offer_id: offerId });
            if (error) { alert(error.message); return; }
            if (data.success) { alert('Purchased!'); loadMarket(); }
            else alert(data.error || 'Purchase failed');
        };

        // ---- Trade Routes ----
        document.getElementById('btn-route').addEventListener('click', async () => {
            const mgmt = document.getElementById('route-management');
            if (mgmt.style.display === 'block') { mgmt.style.display = 'none'; return; }
            mgmt.style.display = 'block';
            await loadRoutesForRegion();
        });
        async function loadRoutesForRegion() {
            const { data: routes } = await sb.from('trade_routes').select('*, from_region:from_region_id(name), to_region:to_region_id(name)').or(`from_region_id.eq.${currentRegionId},to_region_id.eq.${currentRegionId}`).eq('active', true);
            const listDiv = document.getElementById('existing-routes');
            if (!routes || routes.length === 0) { listDiv.innerHTML = '<p>No active routes.</p>'; return; }
            listDiv.innerHTML = routes.map(r => `<div class="route-item">${r.from_region.name} ↔ ${r.to_region.name} (${r.resource}) <button onclick="deleteRoute('${r.id}')">Remove</button></div>`).join('');
        }
        window.deleteRoute = async (routeId) => {
            if (!confirm('Remove route?')) return;
            await sb.rpc('remove_trade_route', { p_route_id: routeId });
            showFeedback('Route removed');
            await loadRoutesForRegion();
            await loadTradeRoutes();
        };
        document.getElementById('btn-create-route').addEventListener('click', async () => {
            const targetYear = currentTargetYear;
            const { data: owned } = await sb.from('historical_regions').select('id, name').eq('owner_type', 'player').eq('owner_id', player.id).lte('start_year', targetYear).gte('end_year', targetYear).neq('id', currentRegionId);
            if (!owned || owned.length === 0) { alert('No other regions.'); return; }
            let list = owned.map(r => `${r.name} (${r.id.slice(0,4)})`).join('\n');
            const destId = prompt(`Destination:\n${list}\n\nRegion ID:`);
            if (!destId) return;
            const resource = prompt('Resource (food/wood/metal):');
            if (!resource || !['food','wood','metal'].includes(resource)) { alert('Invalid'); return; }
            const { data, error } = await sb.rpc('create_trade_route', { p_from_region_id: currentRegionId, p_to_region_id: destId, p_resource: resource });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message || data.error);
            await loadRoutesForRegion();
            await loadTradeRoutes();
        });

        // ---- Diplomacy ----
        document.getElementById('btn-diplomacy').addEventListener('click', async () => {
            const panel = document.getElementById('diplomacy-panel');
            if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
            const targetPlayerId = document.getElementById('diplomacy-target').value;
            if (!targetPlayerId) return;
            panel.style.display = 'block';
            const { data: alliance } = await sb.from('alliances').select('*').or(`and(player1_id.eq.${player.id},player2_id.eq.${targetPlayerId}),and(player1_id.eq.${targetPlayerId},player2_id.eq.${player.id})`).maybeSingle();
            const { data: pending } = await sb.from('alliance_requests').select('*').eq('from_player_id', player.id).eq('to_player_id', targetPlayerId).eq('status', 'pending').maybeSingle();
            let html = '';
            if (alliance) html = '<p>Allied.</p><button onclick="cancelAlliance(\'' + targetPlayerId + '\')">Cancel Alliance</button>';
            else if (pending) html = '<p>Request pending.</p>';
            else html = '<button onclick="sendAllianceRequest(\'' + targetPlayerId + '\')">Send Alliance Request</button>';
            panel.innerHTML = html;
        });
        window.sendAllianceRequest = async (toId) => {
            const { data, error } = await sb.rpc('send_alliance_request', { p_to_player_id: toId });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message);
            document.getElementById('diplomacy-panel').style.display = 'none';
        };
        window.cancelAlliance = async (allyId) => {
            if (!confirm('Cancel alliance?')) return;
            const { data, error } = await sb.rpc('cancel_alliance', { p_ally_player_id: allyId });
            if (error) { showFeedback(error.message); return; }
            showFeedback(data.message);
            await loadAllies();
            loadYear(currentTargetYear);
        };
        document.getElementById('btn-open-diplomacy').addEventListener('click', async () => {
            const modal = document.getElementById('diplomacy-modal');
            modal.style.display = 'block';
            const content = document.getElementById('diplomacy-content');
            content.innerHTML = '<p>Loading...</p>';
            const { data: requests } = await sb.from('alliance_requests').select('*, from_player:players!from_player_id(username)').eq('to_player_id', player.id).eq('status', 'pending');
            const { data: alliances } = await sb.from('alliances').select('*, player1:players!player1_id(username), player2:players!player2_id(username)').or(`player1_id.eq.${player.id},player2_id.eq.${player.id}`);
            let html = '<h3>Incoming Requests</h3>';
            if (!requests || requests.length === 0) html += '<p>No pending requests.</p>';
            else requests.forEach(r => html += `<p>${r.from_player.username} wants to ally. <button onclick="acceptRequest('${r.id}')">Accept</button> <button onclick="rejectRequest('${r.id}')">Reject</button></p>`);
            html += '<h3>My Alliances</h3>';
            if (!alliances || alliances.length === 0) html += '<p>No alliances.</p>';
            else alliances.forEach(a => {
                const allyName = a.player1_id === player.id ? a.player2.username : a.player1.username;
                html += `<p>${allyName} <button onclick="cancelAlliance('${a.player1_id === player.id ? a.player2_id : a.player1_id}')">Cancel</button></p>`;
            });
            content.innerHTML = html;
        });
        window.acceptRequest = async (reqId) => { /* ... same as before ... */ };
        window.rejectRequest = async (reqId) => { /* ... same as before ... */ };

        // ---- Empire History ----
        document.getElementById('btn-open-history').addEventListener('click', async () => {
            const modal = document.getElementById('history-modal');
            modal.style.display = 'block';
            const content = document.getElementById('history-content');
            content.innerHTML = '<p>Loading history...</p>';
            const { data: logs } = await sb.from('player_conquest_log')
                .select('*, era:era_id(name, year_start, year_end)')
                .eq('player_id', player.id)
                .order('conquered_at', { ascending: false });
            if (!logs || logs.length === 0) {
                content.innerHTML = '<p>No conquests yet.</p>';
                return;
            }
            content.innerHTML = logs.map(log => {
                const eraName = log.era ? log.era.name : 'Unknown Era';
                const date = new Date(log.conquered_at).toLocaleDateString();
                const time = new Date(log.conquered_at).toLocaleTimeString();
                return `<div class="history-item">
                    <strong>${log.region_name}</strong> (${formatYear(log.target_year)})<br>
                    <small>${eraName} – ${date} ${time}</small>
                </div>`;
            }).join('');
        });

        document.getElementById('btn-events').addEventListener('click', async () => {
            const eventsDiv = document.getElementById('events-list');
            if (!eventsDiv.classList.contains('hidden')) { eventsDiv.classList.add('hidden'); return; }
            if (!currentEraId) return;
            const { data: events } = await sb.from('historical_events').select('*').eq('era_id', currentEraId).order('created_at', { ascending: false });
            eventsDiv.innerHTML = (!events || events.length === 0) ? '<p>No events recorded.</p>' : events.map(e => `<div class="event-item"><strong>${e.title}</strong> (${e.description})<br>Effect: ${JSON.stringify(e.effect)}</div>`).join('');
            eventsDiv.classList.remove('hidden');
        });

        function showFeedback(msg) {
            document.getElementById('action-feedback').textContent = msg;
            setTimeout(() => document.getElementById('action-feedback').textContent = '', 4000);
        }

        function setupRealtime() {
            sb.channel('historical-regions').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'historical_regions' }, () => { if (currentTargetYear) loadYear(currentTargetYear); }).subscribe();
        }

        document.getElementById('btn-empire-stats').addEventListener('click', async () => {
            const { data } = await sb.rpc('get_empire_stats', { p_player_id: player.id });
            alert(`Total Regions: ${data.total_regions}\nArmy: ${data.army}\nGold: ${data.gold}`);
        });

        init();
    </script>
</body>
</html>
