<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rheoa Admin Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #ff6b6b; margin-bottom: 20px; }
    .stats-bar {
      display: flex; gap: 20px; margin-bottom: 25px;
      background: #16213e; padding: 15px; border-radius: 8px;
    }
    .stat {
      background: #0f3460; padding: 10px 20px; border-radius: 8px;
    }
    .stat-value { font-size: 1.8rem; font-weight: bold; }
    .stat-label { font-size: 0.8rem; opacity: 0.8; }
    table {
      width: 100%; border-collapse: collapse; background: #16213e;
      border-radius: 8px; overflow: hidden;
    }
    th, td {
      text-align: left; padding: 12px; border-bottom: 1px solid #2c3e66;
    }
    th { background: #0f3460; }
    .online { color: #4caf50; font-weight: bold; }
    .offline { color: #888; }
    .ban-btn, .unban-btn {
      padding: 5px 12px; border: none; border-radius: 4px;
      cursor: pointer; font-family: monospace; font-weight: bold;
    }
    .ban-btn { background: #e74c3c; color: white; }
    .unban-btn { background: #2ecc71; color: white; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal-content {
      background: #16213e; padding: 25px; border-radius: 12px;
      width: 400px; max-width: 90%;
    }
    .modal input, .modal select, .modal textarea {
      width: 100%; margin: 10px 0; padding: 8px;
      font-family: monospace; background: #0f3460; color: white;
      border: 1px solid #2c3e66; border-radius: 4px;
    }
    .modal button { margin-right: 10px; padding: 8px 15px; cursor: pointer; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #333; color: white; padding: 12px 20px;
      border-radius: 8px; z-index: 2000;
    }
    .refresh-btn {
      background: #4caf50; color: white; padding: 8px 16px;
      border: none; border-radius: 4px; cursor: pointer; margin-bottom: 15px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛡️ Rheoa Admin Portal</h1>
  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-value" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
    <div class="stat"><div class="stat-value" id="onlineNow">0</div><div class="stat-label">Online Now</div></div>
    <div class="stat"><div class="stat-value" id="chatOnline">0</div><div class="stat-label">In Chat / Forum</div></div>
  </div>
  <button class="refresh-btn" onclick="loadUserList()">⟳ Refresh</button>
  <div style="overflow-x: auto;">
    <table id="userTable">
      <thead>
        <tr><th>Username</th><th>Email</th><th>Level</th><th>Cash</th><th>Status</th><th>Current Page</th><th>Last Active</th><th>Actions</th></tr>
      </thead>
      <tbody id="userTableBody"><tr><td colspan="8">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Ban Modal -->
<div id="banModal" class="modal">
  <div class="modal-content">
    <h3>Ban User</h3>
    <p id="banUsername"></p>
    <label>Duration:</label>
    <select id="banDuration">
      <option value="1 hour">1 hour</option>
      <option value="1 day">1 day</option>
      <option value="7 days">7 days</option>
      <option value="30 days">30 days</option>
      <option value="permanent">Permanent</option>
    </select>
    <label>Reason:</label>
    <textarea id="banReason" rows="2" placeholder="Rule violation description..."></textarea>
    <div>
      <button onclick="confirmBan()">Ban</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
  const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
  const sb = supabase.createClient(supabaseUrl, supabaseKey);

  let currentAdmin = null;
  let targetUserId = null;

  // Check admin authorization
  async function checkAdmin() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    const { data: player } = await sb
      .from('players')
      .select('is_admin, username')
      .eq('auth_id', user.id)
      .single();
    if (!player || !player.is_admin) {
      alert('Access denied. Admins only.');
      await sb.auth.signOut();
      window.location.href = 'index.html';
      return;
    }
    currentAdmin = player;
    loadUserList();
    // Auto-refresh every 10 seconds
    setInterval(loadUserList, 10000);
  }

  async function loadUserList() {
    // Use the admin view
    const { data: users, error } = await sb
      .from('admin_online_users')
      .select('*')
      .order('username');

    if (error) {
      console.error(error);
      document.getElementById('userTableBody').innerHTML = '<tr><td colspan="8">Error loading users</td></tr>';
      return;
    }

    const onlineCount = users.filter(u => u.is_online).length;
    const chatOnline = users.filter(u => u.is_online && (u.current_page?.includes('chat') || u.current_page?.includes('forum'))).length;
    document.getElementById('totalUsers').innerText = users.length;
    document.getElementById('onlineNow').innerText = onlineCount;
    document.getElementById('chatOnline').innerText = chatOnline;

    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = users.map(u => {
      const isBanned = u.banned_until && new Date(u.banned_until) > new Date();
      const statusHtml = isBanned ? `<span style="color:#e74c3c">Banned until ${new Date(u.banned_until).toLocaleString()}</span>` :
                         (u.is_online ? '<span class="online">● Online</span>' : '<span class="offline">○ Offline</span>');
      const lastActive = u.last_heartbeat ? new Date(u.last_heartbeat).toLocaleString() : 'Never';
      const page = u.current_page || 'Unknown';
      return `
        <tr>
          <td>${escapeHtml(u.username)} ${u.is_admin ? '👑' : ''}</td>
          <td>${escapeHtml(u.email || '-')}</td>
          <td>${u.level}</td>
          <td>₹${(u.cash || 0).toLocaleString()}</td>
          <td>${statusHtml}</td>
          <td>${escapeHtml(page)}</td>
          <td>${lastActive}</td>
          <td>
            ${!isBanned ? `<button class="ban-btn" onclick="openBanModal('${u.id}', '${escapeHtml(u.username)}')">Ban</button>` :
              `<button class="unban-btn" onclick="unbanUser('${u.id}')">Unban</button>`}
          </td>
        </tr>
      `;
    }).join('');
  }

  function openBanModal(userId, username) {
    targetUserId = userId;
    document.getElementById('banUsername').innerHTML = `User: ${username}`;
    document.getElementById('banModal').style.display = 'flex';
  }

  async function confirmBan() {
    const duration = document.getElementById('banDuration').value;
    const reason = document.getElementById('banReason').value.trim() || 'Violation of rules';
    let banUntil = null;
    const now = new Date();
    if (duration === '1 hour') banUntil = new Date(now.getTime() + 3600000);
    else if (duration === '1 day') banUntil = new Date(now.getTime() + 86400000);
    else if (duration === '7 days') banUntil = new Date(now.getTime() + 604800000);
    else if (duration === '30 days') banUntil = new Date(now.getTime() + 2592000000);
    else if (duration === 'permanent') banUntil = new Date('9999-12-31');

    const { data, error } = await sb.rpc('admin_ban_player', {
      p_player_id: targetUserId,
      p_ban_until: banUntil?.toISOString(),
      p_reason: reason
    });
    if (error || !data.success) {
      alert('Ban failed: ' + (error?.message || data?.error));
    } else {
      alert('User banned successfully');
      closeModal();
      loadUserList();
    }
  }

  async function unbanUser(userId) {
    if (!confirm('Remove ban from this user?')) return;
    const { data, error } = await sb.rpc('admin_ban_player', {
      p_player_id: userId,
      p_ban_until: null,
      p_reason: null
    });
    if (error || !data.success) {
      alert('Unban failed: ' + (error?.message || data?.error));
    } else {
      alert('Ban removed');
      loadUserList();
    }
  }

  function closeModal() {
    document.getElementById('banModal').style.display = 'none';
    document.getElementById('banReason').value = '';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  checkAdmin();
</script>
</body>
</html>
