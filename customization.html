<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Customization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #9c27b0;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Player Preview */
    .preview-section {
      background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      color: white;
    }
    
    .preview-title {
      font-size: 1.2rem;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .profile-preview {
      display: flex;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .avatar-preview {
      width: 120px;
      height: 120px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    
    .info-preview {
      flex: 1;
      min-width: 250px;
    }
    
    .preview-name {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .preview-title-badge {
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-block;
      font-size: 1.2rem;
    }
    
    .preview-frame {
      padding: 5px;
      border-radius: 15px;
      margin-top: 10px;
    }
    
    /* Customization Tabs */
    .customization-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      background: #333;
      color: white;
    }
    
    .tab-btn.active {
      background: #9c27b0;
      color: white;
      border-color: #9c27b0;
    }
    
    /* Items Grid */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .item-card {
      background: white;
      border: 2px solid #9c27b0;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s;
      position: relative;
    }
    
    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(156, 39, 176, 0.2);
    }
    
    .item-card.equipped {
      border-color: #4CAF50;
      background: #f0fff0;
    }
    
    .item-card.locked {
      opacity: 0.6;
      border-color: #999;
    }
    
    .item-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .item-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .item-rarity {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 15px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .rarity-common { background: #e0e0e0; color: #333; }
    .rarity-rare { background: #2196F3; color: white; }
    .rarity-epic { background: #9c27b0; color: white; }
    .rarity-legendary { background: #ff9800; color: white; }
    .rarity-mythic { background: #f44336; color: white; }
    
    .item-description {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    
    .item-unlock {
      font-size: 0.8rem;
      color: #4CAF50;
      margin: 10px 0;
    }
    
    .item-price {
      font-size: 1.2rem;
      font-weight: bold;
      color: #4CAF50;
      margin: 10px 0;
    }
    
    .equip-btn {
      width: 100%;
      padding: 8px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .equip-btn.equipped {
      background: #9c27b0;
    }
    
    .equip-btn:hover:not(:disabled) {
      background: #45a049;
    }
    
    .equip-btn.equipped:hover {
      background: #7b1fa2;
    }
    
    .equip-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .owned-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #4CAF50;
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    
    /* Color Scheme Preview */
    .color-preview {
      height: 50px;
      border-radius: 5px;
      margin: 10px 0;
      border: 1px solid #ddd;
    }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    /* Toast container styles are now in toast.js - removing duplicate */
    
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #9c27b0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .empty-message {
      text-align: center;
      padding: 40px;
      color: #666;
      grid-column: 1/-1;
    }
    
    @media (max-width: 600px) {
      .customization-tabs {
        flex-direction: column;
      }
      
      .tab-btn {
        width: 100%;
      }
      
      .profile-preview {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<!-- Toast container is created by toast.js, removed static container -->

<h1>🎨 Customization</h1>
<div class="subtitle">Personalize your criminal empire</div>

<!-- Player Preview -->
<div class="preview-section" id="previewSection" style="display: none;">
  <div class="preview-title">Your Profile Preview</div>
  <div class="profile-preview">
    <div class="avatar-preview" id="previewAvatar">👤</div>
    <div class="info-preview">
      <div class="preview-name" id="previewUsername">Username</div>
      <div class="preview-title-badge" id="previewTitle">Criminal</div>
      <div class="preview-frame" id="previewFrame"></div>
    </div>
  </div>
</div>

<!-- Customization Tabs -->
<div class="customization-tabs">
  <button class="tab-btn active" onclick="switchTab('titles')">📛 Titles</button>
  <button class="tab-btn" onclick="switchTab('avatars')">👤 Avatars</button>
  <button class="tab-btn" onclick="switchTab('frames')">🖼️ Frames</button>
  <button class="tab-btn" onclick="switchTab('badges')">🎖️ Badges</button>
  <button class="tab-btn" onclick="switchTab('colors')">🎨 Colors</button>
  <button class="tab-btn" onclick="switchTab('shop')">🛒 Shop</button>
</div>

<!-- Titles Tab -->
<div id="titles" class="tab-content" style="display: block;">
  <div class="items-grid" id="titlesGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading titles...</p>
    </div>
  </div>
</div>

<!-- Avatars Tab -->
<div id="avatars" class="tab-content" style="display: none;">
  <div class="items-grid" id="avatarsGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading avatars...</p>
    </div>
  </div>
</div>

<!-- Frames Tab -->
<div id="frames" class="tab-content" style="display: none;">
  <div class="items-grid" id="framesGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading frames...</p>
    </div>
  </div>
</div>

<!-- Badges Tab -->
<div id="badges" class="tab-content" style="display: none;">
  <div class="items-grid" id="badgesGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading badges...</p>
    </div>
  </div>
</div>

<!-- Colors Tab -->
<div id="colors" class="tab-content" style="display: none;">
  <div class="items-grid" id="colorsGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading color schemes...</p>
    </div>
  </div>
</div>

<!-- Shop Tab -->
<div id="shop" class="tab-content" style="display: none;">
  <div class="items-grid" id="shopGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading shop...</p>
    </div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<!-- Script includes: Supabase library + shared utilities -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="toast.js"></script>
<script src="loading.js"></script>
<script src="error-handler.js"></script>

<script>
// Use the shared supabase client
const sb = window.supabaseClient;

let currentPlayer = null;
let customization = null;
let ownedTitles = [];
let ownedAvatars = [];
let ownedFrames = [];
let ownedBadges = [];
let ownedColors = [];
let allTitles = [];
let allAvatars = [];
let allFrames = [];
let allBadges = [];
let allColors = [];

// Load player data
async function loadPlayerData() {
  try {
    const user = await window.getCurrentUser();
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    
    const player = await window.getCurrentPlayer();
    if (!player) {
      window.showToast('Player not found', 'error');
      return;
    }
    
    currentPlayer = player;
    await loadCustomization();
    await loadOwnedItems();
    await loadAllItems();
    updatePreview();
    
  } catch (error) {
    console.error('Error loading player:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Error loading data');
    window.showToast(friendlyMessage, 'error');
  }
}

// Load player customization
async function loadCustomization() {
  try {
    const { data, error } = await sb
      .from('player_customization')
      .select(`
        *,
        current_avatar:avatar_options(*),
        current_frame:frame_options(*),
        current_color:color_schemes(*)
      `)
      .eq('player_id', currentPlayer.id)
      .single();
    
    if (error && error.code !== 'PGRST116') throw error;
    
    customization = data || {};
    document.getElementById('previewSection').style.display = 'block';
  } catch (error) {
    console.error('Error loading customization:', error);
    window.showToast('Error loading customization', 'error');
  }
}

// Load owned items
async function loadOwnedItems() {
  try {
    // Load owned titles
    const { data: titles, error: titlesError } = await sb
      .from('player_titles')
      .select('title_id, equipped')
      .eq('player_id', currentPlayer.id);
    if (titlesError) throw titlesError;
    ownedTitles = titles || [];
    
    // Load owned avatars
    const { data: avatars, error: avatarsError } = await sb
      .from('player_avatars')
      .select('avatar_id, equipped')
      .eq('player_id', currentPlayer.id);
    if (avatarsError) throw avatarsError;
    ownedAvatars = avatars || [];
    
    // Load owned frames
    const { data: frames, error: framesError } = await sb
      .from('player_frames')
      .select('frame_id, equipped')
      .eq('player_id', currentPlayer.id);
    if (framesError) throw framesError;
    ownedFrames = frames || [];
    
    // Load owned badges
    const { data: badges, error: badgesError } = await sb
      .from('player_badges')
      .select('badge_id, equipped')
      .eq('player_id', currentPlayer.id);
    if (badgesError) throw badgesError;
    ownedBadges = badges || [];
    
    // Load owned colors
    const { data: colors, error: colorsError } = await sb
      .from('player_color_schemes')
      .select('color_scheme_id, equipped')
      .eq('player_id', currentPlayer.id);
    if (colorsError) throw colorsError;
    ownedColors = colors || [];
    
  } catch (error) {
    console.error('Error loading owned items:', error);
    window.showToast('Error loading your items', 'error');
  }
}

// Load all available items
async function loadAllItems() {
  try {
    // Load all titles
    const { data: titles, error: titlesError } = await sb
      .from('title_options')
      .select('*')
      .order('rarity');
    if (titlesError) throw titlesError;
    allTitles = titles || [];
    renderTitles();
    
    // Load all avatars
    const { data: avatars, error: avatarsError } = await sb
      .from('avatar_options')
      .select('*')
      .order('price');
    if (avatarsError) throw avatarsError;
    allAvatars = avatars || [];
    renderAvatars();
    
    // Load all frames
    const { data: frames, error: framesError } = await sb
      .from('frame_options')
      .select('*')
      .order('price');
    if (framesError) throw framesError;
    allFrames = frames || [];
    renderFrames();
    
    // Load all badges
    const { data: badges, error: badgesError } = await sb
      .from('badge_options')
      .select('*')
      .order('rarity');
    if (badgesError) throw badgesError;
    allBadges = badges || [];
    renderBadges();
    
    // Load all colors
    const { data: colors, error: colorsError } = await sb
      .from('color_schemes')
      .select('*')
      .order('rarity');
    if (colorsError) throw colorsError;
    allColors = colors || [];
    renderColors();
    renderShop();
    
  } catch (error) {
    console.error('Error loading items:', error);
    window.showToast('Error loading items', 'error');
  }
}

// Update preview
function updatePreview() {
  document.getElementById('previewUsername').textContent = currentPlayer.username;
  
  // Update avatar preview
  if (customization.current_avatar) {
    document.getElementById('previewAvatar').textContent = customization.current_avatar.name.charAt(0);
  }
  
  // Update title preview
  document.getElementById('previewTitle').textContent = customization.current_title || 'Criminal';
  
  // Update frame preview
  const frame = customization.current_frame;
  if (frame) {
    document.getElementById('previewFrame').style.border = `4px solid ${frame.border_color || '#000'}`;
    document.getElementById('previewFrame').style.background = frame.background_color || 'transparent';
  }
  
  // Update color scheme
  if (customization.current_color) {
    document.body.style.backgroundColor = customization.current_color.background_color;
    document.body.style.color = customization.current_color.text_color;
  }
}

// Render titles
function renderTitles() {
  const grid = document.getElementById('titlesGrid');
  
  grid.innerHTML = allTitles.map(title => {
    const owned = ownedTitles.find(t => t.title_id === title.id);
    const isEquipped = owned?.equipped;
    const isLocked = !owned && title.price > 0;
    
    return `
      <div class="item-card ${isEquipped ? 'equipped' : ''} ${isLocked ? 'locked' : ''}">
        <div class="item-icon">${title.icon || '📛'}</div>
        <div class="item-name">${title.title}</div>
        <span class="item-rarity rarity-${title.rarity}">${title.rarity}</span>
        <div class="item-description">${title.description || ''}</div>
        ${owned ? '<span class="owned-badge">✓ OWNED</span>' : ''}
        ${isLocked ? `
          <div class="item-unlock">Unlock: ${title.unlock_method} ${title.unlock_requirement}</div>
        ` : ''}
        ${owned && !isEquipped ? `
          <button class="equip-btn" onclick="equipTitle('${title.id}')">Equip</button>
        ` : ''}
        ${isEquipped ? `
          <button class="equip-btn equipped" disabled>✓ Equipped</button>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Render avatars
function renderAvatars() {
  const grid = document.getElementById('avatarsGrid');
  
  grid.innerHTML = allAvatars.map(avatar => {
    const owned = ownedAvatars.find(a => a.avatar_id === avatar.id);
    const isEquipped = owned?.equipped;
    const isLocked = !owned && avatar.price > 0;
    
    return `
      <div class="item-card ${isEquipped ? 'equipped' : ''} ${isLocked ? 'locked' : ''}">
        <div class="item-icon">${avatar.animated ? '✨' : '👤'}</div>
        <div class="item-name">${avatar.name}</div>
        <span class="item-rarity rarity-${avatar.rarity}">${avatar.rarity}</span>
        <div class="item-description">Category: ${avatar.category}</div>
        ${avatar.animated ? '<div>✨ Animated</div>' : ''}
        ${owned ? '<span class="owned-badge">✓ OWNED</span>' : ''}
        ${isLocked ? `
          <div class="item-price">💰 ₹${avatar.price.toLocaleString()}</div>
        ` : ''}
        ${owned && !isEquipped ? `
          <button class="equip-btn" onclick="equipAvatar('${avatar.id}')">Equip</button>
        ` : ''}
        ${isEquipped ? `
          <button class="equip-btn equipped" disabled>✓ Equipped</button>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Render frames
function renderFrames() {
  const grid = document.getElementById('framesGrid');
  
  grid.innerHTML = allFrames.map(frame => {
    const owned = ownedFrames.find(f => f.frame_id === frame.id);
    const isEquipped = owned?.equipped;
    const isLocked = !owned && frame.price > 0;
    
    return `
      <div class="item-card ${isEquipped ? 'equipped' : ''} ${isLocked ? 'locked' : ''}">
        <div class="item-icon">🖼️</div>
        <div class="item-name">${frame.name}</div>
        <span class="item-rarity rarity-${frame.rarity}">${frame.rarity}</span>
        <div style="width:100%; height:30px; background:${frame.background_color || '#fff'}; border:2px solid ${frame.border_color || '#000'}; margin:10px 0;"></div>
        ${frame.animated ? '<div>✨ Animated</div>' : ''}
        ${owned ? '<span class="owned-badge">✓ OWNED</span>' : ''}
        ${isLocked ? `
          <div class="item-price">💰 ₹${frame.price.toLocaleString()}</div>
        ` : ''}
        ${owned && !isEquipped ? `
          <button class="equip-btn" onclick="equipFrame('${frame.id}')">Equip</button>
        ` : ''}
        ${isEquipped ? `
          <button class="equip-btn equipped" disabled>✓ Equipped</button>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Render badges
function renderBadges() {
  const grid = document.getElementById('badgesGrid');
  
  grid.innerHTML = allBadges.map(badge => {
    const owned = ownedBadges.find(b => b.badge_id === badge.id);
    const isLocked = !owned && badge.price > 0;
    
    return `
      <div class="item-card ${owned ? 'equipped' : ''} ${isLocked ? 'locked' : ''}">
        <div class="item-icon">${badge.icon || '🎖️'}</div>
        <div class="item-name">${badge.name}</div>
        <span class="item-rarity rarity-${badge.rarity}">${badge.rarity}</span>
        <div class="item-description">${badge.description || ''}</div>
        <div>Category: ${badge.category}</div>
        ${owned ? '<span class="owned-badge">✓ OWNED</span>' : ''}
        ${isLocked ? `
          <div class="item-unlock">Unlock: ${badge.unlock_method} ${badge.unlock_requirement}</div>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Render colors
function renderColors() {
  const grid = document.getElementById('colorsGrid');
  
  grid.innerHTML = allColors.map(color => {
    const owned = ownedColors.find(c => c.color_scheme_id === color.id);
    const isEquipped = owned?.equipped;
    const isLocked = !owned && color.price > 0;
    
    return `
      <div class="item-card ${isEquipped ? 'equipped' : ''} ${isLocked ? 'locked' : ''}">
        <div class="item-name">${color.name}</div>
        <span class="item-rarity rarity-${color.rarity}">${color.rarity}</span>
        <div class="color-preview" style="background: linear-gradient(90deg, ${color.primary_color} 0%, ${color.secondary_color} 100%);"></div>
        <div style="font-size:0.8rem; margin:5px 0;">
          <span style="color:${color.primary_color};">Primary</span> | 
          <span style="color:${color.secondary_color};">Secondary</span>
        </div>
        ${owned ? '<span class="owned-badge">✓ OWNED</span>' : ''}
        ${isLocked ? `
          <div class="item-price">💰 ₹${color.price.toLocaleString()}</div>
        ` : ''}
        ${owned && !isEquipped ? `
          <button class="equip-btn" onclick="equipColor('${color.id}')">Apply</button>
        ` : ''}
        ${isEquipped ? `
          <button class="equip-btn equipped" disabled>✓ Applied</button>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Render shop
function renderShop() {
  const grid = document.getElementById('shopGrid');
  
  // Combine purchasable items
  const shopItems = [
    ...allAvatars.filter(a => a.price > 0 && !ownedAvatars.some(o => o.avatar_id === a.id)),
    ...allFrames.filter(f => f.price > 0 && !ownedFrames.some(o => o.frame_id === f.id)),
    ...allColors.filter(c => c.price > 0 && !ownedColors.some(o => o.color_scheme_id === c.id))
  ];
  
  if (!shopItems.length) {
    grid.innerHTML = '<div class="empty-message">No items available for purchase</div>';
    return;
  }
  
  grid.innerHTML = shopItems.map(item => {
    const type = item.hasOwnProperty('title') ? 'title' : 
                 item.hasOwnProperty('image_url') ? 'avatar' : 
                 item.hasOwnProperty('border_color') ? 'frame' : 'color';
    
    return `
      <div class="item-card">
        <div class="item-icon">${type === 'avatar' ? '👤' : type === 'frame' ? '🖼️' : '🎨'}</div>
        <div class="item-name">${item.name || item.title}</div>
        <span class="item-rarity rarity-${item.rarity}">${item.rarity}</span>
        <div class="item-price">💰 ₹${item.price.toLocaleString()}</div>
        <div class="item-description">${item.description || ''}</div>
        <button class="equip-btn" onclick="purchaseItem('${type}', '${item.id}')"
                ${currentPlayer.cash < item.price ? 'disabled' : ''}>
          ${currentPlayer.cash < item.price ? 'Cannot Afford' : 'Purchase'}
        </button>
      </div>
    `;
  }).join('');
}

// Equip title
async function equipTitle(titleId) {
  try {
    const { data, error } = await sb.rpc('equip_title', {
      p_title_id: titleId
    });
    
    if (error) throw error;
    
    if (data.success) {
      window.showToast(data.message, 'success');
      await loadCustomization();
      await loadOwnedItems();
      renderTitles();
      updatePreview();
    }
  } catch (error) {
    console.error('Error equipping title:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Failed to equip title');
    window.showToast(friendlyMessage, 'error');
  }
}

// Purchase item
async function purchaseItem(type, itemId) {
  try {
    const { data, error } = await sb.rpc('purchase_cosmetic', {
      p_item_type: type,
      p_item_id: itemId
    });
    
    if (error) throw error;
    
    if (data.success) {
      window.showToast(data.message, 'success');
      await loadPlayerData(); // Refresh cash
      await loadOwnedItems();
      renderShop();
      
      // Refresh the appropriate tab
      if (type === 'avatar') renderAvatars();
      if (type === 'frame') renderFrames();
      if (type === 'color') renderColors();
    }
  } catch (error) {
    console.error('Error purchasing item:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Failed to purchase item');
    window.showToast(friendlyMessage, 'error');
  }
}

// Switch tabs
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.style.display = 'none';
  });
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  document.getElementById(tabName).style.display = 'block';
  event.target.classList.add('active');
}

// Navigation
function goToDashboard() {
  window.location.href = "dashboard.html";
}

// Initialize with error handling
window.ErrorHandler.withErrorHandling(
  loadPlayerData,
