<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - World Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #2E7D32;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Main Container */
    .exploration-container {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      height: 600px;
      margin-bottom: 30px;
    }
    
    /* Map Container */
    #map {
      height: 100%;
      width: 100%;
      border: 3px solid #2E7D32;
      border-radius: 15px;
      z-index: 1;
    }
    
    /* Info Panel */
    .info-panel {
      background: white;
      border: 3px solid #2E7D32;
      border-radius: 15px;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .panel-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: #2E7D32;
      border-bottom: 2px solid #2E7D32;
      padding-bottom: 10px;
    }
    
    /* Region Details */
    .region-detail {
      display: none;
    }
    
    .region-detail.active {
      display: block;
    }
    
    .region-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2E7D32;
      margin-bottom: 10px;
    }
    
    .region-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }
    
    .stat-badge {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .stat-value {
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .danger-low { color: #4CAF50; }
    .danger-medium { color: #ff9800; }
    .danger-high { color: #f44336; }
    
    .explore-progress {
      margin: 20px 0;
    }
    
    .progress-bar {
      width: 100%;
      height: 20px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin: 5px 0;
    }
    
    .progress-fill {
      height: 100%;
      background: #2E7D32;
      transition: width 0.3s;
    }
    
    /* Discoveries List */
    .discoveries-list {
      margin: 15px 0;
    }
    
    .discovery-item {
      background: #e8f5e8;
      border-left: 4px solid #2E7D32;
      padding: 10px;
      margin: 5px 0;
      border-radius: 0 5px 5px 0;
    }
    
    .discovery-name {
      font-weight: bold;
    }
    
    .discovery-desc {
      font-size: 0.9rem;
      color: #666;
    }
    
    /* Travel Options */
    .travel-options {
      margin-top: 20px;
    }
    
    .travel-card {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .travel-info {
      flex: 1;
    }
    
    .travel-dest {
      font-weight: bold;
    }
    
    .travel-time {
      font-size: 0.8rem;
      color: #666;
    }
    
    .travel-cost {
      font-weight: bold;
      color: #4CAF50;
    }
    
    .travel-btn {
      padding: 5px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
    }
    
    .travel-btn:hover:not(:disabled) {
      background: #45a049;
    }
    
    .travel-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    /* Region Actions */
    .region-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }
    
    .explore-btn {
      background: #2E7D32;
      color: white;
    }
    
    .explore-btn:hover {
      background: #1B5E20;
    }
    
    .crimes-btn {
      background: #f44336;
      color: white;
    }
    
    .jobs-btn {
      background: #2196F3;
      color: white;
    }
    
    /* Player Stats */
    .player-stats {
      background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-around;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      opacity: 0.9;
    }
    
    .stat-value {
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    /* Toast container styles are now in toast.js - removing duplicate */
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2E7D32;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 900px) {
      .exploration-container {
        grid-template-columns: 1fr;
        height: auto;
      }
      
      #map {
        height: 400px;
      }
    }
  </style>
</head>
<body>

<!-- Toast container is created by toast.js, removed static container -->

<h1>🌍 World Map</h1>
<div class="subtitle">Explore regions, discover secrets, and expand your empire</div>

<!-- Player Stats -->
<div class="player-stats" id="playerStats" style="display: none;">
  <div class="stat">
    <div class="stat-label">💰 Cash</div>
    <div class="stat-value" id="playerCash">₹0</div>
  </div>
  <div class="stat">
    <div class="stat-label">⭐ Level</div>
    <div class="stat-value" id="playerLevel">1</div>
  </div>
  <div class="stat">
    <div class="stat-label">🔍 Explored</div>
    <div class="stat-value" id="exploredCount">0/0</div>
  </div>
</div>

<!-- Main Container -->
<div class="exploration-container">
  <!-- Map -->
  <div id="map"></div>
  
  <!-- Info Panel -->
  <div class="info-panel" id="infoPanel">
    <div class="panel-title">📍 Region Info</div>
    <div id="regionDetail" class="region-detail">
      <div style="text-align: center; padding: 20px;">
        <p>Click on a region marker to view details</p>
      </div>
    </div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<!-- Script includes: Supabase library + shared utilities -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="toast.js"></script>
<script src="loading.js"></script>
<script src="error-handler.js"></script>

<script>
// Use the shared supabase client
const sb = window.supabaseClient;

let currentPlayer = null;
let map = null;
let regions = [];
let playerExploration = [];
let discoveries = [];
let connections = [];
let currentRegion = null;
let markers = [];

// Load player data
async function loadPlayerData() {
  try {
    const user = await window.getCurrentUser();
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    
    const player = await window.getCurrentPlayer();
    if (!player) {
      window.showToast('Player not found', 'error');
      return;
    }
    
    currentPlayer = player;
    await loadRegions();
    await loadPlayerExploration();
    await loadConnections();
    updatePlayerStats();
    initMap();
    
  } catch (error) {
    console.error('Error loading player:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Error loading data');
    window.showToast(friendlyMessage, 'error');
  }
}

// Load regions
async function loadRegions() {
  try {
    const { data, error } = await sb
      .from('regions')
      .select('*')
      .order('min_level');
    
    if (error) throw error;
    
    regions = data || [];
  } catch (error) {
    console.error('Error loading regions:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Error loading regions');
    window.showToast(friendlyMessage, 'error');
  }
}

// Load player exploration
async function loadPlayerExploration() {
  try {
    const { data, error } = await sb
      .from('player_exploration')
      .select('*')
      .eq('player_id', currentPlayer.id);
    
    if (error) throw error;
    
    playerExploration = data || [];
    
    // Update explored count
    document.getElementById('exploredCount').textContent = 
      `${playerExploration.length}/${regions.length}`;
  } catch (error) {
    console.error('Error loading exploration:', error);
  }
}

// Load region connections
async function loadConnections() {
  try {
    const { data, error } = await sb
      .from('region_connections')
      .select(`
        *,
        from_region:regions!region_connections_from_region_id_fkey(*),
        to_region:regions!region_connections_to_region_id_fkey(*)
      `);
    
    if (error) throw error;
    
    connections = data || [];
  } catch (error) {
    console.error('Error loading connections:', error);
    window.showToast('Error loading travel connections', 'error');
  }
}

// Update player stats
function updatePlayerStats() {
  document.getElementById('playerStats').style.display = 'flex';
  document.getElementById('playerCash').textContent = `₹${currentPlayer.cash.toLocaleString()}`;
  document.getElementById('playerLevel').textContent = currentPlayer.level;
}

// Initialize map
function initMap() {
  // Set map view to center of all regions (NYC area)
  map = L.map('map').setView([40.7128, -74.0060], 11);
  
  // Add tile layer (OpenStreetMap)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);
  
  // Add region markers
  regions.forEach(region => {
    const coords = region.coordinates;
    const exploration = playerExploration.find(e => e.region_id === region.id);
    const isDiscovered = !!exploration;
    const isLocked = currentPlayer.level < region.min_level;
    
    // Create custom icon
    const icon = L.divIcon({
      className: 'custom-marker',
      html: `<div style="
        background: ${isLocked ? '#ccc' : region.color};
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px solid white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        font-size: 16px;
        opacity: ${isLocked ? 0.5 : 1};
      ">${region.icon}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });
    
    // Create marker
    const marker = L.marker([coords.lat, coords.lng], { 
      icon: icon,
      region: region
    }).addTo(map);
    
    // Add popup
    marker.bindPopup(`
      <b>${region.name}</b><br>
      Level ${region.min_level}+ • Danger: ${region.danger_level}/10<br>
      ${isDiscovered ? `Explored: ${exploration.explored_percent}%` : '🔒 Undiscovered'}
    `);
    
    // Add click handler
    marker.on('click', () => selectRegion(region));
    
    markers.push(marker);
  });
}

// Select region
async function selectRegion(region) {
  currentRegion = region;
  
  // Check if discovered
  const exploration = playerExploration.find(e => e.region_id === region.id);
  const isDiscovered = !!exploration;
  const isLocked = currentPlayer.level < region.min_level;
  
  // Load discoveries for this region
  let regionDiscoveries = [];
  if (isDiscovered) {
    try {
      const { data, error } = await sb
        .from('player_discoveries')
        .select(`
          *,
          discovery:exploration_discoveries(*)
        `)
        .eq('player_id', currentPlayer.id)
        .in('discovery_id', 
          sb.from('exploration_discoveries').select('id').eq('region_id', region.id)
        );
      
      if (error) throw error;
      regionDiscoveries = data || [];
    } catch (error) {
      console.error('Error loading discoveries:', error);
    }
  }
  
  // Get travel options
  const fromHere = connections.filter(c => c.from_region_id === region.id);
  const toHere = connections.filter(c => c.to_region_id === region.id);
  const travelOptions = [...fromHere, ...toHere];
  
  // Render region details
  const detailDiv = document.getElementById('regionDetail');
  
  const dangerClass = region.danger_level <= 3 ? 'danger-low' : 
                      region.danger_level <= 6 ? 'danger-medium' : 'danger-high';
  
  detailDiv.innerHTML = `
    <div class="region-detail active">
      <div class="region-name">${region.name}</div>
      <div class="region-stats">
        <div class="stat-badge">
          <div class="stat-label">Required Level</div>
          <div class="stat-value">${region.min_level}</div>
        </div>
        <div class="stat-badge">
          <div class="stat-label">Danger Level</div>
          <div class="stat-value ${dangerClass}">${region.danger_level}/10</div>
        </div>
        <div class="stat-badge">
          <div class="stat-label">Type</div>
          <div class="stat-value">${region.region_type}</div>
        </div>
        <div class="stat-badge">
          <div class="stat-label">Unlock Cost</div>
          <div class="stat-value">₹${region.unlock_cost?.toLocaleString() || 0}</div>
        </div>
      </div>
      
      <p style="margin: 15px 0;">${region.description}</p>
      
      ${isDiscovered ? `
        <div class="explore-progress">
          <div style="display: flex; justify-content: space-between;">
            <span>Exploration Progress</span>
            <span>${exploration.explored_percent}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${exploration.explored_percent}%"></div>
          </div>
        </div>
        
        ${regionDiscoveries.length > 0 ? `
          <div class="discoveries-list">
            <strong>🔍 Discoveries Found:</strong>
            ${regionDiscoveries.map(d => `
              <div class="discovery-item">
                <div class="discovery-name">${d.discovery.name}</div>
                <div class="discovery-desc">${d.discovery.description}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
        
        <div class="region-actions">
          <button class="action-btn explore-btn" onclick="exploreRegion('${region.id}')">
            🔍 Explore
          </button>
          <button class="action-btn crimes-btn" onclick="goToCrimes('${region.id}')">
            🔫 Crimes
          </button>
          <button class="action-btn jobs-btn" onclick="goToJobs('${region.id}')">
            💼 Jobs
          </button>
        </div>
      ` : isLocked ? `
        <div style="text-align: center; padding: 20px; background: #ffebee; border-radius: 8px;">
          <p>🔒 Need level ${region.min_level} to unlock this region</p>
          ${region.unlock_cost > 0 ? `
            <button class="action-btn explore-btn" style="width:100%;" 
                    onclick="unlockRegion('${region.id}')" 
                    ${currentPlayer.cash < region.unlock_cost ? 'disabled' : ''}>
              Unlock for ₹${region.unlock_cost.toLocaleString()}
            </button>
          ` : ''}
        </div>
      ` : `
        <div style="text-align: center; padding: 20px;">
          <button class="action-btn explore-btn" style="width:100%;" 
                  onclick="discoverRegion('${region.id}')">
            🗺️ Discover Region
          </button>
        </div>
      `}
      
      ${travelOptions.length > 0 ? `
        <div class="travel-options">
          <strong>🚗 Travel Options:</strong>
          ${travelOptions.map(conn => {
            const dest = conn.from_region_id === region.id ? conn.to_region : conn.from_region;
            const destExplored = playerExploration.find(e => e.region_id === dest.id);
            
            return `
              <div class="travel-card">
                <div class="travel-info">
                  <div class="travel-dest">→ ${dest.name}</div>
                  <div class="travel-time">⏱️ ${conn.travel_time_minutes} min</div>
                </div>
                <div class="travel-cost">💰 ₹${conn.travel_cost.toLocaleString()}</div>
                <button class="travel-btn" onclick="travelTo('${conn.id}')"
                        ${currentPlayer.cash < conn.travel_cost || !destExplored ? 'disabled' : ''}>
                  Go
                </button>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}
    </div>
  `;
  
  detailDiv.style.display = 'block';
}

// Discover region
async function discoverRegion(regionId) {
  try {
    const { data, error } = await sb.rpc('discover_region', {
      p_region_id: regionId
    });
    
    if (error) throw error;
    
    if (data.success) {
      window.showToast(data.message, 'success');
      
      if (data.xp_gained > 0) {
        window.showToast(`✨ Gained ${data.xp_gained} XP!`, 'info');
      }
      
      if (data.discoveries && data.discoveries.length > 0) {
        data.discoveries.forEach(d => {
          window.showToast(`🔍 Discovered: ${d}!`, 'discovery');
        });
      }
      
      await loadPlayerExploration();
      await loadPlayerData(); // Refresh player stats
      selectRegion(currentRegion); // Refresh view
    }
  } catch (error) {
    console.error('Error discovering region:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Failed to discover region');
    window.showToast(friendlyMessage, 'error');
  }
}

// Explore region (increase exploration)
async function exploreRegion(regionId) {
  try {
    const { data, error } = await sb.rpc('discover_region', {
      p_region_id: regionId
    });
    
    if (error) throw error;
    
    if (data.success) {
      if (data.xp_gained > 0) {
        window.showToast(`✨ Gained ${data.xp_gained} XP!`, 'info');
      }
      
      if (data.discoveries && data.discoveries.length > 0) {
        data.discoveries.forEach(d => {
          window.showToast(`🔍 Discovered: ${d}!`, 'discovery');
        });
      }
      
      await loadPlayerExploration();
      await loadPlayerData();
      selectRegion(currentRegion);
    }
  } catch (error) {
    console.error('Error exploring region:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Failed to explore');
    window.showToast(friendlyMessage, 'error');
  }
}

// Unlock region (pay unlock cost)
async function unlockRegion(regionId) {
  const region = regions.find(r => r.id === regionId);
  
  if (currentPlayer.cash < region.unlock_cost) {
    window.showToast('Not enough cash!', 'error');
    return;
  }
  
  try {
    const { error } = await sb
      .from('players')
      .update({ cash: currentPlayer.cash - region.unlock_cost })
      .eq('id', currentPlayer.id);
    
    if (error) throw error;
    
    window.showToast(`🔓 Unlocked ${region.name}!`, 'success');
    await loadPlayerData();
    selectRegion(region);
  } catch (error) {
    console.error('Error unlocking region:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Failed to unlock region');
    window.showToast(friendlyMessage, 'error');
  }
}

// Travel to region
async function travelTo(connectionId) {
  const connection = connections.find(c => c.id === connectionId);
  
  if (currentPlayer.cash < connection.travel_cost) {
    window.showToast('Not enough cash for travel!', 'error');
    return;
  }
  
  try {
    // Deduct travel cost
    const { error } = await sb
      .from('players')
      .update({ cash: currentPlayer.cash - connection.travel_cost })
      .eq('id', currentPlayer.id);
    
    if (error) throw error;
    
    // Determine destination
    const dest = connection.from_region_id === currentRegion.id ? 
                 connection.to_region : connection.from_region;
    
    window.showToast(`🚗 Traveling to ${dest.name}...`, 'info', 2000);
    
    setTimeout(async () => {
      await loadPlayerData();
      selectRegion(dest);
      
      // Center map on destination
      map.setView([dest.coordinates.lat, dest.coordinates.lng], 12);
    }, 2000);
    
  } catch (error) {
    console.error('Error traveling:', error);
    const friendlyMessage = window.ErrorHandler.handleSupabaseError(error, 'Travel failed');
    window.showToast(friendlyMessage, 'error');
  }
}

// Navigation helpers
function goToCrimes(regionId) {
  // Store selected region in session storage
  sessionStorage.setItem('selectedRegion', regionId);
  window.location.href = "crime.html";
}

function goToJobs(regionId) {
  sessionStorage.setItem('selectedRegion', regionId);
  window.location.href = "jobs.html";
}

function goToDashboard() {
  window.location.href = "dashboard.html";
}

// Initialize with error handling
window.ErrorHandler.withErrorHandling(
  loadPlayerData,
  null,
  'Failed to load world map'
).catch(() => {});
</script>

</body>
</html>
