<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Crime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 30px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
    }
    
    .crimes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 10px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .crime-card { 
      border: 2px solid black; 
      border-radius: 12px; 
      padding: 20px; 
      background: white;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    
    .crime-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }
    
    .crime-card h3 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      text-align: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 8px;
    }
    
    .crime-details {
      flex-grow: 1;
      margin-bottom: 15px;
    }
    
    .crime-details p {
      margin: 8px 0;
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
    }
    
    .crime-details p span {
      font-weight: bold;
    }
    
    .reward { color: #4CAF50; }
    .penalty { color: #f44336; }
    .energy { color: #2196F3; }
    
    button {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    
    button:hover:not(:disabled) {
      background: #45a049;
      transform: scale(1.02);
    }
    
    button.cooldown {
      background: #ccc;
      color: #666;
      cursor: not-allowed;
      border-color: #999;
    }
    
    .back-button {
      display: block;
      width: 200px;
      margin: 30px auto;
      background: #666;
    }
    
    .back-button:hover {
      background: #555;
    }
    
    #feedback { 
      margin: 20px auto;
      font-weight: bold; 
      text-align: center;
      font-size: 1.2rem;
      padding: 10px;
      max-width: 600px;
    }
    
    #levelUpPopup { 
      display: none; 
      position: fixed; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      background: #fff; 
      padding: 30px; 
      border: 4px solid #9c27b0; 
      border-radius: 15px; 
      font-size: 2rem; 
      font-weight: bold;
      z-index: 1000; 
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: popIn 0.3s ease-out;
    }
    
    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    
    /* Mobile styles */
    @media (max-width: 600px) {
      body { padding: 10px; }
      
      .crimes-grid {
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 5px;
      }
      
      .crime-card {
        padding: 15px;
      }
      
      .crime-card h3 {
        font-size: 1.2rem;
      }
      
      .crime-details p {
        font-size: 0.95rem;
      }
      
      button {
        padding: 15px;
        font-size: 1rem;
      }
      
      .back-button {
        width: 100%;
      }
      
      #levelUpPopup {
        font-size: 1.5rem;
        padding: 20px;
        width: 90%;
      }
    }
    
    /* Loading state */
    .loading {
      text-align: center;
      font-size: 1.2rem;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>

<h1>🔫 Crime Activities</h1>

<div id="crimes" class="crimes-grid">
  <div class="loading">Loading crimes...</div>
</div>

<div id="feedback"></div>
<div id="levelUpPopup">🎉 LEVEL UP! 🎉</div>

<button class="back-button" onclick="goBack()">← Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;
let cooldowns = {};

async function loadCrimes() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href = "index.html";

  let { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { 
    document.getElementById("crimes").innerHTML = '<div class="stat-card">Player not found</div>'; 
    return; 
  }
  player = playerData;

  let { data: crimes } = await sb.from('crimes').select('*');
  if (!crimes || crimes.length === 0) {
    document.getElementById("crimes").innerHTML = '<div class="loading">No crimes available</div>';
    return;
  }

  const crimesDiv = document.getElementById("crimes");
  crimesDiv.innerHTML = "";

  crimes.forEach(c => {
    const cdKey = c.id;
    const remaining = cooldowns[cdKey] ? Math.max(0, 60 - ((Date.now() - cooldowns[cdKey]) / 1000)) : 0;
    const successRate = c.success_rate + (player.success_boost || 0);

    crimesDiv.innerHTML += `
      <div class="crime-card">
        <h3>${c.name}</h3>
        <div class="crime-details">
          <p>🎯 Success Chance <span>${successRate}%</span></p>
          <p>💰 Reward <span class="reward">₹${c.reward_cash.toLocaleString()}</span></p>
          <p>⭐ XP Reward <span class="reward">${c.reward_xp} XP</span></p>
          <p>❌ Fail Penalty <span class="penalty">₹${c.fail_penalty.toLocaleString()}</span></p>
          <p>⚡ Energy Cost <span class="energy">${c.energy_cost}</span></p>
        </div>
        <button id="crimeBtn-${c.id}" 
                onclick="attemptCrime('${c.id}', ${c.success_rate}, ${c.reward_cash}, ${c.reward_xp}, ${c.fail_penalty}, ${c.energy_cost})"
                ${remaining > 0 ? 'disabled class="cooldown"' : ''}>
          ${remaining > 0 ? `⏳ Wait ${Math.ceil(remaining)}s` : '🚀 Attempt Crime'}
        </button>
      </div>
    `;
  });
}

async function attemptCrime(id, baseRate, rewardCash, rewardXP, failPenalty, energyCost) {
  if (!player) return;

  const now = new Date();
  if (player.energy < energyCost) { 
    showFeedback("❌ Not enough energy!", false); 
    return; 
  }

  const finalRate = baseRate + (player.success_boost || 0);
  const success = Math.random() * 100 < finalRate;

  let newCash = player.cash;
  let newXP = player.xp;
  let newEnergy = player.energy - energyCost;

  if (success) {
    newCash += rewardCash;
    newXP += rewardXP;
    showFeedback(`✅ Success! +₹${rewardCash.toLocaleString()}, +${rewardXP} XP`, true);
  } else {
    newCash = Math.max(0, newCash - failPenalty);
    showFeedback(`❌ Failed! Lost ₹${failPenalty.toLocaleString()}`, false);
  }

  const newLevel = Math.floor(Math.sqrt(newXP/100)) + 1;

  await sb.from('players').update({ 
    cash: newCash, 
    xp: newXP, 
    energy: newEnergy, 
    level: newLevel 
  }).eq('id', player.id);
  
  player.cash = newCash; 
  player.xp = newXP; 
  player.energy = newEnergy; 
  player.level = newLevel;

  checkLevelUp(newLevel);

  cooldowns[id] = Date.now();
  const { data: record } = await sb.from('player_crimes')
    .select('*')
    .eq('player_id', player.id)
    .eq('crime_id', id)
    .maybeSingle();
    
  if (record) {
    await sb.from('player_crimes')
      .update({ last_attempt: now })
      .eq('id', record.id);
  } else {
    await sb.from('player_crimes')
      .insert({ player_id: player.id, crime_id: id, last_attempt: now });
  }

  loadCrimes();
}

function showFeedback(msg, success=true) {
  const f = document.getElementById("feedback");
  f.style.color = success ? '#4CAF50' : '#f44336';
  f.innerText = msg;
  f.style.animation = 'none';
  f.offsetHeight;
  f.style.animation = 'popIn 0.3s ease-out';
  setTimeout(() => { f.innerText = ''; }, 4000);
}

function checkLevelUp(newLevel) {
  if (newLevel > player.level) {
    const popup = document.getElementById("levelUpPopup");
    popup.style.display = "block";
    setTimeout(() => popup.style.display = "none", 2500);
  }
}

function goBack() { 
  window.location.href = "dashboard.html"; 
}

setInterval(() => loadCrimes(), 1000);
loadCrimes();
</script>

</body>
</html>
