<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Stock Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #4CAF50;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Portfolio Banner */
    .portfolio-banner {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .portfolio-item {
      text-align: center;
    }
    
    .portfolio-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    
    .portfolio-value {
      font-size: 1.8rem;
      font-weight: bold;
    }
    
    .portfolio-change {
      font-size: 1rem;
    }
    
    .positive { color: #a5d6a5; }
    .negative { color: #ffcdd2; }
    
    /* Transfer Section */
    .transfer-section {
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
    }
    
    .transfer-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #4CAF50;
    }
    
    .transfer-controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .transfer-input-group {
      flex: 1;
      min-width: 200px;
    }
    
    .transfer-label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .transfer-input {
      width: 100%;
      padding: 10px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 8px;
    }
    
    .transfer-btn {
      padding: 10px 20px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    
    .transfer-btn:hover {
      background: #45a049;
    }
    
    /* Market Tabs */
    .market-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      background: #333;
      color: white;
    }
    
    .tab-btn.active {
      background: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }
    
    /* Stocks Grid */
    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stock-card {
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
      padding: 20px;
      transition: transform 0.2s;
    }
    
    .stock-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(76, 175, 80, 0.2);
    }
    
    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .stock-symbol {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .stock-sector {
      background: #f0f0f0;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    
    .stock-name {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: #333;
    }
    
    .stock-price {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    
    .current-price {
      font-size: 2rem;
      font-weight: bold;
    }
    
    .price-change {
      font-size: 1.1rem;
    }
    
    .price-change.positive { color: #4CAF50; }
    .price-change.negative { color: #f44336; }
    
    .stock-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
      padding: 15px 0;
      border-top: 2px solid #eee;
      border-bottom: 2px solid #eee;
    }
    
    .detail-item {
      text-align: center;
    }
    
    .detail-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .detail-value {
      font-weight: bold;
    }
    
    .trade-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .trade-input {
      flex: 1;
      padding: 8px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 5px;
    }
    
    .buy-btn {
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .sell-btn {
      padding: 8px 16px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .buy-btn:hover { background: #45a049; }
    .sell-btn:hover { background: #d32f2f; }
    
    /* Holdings Table */
    .holdings-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .holdings-table th {
      background: #4CAF50;
      color: white;
      padding: 12px;
      font-weight: bold;
    }
    
    .holdings-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    
    .holdings-table tr:hover {
      background: #f5f5f5;
    }
    
    .profit { color: #4CAF50; font-weight: bold; }
    .loss { color: #f44336; font-weight: bold; }
    
    /* Transaction History */
    .history-list {
      max-height: 400px;
      overflow-y: auto;
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
    }
    
    .history-item {
      display: grid;
      grid-template-columns: 100px 80px 1fr 100px;
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      align-items: center;
    }
    
    .history-item.buy { background: #e8f5e8; }
    .history-item.sell { background: #ffebee; }
    
    .history-date {
      color: #666;
      font-size: 0.9rem;
    }
    
    .history-type {
      font-weight: bold;
    }
    
    .history-type.buy { color: #4CAF50; }
    .history-type.sell { color: #f44336; }
    
    .history-details {
      text-align: center;
    }
    
    .history-amount {
      text-align: right;
      font-weight: bold;
    }
    
    /* News Ticker */
    .news-ticker {
      background: #333;
      color: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
    }
    
    .news-content {
      display: inline-block;
      animation: ticker 30s linear infinite;
    }
    
    @keyframes ticker {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    .news-item {
      display: inline-block;
      margin-right: 50px;
    }
    
    .news-impact.positive { color: #4CAF50; }
    .news-impact.negative { color: #f44336; }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    /* Toast Notifications */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    
    .toast {
      padding: 15px 25px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      animation: slideIn 0.3s ease-out;
    }
    
    .toast.success { background: #4CAF50; }
    .toast.error { background: #f44336; }
    .toast.info { background: #2196F3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 600px) {
      .portfolio-banner {
        flex-direction: column;
      }
      
      .history-item {
        grid-template-columns: 80px 60px 1fr 80px;
        font-size: 0.9rem;
      }
      
      .trade-controls {
        flex-direction: column;
      }
      
      .holdings-table {
        font-size: 0.9rem;
      }
      
      .holdings-table th,
      .holdings-table td {
        padding: 8px 4px;
      }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<h1>📈 Stock Market</h1>
<div class="subtitle">Trade stocks and build your investment portfolio</div>

<!-- Portfolio Banner -->
<div class="portfolio-banner" id="portfolioBanner">
  <div class="portfolio-item">
    <div class="portfolio-label">Trading Balance</div>
    <div class="portfolio-value" id="tradingBalance">₹0</div>
  </div>
  <div class="portfolio-item">
    <div class="portfolio-label">Holdings Value</div>
    <div class="portfolio-value" id="holdingsValue">₹0</div>
  </div>
  <div class="portfolio-item">
    <div class="portfolio-label">Total Value</div>
    <div class="portfolio-value" id="totalValue">₹0</div>
  </div>
  <div class="portfolio-item">
    <div class="portfolio-label">P/L</div>
    <div class="portfolio-value" id="totalPL">₹0</div>
    <div class="portfolio-change" id="plPercent"></div>
  </div>
</div>

<!-- Transfer Section -->
<div class="transfer-section">
  <div class="transfer-title">💰 Transfer Funds</div>
  <div class="transfer-controls">
    <div class="transfer-input-group">
      <label class="transfer-label">Amount (₹)</label>
      <input type="number" id="transferAmount" class="transfer-input" min="1" value="1000">
    </div>
    <button class="transfer-btn" onclick="transferToTrading()">↓ To Trading</button>
    <button class="transfer-btn" onclick="transferFromTrading()">↑ To Main</button>
  </div>
</div>

<!-- News Ticker -->
<div class="news-ticker" id="newsTicker">
  <div class="news-content" id="newsContent">
    Loading market news...
  </div>
</div>

<!-- Market Tabs -->
<div class="market-tabs">
  <button class="tab-btn active" onclick="switchTab('stocks')">📊 Stocks</button>
  <button class="tab-btn" onclick="switchTab('holdings')">📋 My Holdings</button>
  <button class="tab-btn" onclick="switchTab('history')">📜 Transaction History</button>
</div>

<!-- Stocks Tab -->
<div id="stocks" class="tab-content" style="display: block;">
  <div class="stocks-grid" id="stocksGrid">
    <div style="text-align: center; grid-column: 1/-1; padding: 40px;">
      <div class="spinner"></div>
      <p>Loading stocks...</p>
    </div>
  </div>
</div>

<!-- Holdings Tab -->
<div id="holdings" class="tab-content" style="display: none;">
  <table class="holdings-table" id="holdingsTable">
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Company</th>
        <th>Shares</th>
        <th>Avg Buy</th>
        <th>Current</th>
        <th>Value</th>
        <th>P/L</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="holdingsBody">
      <tr>
        <td colspan="8" style="text-align: center; padding: 40px;">
          <div class="spinner"></div>
          <p>Loading holdings...</p>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- History Tab -->
<div id="history" class="tab-content" style="display: none;">
  <div class="history-list" id="historyList">
    <div style="text-align: center; padding: 40px;">
      <div class="spinner"></div>
      <p>Loading history...</p>
    </div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;
let stocks = [];
let portfolio = null;
let holdings = [];
let transactions = [];
let news = [];
let refreshInterval = null;

// Toast notification
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('fade-out');
    setTimeout(() => {
      if (toast.parentNode) {
        container.removeChild(toast);
      }
    }, 300);
  }, duration);
}

// Load player data
async function loadPlayerData() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return window.location.href = "index.html";
    
    const { data: player } = await sb
      .from('players')
      .select('*')
      .eq('auth_id', user.id)
      .single();
    
    if (player) {
      currentPlayer = player;
      await loadPortfolio();
      await loadStocks();
      await loadHoldings();
      await loadTransactions();
      await loadNews();
      
      // Refresh every 60 seconds
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        loadStocks();
        loadPortfolio();
        loadHoldings();
      }, 60000);
    }
  } catch (error) {
    console.error('Error loading player:', error);
  }
}

// Load portfolio
async function loadPortfolio() {
  try {
    const { data, error } = await sb.rpc('get_portfolio_summary');
    
    if (error) throw error;
    
    if (data.success) {
      portfolio = data;
      updatePortfolioDisplay();
    }
  } catch (error) {
    console.error('Error loading portfolio:', error);
  }
}

// Load stocks
async function loadStocks() {
  try {
    const { data } = await sb
      .from('stocks')
      .select('*')
      .eq('is_active', true)
      .order('symbol');
    
    stocks = data || [];
    renderStocks();
  } catch (error) {
    console.error('Error loading stocks:', error);
  }
}

// Load holdings
async function loadHoldings() {
  try {
    const { data } = await sb
      .from('player_holdings')
      .select(`
        *,
        stocks!inner (
          symbol,
          company_name,
          current_price,
          sector
        )
      `)
      .eq('player_id', currentPlayer.id);
    
    holdings = data || [];
    renderHoldings();
  } catch (error) {
    console.error('Error loading holdings:', error);
  }
}

// Load transactions
async function loadTransactions() {
  try {
    const { data } = await sb
      .from('stock_transactions')
      .select(`
        *,
        stocks!inner (
          symbol,
          company_name
        )
      `)
      .eq('player_id', currentPlayer.id)
      .order('created_at', { ascending: false })
      .limit(50);
    
    transactions = data || [];
    renderTransactions();
  } catch (error) {
    console.error('Error loading transactions:', error);
  }
}

// Load market news
async function loadNews() {
  try {
    const { data } = await sb
      .from('market_news')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(10);
    
    news = data || [];
    updateNewsTicker();
  } catch (error) {
    console.error('Error loading news:', error);
  }
}

// Update portfolio display
function updatePortfolioDisplay() {
  if (!portfolio) return;
  
  document.getElementById('tradingBalance').textContent = `₹${portfolio.cash_balance.toLocaleString()}`;
  document.getElementById('holdingsValue').textContent = `₹${portfolio.holdings_value.toLocaleString()}`;
  document.getElementById('totalValue').textContent = `₹${portfolio.total_value.toLocaleString()}`;
  
  const pl = portfolio.total_pl;
  const plPercent = portfolio.total_invested > 0 
    ? ((pl / portfolio.total_invested) * 100).toFixed(2)
    : 0;
  
  document.getElementById('totalPL').textContent = `₹${pl.toLocaleString()}`;
  document.getElementById('totalPL').className = pl >= 0 ? 'portfolio-value positive' : 'portfolio-value negative';
  document.getElementById('plPercent').textContent = `${pl >= 0 ? '+' : ''}${plPercent}%`;
  document.getElementById('plPercent').className = pl >= 0 ? 'positive' : 'negative';
}

// Render stocks
function renderStocks() {
  const grid = document.getElementById('stocksGrid');
  
  if (!stocks.length) {
    grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px;">No stocks available</div>';
    return;
  }
  
  grid.innerHTML = stocks.map(stock => {
    const change = stock.current_price - stock.previous_price;
    const changePercent = ((change / stock.previous_price) * 100).toFixed(2);
    const changeClass = change >= 0 ? 'positive' : 'negative';
    const changeSymbol = change >= 0 ? '▲' : '▼';
    
    return `
      <div class="stock-card">
        <div class="stock-header">
          <span class="stock-symbol">${stock.symbol}</span>
          <span class="stock-sector">${stock.sector}</span>
        </div>
        <div class="stock-name">${stock.company_name}</div>
        <div class="stock-price">
          <span class="current-price">₹${stock.current_price.toLocaleString()}</span>
          <span class="price-change ${changeClass}">
            ${changeSymbol} ${Math.abs(change).toLocaleString()} (${changePercent}%)
          </span>
        </div>
        <div class="stock-details">
          <div class="detail-item">
            <div class="detail-label">Volume</div>
            <div class="detail-value">${stock.volume.toLocaleString()}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Dividend</div>
            <div class="detail-value">${stock.dividend_yield}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Day Range</div>
            <div class="detail-value">₹${stock.min_price}-${stock.max_price}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Volatility</div>
            <div class="detail-value">${stock.volatility}x</div>
          </div>
        </div>
        <div class="trade-controls">
          <input type="number" id="buy-${stock.id}" class="trade-input" placeholder="Shares" min="1" value="1">
          <button class="buy-btn" onclick="buyStock('${stock.id}')">Buy</button>
          <button class="sell-btn" onclick="sellStock('${stock.id}')">Sell</button>
        </div>
      </div>
    `;
  }).join('');
}

// Render holdings
function renderHoldings() {
  const tbody = document.getElementById('holdingsBody');
  
  if (!holdings.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">No holdings yet</td></tr>';
    return;
  }
  
  tbody.innerHTML = holdings.map(holding => {
    const currentPrice = holding.stocks.current_price;
    const avgPrice = holding.average_buy_price;
    const shares = holding.shares;
    const totalCost = shares * avgPrice;
    const currentValue = shares * currentPrice;
    const profitLoss = currentValue - totalCost;
    const plPercent = ((currentPrice - avgPrice) / avgPrice * 100).toFixed(2);
    const plClass = profitLoss >= 0 ? 'profit' : 'loss';
    
    return `
      <tr>
        <td><strong>${holding.stocks.symbol}</strong></td>
        <td>${holding.stocks.company_name}</td>
        <td>${shares}</td>
        <td>₹${avgPrice.toLocaleString()}</td>
        <td>₹${currentPrice.toLocaleString()}</td>
        <td>₹${currentValue.toLocaleString()}</td>
        <td class="${plClass}">
          ₹${Math.abs(profitLoss).toLocaleString()} (${plPercent}%)
        </td>
        <td>
          <input type="number" id="sell-${holding.stock_id}" class="trade-input" style="width: 80px;" min="1" max="${shares}" value="1">
          <button class="sell-btn" style="padding: 5px 10px;" onclick="sellStock('${holding.stock_id}')">Sell</button>
        </td>
      </tr>
    `;
  }).join('');
}

// Render transactions
function renderTransactions() {
  const list = document.getElementById('historyList');
  
  if (!transactions.length) {
    list.innerHTML = '<div style="text-align: center; padding: 40px;">No transactions yet</div>';
    return;
  }
  
  list.innerHTML = transactions.map(t => {
    const date = new Date(t.created_at).toLocaleString();
    const typeClass = t.transaction_type;
    
    return `
      <div class="history-item ${typeClass}">
        <div class="history-date">${date}</div>
        <div class="history-type ${typeClass}">${t.transaction_type.toUpperCase()}</div>
        <div class="history-details">
          ${t.shares} shares of ${t.stocks.symbol} @ ₹${t.price_per_share}
        </div>
        <div class="history-amount">₹${t.total_amount.toLocaleString()}</div>
      </div>
    `;
  }).join('');
}

// Update news ticker
function updateNewsTicker() {
  const content = document.getElementById('newsContent');
  
  if (!news.length) {
    content.innerHTML = '<span class="news-item">No market news at this time</span>';
    return;
  }
  
  content.innerHTML = news.map(item => {
    const impactClass = item.impact >= 0 ? 'positive' : 'negative';
    const impactSymbol = item.impact >= 0 ? '▲' : '▼';
    
    return `
      <span class="news-item">
        ${item.title} 
        <span class="news-impact ${impactClass}">
          ${impactSymbol} ${Math.abs(item.impact)}%
        </span>
      </span>
    `;
  }).join(' • ');
}

// Transfer to trading
async function transferToTrading() {
  const amount = parseInt(document.getElementById('transferAmount').value);
  
  if (amount < 1) {
    showToast('Enter a valid amount', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('transfer_to_trading', {
      p_amount: amount
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPortfolio();
      
      // Update main player cash in background
      const { data: player } = await sb
        .from('players')
        .select('cash')
        .eq('id', currentPlayer.id)
        .single();
      
      if (player) {
        currentPlayer.cash = player.cash;
      }
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error transferring:', error);
    showToast('Transfer failed', 'error');
  }
}

// Buy stock
async function buyStock(stockId) {
  const input = document.getElementById(`buy-${stockId}`);
  const shares = parseInt(input.value);
  
  if (shares < 1) {
    showToast('Enter valid share quantity', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('buy_stock', {
      p_stock_id: stockId,
      p_shares: shares
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPortfolio();
      await loadHoldings();
      await loadTransactions();
      
      // Reset input
      input.value = 1;
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error buying stock:', error);
    showToast('Purchase failed', 'error');
  }
}

// Sell stock
async function sellStock(stockId) {
  // Try to get from holdings-specific input first
  let input = document.getElementById(`sell-${stockId}`);
  
  // If not found, try the stock card input
  if (!input) {
    input = document.getElementById(`buy-${stockId}`);
  }
  
  const shares = parseInt(input.value);
  
  if (shares < 1) {
    showToast('Enter valid share quantity', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('sell_stock', {
      p_stock_id: stockId,
      p_shares: shares
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPortfolio();
      await loadHoldings();
      await loadTransactions();
      
      // Reset input
      input.value = 1;
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error selling stock:', error);
    showToast('Sale failed', 'error');
  }
}

// Switch tabs
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.style.display = 'none';
  });
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  document.getElementById(tabName).style.display = 'block';
  event.target.classList.add('active');
}
