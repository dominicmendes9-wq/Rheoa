<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rheoa RPG - Stock Market</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #4CAF50;
      text-shadow: 2px 2px 0 #388E3C;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 2px 2px 0 #388E3C; }
      50% { text-shadow: 4px 4px 0 #388E3C; }
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Portfolio Banner */
    .portfolio-banner {
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      animation: slideInDown 0.6s ease-out;
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }

    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .portfolio-item {
      text-align: center;
      transition: transform 0.2s;
      cursor: pointer;
    }

    .portfolio-item:hover {
      transform: scale(1.1);
    }
    
    .portfolio-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    
    .portfolio-value {
      font-size: 1.8rem;
      font-weight: bold;
    }
    
    .portfolio-change {
      font-size: 1rem;
    }
    
    .positive { color: #a5d6a5; }
    .negative { color: #ffcdd2; }
    
    /* Transfer Section */
    .transfer-section {
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease-out 0.2s both;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .transfer-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #4CAF50;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .transfer-controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .transfer-input-group {
      flex: 1;
      min-width: 250px;
    }
    
    .transfer-label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .transfer-input {
      width: 100%;
      padding: 12px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    .transfer-input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    
    .transfer-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .transfer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
    }
    
    .transfer-btn:last-child {
      background: linear-gradient(135deg, #f44336, #d32f2f);
    }
    
    .transfer-btn:last-child:hover {
      box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
    }
    
    /* Market Tabs */
    .market-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      animation: fadeIn 0.6s ease-out 0.25s both;
    }
    
    .tab-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .tab-btn:hover::after {
      width: 200px;
      height: 200px;
    }
    
    .tab-btn:hover {
      background: #333;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #4CAF50, #388E3C);
      color: white;
      border-color: #4CAF50;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }
    
    /* Stocks Grid */
    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stock-card {
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s;
      animation: cardFadeIn 0.5s ease-out;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .stock-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 30px rgba(76, 175, 80, 0.2);
    }
    
    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .stock-symbol {
      font-size: 1.6rem;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .stock-sector {
      background: #f0f0f0;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    
    .stock-name {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: #333;
    }
    
    .stock-price {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
    }
    
    .current-price {
      font-size: 2.2rem;
      font-weight: bold;
    }
    
    .price-change {
      font-size: 1.2rem;
    }
    
    .price-change.positive { color: #4CAF50; }
    .price-change.negative { color: #f44336; }
    
    .stock-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
      padding: 15px 0;
      border-top: 2px solid #eee;
      border-bottom: 2px solid #eee;
    }
    
    .detail-item {
      text-align: center;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 8px;
      transition: transform 0.2s;
    }

    .detail-item:hover {
      transform: scale(1.05);
      background: #e0e0e0;
    }
    
    .detail-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .detail-value {
      font-weight: bold;
    }
    
    .trade-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .trade-input {
      flex: 1;
      padding: 10px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 8px;
    }

    .trade-input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    
    .buy-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    
    .sell-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #f44336, #d32f2f);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    
    .buy-btn:hover, .sell-btn:hover {
      transform: translateY(-2px);
    }
    
    .buy-btn:hover { box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); }
    .sell-btn:hover { box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4); }
    
    /* Holdings Table */
    .holdings-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .holdings-table th {
      background: linear-gradient(135deg, #4CAF50, #388E3C);
      color: white;
      padding: 15px;
      font-weight: bold;
    }
    
    .holdings-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    
    .holdings-table tr:hover {
      background: #f5f5f5;
    }
    
    .holdings-table tr.current-row {
      background: #e8f5e8;
    }
    
    .profit { color: #4CAF50; font-weight: bold; }
    .loss { color: #f44336; font-weight: bold; }
    
    /* Transaction History */
    .history-list {
      max-height: 500px;
      overflow-y: auto;
      background: white;
      border: 3px solid #4CAF50;
      border-radius: 15px;
    }
    
    .history-item {
      display: grid;
      grid-template-columns: 120px 80px 1fr 120px;
      padding: 15px;
      border-bottom: 1px solid #eee;
      align-items: center;
      transition: all 0.2s;
      cursor: pointer;
    }

    .history-item:hover {
      background: #f5f5f5;
      transform: translateX(5px);
    }
    
    .history-item.buy { background: #e8f5e8; }
    .history-item.sell { background: #ffebee; }
    
    .history-date {
      color: #666;
      font-size: 0.9rem;
    }
    
    .history-type {
      font-weight: bold;
    }
    
    .history-type.buy { color: #4CAF50; }
    .history-type.sell { color: #f44336; }
    
    .history-details {
      text-align: center;
    }
    
    .history-amount {
      text-align: right;
      font-weight: bold;
    }
    
    /* News Ticker */
    .news-ticker {
      background: linear-gradient(135deg, #333, #222);
      color: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
      animation: slideInUp 0.6s ease-out 0.15s both;
    }
    
    .news-content {
      display: inline-block;
      animation: ticker 30s linear infinite;
    }
    
    @keyframes ticker {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    .news-item {
      display: inline-block;
      margin-right: 50px;
    }
    
    .news-impact.positive { color: #4CAF50; }
    .news-impact.negative { color: #f44336; }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .back-button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .back-button:hover::after {
      width: 300px;
      height: 300px;
    }
    
    /* Scroll to top button */
    .scroll-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      display: none;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
      transition: all 0.2s;
      z-index: 1000;
      animation: fadeInScale 0.3s ease-out;
    }

    .scroll-top:hover {
      transform: scale(1.1);
      background: #388E3C;
    }

    .scroll-top.visible {
      display: flex;
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Progress bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #4CAF50, #2196F3, #f44336);
      z-index: 1001;
      transition: width 0.1s;
    }

    /* Realtime status */
    .realtime-status {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 8px 15px;
      background: rgba(0,0,0,0.8);
      color: white;
      border-radius: 30px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9997;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      animation: slideInLeft 0.5s ease-out;
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4CAF50;
      animation: pulse 2s infinite;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .empty-message {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    @media (max-width: 600px) {
      .portfolio-banner {
        flex-direction: column;
      }
      
      .history-item {
        grid-template-columns: 80px 60px 1fr 80px;
        font-size: 0.9rem;
      }
      
      .trade-controls {
        flex-direction: column;
      }
      
      .holdings-table {
        font-size: 0.85rem;
      }
      
      .holdings-table th,
      .holdings-table td {
        padding: 8px 4px;
      }

      .realtime-status {
        bottom: 10px;
        left: 10px;
        padding: 5px 10px;
        font-size: 0.75rem;
      }

      .scroll-top {
        bottom: 10px;
        right: 10px;
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }

    /* Print styles */
    @media print {
      .market-tabs, .back-button, .realtime-status, .scroll-top, .transfer-btn {
        display: none !important;
      }
      
      .stock-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

<!-- Reading progress bar -->
<div class="reading-progress" id="readingProgress"></div>

<!-- Scroll to top button -->
<button class="scroll-top" onclick="scrollToTop()" id="scrollTopBtn" aria-label="Scroll to top">↑</button>

<!-- Realtime Status Indicator -->
<div class="realtime-status" id="realtimeStatus">
  <span class="status-dot"></span>
  <span id="realtimeText">Market Active</span>
</div>

<div class="toast-container" id="toast-container"></div>

<h1>📈 Stock Market</h1>
<div class="subtitle">Trade stocks and build your investment portfolio</div>

<!-- Portfolio Banner -->
<div class="portfolio-banner" id="portfolioBanner">
  <div class="portfolio-item" onclick="showPortfolioDetail('trading')" title="Click for details">
    <div class="portfolio-label">Trading Balance</div>
    <div class="portfolio-value" id="tradingBalance">₹0</div>
  </div>
  <div class="portfolio-item" onclick="showPortfolioDetail('holdings')" title="Click for details">
    <div class="portfolio-label">Holdings Value</div>
    <div class="portfolio-value" id="holdingsValue">₹0</div>
  </div>
  <div class="portfolio-item" onclick="showPortfolioDetail('total')" title="Click for details">
    <div class="portfolio-label">Total Value</div>
    <div class="portfolio-value" id="totalValue">₹0</div>
  </div>
  <div class="portfolio-item" onclick="showPortfolioDetail('pl')" title="Click for details">
    <div class="portfolio-label">P/L</div>
    <div class="portfolio-value" id="totalPL">₹0</div>
    <div class="portfolio-change" id="plPercent"></div>
  </div>
</div>

<!-- Transfer Section -->
<div class="transfer-section">
  <div class="transfer-title">
    <span>💰</span>
    <span>Transfer Funds</span>
  </div>
  <div class="transfer-controls">
    <div class="transfer-input-group">
      <label class="transfer-label">Amount (₹)</label>
      <input type="number" id="transferAmount" class="transfer-input" min="1" value="1000" oninput="updateTransferPreview()">
    </div>
    <button class="transfer-btn" onclick="transferToTrading()" id="transferToBtn">↓ To Trading</button>
    <button class="transfer-btn" onclick="transferFromTrading()" id="transferFromBtn">↑ To Main</button>
  </div>
  <div style="margin-top: 10px; text-align: center; color: #666;" id="transferPreview"></div>
</div>

<!-- News Ticker -->
<div class="news-ticker" id="newsTicker">
  <div class="news-content" id="newsContent">
    Loading market news...
  </div>
</div>

<!-- Market Tabs -->
<div class="market-tabs">
  <button class="tab-btn active" onclick="switchTab('stocks')" id="tabStocks">📊 Stocks</button>
  <button class="tab-btn" onclick="switchTab('holdings')" id="tabHoldings">📋 My Holdings</button>
  <button class="tab-btn" onclick="switchTab('history')" id="tabHistory">📜 Transaction History</button>
</div>

<!-- Stocks Tab -->
<div id="stocks" class="tab-content" style="display: block;">
  <div class="stocks-grid" id="stocksGrid">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading stocks...</p>
    </div>
  </div>
</div>

<!-- Holdings Tab -->
<div id="holdings" class="tab-content" style="display: none;">
  <table class="holdings-table" id="holdingsTable">
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Company</th>
        <th>Shares</th>
        <th>Avg Buy</th>
        <th>Current</th>
        <th>Value</th>
        <th>P/L</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="holdingsBody">
      <tr>
        <td colspan="8" class="empty-message">
          <div class="spinner"></div>
          <p>Loading holdings...</p>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- History Tab -->
<div id="history" class="tab-content" style="display: none;">
  <div class="history-list" id="historyList">
    <div class="empty-message">
      <div class="spinner"></div>
      <p>Loading history...</p>
    </div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<!-- Include shared utilities -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="toast.js"></script>
<script src="loading.js"></script>
<script src="error-handler.js"></script>

<script>
// Initialize Supabase client
const sb = window.supabaseClient;

let currentPlayer = null;
let stocks = [];
let portfolio = null;
let holdings = [];
let transactions = [];
let news = [];
let refreshInterval = null;
let stocksChannel = null;

// Page initialization
document.addEventListener('DOMContentLoaded', async function() {
    await initializePage();
    setupScrollToTop();
    setupReadingProgress();
    setupKeyboardNavigation();
    setupRealtimeSubscription();
});

// Initialize page
async function initializePage() {
    return ErrorHandler.withErrorHandling(async () => {
        // Check authentication
        const user = await getCurrentUser();
        if (!user) {
            showToast('Please log in to access stock market', 'warning', 3000);
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
            return;
        }

        // Load player data
        currentPlayer = await getCurrentPlayer();
        if (!currentPlayer) {
            showToast('Player data not found', 'error');
            return;
        }

        // Load market data
        await Promise.all([
            loadPortfolio(),
            loadStocks(),
            loadHoldings(),
            loadTransactions(),
            loadNews()
        ]);
        
        // Show welcome toast
        showToast('📈 Welcome to the Stock Market!', 'info', 3000);

    }, null, 'Failed to initialize stock market');
}

// Load portfolio
async function loadPortfolio() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb.rpc('get_portfolio_summary');
        
        if (error) throw error;
        
        if (data.success) {
            portfolio = data;
            updatePortfolioDisplay();
        }
    }, null, 'Error loading portfolio');
}

// Load stocks
async function loadStocks() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb
            .from('stocks')
            .select('*')
            .eq('is_active', true)
            .order('symbol');
        
        if (error) throw error;
        
        stocks = data || [];
        renderStocks();
    }, 'stocksGrid', 'Error loading stocks');
}

// Load holdings
async function loadHoldings() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb
            .from('player_holdings')
            .select(`
                *,
                stocks!inner (
                    symbol,
                    company_name,
                    current_price,
                    sector,
                    id
                )
            `)
            .eq('player_id', currentPlayer.id);
        
        if (error) throw error;
        
        holdings = data || [];
        renderHoldings();
    }, 'holdingsBody', 'Error loading holdings');
}

// Load transactions
async function loadTransactions() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb
            .from('stock_transactions')
            .select(`
                *,
                stocks!inner (
                    symbol,
                    company_name
                )
            `)
            .eq('player_id', currentPlayer.id)
            .order('created_at', { ascending: false })
            .limit(50);
        
        if (error) throw error;
        
        transactions = data || [];
        renderTransactions();
    }, 'historyList', 'Error loading transactions');

// Load market news

    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb
            .from('market_news')
            .select('*')
            .order('created_at', { ascending: false })

// Update portfolio display
function updatePortfolioDisplay() {
    if (!portfolio) return;
    
    document.getElementById('tradingBalance').textContent = `₹${portfolio.cash_balance.toLocaleString()}`;
    document.getElementById('holdingsValue').textContent = `₹${portfolio.holdings_value.toLocaleString()}`;
    document.getElementById('totalValue').textContent = `₹${portfolio.total_value.toLocaleString()}`;
    
    const pl = portfolio.total_pl;
    const plPercent = portfolio.total_invested > 0 
        ? ((pl / portfolio.total_invested) * 100).toFixed(2)
        : 0;

    document.getElementById('plPercent').textContent = `${pl >= 0 ? '+' : ''}${plPercent}%`;
    document.getElementById('plPercent').className = pl >= 0 ? 'positive' : 'negative';

// Render stocks
function renderStocks() {
    const grid = document.getElementById('stocksGrid');
    
    if (!stocks.length) {
        grid.innerHTML = '<div class="empty-message">No stocks available</div>';
        return;
    }
    
    grid.innerHTML = stocks.map(stock => {
        const change = stock.current_price - stock.previous_price;
        const changePercent = ((change / stock.previous_price) * 100).toFixed(2);
        const changeClass = change >= 0 ? 'positive' : 'negative';
        const changeSymbol = change >= 0 ? '▲' : '▼';
        
        return `
            <div class="stock-card" onclick="showStockDetails('${stock.id}')">
                <div class="stock-header">
                    <span class="stock-symbol">${stock.symbol}</span>
                    <span class="stock-sector">${stock.sector}</span>
                </div>
                <div class="stock-name">${stock.company_name}</div>
                <div class="stock-price">
                    <span class="current-price">₹${stock.current_price.toLocaleString()}</span>
                    <span class="price-change ${changeClass}">
                        ${changeSymbol} ${Math.abs(change).toLocaleString()} (${changePercent}%)
                    </span>
                </div>
                <div class="stock-details">
                    <div class="detail-item">
                        <div class="detail-label">Volume</div>
                        <div class="detail-value">${stock.volume?.toLocaleString() || '0'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Dividend</div>
                        <div class="detail-value">${stock.dividend_yield || 0}%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Day Range</div>
                        <div class="detail-value">₹${stock.min_price || 0}-${stock.max_price || 0}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Volatility</div>
                        <div class="detail-value">${stock.volatility || 1}x</div>
                    </div>
                </div>
                <div class="trade-controls">
                    <input type="number" id="buy-${stock.id}" class="trade-input" placeholder="Shares" min="1" value="1" onclick="event.stopPropagation()">
                    <button class="buy-btn" onclick="buyStock('${stock.id}'); event.stopPropagation()">Buy</button>
                    <button class="sell-btn" onclick="sellStock('${stock.id}'); event.stopPropagation()">Sell</button>
                </div>
            </div>
        `;
    }).join('');
}

// Show stock details
function showStockDetails(stockId) {
    const stock = stocks.find(s => s.id === stockId);
    if (!stock) return;
    
    showToast(`
        📊 ${stock.symbol} - ${stock.company_name}
        Sector: ${stock.sector}
        Price: ₹${stock.current_price.toLocaleString()}
        Change: ${((stock.current_price - stock.previous_price) / stock.previous_price * 100).toFixed(2)}%
        Volume: ${stock.volume?.toLocaleString() || 'N/A'}
        Dividend: ${stock.dividend_yield || 0}%
    `, 'info', 5000);
}

// Render holdings
function renderHoldings() {
    const tbody = document.getElementById('holdingsBody');
    
    if (!holdings.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-message">No holdings yet. Start trading!</td></tr>';
        return;
    }
    
    tbody.innerHTML = holdings.map((holding, index) => {
        const currentPrice = holding.stocks.current_price;
        const avgPrice = holding.average_buy_price;
        const shares = holding.shares;
        const totalCost = shares * avgPrice;
        const currentValue = shares * currentPrice;
        const profitLoss = currentValue - totalCost;
        const plPercent = ((currentPrice - avgPrice) / avgPrice * 100).toFixed(2);
        const plClass = profitLoss >= 0 ? 'profit' : 'loss';
        
        return `
            <tr class="${index % 2 === 0 ? 'current-row' : ''}" onclick="showHoldingDetails('${holding.stock_id}')">
                <td><strong>${holding.stocks.symbol}</strong></td>
                <td>${holding.stocks.company_name}</td>
                <td>${shares}</td>
                <td>₹${avgPrice.toLocaleString()}</td>
                <td>₹${currentPrice.toLocaleString()}</td>
                <td>₹${currentValue.toLocaleString()}</td>
                <td class="${plClass}">
                    ₹${Math.abs(profitLoss).toLocaleString()} (${plPercent}%)
                </td>
                <td>
                    <input type="number" id="sell-${holding.stock_id}" class="trade-input" style="width: 80px;" min="1" max="${shares}" value="1" onclick="event.stopPropagation()">
                    <button class="sell-btn" style="padding: 5px 10px;" onclick="sellStock('${holding.stock_id}'); event.stopPropagation()">Sell</button>
                </td>
            </tr>
        `;
    }).join('');
}

// Show holding details
function showHoldingDetails(stockId) {
    const holding = holdings.find(h => h.stock_id === stockId);
    if (!holding) return;
    
    const currentPrice = holding.stocks.current_price;
    const profitLoss = (currentPrice - holding.average_buy_price) * holding.shares;
    
    showToast(`
        📋 ${holding.stocks.symbol} Holdings
        Shares: ${holding.shares}
        Avg Price: ₹${holding.average_buy_price.toLocaleString()}
        Current: ₹${currentPrice.toLocaleString()}
        Total Value: ₹${(holding.shares * currentPrice).toLocaleString()}
        P/L: ${profitLoss >= 0 ? '+' : '-'}₹${Math.abs(profitLoss).toLocaleString()}
    `, 'info', 5000);
}

// Render transactions
function renderTransactions() {
    const list = document.getElementById('historyList');
    
    if (!transactions.length) {
        list.innerHTML = '<div class="empty-message">No transactions yet</div>';
        return;
    }
    
    list.innerHTML = transactions.map((t, index) => {
        const date = new Date(t.created_at).toLocaleString();

            <div class="history-item ${typeClass}" onclick="showTransactionDetails(${index})">

                <div class="history-details">

                </div>
                <div class="history-amount">₹${t.total_amount.toLocaleString()}</div>

// Show transaction details
function showTransactionDetails(index) {
    const t = transactions[index];

    showToast(`
        📜 ${t.transaction_type.toUpperCase()} - ${t.stocks.symbol}

// Update news ticker
function updateNewsTicker() {
    const content = document.getElementById('newsContent');
    
    if (!news.length) {
        content.innerHTML = '<span class="news-item">📰 No market news at this time</span>';
        return;
    }
    
    content.innerHTML = news.map(item => {
        const impactClass = item.impact >= 0 ? 'positive' : 'negative';
        const impactSymbol = item.impact >= 0 ? '▲' : '▼';
        
        return `
            <span class="news-item" onclick="showNewsDetails('${item.id}')">
                ${item.title} 
                <span class="news-impact ${impactClass}">
                    ${impactSymbol} ${Math.abs(item.impact)}%
                </span>
            </span>
        `;
    }).join(' • ');

// Show news details
function showNewsDetails(newsId) {
    const item = news.find(n => n.id === newsId);
    if (!item) return;
    
    showToast(`
        📰 ${item.title}
        Impact: ${item.impact >= 0 ? '+' : '-'}${Math.abs(item.impact)}%
        ${item.content || ''}
        Published: ${new Date(item.created_at).toLocaleString()}

}

// Transfer to trading
async function transferToTrading() {
    const amount = parseInt(document.getElementById('transferAmount').value);
    
    if (amount < 1) {
        showToast('Enter a valid amount', 'error');
        return;
    }
    
    if (amount > currentPlayer.cash) {
        showToast(`Insufficient cash. You have ₹${currentPlayer.cash.toLocaleString()}`, 'error');
        return;
    }
    
    const btn = document.getElementById('transferToBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Transferring...';
    
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb.rpc('transfer_to_trading', {
            p_amount: amount
        });
        
        if (error) throw error;
        
        if (data.success) {
            showToast(data.message, 'success');
            await Promise.all([
                loadPortfolio(),
                loadPlayerData() // Refresh main player data
            ]);
            
            // Update current player cash
            const { data: player } = await sb
                .from('players')
                .select('cash')
                .eq('id', currentPlayer.id)
                .single();
            
            if (player) {
                currentPlayer.cash = player.cash;
            }
            
            document.getElementById('transferAmount').value = 1000;
            updateTransferPreview();
        } else {
            showToast(data.error || 'Transfer failed', 'error');
        }
    }, null, 'Error transferring funds').finally(() => {
        btn.disabled = false;
        btn.textContent = '↓ To Trading';
    });
}

// Buy stock
async function buyStock(stockId) {
    const input = document.getElementById(`buy-${stockId}`);
    const shares = parseInt(input.value);
    
    if (shares < 1) {
        showToast('Enter valid share quantity', 'error');
        return;
    }
    
    const stock = stocks.find(s => s.id === stockId);
    if (!stock) return;
    
    const totalCost = shares * stock.current_price;
    
    if (!portfolio || totalCost > portfolio.cash_balance) {
        showToast(`Insufficient trading balance. Need ₹${totalCost.toLocaleString()}`, 'error');
        return;
    }
    
    const btn = input.nextElementSibling;
    btn.disabled = true;
    btn.textContent = '⏳ Buying...';
    
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb.rpc('buy_stock', {
            p_stock_id: stockId,
            p_shares: shares
        });
        
        if (error) throw error;
        
        if (data.success) {
            showToast(data.message, 'success');
            await Promise.all([
                loadPortfolio(),
                loadHoldings(),
                loadTransactions()
            ]);
            
            // Reset input
            input.value = 1;
            
            // Update realtime text
            document.getElementById('realtimeText').textContent = 'Trade executed';
            setTimeout(() => {
                document.getElementById('realtimeText').textContent = 'Market Active';
            }, 2000);
        } else {
            showToast(data.error || 'Purchase failed', 'error');
        }
    }, null, 'Error buying stock').finally(() => {
        btn.disabled = false;
        btn.textContent = 'Buy';
    });
}

// Sell stock
async function sellStock(stockId) {
    // Try to get from holdings-specific input first
    let input = document.getElementById(`sell-${stockId}`);
    
    // If not found, try the stock card input
    if (!input) {
        input = document.getElementById(`buy-${stockId}`);
    }
    
    const shares = parseInt(input.value);
    
    if (shares < 1) {
        showToast('Enter valid share quantity', 'error');
        return;
    }
    
    const holding = holdings.find(h => h.stock_id === stockId);
    if (!holding || shares > holding.shares) {
        showToast(`You only have ${holding?.shares || 0} shares`, 'error');
        return;
    }
    
    const btn = input.nextElementSibling;
    btn.disabled = true;
    btn.textContent = '⏳ Selling...';
    
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb.rpc('sell_stock', {
            p_stock_id: stockId,
            p_shares: shares
        });
        
        if (error) throw error;
        
        if (data.success) {
            showToast(data.message, 'success');
            await Promise.all([
                loadPortfolio(),
                loadHoldings(),
                loadTransactions()
            ]);
            
            // Reset input
            input.value = 1;
            
            // Update realtime text
            document.getElementById('realtimeText').textContent = 'Trade executed';
            setTimeout(() => {
                document.getElementById('realtimeText').textContent = 'Market Active';
            }, 2000);
        } else {
            showToast(data.error || 'Sale failed', 'error');
        }
    }, null, 'Error selling stock').finally(() => {
        btn.disabled = false;
        btn.textContent = 'Sell';
    });
}

// Setup realtime subscription
function setupRealtimeSubscription() {
    if (!currentPlayer) return;
    
    if (stocksChannel) stocksChannel.unsubscribe();
    
    stocksChannel = sb
        .channel('stocks-updates')
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'stocks'
            },
            async () => {
                await loadStocks();
                await loadHoldings(); // Update holdings with new prices
                await loadPortfolio(); // Update portfolio values
                
                document.getElementById('realtimeText').textContent = 'Prices updated';
                setTimeout(() => {
                    document.getElementById('realtimeText').textContent = 'Market Active';
                }, 2000);
            }
        )
        .on(
            'postgres_changes',
            {
                event: 'INSERT',
                schema: 'public',
                table: 'market_news'
            },
            async (payload) => {
                showToast(`📰 ${payload.new.title}`, 'info', 5000);
                await loadNews();
            }
        )
        .subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                document.getElementById('realtimeStatus').style.opacity = '1';
            }
        });
}

// Show portfolio details
function showPortfolioDetail(detail) {
    if (!portfolio) return;
    
    switch(detail) {
        case 'trading':
            showToast(`💰 Trading Balance: ₹${portfolio.cash_balance.toLocaleString()}\nAvailable for trading`, 'info', 4000);
            break;
        case 'holdings':
            showToast(`📊 Holdings Value: ₹${portfolio.holdings_value.toLocaleString()}\nAcross ${holdings.length} stocks`, 'info', 4000);
            break;
        case 'total':
            showToast(`💰 Total Value: ₹${portfolio.total_value.toLocaleString()}\nTrading + Holdings`, 'info', 4000);
            break;
        case 'pl':
            const pl = portfolio.total_pl;
            showToast(`📈 Total P/L: ${pl >= 0 ? '+' : '-'}₹${Math.abs(pl).toLocaleString()}\nSince you started trading`, 'info', 4000);
            break;
    }
}

// Switch tabs
function switchTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.style.display = 'none';
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    document.getElementById(tabName).style.display = 'block';
    document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
    
    // Refresh data when switching tabs
    switch(tabName) {
        case 'holdings':
            loadHoldings();
            break;
        case 'history':
            loadTransactions();
            break;
        case 'stocks':
            loadStocks();
            break;
    }
    
    showToast(`📋 Viewing: ${tabName}`, 'info', 1500);
}

// Navigation
function goToDashboard() {
    showToast('Returning to dashboard...', 'info', 1000);
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 500);
}

// Scroll to top functionality
function setupScrollToTop() {
    const scrollBtn = document.getElementById('scrollTopBtn');
    
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            scrollBtn.classList.add('visible');
        } else {
            scrollBtn.classList.remove('visible');
        }
    });
}

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}

// Reading progress bar
function setupReadingProgress() {
    const progressBar = document.getElementById('readingProgress');
    
    window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        progressBar.style.width = scrolled + '%';
    });
}

// Keyboard navigation
function setupKeyboardNavigation() {
    document.addEventListener('keydown', (e) => {
        // 1-3 for tabs
        if (e.key === '1') {
            e.preventDefault();
            switchTab('stocks');
        } else if (e.key === '2') {
            e.preventDefault();
            switchTab('holdings');
        } else if (e.key === '3') {
            e.preventDefault();
            switchTab('history');
        }
        
        // Ctrl + T for transfer focus
        if (e.ctrlKey && e.key === 't') {
            e.preventDefault();
            document.getElementById('transferAmount').focus();
        }
        
        // R to refresh
        if (e.key === 'r' || e.key === 'R') {
            if (!e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                Promise.all([
                    loadStocks(),
                    loadPortfolio(),
                    loadHoldings(),
                    loadTransactions(),
                    loadNews()
                ]);
                showToast('Refreshing market data...', 'info', 1000);
            }
        }
        
        // Esc to clear inputs
        if (e.key === 'Escape') {
            document.getElementById('transferAmount').value = 1000;
            updateTransferPreview();
        }
    });
}

// Clean up
window.addEventListener('beforeunload', () => {
    if (refreshInterval) clearInterval(refreshInterval);
    if (stocksChannel) stocksChannel.unsubscribe();
});

// Export functions for global use
window.switchTab = switchTab;
window.goToDashboard = goToDashboard;
window.scrollToTop = scrollToTop;
window.transferToTrading = transferToTrading;
window.transferFromTrading = transferFromTrading;
window.buyStock = buyStock;
window.sellStock = sellStock;
window.updateTransferPreview = updateTransferPreview;
window.showPortfolioDetail = showPortfolioDetail;
window.showStockDetails = showStockDetails;
window.showHoldingDetails = showHoldingDetails;
window.showTransactionDetails = showTransactionDetails;
window.showNewsDetails = showNewsDetails;
</script>
