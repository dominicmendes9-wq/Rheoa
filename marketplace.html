<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Marketplace - Rheoa RPG</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .template-card { border: 2px solid #2196F3; border-radius: 10px; padding: 15px; background: white; }
        .preview { margin-bottom: 15px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
        .order-btn { background: #4CAF50; color: white; padding: 8px; border: none; cursor: pointer; width: 100%; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
        .modal textarea, .modal input { width: 100%; margin: 10px 0; padding: 8px; }
        .qr-container { text-align: center; margin: 15px 0; }
        #qrcode { display: inline-block; padding: 10px; background: white; }
        .back-btn { display: block; width: 200px; margin: 30px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
        .category-filter { margin-bottom: 20px; text-align: center; }
        .category-filter select { padding: 8px; font-family: inherit; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 Freelancer Templates</h1>
    <div class="category-filter">
        <label>Category: </label>
        <select id="categorySelect" onchange="filterTemplates()">
            <option value="all">All</option>
            <option value="Menu">Menu</option>
            <option value="Resume">Resume</option>
            <option value="Poster">Poster</option>
            <option value="Brochure">Brochure</option>
        </select>
    </div>
    <div id="templateList" class="template-grid">Loading...</div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <!-- Customization Modal -->
    <div id="customizeModal" class="modal">
        <div class="modal-content">
            <h2>Customize & Order</h2>
            <p>Template: <span id="modalTemplateName"></span></p>
            <p>Base Price: $<span id="modalPrice"></span></p>
            <label>Additional Instructions (optional):</label>
            <textarea id="customInstructions" placeholder="e.g., change colors, add text..."></textarea>
            <button id="proceedBtn" onclick="createOrder()">Proceed to Payment</button>
            <button onclick="closeModal('customizeModal')">Cancel</button>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2>Payment Instructions</h2>
            <p>Amount to send: <strong id="paymentAmount"></strong> USDT</p>
            <p>Send to wallet address:</p>
            <code id="escrowAddress" style="word-break: break-all;"></code>
            <div class="qr-container" id="qrcode"></div>
            <p>After sending, paste the transaction hash below and click Verify.</p>
            <input type="text" id="txHashInput" placeholder="Transaction hash (0x...)" />
            <button onclick="verifyPayment()">Verify Payment</button>
            <div id="paymentStatus"></div>
            <button onclick="closeModal('paymentModal')">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix/qrcode.min.js"></script>
    <script>
        const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let currentTemplate = null;
        let currentOrder = null;

        async function loadTemplates() {
            const { data, error } = await sb.from('freelance_templates').select('*');
            if (error) return console.error(error);
            window.allTemplates = data;
            filterTemplates();
        }

        function filterTemplates() {
            const category = document.getElementById('categorySelect').value;
            const filtered = category === 'all' ? window.allTemplates : window.allTemplates.filter(t => t.category === category);
            renderTemplates(filtered);
        }

        function renderTemplates(templates) {
            const container = document.getElementById('templateList');
            if (!templates.length) {
                container.innerHTML = '<p>No templates found.</p>';
                return;
            }
            container.innerHTML = templates.map(t => `
                <div class="template-card">
                    <div class="preview">${t.design_html || '<img src="' + (t.preview_url || 'https://via.placeholder.com/300x200') + '" style="width:100%;">'}</div>
                    <h3>${t.title}</h3>
                    <p>${t.description || ''}</p>
                    <p>Price: $${t.price} USDT</p>
                    <button class="order-btn" onclick="orderTemplate('${t.id}')">Order & Customize</button>
                </div>
            `).join('');
        }

        async function orderTemplate(templateId) {
            const { data: template, error } = await sb.from('freelance_templates').select('*').eq('id', templateId).single();
            if (error) return alert('Error loading template');
            currentTemplate = template;
            document.getElementById('modalTemplateName').innerText = template.title;
            document.getElementById('modalPrice').innerText = template.price;
            document.getElementById('customInstructions').value = '';
            openModal('customizeModal');
        }

        async function createOrder() {
            const instructions = document.getElementById('customInstructions').value.trim();
            const customization = { instructions };
            let employerWallet = null;
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                    employerWallet = accounts[0];
                } catch (e) { console.warn('Wallet not connected'); }
            }

            const { data, error: rpcError } = await sb.rpc('create_order', {
                p_template_id: currentTemplate.id,
                p_employer_wallet: employerWallet,
                p_customizations: customization
            });
            if (rpcError) return alert('Order failed: ' + rpcError.message);
            if (!data.success) return alert(data.error);

            currentOrder = data;
            closeModal('customizeModal');

            // Show payment modal with QR code
            document.getElementById('paymentAmount').innerText = data.amount;
            document.getElementById('escrowAddress').innerText = data.escrow_wallet;
            // Clear previous QR
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: data.escrow_wallet,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
            document.getElementById('txHashInput').value = '';
            document.getElementById('paymentStatus').innerHTML = '';
            openModal('paymentModal');
        }

        async function verifyPayment() {
            const txHash = document.getElementById('txHashInput').value.trim();
            if (!txHash) {
                document.getElementById('paymentStatus').innerHTML = '<span style="color:red;">Please enter transaction hash.</span>';
                return;
            }
            document.getElementById('paymentStatus').innerHTML = 'Verifying...';
            // Optionally, you could verify the transaction on-chain (simplified)
            // For now, we trust the user input and call the RPC.
            const { data, error } = await sb.rpc('assign_order', {
                p_order_id: currentOrder.order_id,
                p_payment_tx_hash: txHash
            });
            if (error) {
                document.getElementById('paymentStatus').innerHTML = '<span style="color:red;">Error: ' + error.message + '</span>';
                return;
            }
            if (!data.success) {
                document.getElementById('paymentStatus').innerHTML = '<span style="color:red;">' + data.error + '</span>';
                return;
            }
            document.getElementById('paymentStatus').innerHTML = '<span style="color:green;">Payment verified! Order assigned to freelancer.</span>';
            setTimeout(() => {
                closeModal('paymentModal');
                alert('Order assigned. You can track status at /order-status.html?order=' + currentOrder.order_id);
            }, 2000);
        }

        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        loadTemplates();
    </script>
</body>
</html>
