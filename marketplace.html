<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Marketplace - Rheoa RPG</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .template-card { border: 2px solid #2196F3; border-radius: 10px; padding: 15px; background: white; }
        .order-btn { background: #4CAF50; color: white; padding: 8px; border: none; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 500px; border-radius: 10px; }
        .back-btn { display: block; width: 200px; margin: 30px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <h1>📋 Freelancer Templates</h1>
    <div id="templateList" class="template-grid">Loading...</div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2>Complete Payment</h2>
            <p>Template: <span id="modalTemplateName"></span></p>
            <p>Amount: <span id="modalAmount"></span> USDT</p>
            <p>Send exactly this amount to:</p>
            <code id="escrowAddress"></code>
            <p>After payment, click <button id="verifyPayment">Verify Payment</button></p>
            <div id="paymentStatus"></div>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let currentTemplate = null;
        let currentOrder = null;

        // Load templates from freelance_templates
        async function loadTemplates() {
            const { data, error } = await sb.from('freelance_templates').select('*');
            if (error) return console.error(error);
            const container = document.getElementById('templateList');
            container.innerHTML = data.map(t => `
                <div class="template-card">
                    <h3>${t.title}</h3>
                    <p>${t.description || ''}</p>
                    <p>Price: ${t.price} USDT</p>
                    <button class="order-btn" onclick="orderTemplate('${t.id}')">Order & Customize</button>
                </div>
            `).join('');
        }

        async function orderTemplate(templateId) {
            // Get template details
            const { data: template, error } = await sb.from('freelance_templates').select('*').eq('id', templateId).single();
            if (error) return alert('Error loading template');

            // Get employer wallet from MetaMask/Trust Wallet
            let employerWallet = null;
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                    employerWallet = accounts[0];
                } catch (e) { console.warn('Web3 wallet not connected'); }
            }

            // Create order (RPC)
            const { data, error: rpcError } = await sb.rpc('create_order', {
                p_template_id: templateId,
                p_employer_wallet: employerWallet,
                p_customizations: {} // you can add customization UI later
            });
            if (rpcError) return alert('Order failed: ' + rpcError.message);
            if (!data.success) return alert(data.error);

            currentOrder = data;
            currentTemplate = template;

            document.getElementById('modalTemplateName').innerText = template.title;
            document.getElementById('modalAmount').innerText = data.amount;
            document.getElementById('escrowAddress').innerText = data.escrow_wallet;
            document.getElementById('orderModal').style.display = 'block';
        }

        window.verifyPayment = async function() {
            const statusDiv = document.getElementById('paymentStatus');
            statusDiv.innerText = 'Checking payment...';
            const txHash = prompt('Enter the transaction hash (0x...)');
            if (!txHash) return;

            const provider = new ethers.providers.JsonRpcProvider('https://bsc-dataseed.binance.org/');
            try {
                const tx = await provider.getTransaction(txHash);
                if (!tx) throw new Error('Transaction not found');
                if (tx.to.toLowerCase() !== currentOrder.escrow_wallet.toLowerCase()) throw new Error('Wrong recipient');
                if (parseFloat(ethers.utils.formatEther(tx.value)) !== currentOrder.amount) throw new Error('Wrong amount');
                // Wait for confirmations? For simplicity, assume it's confirmed.

                // Notify backend
                const { data, error } = await sb.rpc('assign_order', {
                    p_order_id: currentOrder.order_id,
                    p_payment_tx_hash: txHash
                });
                if (error) throw error;
                if (!data.success) throw new Error(data.error);
                alert('Payment verified! Order assigned to freelancer. Check order status: /order-status.html?order=' + currentOrder.order_id);
                closeModal();
            } catch (err) {
                statusDiv.innerText = 'Error: ' + err.message;
            }
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        loadTemplates();
    </script>
</body>
</html>
