<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Marketplace - Rheoa RPG</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .template-card { border: 2px solid #2196F3; border-radius: 10px; padding: 15px; background: white; }
        .preview { margin-bottom: 15px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
        .order-btn { background: #4CAF50; color: white; padding: 8px; border: none; cursor: pointer; width: 100%; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 600px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
        .modal textarea { width: 100%; height: 100px; margin: 10px 0; }
        .back-btn { display: block; width: 200px; margin: 30px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
        .category-filter { margin-bottom: 20px; text-align: center; }
        .category-filter select { padding: 8px; font-family: inherit; }
    </style>
</head>
<body>
    <h1>📋 Freelancer Templates</h1>
    <div class="category-filter">
        <label>Category: </label>
        <select id="categorySelect" onchange="filterTemplates()">
            <option value="all">All</option>
            <option value="Menu">Menu</option>
            <option value="Resume">Resume</option>
            <option value="Poster">Poster</option>
            <option value="Brochure">Brochure</option>
        </select>
    </div>
    <div id="templateList" class="template-grid">Loading...</div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2>Customize & Order</h2>
            <p>Template: <span id="modalTemplateName"></span></p>
            <p>Base Price: $<span id="modalPrice"></span></p>
            <label>Additional Instructions (optional):</label>
            <textarea id="customInstructions" placeholder="e.g., change colors, add text..."></textarea>
            <button id="proceedBtn" onclick="proceedToPayment()">Proceed to Payment</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let currentTemplate = null;
        let currentOrder = null;

        // Load templates with category filter
        async function loadTemplates() {
            const { data, error } = await sb.from('freelance_templates').select('*');
            if (error) return console.error(error);
            window.allTemplates = data;
            filterTemplates();
        }

        function filterTemplates() {
            const category = document.getElementById('categorySelect').value;
            const filtered = category === 'all' ? window.allTemplates : window.allTemplates.filter(t => t.category === category);
            renderTemplates(filtered);
        }

        function renderTemplates(templates) {
            const container = document.getElementById('templateList');
            if (!templates.length) {
                container.innerHTML = '<p>No templates found.</p>';
                return;
            }
            container.innerHTML = templates.map(t => `
                <div class="template-card">
                    <div class="preview">${t.design_html || '<img src="' + (t.preview_url || 'https://via.placeholder.com/300x200') + '" style="width:100%;">'}</div>
                    <h3>${t.title}</h3>
                    <p>${t.description || ''}</p>
                    <p>Price: $${t.price} USDT</p>
                    <button class="order-btn" onclick="orderTemplate('${t.id}')">Order & Customize</button>
                </div>
            `).join('');
        }

        async function orderTemplate(templateId) {
            const { data: template, error } = await sb.from('freelance_templates').select('*').eq('id', templateId).single();
            if (error) return alert('Error loading template');
            currentTemplate = template;
            document.getElementById('modalTemplateName').innerText = template.title;
            document.getElementById('modalPrice').innerText = template.price;
            document.getElementById('customInstructions').value = '';
            document.getElementById('orderModal').style.display = 'block';
        }

        async function proceedToPayment() {
            const instructions = document.getElementById('customInstructions').value.trim();
            const customization = { instructions }; // you can extend with structured fields later
            let employerWallet = null;
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                    employerWallet = accounts[0];
                } catch (e) { console.warn('Wallet not connected'); }
            }

            const { data, error: rpcError } = await sb.rpc('create_order', {
                p_template_id: currentTemplate.id,
                p_employer_wallet: employerWallet,
                p_customizations: customization
            });
            if (rpcError) return alert('Order failed: ' + rpcError.message);
            if (!data.success) return alert(data.error);

            currentOrder = data;
            alert(`Order created! Please send ${data.amount} USDT to:\n${data.escrow_wallet}\n\nTransaction hash will be verified.`);
            // Optionally, you could show a QR code or redirect to a payment page.
            closeModal();
            // After payment, you'll need to manually verify; for now we rely on user entering hash.
            // In production, you'd listen for the payment event.
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        loadTemplates();
    </script>
</body>
</html>
