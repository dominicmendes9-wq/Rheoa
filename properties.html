<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Properties</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #8B4513;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Player Stats Bar */
    .player-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, #8B4513 0%, #654321 100%);
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .stat-group {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      opacity: 0.9;
    }
    
    .stat-value {
      font-size: 1.3rem;
      font-weight: bold;
    }
    
    /* Property Tabs */
    .property-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      background: #333;
      color: white;
    }
    
    .tab-btn.active {
      background: #8B4513;
      color: white;
      border-color: #8B4513;
    }
    
    /* Property Overview */
    .property-overview {
      background: white;
      border: 3px solid #8B4513;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
    }
    
    .property-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .property-name {
      font-size: 2rem;
      font-weight: bold;
      color: #8B4513;
    }
    
    .property-type {
      background: #8B4513;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 1rem;
    }
    
    .property-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .property-stat-card {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }
    
    .property-stat-label {
      font-size: 0.9rem;
      color: #666;
    }
    
    .property-stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #8B4513;
    }
    
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    
    .progress-fill {
      height: 100%;
      background: #8B4513;
      transition: width 0.3s;
    }
    
    /* Cash Storage Section */
    .cash-storage {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .storage-card {
      flex: 1;
      min-width: 250px;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    
    .storage-amount {
      font-size: 2rem;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .storage-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .storage-input {
      flex: 1;
      padding: 8px;
      font-family: 'Courier New', monospace;
      border: none;
      border-radius: 5px;
    }
    
    .storage-btn {
      padding: 8px 15px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid white;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .storage-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* Upgrades Grid */
    .upgrades-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .upgrade-card {
      background: white;
      border: 2px solid #8B4513;
      border-radius: 10px;
      padding: 20px;
      transition: transform 0.2s;
    }
    
    .upgrade-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(139, 69, 19, 0.2);
    }
    
    .upgrade-card.current {
      border-color: #4CAF50;
      background: #f0fff0;
    }
    
    .upgrade-card.maxed {
      border-color: #f44336;
      background: #ffebee;
    }
    
    .upgrade-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: #8B4513;
      margin-bottom: 10px;
    }
    
    .upgrade-level {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
    }
    
    .level-badge {
      background: #8B4513;
      color: white;
      padding: 3px 10px;
      border-radius: 15px;
      font-size: 0.9rem;
    }
    
    .upgrade-benefit {
      color: #4CAF50;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .upgrade-cost {
      color: #f44336;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .upgrade-btn {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .upgrade-btn:hover:not(:disabled) {
      background: #45a049;
    }
    
    .upgrade-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    /* Features Grid */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .feature-card {
      background: white;
      border: 2px solid #8B4513;
      border-radius: 10px;
      padding: 20px;
      transition: transform 0.2s;
    }
    
    .feature-card.owned {
      border-color: #4CAF50;
      background: #f0fff0;
    }
    
    .feature-icon {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 10px;
    }
    
    .feature-name {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }
    
    .feature-description {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .feature-benefit {
      background: #e8f5e8;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      text-align: center;
      color: #4CAF50;
      font-weight: bold;
    }
    
    .feature-cost {
      color: #f44336;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }
    
    .feature-btn {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .feature-btn.owned {
      background: #9c27b0;
    }
    
    .feature-btn:hover:not(:disabled) {
      background: #45a049;
    }
    
    .feature-btn.owned:hover {
      background: #7b1fa2;
    }
    
    /* Robbery Logs */
    .logs-section {
      background: white;
      border: 3px solid #8B4513;
      border-radius: 15px;
      padding: 20px;
      margin-top: 30px;
    }
    
    .log-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    
    .log-success { color: #4CAF50; }
    .log-failed { color: #f44336; }
    
    /* Market Listings */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .listing-card {
      background: white;
      border: 2px solid #8B4513;
      border-radius: 10px;
      padding: 20px;
    }
    
    .listing-price {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4CAF50;
      margin: 10px 0;
    }
    
    /* Shop Grid */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .shop-card {
      background: white;
      border: 2px solid #8B4513;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    
    .shop-price {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4CAF50;
      margin: 10px 0;
    }
    
    .shop-btn {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .shop-btn:hover:not(:disabled) {
      background: #45a049;
    }
    
    .shop-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    /* Toast Notifications */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    
    .toast {
      padding: 15px 25px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      animation: slideIn 0.3s ease-out;
    }
    
    .toast.success { background: #4CAF50; }
    .toast.error { background: #f44336; }
    .toast.info { background: #2196F3; }
    .toast.warning { background: #ff9800; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #8B4513;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .empty-message {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    @media (max-width: 600px) {
      .player-stats {
        flex-direction: column;
        text-align: center;
      }
      
      .property-tabs {
        flex-direction: column;
      }
      
      .tab-btn {
        width: 100%;
      }
      
      .property-header {
        flex-direction: column;
        text-align: center;
      }
      
      .cash-storage {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<h1>🏰 Player Properties</h1>
<div class="subtitle">Own, upgrade, and protect your criminal empire</div>

<!-- Player Stats -->
<div class="player-stats" id="playerStats" style="display: none;">
  <div class="stat-group">
    <div class="stat">
      <div class="stat-label">💰 Cash</div>
      <div class="stat-value" id="playerCash">₹0</div>
    </div>
    <div class="stat">
      <div class="stat-label">⭐ Level</div>
      <div class="stat-value" id="playerLevel">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">⚡ Energy</div>
      <div class="stat-value" id="playerEnergy">100</div>
    </div>
  </div>
</div>

<!-- Property Tabs -->
<div class="property-tabs">
  <button class="tab-btn active" onclick="switchTab('overview')">🏠 Overview</button>
  <button class="tab-btn" onclick="switchTab('upgrades')">⬆️ Upgrades</button>
  <button class="tab-btn" onclick="switchTab('features')">✨ Features</button>
  <button class="tab-btn" onclick="switchTab('security')">🔒 Security</button>
  <button class="tab-btn" onclick="switchTab('market')">🏪 Market</button>
  <button class="tab-btn" onclick="switchTab('shop')">🛒 Buy Property</button>
</div>

<!-- Overview Tab -->
<div id="overview" class="tab-content" style="display: block;">
  <div id="propertyOverview" class="property-overview">
    <div style="text-align: center; padding: 40px;">
      <div class="spinner"></div>
      <p>Loading property data...</p>
    </div>
  </div>
</div>

<!-- Upgrades Tab -->
<div id="upgrades" class="tab-content" style="display: none;">
  <div class="property-overview">
    <h2 style="margin-bottom: 20px;">⬆️ Property Upgrades</h2>
    <div class="upgrades-grid" id="upgradesGrid"></div>
  </div>
</div>

<!-- Features Tab -->
<div id="features" class="tab-content" style="display: none;">
  <div class="property-overview">
    <h2 style="margin-bottom: 20px;">✨ Special Features</h2>
    <div class="features-grid" id="featuresGrid"></div>
  </div>
</div>

<!-- Security Tab -->
<div id="security" class="tab-content" style="display: none;">
  <div class="property-overview">
    <h2 style="margin-bottom: 20px;">🔒 Security & Robbery Logs</h2>
    <div id="securityContent"></div>
  </div>
</div>

<!-- Market Tab -->
<div id="market" class="tab-content" style="display: none;">
  <div class="property-overview">
    <h2 style="margin-bottom: 20px;">🏪 Property Market</h2>
    <div class="market-grid" id="marketGrid"></div>
  </div>
</div>

<!-- Shop Tab -->
<div id="shop" class="tab-content" style="display: none;">
  <div class="property-overview">
    <h2 style="margin-bottom: 20px;">🛒 Buy Property</h2>
    <div class="shop-grid" id="shopGrid"></div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);
// XSS protection – turns dangerous characters into safe text
function escapeHtml(str) {
    if (!str) return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
let currentPlayer = null;
let playerProperty = null;
let propertyTypes = [];
let propertyUpgrades = [];
let propertyFeatures = [];
let ownedFeatures = [];
let robberyLogs = [];
let propertyListings = [];

// Toast notification
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('fade-out');
    setTimeout(() => {
      if (toast.parentNode) {
        container.removeChild(toast);
      }
    }, 300);
  }, duration);
}

// Load player data
async function loadPlayerData() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    
    const { data: player, error } = await sb
      .from('players')
      .select('*')
      .eq('auth_id', user.id)
      .single();
    
    if (error) throw error;
    
    if (player) {
      currentPlayer = player;
      updatePlayerStats();
      await loadPlayerProperty();
      await loadPropertyTypes();
      await loadPropertyFeatures();
      
      if (playerProperty) {
        await loadPropertyUpgrades();
        await loadOwnedFeatures();
        await loadRobberyLogs();
      }
    }
  } catch (error) {
    console.error('Error loading player:', error);
    showToast('Error loading data', 'error');
  }
}

// Update player stats
function updatePlayerStats() {
  document.getElementById('playerStats').style.display = 'flex';
  document.getElementById('playerCash').textContent = `₹${currentPlayer.cash.toLocaleString()}`;
  document.getElementById('playerLevel').textContent = currentPlayer.level;
  document.getElementById('playerEnergy').textContent = currentPlayer.energy;
}

// Load player property
async function loadPlayerProperty() {
  try {
    // First get the player property without nested join
    const { data: propertyData, error: propertyError } = await sb
      .from('player_properties')
      .select('*')
      .eq('player_id', currentPlayer.id)
      .single();
    
    if (propertyError && propertyError.code !== 'PGRST116') throw propertyError;
    
    if (propertyData) {
      // Now fetch the property type separately
      const { data: typeData, error: typeError } = await sb
        .from('property_types')
        .select('*')
        .eq('id', propertyData.property_type_id)
        .single();
      
      if (typeError) throw typeError;
      
      // Combine into a single object
      playerProperty = {
        ...propertyData,
        property_types: typeData
      };
    } else {
      playerProperty = null;
    }
    
    renderPropertyOverview();
  } catch (error) {
    console.error('Error loading property:', error.message || error);
    showToast('Error loading property data', 'error');
  }
}

// Load property types
async function loadPropertyTypes() {
  try {
    const { data, error } = await sb
      .from('property_types')
      .select('*')
      .order('base_price');
    
    if (error) throw error;
    
    propertyTypes = data || [];
    renderShop();
  } catch (error) {
    console.error('Error loading property types:', error);
  }
}

// Load property upgrades
async function loadPropertyUpgrades() {
  if (!playerProperty) return;
  
  try {
    const { data, error } = await sb
      .from('property_upgrades')
      .select('*')
      .eq('property_type_id', playerProperty.property_type_id)
      .order('upgrade_level');
    
    if (error) throw error;
    
    propertyUpgrades = data || [];
    renderUpgrades();
  } catch (error) {
    console.error('Error loading upgrades:', error);
  }
}

// Load property features
async function loadPropertyFeatures() {
  try {
    const { data, error } = await sb
      .from('property_features')
      .select('*')
      .order('cost');
    
    if (error) throw error;
    
    propertyFeatures = data || [];
  } catch (error) {
    console.error('Error loading features:', error);
  }
}

// Load owned features
async function loadOwnedFeatures() {
  if (!playerProperty) return;
  
  try {
    const { data, error } = await sb
      .from('player_property_features')
      .select('feature_id')
      .eq('property_id', playerProperty.id);
    
    if (error) throw error;
    
    ownedFeatures = data.map(f => f.feature_id) || [];
    renderFeatures();
  } catch (error) {
    console.error('Error loading owned features:', error);
  }
}

// Load robbery logs
async function loadRobberyLogs() {
  if (!playerProperty) return;
  
  try {
    const { data, error } = await sb
      .from('property_robberies')
      .select(`
        *,
        robber:players!property_robberies_robber_id_fkey (username)
      `)
      .eq('target_player_id', currentPlayer.id)
      .order('created_at', { ascending: false })
      .limit(20);
    
    if (error) throw error;
    
    robberyLogs = data || [];
    renderSecurity();
  } catch (error) {
    console.error('Error loading robbery logs:', error);
  }
}

// Render property overview
function renderPropertyOverview() {
  const container = document.getElementById('propertyOverview');
  
  if (!playerProperty) {
    container.innerHTML = `
      <div class="empty-message">
        <p>You don't own a property yet!</p>
        <p>Go to the Shop tab to buy your first property.</p>
      </div>
    `;
    return;
  }
  
  const type = playerProperty.property_types;
  
  if (!type) {
    console.error('Property type missing for property:', playerProperty);
    container.innerHTML = `
      <div class="empty-message">
        <p>Property data is corrupted. Please contact support.</p>
        <p>Property ID: ${playerProperty.id}</p>
      </div>
    `;
    return;
  }
  
  const securityPercent = (playerProperty.security_level / 10) * 100;
  const storagePercent = (playerProperty.storage_capacity / 500) * 100;
  
  container.innerHTML = `
    <div class="property-header">
      <div>
        <span class="property-name">${escapeHtml(playerProperty.property_name || type.name)}</span>
      </div>
      <span class="property-type">${type.property_class}</span>
    </div>
    
    <div class="property-stats-grid">
      <div class="property-stat-card">
        <div class="property-stat-label">Level</div>
        <div class="property-stat-value">${playerProperty.level}/${type.max_level}</div>
      </div>
      <div class="property-stat-card">
        <div class="property-stat-label">Security</div>
        <div class="property-stat-value">${playerProperty.security_level}/10</div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${securityPercent}%"></div></div>
      </div>
      <div class="property-stat-card">
        <div class="property-stat-label">Storage</div>
        <div class="property-stat-value">${playerProperty.storage_capacity} items</div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${storagePercent}%"></div></div>
      </div>
      <div class="property-stat-card">
        <div class="property-stat-label">Rooms</div>
        <div class="property-stat-value">${playerProperty.rooms}</div>
      </div>
    </div>
    
    <div class="cash-storage">
      <div class="storage-card">
        <div>💵 Cash in Property</div>
        <div class="storage-amount">₹${playerProperty.cash_stored.toLocaleString()}</div>
        <div class="storage-controls">
          <input type="number" id="depositAmount" class="storage-input" placeholder="Amount" min="1" value="1000">
          <button class="storage-btn" onclick="depositCash()">Deposit</button>
        </div>
        <div class="storage-controls">
          <input type="number" id="withdrawAmount" class="storage-input" placeholder="Amount" min="1" value="1000">
          <button class="storage-btn" onclick="withdrawCash()">Withdraw</button>
        </div>
      </div>
      
      <div class="storage-card" style="background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);">
        <div>⚡ Robbery Info</div>
        <div style="margin: 10px 0;">
          Last robbed: ${playerProperty.last_robbed_at ? new Date(playerProperty.last_robbed_at).toLocaleString() : 'Never'}
        </div>
        <div>Security Level: ${playerProperty.security_level}/10</div>
        <div>Protection until: ${playerProperty.robbery_protection_until ? new Date(playerProperty.robbery_protection_until).toLocaleString() : 'None'}</div>
      </div>
    </div>
  `;
}

// Render upgrades
function renderUpgrades() {
  const container = document.getElementById('upgradesGrid');
  
  if (!playerProperty || !propertyUpgrades.length) {
    container.innerHTML = '<div class="empty-message">No upgrades available</div>';
    return;
  }
  
  const type = playerProperty.property_types;
  
  if (!type) {
    container.innerHTML = '<div class="empty-message">Property type data missing</div>';
    return;
  }
  
  const currentSecurity = playerProperty.security_level;
  const currentStorage = playerProperty.storage_capacity;
  const currentRooms = playerProperty.rooms;
  
  const securityUpgrades = propertyUpgrades.filter(u => u.upgrade_type === 'security');
  const storageUpgrades = propertyUpgrades.filter(u => u.upgrade_type === 'storage');
  const roomsUpgrades = propertyUpgrades.filter(u => u.upgrade_type === 'rooms');
  
  container.innerHTML = '';
  
  // Security upgrades
  if (securityUpgrades.length) {
    const nextLevel = currentSecurity - type.base_security + 1;
    const currentUpgrade = securityUpgrades.find(u => u.upgrade_level === nextLevel);
    const isMaxed = nextLevel > type.max_level;
    
    container.innerHTML += `
      <div class="upgrade-card ${isMaxed ? 'maxed' : ''}">
        <div class="upgrade-title">🔒 Security System</div>
        <div class="upgrade-level">
          <span>Current: ${currentSecurity}</span>
          <span class="level-badge">Max: 10</span>
        </div>
        ${!isMaxed && currentUpgrade ? `
          <div class="upgrade-benefit">Next: +1 Security (Level ${currentSecurity + 1})</div>
          <div class="upgrade-cost">Cost: ₹${currentUpgrade.cost.toLocaleString()}</div>
          <button class="upgrade-btn" onclick="upgradeProperty('security')" 
                  ${currentPlayer.cash < currentUpgrade.cost ? 'disabled' : ''}>
            Upgrade Security
          </button>
        ` : '<div class="upgrade-benefit">Maximum Level Reached</div>'}
      </div>
    `;
  }
  
  // Storage upgrades
  if (storageUpgrades.length) {
    const nextLevel = (currentStorage - type.base_capacity) / 50 + 1;
    const currentUpgrade = storageUpgrades.find(u => u.upgrade_level === nextLevel);
    const isMaxed = nextLevel > type.max_level;
    
    container.innerHTML += `
      <div class="upgrade-card ${isMaxed ? 'maxed' : ''}">
        <div class="upgrade-title">📦 Storage Expansion</div>
        <div class="upgrade-level">
          <span>Current: ${currentStorage}</span>
          <span class="level-badge">Max: ${type.base_capacity + (type.max_level-1)*50}</span>
        </div>
        ${!isMaxed && currentUpgrade ? `
          <div class="upgrade-benefit">Next: +${currentUpgrade.benefit_value} Storage</div>
          <div class="upgrade-cost">Cost: ₹${currentUpgrade.cost.toLocaleString()}</div>
          <button class="upgrade-btn" onclick="upgradeProperty('storage')"
                  ${currentPlayer.cash < currentUpgrade.cost ? 'disabled' : ''}>
            Upgrade Storage
          </button>
        ` : '<div class="upgrade-benefit">Maximum Level Reached</div>'}
      </div>
    `;
  }
  
  // Rooms upgrades
  if (roomsUpgrades.length) {
    const nextLevel = currentRooms - type.base_rooms + 1;
    const currentUpgrade = roomsUpgrades.find(u => u.upgrade_level === nextLevel);
    const isMaxed = nextLevel > type.max_level;
    
    container.innerHTML += `
      <div class="upgrade-card ${isMaxed ? 'maxed' : ''}">
        <div class="upgrade-title">🏠 Extra Rooms</div>
        <div class="upgrade-level">
          <span>Current: ${currentRooms}</span>
          <span class="level-badge">Max: ${type.base_rooms + (type.max_level-1)}</span>
        </div>
        ${!isMaxed && currentUpgrade ? `
          <div class="upgrade-benefit">Next: +1 Room</div>
          <div class="upgrade-cost">Cost: ₹${currentUpgrade.cost.toLocaleString()}</div>
          <button class="upgrade-btn" onclick="upgradeProperty('rooms')"
                  ${currentPlayer.cash < currentUpgrade.cost ? 'disabled' : ''}>
            Add Room
          </button>
        ` : '<div class="upgrade-benefit">Maximum Level Reached</div>'}
      </div>
    `;
  }
}

// Render features
function renderFeatures() {
  const container = document.getElementById('featuresGrid');
  
  if (!propertyFeatures.length) {
    container.innerHTML = '<div class="empty-message">No features available</div>';
    return;
  }
  
  container.innerHTML = propertyFeatures.map(feature => {
    const isOwned = ownedFeatures.includes(feature.id);
    const canAfford = currentPlayer.cash >= feature.cost;
    const meetsLevel = currentPlayer.level >= feature.required_level;
    
    return `
      <div class="feature-card ${isOwned ? 'owned' : ''}">
        <div class="feature-icon">${feature.icon || '✨'}</div>
        <div class="feature-name">${feature.name}</div>
        <div class="feature-description">${feature.description}</div>
        <div class="feature-benefit">${feature.benefit}</div>
        <div class="feature-cost">Cost: ₹${feature.cost.toLocaleString()}</div>
        <div>Required Level: ${feature.required_level}</div>
        <button class="feature-btn ${isOwned ? 'owned' : ''}" 
                onclick="${isOwned ? '#' : `purchaseFeature('${feature.id}')`}"
                ${isOwned ? 'disabled' : (!meetsLevel || !canAfford || !playerProperty ? 'disabled' : '')}>
          ${isOwned ? '✓ Owned' : 'Purchase'}
        </button>
      </div>
    `;
  }).join('');
}

// Render security
function renderSecurity() {
  const container = document.getElementById('securityContent');
  
  if (!robberyLogs.length) {
    container.innerHTML = '<div class="empty-message">No robbery attempts recorded</div>';
    return;
  }
  
  container.innerHTML = `
    <h3 style="margin-bottom: 15px;">Recent Robbery Attempts</h3>
    ${robberyLogs.map(log => `
      <div class="log-item">
        <span>${new Date(log.created_at).toLocaleString()}</span>
        <span class="log-${log.outcome}">${log.outcome.toUpperCase()}</span>
<span>by ${escapeHtml(log.robber?.username || 'Unknown')}</span>        <span>${log.outcome === 'success' ? `Lost ₹${log.loot_amount}` : 'Failed'}</span>
      </div>
    `).join('')}
  `;
}

// Render shop
function renderShop() {
  const container = document.getElementById('shopGrid');
  
  if (playerProperty) {
    container.innerHTML = `
      <div class="empty-message">
        <p>You already own a property!</p>
        <p>You must sell your current property before buying a new one.</p>
      </div>
    `;
    return;
  }
  
  if (!propertyTypes.length) {
    container.innerHTML = '<div class="empty-message">No properties available</div>';
    return;
  }
  
  container.innerHTML = propertyTypes.map(type => {
    const canAfford = currentPlayer.cash >= type.base_price;
    const meetsLevel = currentPlayer.level >= type.min_level;
    
    return `
      <div class="shop-card">
        <div class="feature-icon">${type.icon || '🏠'}</div>
        <h3>${type.name}</h3>
        <p>${type.description || ''}</p>
        <div class="property-stats-grid" style="margin: 15px 0;">
          <div>Security: ${type.base_security}/10</div>
          <div>Storage: ${type.base_capacity}</div>
          <div>Rooms: ${type.base_rooms}</div>
          <div>Max Level: ${type.max_level}</div>
        </div>
        <div class="shop-price">₹${type.base_price.toLocaleString()}</div>
        <div>Required Level: ${type.min_level}</div>
        <button class="shop-btn" onclick="buyProperty('${type.id}')"
                ${!meetsLevel || !canAfford ? 'disabled' : ''}>
          ${!meetsLevel ? 'Level ' + type.min_level + ' Required' : 
            !canAfford ? 'Cannot Afford' : 'Buy Now'}
        </button>
      </div>
    `;
  }).join('');
}

// Buy property
async function buyProperty(propertyTypeId) {
  const propertyName = prompt('Give your property a name (optional):', '');
  
  try {
    const { data, error } = await sb.rpc('buy_property', {
      p_property_type_id: propertyTypeId,
      p_property_name: propertyName || null
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPlayerData();
      switchTab('overview');
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error buying property:', error);
    showToast('Failed to buy property', 'error');
  }
}

// Upgrade property
async function upgradeProperty(upgradeType) {
  try {
    const { data, error } = await sb.rpc('upgrade_property', {
      p_upgrade_type: upgradeType
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPlayerData();
      await loadPlayerProperty();
      await loadPropertyUpgrades();
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error upgrading property:', error);
    showToast('Failed to upgrade', 'error');
  }
}

// Purchase feature
async function purchaseFeature(featureId) {
  try {
    const { data, error } = await sb.rpc('purchase_property_feature', {
      p_feature_id: featureId
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPlayerData();
      await loadOwnedFeatures();
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error purchasing feature:', error);
    showToast('Failed to purchase feature', 'error');
  }
}

// Deposit cash
async function depositCash() {
  const amount = parseInt(document.getElementById('depositAmount').value);
  
  if (amount < 1) {
    showToast('Enter a valid amount', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('store_cash_in_property', {
      p_amount: amount
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPlayerData();
      await loadPlayerProperty();
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error depositing cash:', error);
    showToast('Failed to deposit cash', 'error');
  }
}

// Withdraw cash
async function withdrawCash() {
  const amount = parseInt(document.getElementById('withdrawAmount').value);
  
  if (amount < 1) {
    showToast('Enter a valid amount', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('withdraw_cash_from_property', {
      p_amount: amount
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(data.message, 'success');
      await loadPlayerData();
      await loadPlayerProperty();
    } else {
      showToast(data.error, 'error');
    }
  } catch (error) {
    console.error('Error withdrawing cash:', error);
    showToast('Failed to withdraw cash', 'error');
  }
}

// Switch tabs
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.style.display = 'none';
  });
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  document.getElementById(tabName).style.display = 'block';
  event.target.classList.add('active');
}

// Navigation
function goToDashboard() {
  window.location.href = "dashboard.html";
}

// Initialize
loadPlayerData();
</script>
