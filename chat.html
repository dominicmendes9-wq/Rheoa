<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e1e2f;
            color: #eee;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #2d2d44;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .header {
            background: #3b3b5a;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4a4a6a;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .online-badge {
            background: #2ecc71;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }
        .message.self {
            align-self: flex-end;
        }
        .message .sender {
            font-size: 0.75rem;
            font-weight: 600;
            color: #a0aec0;
            margin-bottom: 2px;
        }
        .message.self .sender {
            color: #63b3ed;
        }
        .message .bubble {
            background: #3d3d5c;
            padding: 8px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.self .bubble {
            background: #4a6fa5;
        }
        .message .time {
            font-size: 0.65rem;
            color: #718096;
            margin-top: 2px;
        }
        .input-area {
            padding: 16px 24px;
            background: #25253b;
            border-top: 1px solid #3b3b5a;
            display: flex;
            gap: 12px;
        }
        #messageInput {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background: #3d3d5c;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
        }
        #messageInput::placeholder {
            color: #8888aa;
        }
        #sendBtn {
            padding: 10px 24px;
            background: #4a6fa5;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        #sendBtn:hover {
            background: #5a7fb5;
        }
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .online-users {
            padding: 8px 24px;
            background: #22223a;
            border-bottom: 1px solid #3b3b5a;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            min-height: 44px;
        }
        .online-user {
            background: #3b3b5a;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .online-user .dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
        }
        .empty-online {
            color: #718096;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <h1>🌍 Global Chat</h1>
            <span class="online-badge" id="onlineCount">0 online</span>
        </div>

        <div class="online-users" id="onlineUsersList">
            <span class="empty-online">Loading online users...</span>
        </div>

        <div class="messages" id="messagesArea">
            <div style="text-align:center; color:#718096;">Loading messages...</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." />
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        // ─── Supabase client ──────────────────────────────────
        const sb = window.supabase.createClient(
            "https://mtiwodvsrwvrujbhmmrn.supabase.co",
            "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
        );

        // ─── State ────────────────────────────────────────────
        let currentPlayer = null;   // { id, username }
        let currentRoom = null;     // { id, name }
        let messages = [];
        let onlineUsers = [];
        let presenceChannel = null;
        let messageChannel = null;

        // ─── DOM refs ─────────────────────────────────────────
        const messagesArea = document.getElementById('messagesArea');
        const onlineUsersList = document.getElementById('onlineUsersList');
        const onlineCount = document.getElementById('onlineCount');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // ─── Helpers ──────────────────────────────────────────
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(iso) {
            return new Date(iso).toLocaleTimeString();
        }

        // ─── Auth & player ────────────────────────────────────
        async function getOrCreatePlayer() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                // Not signed in – redirect to sign-in page (or auto-sign-in)
                // For demo, we'll auto sign in anonymously (if you have it enabled)
                // Otherwise you need a login flow.
                // We'll try to sign in anonymously for simplicity.
                const { data, error } = await sb.auth.signInAnonymously();
                if (error) {
                    alert('Please sign in first.');
                    window.location.href = 'index.html';
                    return null;
                }
                // After sign-in, reload to get user
                window.location.reload();
                return null;
            }

            // Check if player exists
            let { data: player, error } = await sb
                .from('players')
                .select('*')
                .eq('auth_id', user.id)
                .maybeSingle();

            if (error) {
                console.error('Error fetching player:', error);
                return null;
            }

            if (!player) {
                // Create player with a random username
                const adjectives = ['Happy', 'Clever', 'Brave', 'Kind', 'Swift'];
                const nouns = ['Panda', 'Tiger', 'Eagle', 'Fox', 'Wolf'];
                const username = `${adjectives[Math.floor(Math.random() * adjectives.length)]}${
                    nouns[Math.floor(Math.random() * nouns.length)]
                }${Math.floor(Math.random() * 1000)}`;
                const { data: newPlayer, error: insertError } = await sb
                    .from('players')
                    .insert({ auth_id: user.id, username })
                    .select('*')
                    .single();
                if (insertError) {
                    console.error('Error creating player:', insertError);
                    return null;
                }
                player = newPlayer;
            }
            return player;
        }

        // ─── Load global room ─────────────────────────────────
        async function getGlobalRoom() {
            const { data, error } = await sb
                .from('chat_rooms')
                .select('*')
                .eq('name', 'Global Chat')
                .maybeSingle();

            if (error) {
                console.error('Error fetching room:', error);
                return null;
            }
            if (!data) {
                // Room not found – create it (but should already exist from SQL setup)
                const { data: newRoom, error: createError } = await sb
                    .from('chat_rooms')
                    .insert({ name: 'Global Chat' })
                    .select('*')
                    .single();
                if (createError) {
                    console.error('Error creating room:', createError);
                    return null;
                }
                return newRoom;
            }
            return data;
        }

        // ─── Load messages ────────────────────────────────────
        async function loadMessages() {
            if (!currentRoom) return;
            const { data, error } = await sb
                .from('chat_messages')
                .select(`
                    id, content, created_at,
                    user_id,
                    players:user_id (username)
                `)
                .eq('room_id', currentRoom.id)
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Error loading messages:', error);
                return;
            }
            messages = (data || []).map(msg => ({
                ...msg,
                username: msg.players?.[0]?.username || 'Unknown'
            }));
            renderMessages();
        }

        function renderMessages() {
            if (!messages.length) {
                messagesArea.innerHTML = '<div style="text-align:center; color:#718096;">No messages yet. Be the first!</div>';
                return;
            }
            const pid = currentPlayer?.id;
            messagesArea.innerHTML = messages.map(msg => {
                const isSelf = msg.user_id === pid;
                return `
                    <div class="message ${isSelf ? 'self' : ''}">
                        <div class="sender">${escapeHtml(msg.username)}</div>
                        <div class="bubble">${escapeHtml(msg.content)}</div>
                        <div class="time">${formatTime(msg.created_at)}</div>
                    </div>
                `;
            }).join('');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // ─── Presence ─────────────────────────────────────────
        const PRESENCE_CHANNEL = 'global-presence';

        function setupPresence() {
            if (presenceChannel) return;

            presenceChannel = sb.channel(PRESENCE_CHANNEL);

            presenceChannel.on('presence', { event: 'sync' }, () => {
                const state = presenceChannel.presenceState();
                const list = [];
                Object.keys(state).forEach(key => {
                    list.push(...state[key]);
                });
                onlineUsers = list;
                renderOnlineUsers();
                onlineCount.textContent = onlineUsers.length + ' online';
            });

            presenceChannel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await updatePresence();
                }
            });
        }

        async function updatePresence() {
            if (!presenceChannel || !currentPlayer || !currentRoom) return;
            await presenceChannel.track({
                user_id: currentPlayer.id,
                username: currentPlayer.username,
                room_id: currentRoom.id,
            });
        }

        function renderOnlineUsers() {
            if (!onlineUsers.length) {
                onlineUsersList.innerHTML = '<span class="empty-online">No one else is online.</span>';
                return;
            }
            onlineUsersList.innerHTML = onlineUsers.map(user => `
                <span class="online-user">
                    <span class="dot"></span>
                    ${escapeHtml(user.username)}
                </span>
            `).join('');
        }

        // ─── Message broadcast ───────────────────────────────
        function setupMessageBroadcast() {
            if (!currentRoom) return;
            if (messageChannel) {
                messageChannel.unsubscribe();
                messageChannel = null;
            }

            const roomId = currentRoom.id;
            messageChannel = sb.channel(`room-${roomId}`);

            messageChannel.on('broadcast', { event: 'message' }, (payload) => {
                const newMsg = payload.payload;
                // Avoid duplicate if already in list (optimistic)
                if (!messages.some(m => m.id === newMsg.id)) {
                    messages.push(newMsg);
                    renderMessages();
                }
            });

            messageChannel.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('Subscribed to message channel');
                }
            });
        }

        // ─── Send message ─────────────────────────────────────
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentRoom || !currentPlayer) return;

            // Optimistic update
            const tempId = 'temp-' + Date.now();
            const newMsg = {
                id: tempId,
                content: text,
                created_at: new Date().toISOString(),
                user_id: currentPlayer.id,
                username: currentPlayer.username,
            };
            messages.push(newMsg);
            renderMessages();
            messageInput.value = '';

            // Broadcast
            if (messageChannel) {
                await messageChannel.send({
                    type: 'broadcast',
                    event: 'message',
                    payload: newMsg,
                });
            }

            // Persist to DB
            const { error } = await sb
                .from('chat_messages')
                .insert({
                    room_id: currentRoom.id,
                    user_id: currentPlayer.id,
                    content: text,
                });

            if (error) {
                console.error('Failed to persist message:', error);
                // Optionally revert optimistic message
            }
        }

        // ─── Init ─────────────────────────────────────────────
        (async function init() {
            // 1. Get or create player
            const player = await getOrCreatePlayer();
            if (!player) return;
            currentPlayer = player;

            // 2. Get global room
            const room = await getGlobalRoom();
            if (!room) {
                alert('Could not find or create global room.');
                return;
            }
            currentRoom = room;

            // 3. Load messages
            await loadMessages();

            // 4. Setup presence
            setupPresence();

            // 5. Setup message broadcast
            setupMessageBroadcast();

            // 6. Update presence after everything is ready
            await updatePresence();

            // 7. Enable UI
            messageInput.disabled = false;
            sendBtn.disabled = false;

            // 8. Event listeners
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        })();
    </script>
</body>
</html>
