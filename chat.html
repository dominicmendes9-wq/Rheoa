<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatroom - Rheoa RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #f8f8f0;
            color: #222;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0; /* important for flex children scrolling */
        }

        /* Rooms Sidebar */
        .rooms-sidebar {
            width: 260px;
            background: white;
            border: 2px solid #2196F3;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .rooms-header {
            background: #2196F3;
            color: white;
            padding: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .create-room-btn {
            background: #ff9800;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .rooms-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .room-item {
            padding: 8px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            background: #f5f5f5;
            transition: background 0.2s;
        }

        .room-item:hover {
            background: #e3f2fd;
        }

        .room-item.active {
            background: #2196F3;
            color: white;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border: 2px solid #2196F3;
            border-radius: 10px;
            overflow: hidden;
        }

        .chat-header {
            background: #2196F3;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-info {
            font-weight: bold;
        }

        .member-count {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message.own {
            align-self: flex-end;
        }

        .message-header {
            font-size: 0.8rem;
            color: #666;
            display: flex;
            gap: 10px;
            align-items: baseline;
        }

        .message-username {
            font-weight: bold;
            color: #2196F3;
        }

        .message-time {
            font-size: 0.7rem;
        }

        .message-text {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 4px;
            word-wrap: break-word;
        }

        .message.own .message-text {
            background: #2196F3;
            color: white;
        }

        .message-input-area {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            font-family: inherit;
            border: 2px solid #ddd;
            border-radius: 5px;
            resize: none;
        }

        #sendBtn {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Members Sidebar */
        .members-sidebar {
            width: 260px;
            background: white;
            border: 2px solid #2196F3;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .members-header {
            background: #2196F3;
            color: white;
            padding: 10px;
            font-weight: bold;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .member-item {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            background: #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .member-name {
            font-weight: bold;
        }

        .member-role {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            background: #ddd;
        }

        .member-role.admin { background: #f44336; color: white; }
        .member-role.operator { background: #ff9800; color: white; }

        .member-actions button {
            margin-left: 5px;
            padding: 2px 5px;
            font-size: 0.7rem;
            cursor: pointer;
            border: none;
            border-radius: 3px;
        }

        .kick-btn { background: #f44336; color: white; }
        .ban-btn { background: #9c27b0; color: white; }
        .promote-btn { background: #4CAF50; color: white; }
        .demote-btn { background: #ff9800; color: white; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }
        .modal input, .modal textarea {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
        .modal button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
        }
        .back-button {
            margin-top: 20px;
            text-align: center;
        }
        .back-button a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Rooms Sidebar -->
        <div class="rooms-sidebar">
            <div class="rooms-header">
                <span>📁 Rooms</span>
                <button class="create-room-btn" onclick="showCreateRoomModal()">+ New</button>
            </div>
            <div class="rooms-list" id="roomsList">
                <div class="loading">Loading rooms...</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="room-info" id="currentRoomName">Select a room</div>
                <div class="member-count" id="memberCount">0 members</div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="loading">Select a room to start chatting</div>
            </div>
            <div class="message-input-area">
                <textarea id="messageInput" placeholder="Type your message..." rows="2" disabled></textarea>
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>

        <!-- Members Sidebar -->
        <div class="members-sidebar">
            <div class="members-header">👥 Members</div>
            <div class="members-list" id="membersList">
                <div class="loading">Select a room</div>
            </div>
        </div>
    </div>

    <div class="back-button">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

    <!-- Create Room Modal -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h3>Create New Channel</h3>
            <input type="text" id="roomName" placeholder="Channel Name">
            <textarea id="roomDescription" placeholder="Description (optional)" rows="3"></textarea>
            <button onclick="createRoom()">Create</button>
            <button onclick="closeModal('createRoomModal')">Cancel</button>
        </div>
    </div>

    <!-- Ban Modal -->
    <div id="banModal" class="modal">
        <div class="modal-content">
            <h3>Ban User</h3>
            <p id="banUserName"></p>
            <input type="text" id="banReason" placeholder="Reason (optional)">
            <select id="banDuration">
                <option value="24">24 hours</option>
                <option value="168">7 days</option>
                <option value="720">30 days</option>
                <option value="0">Permanent</option>
            </select>
            <button onclick="confirmBan()">Ban</button>
            <button onclick="closeModal('banModal')">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const sb = window.supabase.createClient(
            "https://mtiwodvsrwvrujbhmmrn.supabase.co",
            "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
        );

        let currentPlayer = null;
        let currentRoom = null;
        let rooms = [];
        let members = [];
        let messagesSubscription = null;
        let currentMessages = [];

        // Helper to get player's UUID from auth
        async function getPlayerId() {
            if (currentPlayer) return currentPlayer.id;
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return null;
            const { data: player } = await sb.from('players').select('id').eq('auth_id', user.id).single();
            if (player) currentPlayer = player;
            return player?.id;
        }

        // Load rooms the user is member of
       async function loadRooms() {
    const playerId = await getPlayerId();
    if (!playerId) return;

    // Fetch all active rooms with a left join to memberships
    const { data: roomsData, error } = await sb
        .from('chat_rooms')
        .select(`
            id, name, description, type,
            chat_room_members!left(role, user_id)
        `)
        .eq('is_active', true);

    if (error) {
        console.error('Error loading rooms:', error);
        return;
    }

    // Keep global room always; keep channels only if user is a member
    const visibleRooms = roomsData.filter(room => {
        if (room.type === 'global') return true;
        // For channels, user must have a membership row
        return room.chat_room_members.some(m => m.user_id === playerId);
    });

    rooms = visibleRooms.map(room => ({
        ...room,
        role: room.chat_room_members.find(m => m.user_id === playerId)?.role || null
    }));

    renderRooms();

    // If no room is selected and we have a global room, select it automatically
    if (!currentRoom && rooms.length) {
        const globalRoom = rooms.find(r => r.type === 'global');
        if (globalRoom) selectRoom(globalRoom.id);
    }
}

        // Select a room and load its messages and members
        async function selectRoom(roomId) {
            if (currentRoom?.id === roomId) return;
            if (messagesSubscription) messagesSubscription.unsubscribe();

            currentRoom = rooms.find(r => r.id === roomId);
            if (!currentRoom) return;

            renderRooms();
            document.getElementById('currentRoomName').innerHTML = currentRoom.name;
            document.getElementById('messagesArea').innerHTML = '<div class="loading">Loading messages...</div>';
            document.getElementById('memberCount').textContent = 'Loading...';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            await loadMessages();
            await loadMembers();
            subscribeToMessages();
        }

        async function loadMessages() {
            if (!currentRoom) return;
            const { data, error } = await sb
                .from('chat_messages')
                .select(`
                    id, message, created_at, user_id,
                    players!inner(username)
                `)
                .eq('room_id', currentRoom.id)
                .eq('is_deleted', false)
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Error loading messages:', error);
                return;
            }
            currentMessages = data || [];
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('messagesArea');
            if (!currentMessages.length) {
                container.innerHTML = '<div class="empty">No messages yet. Be the first!</div>';
                return;
            }
            const playerId = currentPlayer.id;
            container.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.user_id === playerId ? 'own' : ''}">
                    <div class="message-header">
                        <span class="message-username">${msg.players.username}</span>
                        <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.message)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function loadMembers() {
            if (!currentRoom) return;
            const { data, error } = await sb
                .from('chat_room_members')
                .select(`
                    user_id,
                    role,
                    banned_until,
                    players!inner(username)
                `)
                .eq('room_id', currentRoom.id)
                .order('role', { ascending: false });

            if (error) {
                console.error('Error loading members:', error);
                return;
            }
            members = data || [];
            document.getElementById('memberCount').textContent = `${members.length} members`;
            renderMembers();
        }

        function renderMembers() {
            const container = document.getElementById('membersList');
            if (!members.length) {
                container.innerHTML = '<div class="empty">No members</div>';
                return;
            }

            const playerId = currentPlayer.id;
            const currentUserMember = members.find(m => m.user_id === playerId);
            const isAdmin = currentUserMember?.role === 'admin';
            const isOperator = isAdmin || currentUserMember?.role === 'operator';

            container.innerHTML = members.map(m => {
                const isBanned = m.banned_until && new Date(m.banned_until) > new Date();
                return `
                    <div class="member-item">
                        <div>
                            <span class="member-name">${m.players.username}</span>
                            <span class="member-role ${m.role}">${m.role}</span>
                            ${isBanned ? '<span style="color:red;">(banned)</span>' : ''}
                        </div>
                        <div class="member-actions">
                            ${(isAdmin && m.user_id !== playerId) ? `
                                ${m.role !== 'admin' ? `<button class="promote-btn" onclick="promoteUser('${m.user_id}')">⬆️</button>` : ''}
                                ${m.role !== 'member' ? `<button class="demote-btn" onclick="demoteUser('${m.user_id}')">⬇️</button>` : ''}
                                <button class="kick-btn" onclick="kickUser('${m.user_id}')">Kick</button>
                                <button class="ban-btn" onclick="showBanModal('${m.user_id}', '${m.players.username}')">Ban</button>
                            ` : (isOperator && m.user_id !== playerId && m.role !== 'admin') ? `
                                <button class="kick-btn" onclick="kickUser('${m.user_id}')">Kick</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function subscribeToMessages() {
            if (!currentRoom) return;
            messagesSubscription = sb
                .channel(`room-${currentRoom.id}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `room_id=eq.${currentRoom.id}`
                }, payload => {
                    // Append new message (if not deleted)
                    if (!payload.new.is_deleted) {
                        currentMessages.push(payload.new);
                        renderMessages();
                    }
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `room_id=eq.${currentRoom.id}`
                }, payload => {
                    // Handle message edit/delete
                    const index = currentMessages.findIndex(m => m.id === payload.new.id);
                    if (index !== -1) {
                        if (payload.new.is_deleted) {
                            currentMessages.splice(index, 1);
                        } else {
                            currentMessages[index] = { ...currentMessages[index], ...payload.new };
                        }
                        renderMessages();
                    }
                })
                .subscribe();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentRoom) return;

            const playerId = currentPlayer.id;
            const { error } = await sb
                .from('chat_messages')
                .insert({
                    room_id: currentRoom.id,
                    user_id: playerId,
                    message: text
                });
            if (error) {
                showToast('Failed to send message', 'error');
            } else {
                input.value = '';
            }
        }

        // Room creation
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').style.display = 'block';
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            const description = document.getElementById('roomDescription').value.trim();
            if (!name) {
                showToast('Room name required', 'error');
                return;
            }
            const { data, error } = await sb.rpc('create_chat_room', {
                p_name: name,
                p_description: description || null
            });
            if (error || !data.success) {
                showToast(error?.message || data?.error || 'Failed to create room', 'error');
            } else {
                showToast('Room created!', 'success');
                closeModal('createRoomModal');
                await loadRooms();
                // Optionally auto-join the new room
                selectRoom(data.room_id);
            }
        }

        // Moderation actions
        async function kickUser(userId) {
            if (!confirm('Kick this user from the room?')) return;
            const { data, error } = await sb.rpc('kick_user', {
                p_room_id: currentRoom.id,
                p_user_id: userId
            });
            if (error || !data.success) {
                showToast(error?.message || data?.error || 'Failed to kick', 'error');
            } else {
                showToast('User kicked', 'success');
                await loadMembers();
            }
        }

        let banTargetId = null;
        function showBanModal(userId, username) {
            banTargetId = userId;
            document.getElementById('banUserName').innerText = `Ban ${username}`;
            document.getElementById('banModal').style.display = 'block';
        }

        async function confirmBan() {
            const reason = document.getElementById('banReason').value.trim();
            const durationHours = parseInt(document.getElementById('banDuration').value);
            const { data, error } = await sb.rpc('ban_user', {
                p_room_id: currentRoom.id,
                p_user_id: banTargetId,
                p_reason: reason || null,
                p_duration_hours: durationHours
            });
            if (error || !data.success) {
                showToast(error?.message || data?.error || 'Failed to ban', 'error');
            } else {
                showToast('User banned', 'success');
                closeModal('banModal');
                await loadMembers();
            }
        }

        async function promoteUser(userId) {
            const { data, error } = await sb.rpc('set_member_role', {
                p_room_id: currentRoom.id,
                p_user_id: userId,
                p_role: 'operator'
            });
            if (error || !data.success) {
                showToast(error?.message || data?.error || 'Failed to promote', 'error');
            } else {
                showToast('Promoted to operator', 'success');
                await loadMembers();
            }
        }

        async function demoteUser(userId) {
            const { data, error } = await sb.rpc('set_member_role', {
                p_room_id: currentRoom.id,
                p_user_id: userId,
                p_role: 'member'
            });
            if (error || !data.success) {
                showToast(error?.message || data?.error || 'Failed to demote', 'error');
            } else {
                showToast('Demoted to member', 'success');
                await loadMembers();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function showToast(message, type) {
            // Implement simple toast or use existing function from your game
            alert(message); // placeholder
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialization
        (async function init() {
            const playerId = await getPlayerId();
            if (!playerId) {
                window.location.href = 'index.html';
                return;
            }
            await loadRooms();
            // If there is a global room, select it by default
            const globalRoom = rooms.find(r => r.type === 'global');
            if (globalRoom) {
                selectRoom(globalRoom.id);
            }
        })();
    </script>
</body>
</html>
