<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Rheoa RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #f8f8f0;
            color: #222;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }

        /* Rooms Sidebar */
        .rooms-sidebar {
            width: 260px;
            background: white;
            border: 2px solid #2196F3;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .rooms-header {
            background: #2196F3;
            color: white;
            padding: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .create-room-btn {
            background: #ff9800;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .rooms-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .room-item {
            padding: 8px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            background: #f5f5f5;
            transition: background 0.2s;
        }

        .room-item:hover {
            background: #e3f2fd;
        }

        .room-item.active {
            background: #2196F3;
            color: white;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border: 2px solid #2196F3;
            border-radius: 10px;
            overflow: hidden;
        }

        .chat-header {
            background: #2196F3;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-info {
            font-weight: bold;
        }

        .online-count {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message.own {
            align-self: flex-end;
        }

        .message-header {
            font-size: 0.8rem;
            color: #666;
            display: flex;
            gap: 10px;
            align-items: baseline;
        }

        .message-username {
            font-weight: bold;
            color: #2196F3;
        }

        .message-time {
            font-size: 0.7rem;
        }

        .message-text {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 4px;
            word-wrap: break-word;
        }

        .message.own .message-text {
            background: #2196F3;
            color: white;
        }

        .message-input-area {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            font-family: inherit;
            border: 2px solid #ddd;
            border-radius: 5px;
            resize: none;
        }

        #sendBtn {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Members Sidebar (with presence) */
        .members-sidebar {
            width: 260px;
            background: white;
            border: 2px solid #2196F3;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .members-header {
            background: #2196F3;
            color: white;
            padding: 10px;
            font-weight: bold;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .member-item {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2196F3;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .member-name {
            font-weight: bold;
            flex: 1;
        }

        .member-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }
        .modal input, .modal textarea {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
        .modal button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
        }
        .back-button {
            margin-top: 20px;
            text-align: center;
        }
        .back-button a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Rooms Sidebar -->
        <div class="rooms-sidebar">
            <div class="rooms-header">
                <span>📁 Rooms</span>
                <button class="create-room-btn" onclick="showCreateRoomModal()">+ New</button>
            </div>
            <div class="rooms-list" id="roomsList">
                <div class="loading">Loading rooms...</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="room-info" id="currentRoomName">Select a room</div>
                <div class="online-count" id="onlineCount">0 online</div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="loading">Select a room to start chatting</div>
            </div>
            <div class="message-input-area">
                <textarea id="messageInput" placeholder="Type your message..." rows="2" disabled></textarea>
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>

        <!-- Members Sidebar -->
        <div class="members-sidebar">
            <div class="members-header">👥 Online</div>
            <div class="members-list" id="membersList">
                <div class="loading">Select a room</div>
            </div>
        </div>
    </div>

    <div class="back-button">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

    <!-- Create Room Modal -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h3>Create New Channel</h3>
            <input type="text" id="roomName" placeholder="Channel Name">
            <textarea id="roomDescription" placeholder="Description (optional)" rows="3"></textarea>
            <button onclick="createRoom()">Create</button>
            <button onclick="closeModal('createRoomModal')">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const sb = window.supabase.createClient(
            "https://mtiwodvsrwvrujbhmmrn.supabase.co",
            "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
        );

        // Global state
        let currentPlayer = null;          // { id, username }
        let currentRoom = null;            // { id, name, type }
        let rooms = [];                    // list of rooms user can see
        let currentMessages = [];
        let roomChannel = null;            // Realtime channel for current room (presence + broadcast)
        let onlineUsers = [];              // presence list

        // Helper: get player's id and username
        async function getPlayer() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return null;
            const { data: player } = await sb.from('players').select('id, username').eq('auth_id', user.id).single();
            if (player) currentPlayer = player;
            return player;
        }

        // Load rooms (global + channels user is member of)
        async function loadRooms() {
            const player = await getPlayer();
            if (!player) return;

            // Get all rooms
            const { data: allRooms, error } = await sb
                .from('chat_rooms')
                .select('*')
                .order('created_at');

            if (error) {
                console.error('Error loading rooms:', error);
                return;
            }

            // Get user's channel memberships
            const { data: memberships } = await sb
                .from('chat_members')
                .select('room_id')
                .eq('user_id', player.id);
            const memberRoomIds = memberships?.map(m => m.room_id) || [];

            // Filter: global always visible; channels only if member
            rooms = allRooms.filter(room => {
                if (room.type === 'global') return true;
                return memberRoomIds.includes(room.id);
            });

            renderRooms();

            // Auto-select global room if exists and no room selected
            if (!currentRoom && rooms.length) {
                const globalRoom = rooms.find(r => r.type === 'global');
                if (globalRoom) selectRoom(globalRoom.id);
            }
        }

        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (!rooms.length) {
                container.innerHTML = '<div class="empty">No rooms available. Create one!</div>';
                return;
            }
            container.innerHTML = rooms.map(room => `
                <div class="room-item ${currentRoom?.id === room.id ? 'active' : ''}" 
                     onclick="selectRoom('${room.id}')">
                    <strong>${escapeHtml(room.name)}</strong>
                    <div style="font-size:0.7rem; color:gray;">${room.type === 'global' ? 'Global' : 'Channel'}</div>
                </div>
            `).join('');
        }

        // Select a room, load history, set up realtime channel
        async function selectRoom(roomId) {
            if (currentRoom?.id === roomId) return;
            if (roomChannel) {
                roomChannel.unsubscribe();
                roomChannel = null;
            }

            currentRoom = rooms.find(r => r.id === roomId);
            if (!currentRoom) return;

            renderRooms();
            document.getElementById('currentRoomName').innerHTML = currentRoom.name;
            document.getElementById('messagesArea').innerHTML = '<div class="loading">Loading messages...</div>';
            document.getElementById('onlineCount').textContent = '0 online';
            document.getElementById('membersList').innerHTML = '<div class="loading">Loading...</div>';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            // Load historical messages
            await loadMessages();

            // Setup Realtime channel for this room (presence + broadcast)
            setupRoomChannel();
        }

        async function loadMessages() {
            if (!currentRoom) return;
            const { data, error } = await sb
                .from('chat_messages')
                .select(`
                    id,
                    content,
                    created_at,
                    user_id,
                    players:user_id (username)
                `)
                .eq('room_id', currentRoom.id)
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Error loading messages:', error);
                return;
            }
            // Transform: players is an array, take first element
            currentMessages = (data || []).map(msg => ({
                ...msg,
                players: msg.players[0]
            }));
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('messagesArea');
            if (!currentMessages.length) {
                container.innerHTML = '<div class="empty">No messages yet. Be the first!</div>';
                return;
            }
            const playerId = currentPlayer.id;
            container.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.user_id === playerId ? 'own' : ''}">
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.players.username)}</span>
                        <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.content)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        // Setup Realtime channel for the current room
        function setupRoomChannel() {
            if (!currentRoom || !currentPlayer) return;

            // Channel name: room:<roomId>
            roomChannel = sb.channel(`room:${currentRoom.id}`);

            // Presence: sync event
            roomChannel.on('presence', { event: 'sync' }, () => {
                const state = roomChannel.presenceState();
                const userList = [];
                Object.keys(state).forEach(key => {
                    userList.push(...state[key]);
                });
                onlineUsers = userList;
                document.getElementById('onlineCount').textContent = `${onlineUsers.length} online`;
                renderMembers();
            });

            // Broadcast: receive messages
            roomChannel.on('broadcast', { event: 'message' }, (payload) => {
                const newMsg = payload.payload;
                // Avoid duplicate if we just sent it (optimistic already added)
                if (!currentMessages.some(m => m.id === newMsg.id)) {
                    currentMessages.push(newMsg);
                    renderMessages();
                }
            });

            // Subscribe to the channel
            roomChannel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    // Track own presence
                    await roomChannel.track({
                        user_id: currentPlayer.id,
                        username: currentPlayer.username,
                        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentPlayer.id}`
                    });
                }
            });
        }

        // Send a message (optimistic UI + broadcast + persist)
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentRoom) return;

            const tempId = `temp-${Date.now()}`;
            const newMsg = {
                id: tempId,
                content: text,
                created_at: new Date().toISOString(),
                user_id: currentPlayer.id,
                players: { username: currentPlayer.username }
            };

            // Optimistic add
            currentMessages.push(newMsg);
            renderMessages();
            input.value = '';

            // Broadcast to others (we will also receive it, but duplicate detection prevents double render)
            if (roomChannel) {
                await roomChannel.send({
                    type: 'broadcast',
                    event: 'message',
                    payload: newMsg
                });
            }

            // Persist to database
            const { error } = await sb
                .from('chat_messages')
                .insert({
                    room_id: currentRoom.id,
                    user_id: currentPlayer.id,
                    content: text
                });

            if (error) {
                console.error('Failed to persist message:', error);
                // Optionally show an error and remove the optimistic message
                currentMessages = currentMessages.filter(m => m.id !== tempId);
                renderMessages();
                alert('Failed to send message. Please try again.');
            }
        }

        // Room creation
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').style.display = 'block';
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            if (!name) {
                alert('Room name required');
                return;
            }
            const { data, error } = await sb
                .from('chat_rooms')
                .insert({
                    name: name,
                    type: 'channel',
                    created_by: currentPlayer.id,
                    description: document.getElementById('roomDescription').value.trim() || null
                })
                .select('id')
                .single();

            if (error) {
                alert(error.message);
            } else {
                alert('Room created!');
                closeModal('createRoomModal');
                await loadRooms();
                selectRoom(data.id);
            }
        }

        // Join a channel (for simplicity, we'll add a join button later – but for now, creator auto-joins)
        // We can add a "Join" button next to channels that the user is not a member of.

        function renderMembers() {
            const container = document.getElementById('membersList');
            if (!onlineUsers.length) {
                container.innerHTML = '<div class="empty">No one else is online in this room.</div>';
                return;
            }
            container.innerHTML = onlineUsers.map(user => `
                <div class="member-item">
                    <div class="member-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="member-name">${escapeHtml(user.username)}</div>
                    <div class="member-status"></div>
                </div>
            `).join('');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        (async function init() {
            const player = await getPlayer();
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            await loadRooms();
        })();
    </script>
</body>
</html>
