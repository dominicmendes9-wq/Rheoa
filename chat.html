<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Rheoa RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ─── CSS Variables & Themes ─── */
        :root {
            --bg-body: #f0f4fa;
            --card-bg: #fff;
            --card-border: rgba(148,163,184,0.2);
            --card-shadow: 0 12px 30px rgba(0,0,0,0.05);
            --header-bg: linear-gradient(135deg,#1e2f5e 0%,#1a4b7a 100%);
            --header-text: #fff;
            --accent: #2c6e9e;
            --accent-hover: #1f5480;
            --btn-primary: #2c6e9e;
            --btn-primary-hover: #1f5480;
            --btn-secondary: #475569;
            --btn-ghost: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #334155;
            --border-light: #e2e8f0;
            --card-header-bg: #f8fafc;
            --avatar-bg: #e0f2fe;
            --font-family: 'Courier New', monospace;
            --border-radius-card: 24px;
            --transition: all 0.2s ease;
            --toolbar-bg: #f1f5f9;
        }

        body.theme-dusk {
            --bg-body: #0f1722;
            --card-bg: #1e293b;
            --card-border: rgba(51,65,85,0.6);
            --card-shadow: 0 15px 35px rgba(0,0,0,0.3);
            --header-bg: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
            --header-text: #e2e8f0;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #2563eb;
            --btn-secondary: #334155;
            --btn-ghost: #334155;
            --text-main: #f1f5f9;
            --text-muted: #cbd5e1;
            --border-light: #334155;
            --card-header-bg: #0f172a;
            --avatar-bg: #334155;
            --toolbar-bg: #1e293b;
        }

        body.theme-meadow {
            --bg-body: #eef4e6;
            --card-bg: #ffffffea;
            --card-border: #cbd5b0;
            --card-shadow: 0 12px 24px rgba(60,70,40,0.08);
            --header-bg: linear-gradient(135deg,#2b5e3b 0%,#4a7c59 100%);
            --header-text: #fef9e6;
            --accent: #4b6b3e;
            --accent-hover: #3a5530;
            --btn-primary: #4b6b3e;
            --btn-primary-hover: #3a5530;
            --btn-secondary: #7f6b4a;
            --btn-ghost: #e9e1c7;
            --text-main: #2c2b26;
            --text-muted: #5b5a4c;
            --border-light: #d9d2b0;
            --card-header-bg: #fef6e0;
            --avatar-bg: #e2e9cf;
            --toolbar-bg: #e6e6d4;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-main);
            padding: 28px 20px;
            transition: background .25s, color .2s;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* ─── Top Bar ─── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding: 0 8px;
        }
        .back-link {
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: var(--accent);
            border: 1px solid var(--border-light);
            transition: var(--transition);
            font-size: .9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(2px);
        }
        .back-link:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .theme-switcher, .font-switcher {
            display: flex;
            gap: 6px;
            background: var(--card-bg);
            padding: 4px 8px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(4px);
            align-items: center;
        }
        .theme-btn, .font-btn {
            background: transparent;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            font-size: .8rem;
            cursor: pointer;
            transition: .2s;
            color: var(--text-muted);
            font-family: var(--font-family);
        }
        .theme-btn.active, .font-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .theme-btn:hover:not(.active), .font-btn:hover:not(.active) {
            background: var(--btn-ghost);
            color: var(--text-main);
        }
        .font-btn {
            font-size: .75rem;
            padding: 4px 12px;
        }

        /* ─── Chat Layout ─── */
        .chat-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-card);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .chat-header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }
        .room-info {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .online-count {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--card-header-bg);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }
        .message.own {
            align-self: flex-end;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
            align-items: baseline;
        }
        .message-username {
            font-weight: 600;
            color: var(--accent);
        }
        .message-time {
            font-size: 0.65rem;
        }
        .message-text {
            background: var(--card-bg);
            padding: 8px 14px;
            border-radius: 16px;
            margin-top: 4px;
            word-wrap: break-word;
            border: 1px solid var(--border-light);
        }
        .message.own .message-text {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .message-text img, .message-text a {
            max-width: 100%;
        }
        .message-text a {
            color: var(--accent);
            text-decoration: underline;
        }
        .message-text strong, .message-text b { font-weight: 700; }
        .message-text em, .message-text i { font-style: italic; }
        .message-text h2 { font-size: 1.4rem; font-weight: 700; margin: 8px 0; }

        .message-input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            background: var(--toolbar-bg);
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
        }
        .toolbar button {
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-main);
            transition: .15s;
            font-family: var(--font-family);
        }
        .toolbar button:hover {
            background: var(--btn-ghost);
        }
        .toolbar button:active {
            transform: scale(0.95);
        }
        .toolbar .separator {
            width: 1px;
            height: 24px;
            background: var(--border-light);
            margin: 0 4px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            position: relative;
        }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            font-family: var(--font-family);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            background: var(--card-header-bg);
            color: var(--text-main);
            resize: none;
            font-size: 1rem;
            min-height: 50px;
            transition: border .2s;
        }
        #messageInput:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
        }
        #sendBtn {
            padding: 10px 24px;
            background: var(--btn-primary);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            font-family: var(--font-family);
            white-space: nowrap;
        }
        #sendBtn:hover {
            background: var(--btn-primary-hover);
        }

        /* ─── Emoji Picker ─── */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 12px;
            box-shadow: var(--card-shadow);
            z-index: 1000;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            max-width: 300px;
        }
        .emoji-picker button {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: background .15s;
        }
        .emoji-picker button:hover {
            background: var(--btn-ghost);
        }

        /* ─── Members Sidebar ─── */
        .members-sidebar {
            width: 280px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-card);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .members-header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 16px 20px;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 12px;
            background: var(--card-header-bg);
            transition: background .15s;
        }
        .member-item:hover {
            background: var(--btn-ghost);
        }
        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--avatar-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .member-name {
            font-weight: 500;
            flex: 1;
        }
        .member-tier-badge {
            font-size: 1rem;
            line-height: 1;
        }
        .member-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            flex-shrink: 0;
        }

        /* ─── Toast ─── */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 24px;
            border-radius: 40px;
            color: #fff;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #f44336; }
        .toast.info { background: #2196F3; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading, .empty {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
        }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            .members-sidebar { width: 200px; }
        }
        @media (max-width: 700px) {
            .members-sidebar { display: none; }
            .chat-container { flex-direction: column; }
        }
        @media (max-width: 600px) {
            body { padding: 16px; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .controls { justify-content: center; }
            .chat-header { flex-direction: column; gap: 8px; text-align: center; }
            .message { max-width: 90%; }
            .toolbar button { font-size: 0.75rem; padding: 2px 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
        <a href="dashboard.html" class="back-link">← Dashboard</a>
        <div class="controls">
            <div class="theme-switcher" id="themeSwitcher">
                <button data-theme="default" class="theme-btn active">✨ Aurora</button>
                <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
                <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
            </div>
            <div class="font-switcher" id="fontSwitcher">
                <button data-font="monospace" class="font-btn active">Courier</button>
                <button data-font="sans-serif" class="font-btn">Inter</button>
                <button data-font="serif" class="font-btn">Georgia</button>
            </div>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Main Chat -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="room-info">🌍 Global Chat</div>
                <div class="online-count" id="onlineCount">0 online</div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="loading">Loading messages...</div>
            </div>
            <div class="message-input-area">
                <!-- Toolbar (hidden for non-Black/Founder) -->
                <div class="toolbar" id="toolbar" style="display:none;">
                    <button type="button" onclick="formatMessage('bold')"><b>B</b></button>
                    <button type="button" onclick="formatMessage('italic')"><i>I</i></button>
                    <button type="button" onclick="formatMessage('h2')">H2</button>
                    <button type="button" onclick="insertLink()">🔗 Link</button>
                    <span class="separator"></span>
                    <button type="button" onclick="toggleEmojiPicker()">😊</button>
                </div>
                <div class="input-row">
                    <textarea id="messageInput" placeholder="Type your message..." rows="2"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
                <!-- Emoji Picker -->
                <div class="emoji-picker" id="emojiPicker">
                    <button onclick="insertEmoji('😊')">😊</button>
                    <button onclick="insertEmoji('😂')">😂</button>
                    <button onclick="insertEmoji('🤔')">🤔</button>
                    <button onclick="insertEmoji('🔥')">🔥</button>
                    <button onclick="insertEmoji('💯')">💯</button>
                    <button onclick="insertEmoji('✨')">✨</button>
                    <button onclick="insertEmoji('🎉')">🎉</button>
                    <button onclick="insertEmoji('👏')">👏</button>
                    <button onclick="insertEmoji('👍')">👍</button>
                    <button onclick="insertEmoji('❤️')">❤️</button>
                    <button onclick="insertEmoji('🙌')">🙌</button>
                    <button onclick="insertEmoji('🤩')">🤩</button>
                </div>
            </div>
        </div>

        <!-- Members Sidebar -->
        <div class="members-sidebar">
            <div class="members-header">👥 Online</div>
            <div class="members-list" id="membersList">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    const sb = window.supabase.createClient(
        "https://mtiwodvsrwvrujbhmmrn.supabase.co",
        "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
    );

    // ─── Utilities ────────────────────────────────────────────
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => {
                if (toast.parentNode) container.removeChild(toast);
            }, 300);
        }, duration);
    }

    // ─── Theme & Font ────────────────────────────────────────
    function setTheme(themeName) {
        const body = document.body;
        body.classList.remove('theme-dusk', 'theme-meadow');
        if (themeName === 'dusk') body.classList.add('theme-dusk');
        else if (themeName === 'meadow') body.classList.add('theme-meadow');
        localStorage.setItem('chat_theme', themeName);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
        });
    }

    function setFont(fontName) {
        const root = document.documentElement;
        if (fontName === 'monospace') root.style.setProperty('--font-family', "'Courier New', monospace");
        else if (fontName === 'sans-serif') root.style.setProperty('--font-family', "'Inter', sans-serif");
        else if (fontName === 'serif') root.style.setProperty('--font-family', "'Georgia', serif");
        localStorage.setItem('chat_font', fontName);
        document.querySelectorAll('.font-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-font') === fontName);
        });
    }

    function initThemeAndFont() {
        const savedTheme = localStorage.getItem('chat_theme') || 'default';
        setTheme(savedTheme);
        const savedFont = localStorage.getItem('chat_font') || 'monospace';
        setFont(savedFont);

        document.getElementById('themeSwitcher').addEventListener('click', (e) => {
            const btn = e.target.closest('.theme-btn');
            if (btn) setTheme(btn.getAttribute('data-theme'));
        });
        document.getElementById('fontSwitcher').addEventListener('click', (e) => {
            const btn = e.target.closest('.font-btn');
            if (btn) setFont(btn.getAttribute('data-font'));
        });
    }

    // ─── State ─────────────────────────────────────────────────
    let currentPlayer = null;
    let globalRoom = null;
    let messageChannel = null;
    let onlineUsers = [];

    // ─── Auth & Player ────────────────────────────────────────
    async function getPlayer() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return null;
        const { data: player, error } = await sb
            .from('players')
            .select('id, username, subscription_tier')
            .eq('auth_id', user.id)
            .single();
        if (error) {
            console.error('Error fetching player:', error);
            return null;
        }
        currentPlayer = player;
        return player;
    }

    // ─── Get/Create Global Room ──────────────────────────────
    async function getGlobalRoom() {
        const { data, error } = await sb
            .from('chat_rooms')
            .select('*')
            .eq('name', 'Global Chat')
            .maybeSingle();

        if (error) {
            console.error('Error fetching global room:', error);
            return null;
        }

        if (data) {
            globalRoom = data;
            return data;
        }

        const { data: newRoom, error: createError } = await sb
            .from('chat_rooms')
            .insert({ name: 'Global Chat', type: 'global' })
            .select('*')
            .single();

        if (createError) {
            console.error('Error creating global room:', createError);
            return null;
        }
        globalRoom = newRoom;
        return newRoom;
    }

    // ─── Load Messages ────────────────────────────────────────
    async function loadMessages() {
        if (!globalRoom) return;
        const { data, error } = await sb
            .from('chat_messages')
            .select(`
                id,
                content,
                created_at,
                user_id,
                players:user_id (username)
            `)
            .eq('room_id', globalRoom.id)
            .order('created_at', { ascending: true });

        if (error) {
            console.error('Error loading messages:', error);
            return;
        }
        renderMessages(data || []);
    }

    // ─── Render Messages ─────────────────────────────────────
    function renderMessages(messages) {
        const container = document.getElementById('messagesArea');
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty">No messages yet. Be the first!</div>';
            return;
        }
        const playerId = currentPlayer.id;
        container.innerHTML = messages.map(msg => {
            const username = msg.players?.[0]?.username || 'Unknown';
            const isOwn = msg.user_id === playerId;
            return `
                <div class="message ${isOwn ? 'own' : ''}">
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(username)}</span>
                        <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-text">${renderMessageContent(msg.content)}</div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    function renderMessageContent(text) {
        if (!text) return '';
        let html = escapeHtml(text);
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
        return html;
    }

    // ─── Presence & Channel ──────────────────────────────────
    function setupChannel() {
        if (!globalRoom || !currentPlayer) return;

        messageChannel = sb.channel(`room:${globalRoom.id}`);

        messageChannel.on('presence', { event: 'sync' }, () => {
            const state = messageChannel.presenceState();
            const list = [];
            Object.keys(state).forEach(key => {
                list.push(...state[key]);
            });
            onlineUsers = list;
            // Ensure current user is in the list (fallback)
            if (!onlineUsers.some(u => u.user_id === currentPlayer.id)) {
                onlineUsers.push({
                    user_id: currentPlayer.id,
                    username: currentPlayer.username,
                    subscription_tier: currentPlayer.subscription_tier || 'basic'
                });
            }
            document.getElementById('onlineCount').textContent = `${onlineUsers.length} online`;
            renderMembers();
        });

        messageChannel.on('broadcast', { event: 'message' }, (payload) => {
            loadMessages();
        });

        messageChannel.subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await messageChannel.track({
                    user_id: currentPlayer.id,
                    username: currentPlayer.username,
                    subscription_tier: currentPlayer.subscription_tier || 'basic'
                });
                // Force a sync update after tracking
                setTimeout(() => {
                    const state = messageChannel.presenceState();
                    const list = [];
                    Object.keys(state).forEach(key => {
                        list.push(...state[key]);
                    });
                    onlineUsers = list;
                    if (!onlineUsers.some(u => u.user_id === currentPlayer.id)) {
                        onlineUsers.push({
                            user_id: currentPlayer.id,
                            username: currentPlayer.username,
                            subscription_tier: currentPlayer.subscription_tier || 'basic'
                        });
                    }
                    document.getElementById('onlineCount').textContent = `${onlineUsers.length} online`;
                    renderMembers();
                }, 500);
            }
        });
    }

    // ─── Render Members with Tier Badges ────────────────────
    function renderMembers() {
        const container = document.getElementById('membersList');
        if (!onlineUsers.length) {
            container.innerHTML = '<div class="empty">No one else is online.</div>';
            return;
        }
        container.innerHTML = onlineUsers.map(user => {
            const tier = user.subscription_tier || 'basic';
            const badge = getTierBadge(tier);
            return `
                <div class="member-item">
                    <div class="member-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="member-name">${escapeHtml(user.username)}</div>
                    <div class="member-tier-badge">${badge}</div>
                    <div class="member-status"></div>
                </div>
            `;
        }).join('');
    }

    function getTierBadge(tier) {
        const map = {
            'basic': '🟢',
            'silver': '🔵',
            'gold': '🟡',
            'black': '⚫',
            'founder': '👑'
        };
        return map[tier] || '🟢';
    }

    // ─── Send Message ────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !globalRoom) return;

        input.value = '';

        const tempId = 'temp-' + Date.now();
        const newMsg = {
            id: tempId,
            content: text,
            created_at: new Date().toISOString(),
            user_id: currentPlayer.id,
            players: { username: currentPlayer.username }
        };

        if (messageChannel) {
            await messageChannel.send({
                type: 'broadcast',
                event: 'message',
                payload: newMsg
            });
        }

        const { error } = await sb
            .from('chat_messages')
            .insert({
                room_id: globalRoom.id,
                user_id: currentPlayer.id,
                content: text
            });

        if (error) {
            console.error('Failed to persist message:', error);
            showToast('Error sending message', 'error');
        } else {
            loadMessages();
        }
    }

    // ─── Formatting Toolbar ──────────────────────────────────
    function formatMessage(type) {
        const input = document.getElementById('messageInput');
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const selected = input.value.substring(start, end);
        let replacement = '';
        switch(type) {
            case 'bold': replacement = `**${selected}**`; break;
            case 'italic': replacement = `*${selected}*`; break;
            case 'h2': replacement = `\n# ${selected || 'Heading'}\n`; break;
        }
        input.value = input.value.substring(0, start) + replacement + input.value.substring(end);
        input.focus();
        const newPos = start + replacement.length;
        input.setSelectionRange(newPos, newPos);
    }

    function insertLink() {
        const url = prompt('Enter URL:', 'https://');
        if (!url) return;
        const input = document.getElementById('messageInput');
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const selected = input.value.substring(start, end) || 'link';
        const replacement = `[${selected}](${url})`;
        input.value = input.value.substring(0, start) + replacement + input.value.substring(end);
        input.focus();
        const newPos = start + replacement.length;
        input.setSelectionRange(newPos, newPos);
    }

    // ─── Emoji Picker ────────────────────────────────────────
    let emojiPickerVisible = false;

    function toggleEmojiPicker() {
        const picker = document.getElementById('emojiPicker');
        emojiPickerVisible = !emojiPickerVisible;
        picker.style.display = emojiPickerVisible ? 'grid' : 'none';
    }

    function insertEmoji(emoji) {
        const input = document.getElementById('messageInput');
        const start = input.selectionStart;
        input.value = input.value.substring(0, start) + emoji + input.value.substring(start);
        input.focus();
        const newPos = start + emoji.length;
        input.setSelectionRange(newPos, newPos);
        document.getElementById('emojiPicker').style.display = 'none';
        emojiPickerVisible = false;
    }

    // ─── Toolbar visibility ──────────────────────────────────
    function updateToolbarVisibility() {
        const tier = currentPlayer?.subscription_tier?.toLowerCase() || 'basic';
        const isBlackOrFounder = ['black', 'founder'].includes(tier);
        const toolbar = document.getElementById('toolbar');
        toolbar.style.display = isBlackOrFounder ? 'flex' : 'none';
    }

    // ─── Init ─────────────────────────────────────────────────
    (async function init() {
        initThemeAndFont();

        const player = await getPlayer();
        if (!player) {
            window.location.href = 'index.html';
            return;
        }

        updateToolbarVisibility();

        const room = await getGlobalRoom();
        if (!room) {
            showToast('Could not load chat room', 'error');
            return;
        }

        await loadMessages();
        setupChannel();
    })();
</script>
