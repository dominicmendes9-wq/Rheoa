<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #f57c00;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Player Stats Bar */
    .player-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, #f57c00 0%, #ff9800 100%);
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .stat-group {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      opacity: 0.9;
    }
    
    .stat-value {
      font-size: 1.3rem;
      font-weight: bold;
    }
    
    /* Market Tabs */
    .market-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 25px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 30px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    
    .tab-btn:hover {
      background: #333;
      color: white;
    }
    
    .tab-btn.active {
      background: #f57c00;
      color: white;
      border-color: #f57c00;
    }
    
    /* Main Container */
    .market-container {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    /* Listings Section */
    .listings-section {
      background: white;
      border: 3px solid black;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .section-header {
      background: #333;
      color: white;
      padding: 15px;
      font-weight: bold;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .filter-bar {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: #f5f5f5;
      border-bottom: 2px solid #ddd;
      flex-wrap: wrap;
    }
    
    .filter-input {
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 5px;
      flex: 1;
      min-width: 200px;
    }
    
    .filter-select {
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 5px;
      background: white;
    }
    
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 15px;
      max-height: 600px;
      overflow-y: auto;
    }
    
    .listing-card {
      border: 2px solid #f57c00;
      border-radius: 10px;
      padding: 15px;
      background: #fff3e0;
      transition: transform 0.2s;
    }
    
    .listing-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(245, 124, 0, 0.2);
    }
    
    .listing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .listing-item {
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    .listing-quantity {
      background: #f57c00;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.8rem;
    }
    
    .listing-seller {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    
    .listing-price {
      font-size: 1.3rem;
      font-weight: bold;
      color: #4CAF50;
      margin-bottom: 10px;
    }
    
    .listing-price small {
      font-size: 0.8rem;
      color: #666;
      font-weight: normal;
    }
    
    .listing-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .buy-btn {
      flex: 1;
      padding: 8px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
    
    .buy-btn:hover {
      background: #45a049;
    }
    
    .favorite-btn {
      padding: 8px 12px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .favorite-btn.active {
      background: #f44336;
    }
    
    /* Sidebar */
    .market-sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .sidebar-section {
      background: white;
      border: 3px solid black;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .sidebar-header {
      background: #333;
      color: white;
      padding: 12px 15px;
      font-weight: bold;
    }
    
    .sidebar-content {
      padding: 15px;
    }
    
    /* Sell Form */
    .sell-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .form-label {
      font-weight: bold;
      font-size: 0.9rem;
    }
    
    .form-input {
      padding: 10px;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 5px;
    }
    
    .sell-btn {
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .sell-btn:hover {
      background: #45a049;
    }
    
    .fee-info {
      font-size: 0.8rem;
      color: #666;
      text-align: center;
    }
    
    /* Price Chart */
    .price-chart {
      height: 150px;
      display: flex;
      align-items: flex-end;
      gap: 5px;
      margin: 15px 0;
    }
    
    .chart-bar {
      flex: 1;
      background: #f57c00;
      border-radius: 3px 3px 0 0;
      transition: height 0.3s;
    }
    
    .price-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      text-align: center;
    }
    
    .price-stat {
      background: #f5f5f5;
      padding: 8px;
      border-radius: 5px;
    }
    
    .price-stat-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .price-stat-value {
      font-weight: bold;
      color: #f57c00;
    }
    
    /* My Listings */
    .my-listing-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    
    .my-listing-info {
      flex: 1;
    }
    
    .my-listing-name {
      font-weight: bold;
    }
    
    .my-listing-details {
      font-size: 0.9rem;
      color: #666;
    }
    
    .my-listing-status {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8rem;
    }
    
    .status-active { background: #4CAF50; color: white; }
    .status-sold { background: #9c27b0; color: white; }
    .status-cancelled { background: #f44336; color: white; }
    
    .cancel-btn {
      padding: 5px 10px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    /* Notifications */
    .notification-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    
    .notification-item.unread {
      background: #e3f2fd;
    }
    
    .notification-message {
      font-size: 0.9rem;
    }
    
    .notification-time {
      font-size: 0.7rem;
      color: #666;
    }
    
    /* Quick Buy Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    
    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      border-radius: 15px;
      border: 3px solid black;
      max-width: 400px;
      width: 90%;
    }
    
    .modal-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
    }
    
    .modal-input {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      font-family: 'Courier New', monospace;
      border: 2px solid #ddd;
      border-radius: 5px;
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .modal-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
    
    .modal-btn.confirm {
      background: #4CAF50;
      color: white;
    }
    
    .modal-btn.cancel {
      background: #f44336;
      color: white;
    }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    /* Toast Notifications */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    
    .toast {
      padding: 15px 25px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      animation: slideIn 0.3s ease-out;
    }
    
    .toast.success { background: #4CAF50; }
    .toast.error { background: #f44336; }
    .toast.info { background: #2196F3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @media (max-width: 900px) {
      .market-container {
        grid-template-columns: 1fr;
      }
      
      .player-stats {
        flex-direction: column;
        text-align: center;
      }
      
      .stat-group {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<h1>📈 Market</h1>
<div class="subtitle">Buy and sell items with other players</div>

<!-- Player Stats -->
<div class="player-stats" id="playerStats">
  <div class="stat-group">
    <div class="stat">
      <div class="stat-label">💰 Cash</div>
      <div class="stat-value" id="playerCash">₹0</div>
    </div>
    <div class="stat">
      <div class="stat-label">📦 Inventory</div>
      <div class="stat-value" id="playerItems">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">⭐ Level</div>
      <div class="stat-value" id="playerLevel">1</div>
    </div>
  </div>
  <div class="stat-group">
    <div class="stat">
      <div class="stat-label">📊 Market Fee</div>
      <div class="stat-value" id="marketFee">2%</div>
    </div>
  </div>
</div>

<!-- Market Tabs -->
<div class="market-tabs">
  <button class="tab-btn active" onclick="switchTab('buy')">🛒 Buy</button>
  <button class="tab-btn" onclick="switchTab('sell')">💰 Sell</button>
  <button class="tab-btn" onclick="switchTab('my-listings')">📋 My Listings</button>
  <button class="tab-btn" onclick="switchTab('history')">📜 History</button>
  <button class="tab-btn" onclick="switchTab('favorites')">⭐ Favorites</button>
</div>

<!-- Main Container -->
<div class="market-container">
  <!-- Listings Area -->
  <div class="listings-section" id="listingsSection">
    <div class="section-header">
      <span>🛒 Active Listings</span>
      <span id="listingCount">0 items</span>
    </div>
    
    <!-- Filters -->
    <div class="filter-bar">
      <input type="text" id="searchFilter" class="filter-input" placeholder="Search items..." oninput="filterListings()">
      <select id="categoryFilter" class="filter-select" onchange="filterListings()">
        <option value="all">All Categories</option>
        <option value="energy">⚡ Energy</option>
        <option value="health">❤️ Health</option>
        <option value="hunger">🍽️ Hunger</option>
        <option value="happiness">😊 Happiness</option>
        <option value="boost">✨ Boost</option>
      </select>
      <select id="sortFilter" class="filter-select" onchange="filterListings()">
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>
    
    <!-- Listings Grid -->
    <div id="listingsGrid" class="listings-grid">
      <div style="text-align: center; grid-column: 1/-1; padding: 40px;">
        <div class="spinner" style="margin: 0 auto 10px;"></div>
        <p>Loading listings...</p>
      </div>
    </div>
  </div>
  
  <!-- Sidebar -->
  <div class="market-sidebar">
    <!-- Quick Sell -->
    <div class="sidebar-section" id="quickSellSection">
      <div class="sidebar-header">💰 Quick Sell</div>
      <div class="sidebar-content">
        <div class="sell-form">
          <div class="form-group">
            <label class="form-label">Select Item</label>
            <select id="sellItemSelect" class="form-input">
              <option value="">Choose an item...</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity</label>
            <input type="number" id="sellQuantity" class="form-input" min="1" value="1">
          </div>
          <div class="form-group">
            <label class="form-label">Price per unit (₹)</label>
            <input type="number" id="sellPrice" class="form-input" min="1" value="100">
          </div>
          <div class="fee-info">
            Listing fee: 5% (₹<span id="listingFee">0</span>)
          </div>
          <button class="sell-btn" onclick="createListing()">List Item for Sale</button>
        </div>
      </div>
    </div>
    
    <!-- Price Chart -->
    <div class="sidebar-section">
      <div class="sidebar-header">📊 Price History</div>
      <div class="sidebar-content">
        <select id="priceHistoryItem" class="form-input" style="margin-bottom: 15px;" onchange="loadPriceHistory()">
          <option value="">Select item...</option>
        </select>
        <div id="priceChart" class="price-chart"></div>
        <div id="priceStats" class="price-stats"></div>
      </div>
    </div>
    
    <!-- Notifications -->
    <div class="sidebar-section">
      <div class="sidebar-header">🔔 Notifications</div>
      <div class="sidebar-content" id="notificationsList" style="max-height: 200px; overflow-y: auto;">
        <div style="text-align: center; padding: 20px;">No notifications</div>
      </div>
    </div>
  </div>
</div>

<!-- Buy Modal -->
<div id="buyModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">Buy Item</div>
    <p id="modalItemDetails"></p>
    <input type="number" id="modalQuantity" class="modal-input" min="1" value="1">
    <p>Total: ₹<span id="modalTotal">0</span></p>
    <div class="modal-actions">
      <button class="modal-btn confirm" onclick="confirmPurchase()">Confirm</button>
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let currentPlayer = null;
let playerInventory = [];
let activeListings = [];
let myListings = [];
let favorites = [];
let notifications = [];
let selectedListing = null;
let priceHistory = [];

// Toast notification
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('fade-out');
    setTimeout(() => {
      if (toast.parentNode) {
        container.removeChild(toast);
      }
    }, 300);
  }, duration);
}

// Load player data
async function loadPlayerData() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return window.location.href = "index.html";
    
    const { data: player } = await sb
      .from('players')
      .select('*')
      .eq('auth_id', user.id)
      .single();
    
    if (player) {
      currentPlayer = player;
      await loadPlayerInventory();
      await loadActiveListings();
      await loadMyListings();
      await loadFavorites();
      await loadNotifications();
      await loadPriceHistoryItems();
      
      updatePlayerStats();
      updateSellItemSelect();
    }
  } catch (error) {
    console.error('Error loading player:', error);
  }
}

// Load player inventory
async function loadPlayerInventory() {
  try {
    const { data } = await sb
      .from('player_items')
      .select(`
        *,
        items (*)
      `)
      .eq('player_id', currentPlayer.id);
    
    playerInventory = data || [];
    document.getElementById('playerItems').textContent = playerInventory.length;
  } catch (error) {
    console.error('Error loading inventory:', error);
  }
}

// Load active listings
async function loadActiveListings() {
  try {
    const { data } = await sb
      .from('market_listings')
      .select(`
        *,
        seller:players!market_listings_seller_id_fkey (username),
        item:items (*)
      `)
      .eq('status', 'active')
      .order('created_at', { ascending: false });
    
    activeListings = data || [];
    document.getElementById('listingCount').textContent = `${activeListings.length} items`;
    renderListings();
  } catch (error) {
    console.error('Error loading listings:', error);
  }
}

// Load my listings
async function loadMyListings() {
  try {
    const { data } = await sb
      .from('market_listings')
      .select(`
        *,
        item:items (*)
      `)
      .eq('seller_id', currentPlayer.id)
      .order('created_at', { ascending: false });
    
    myListings = data || [];
    renderMyListings();
  } catch (error) {
    console.error('Error loading my listings:', error);
  }
}

// Load favorites
async function loadFavorites() {
  try {
    const { data } = await sb
      .from('market_favorites')
      .select('item_id')
      .eq('player_id', currentPlayer.id);
    
    favorites = (data || []).map(f => f.item_id);
  } catch (error) {
    console.error('Error loading favorites:', error);
  }
}

// Load notifications
async function loadNotifications() {
  try {
    const { data } = await sb
      .from('market_notifications')
      .select('*')
      .eq('player_id', currentPlayer.id)
      .order('created_at', { ascending: false })
      .limit(20);
    
    notifications = data || [];
    renderNotifications();
    
    // Mark as read
    if (notifications.length > 0) {
      await sb
        .from('market_notifications')
        .update({ read: true })
        .eq('player_id', currentPlayer.id)
        .eq('read', false);
    }
  } catch (error) {
    console.error('Error loading notifications:', error);
  }
}

// Load price history items
async function loadPriceHistoryItems() {
  try {
    const { data } = await sb
      .from('items')
      .select('id, name')
      .order('name');
    
    const select = document.getElementById('priceHistoryItem');
    select.innerHTML = '<option value="">Select item...</option>' + 
      data.map(item => `<option value="${item.id}">${item.name}</option>`).join('');
  } catch (error) {
    console.error('Error loading price history items:', error);
  }
}

// Load price history for selected item
async function loadPriceHistory() {
  const itemId = document.getElementById('priceHistoryItem').value;
  if (!itemId) return;
  
  try {
    const { data } = await sb
      .from('market_price_history')
      .select('*')
      .eq('item_id', itemId)
      .order('recorded_at', { ascending: false })
      .limit(7);
    
    priceHistory = data || [];
    renderPriceChart();
  } catch (error) {
    console.error('Error loading price history:', error);
  }
}

// Update player stats
function updatePlayerStats() {
  document.getElementById('playerCash').textContent = `₹${currentPlayer.cash.toLocaleString()}`;
  document.getElementById('playerLevel').textContent = currentPlayer.level;
}

// Update sell item select
function updateSellItemSelect() {
  const select = document.getElementById('sellItemSelect');
  select.innerHTML = '<option value="">Choose an item...</option>' + 
    playerInventory.map(item => 
      `<option value="${item.item_id}" data-quantity="${item.quantity}">
        ${item.items.name} (x${item.quantity})
      </option>`
    ).join('');
}

// Calculate listing fee
document.getElementById('sellPrice').addEventListener('input', updateListingFee);
document.getElementById('sellQuantity').addEventListener('input', updateListingFee);

function updateListingFee() {
  const quantity = parseInt(document.getElementById('sellQuantity').value) || 1;
  const price = parseInt(document.getElementById('sellPrice').value) || 0;
  const fee = Math.floor((quantity * price * 5) / 100);
  document.getElementById('listingFee').textContent = fee;
}

// Create listing
async function createListing() {
  const itemId = document.getElementById('sellItemSelect').value;
  const quantity = parseInt(document.getElementById('sellQuantity').value);
  const price = parseInt(document.getElementById('sellPrice').value);
  
  if (!itemId || quantity < 1 || price < 1) {
    showToast('Please fill in all fields', 'error');
    return;
  }
  
  const selectedItem = playerInventory.find(i => i.item_id === itemId);
  if (!selectedItem || selectedItem.quantity < quantity) {
    showToast('Not enough items', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('create_market_listing', {
      p_item_id: itemId,
      p_quantity: quantity,
      p_price_per_unit: price
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(`Item listed for sale! Fee paid: ₹${data.fee_paid}`, 'success');
      await loadPlayerInventory();
      await loadActiveListings();
      await loadMyListings();
      updateSellItemSelect();
    } else {
      showToast(data.error || 'Failed to create listing', 'error');
    }
  } catch (error) {
    console.error('Error creating listing:', error);
    showToast('Error creating listing', 'error');
  }
}

// Render listings
function renderListings() {
  const grid = document.getElementById('listingsGrid');
  
  if (activeListings.length === 0) {
    grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px;">No active listings</div>';
    return;
  }
  
  const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  const sort = document.getElementById('sortFilter').value;
  
  let filtered = activeListings.filter(listing => {
    const matchesSearch = listing.item.name.toLowerCase().includes(searchTerm);
    const matchesCategory = category === 'all' || listing.item.type === category;
    return matchesSearch && matchesCategory;
  });
  
  // Sort
  filtered.sort((a, b) => {
    switch(sort) {
      case 'price_asc': return a.price_per_unit - b.price_per_unit;
      case 'price_desc': return b.price_per_unit - a.price_per_unit;
      case 'newest': return new Date(b.created_at) - new Date(a.created_at);
      case 'oldest': return new Date(a.created_at) - new Date(b.created_at);
      default: return 0;
    }
  });
  
  grid.innerHTML = filtered.map(listing => {
    const isFavorite = favorites.includes(listing.item_id);
    const sellerName = listing.seller ? listing.seller.username : 'Unknown';
    
    return `
      <div class="listing-card">
        <div class="listing-header">
          <span class="listing-item">${listing.item.icon || '📦'} ${listing.item.name}</span>
          <span class="listing-quantity">x${listing.quantity}</span>
        </div>
        <div class="listing-seller">Seller: ${sellerName}</div>
        <div class="listing-price">
          ₹${listing.price_per_unit.toLocaleString()} <small>each</small>
        </div>
        <div class="listing-price">
          Total: ₹${listing.total_price.toLocaleString()}
        </div>
        <div class="listing-actions">
          <button class="buy-btn" onclick="openBuyModal('${listing.id}')">Buy</button>
          <button class="favorite-btn ${isFavorite ? 'active' : ''}" 
                  onclick="toggleFavorite('${listing.item_id}')">
            ${isFavorite ? '★' : '☆'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

// Filter listings (debounced)
let filterTimeout;
function filterListings() {
  clearTimeout(filterTimeout);
  filterTimeout = setTimeout(renderListings, 300);
}

// Open buy modal
function openBuyModal(listingId) {
  selectedListing = activeListings.find(l => l.id === listingId);
  if (!selectedListing) return;
  
  const modal = document.getElementById('buyModal');
  const details = document.getElementById('modalItemDetails');
  const quantity = document.getElementById('modalQuantity');
  const total = document.getElementById('modalTotal');
  
  details.innerHTML = `
    <strong>${selectedListing.item.name}</strong><br>
    Seller: ${selectedListing.seller.username}<br>
    Price: ₹${selectedListing.price_per_unit} each<br>
    Available: ${selectedListing.quantity}
  `;
  
  quantity.max = selectedListing.quantity;
  quantity.value = 1;
  total.textContent = selectedListing.price_per_unit;
  
  quantity.oninput = () => {
    const q = parseInt(quantity.value) || 1;
    total.textContent = q * selectedListing.price_per_unit;
  };
  
  modal.style.display = 'block';
}

// Close modal
function closeModal() {
  document.getElementById('buyModal').style.display = 'none';
  selectedListing = null;
}

// Confirm purchase
async function confirmPurchase() {
  if (!selectedListing) return;
  
  const quantity = parseInt(document.getElementById('modalQuantity').value);
  
  if (quantity < 1 || quantity > selectedListing.quantity) {
    showToast('Invalid quantity', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('buy_market_listing', {
      p_listing_id: selectedListing.id,
      p_quantity: quantity
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast(`Purchase successful! Paid: ₹${data.total_cost}`, 'success');
      closeModal();
      await loadPlayerData();
      await loadActiveListings();
      await loadMyListings();
    } else {
      showToast(data.error || 'Purchase failed', 'error');
    }
  } catch (error) {
    console.error('Error buying:', error);
    showToast('Error processing purchase', 'error');
  }
}

// Toggle favorite
async function toggleFavorite(itemId) {
  try {
    if (favorites.includes(itemId)) {
      await sb
        .from('market_favorites')
        .delete()
        .eq('player_id', currentPlayer.id)
        .eq('item_id', itemId);
      
      favorites = favorites.filter(id => id !== itemId);
      showToast('Removed from favorites', 'info');
    } else {
      await sb
        .from('market_favorites')
        .insert({
          player_id: currentPlayer.id,
          item_id: itemId
        });
      
      favorites.push(itemId);
      showToast('Added to favorites', 'success');
    }
    
    renderListings();
  } catch (error) {
    console.error('Error toggling favorite:', error);
  }
}

// Render my listings
function renderMyListings() {
  const container = document.querySelector('#my-listings .listings-grid');
  if (!container) return;
  
  if (myListings.length === 0) {
    container.innerHTML = '<div style="text-align: center; padding: 40px;">You have no listings</div>';
    return;
  }
  
  container.innerHTML = myListings.map(listing => {
    const statusClass = `status-${listing.status}`;
    
    return `
      <div class="listing-card">
        <div class="listing-header">
          <span class="listing-item">${listing.item.icon || '📦'} ${listing.item.name}</span>
          <span class="listing-quantity">x${listing.quantity}</span>
        </div>
        <div class="listing-price">₹${listing.price_per_unit} each</div>
        <div class="listing-price">Total: ₹${listing.total_price}</div>
        <div style="margin: 10px 0;">
          <span class="my-listing-status ${statusClass}">${listing.status}</span>
        </div>
        ${listing.status === 'active' ? `
          <button class="cancel-btn" onclick="cancelListing('${listing.id}')">Cancel</button>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Cancel listing
async function cancelListing(listingId) {
  if (!confirm('Are you sure you want to cancel this listing?')) return;
  
  try {
    const { data, error } = await sb.rpc('cancel_market_listing', {
      p_listing_id: listingId
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast('Listing cancelled', 'success');
      await loadMyListings();
      await loadActiveListings();
      await loadPlayerInventory();
    }
  } catch (error) {
    console.error('Error cancelling listing:', error);
    showToast('Error cancelling listing', 'error');
  }
}

// Render notifications
function renderNotifications() {
  const container = document.getElementById('notificationsList');
  
  if (notifications.length === 0) {
    container.innerHTML = '<div style="text-align: center; padding: 20px;">No notifications</div>';
    return;
  }
  
  container.innerHTML = notifications.map(notif => `
    <div class="notification-item ${notif.read ? '' : 'unread'}">
      <div class="notification-message">${notif.message}</div>
      <div class="notification-time">${new Date(notif.created_at).toLocaleString()}</div>
    </div>
  `).join('');
}

// Render price chart
function renderPriceChart() {
  const chart = document.getElementById('priceChart');
  const stats = document.getElementById('priceStats');
  
  if (priceHistory.length === 0) {
    chart.innerHTML = '<p style="text-align: center;">No price data available</p>';
    stats.innerHTML = '';
    return;
  }
  
  const maxPrice = Math.max(...priceHistory.map(p => p.avg_price));
  
  chart.innerHTML = priceHistory.map(p => {
    const height = (p.avg_price / maxPrice) * 100;
    return `<div class="chart-bar" style="height: ${height}%;" title="₹${p.avg_price}"></div>`;
  }).join('');
  
  const latest = priceHistory[0];
  stats.innerHTML = `
    <div class="price-stat">
      <div class="price-stat-label">Avg Price</div>
      <div class="price-stat-value">₹${latest.avg_price}</div>
    </div>
    <div class="price-stat">
      <div class="price-stat-label">Volume</div>
      <div class="price-stat-value">${latest.volume}</div>
    </div>
    <div class="price-stat">
      <div class="price-stat-label">Min</div>
      <div class="price-stat-value">₹${latest.min_price}</div>
    </div>
    <div class="price-stat">
      <div class="price-stat-label">Max</div>
      <div class="price-stat-value">₹${latest.max_price}</div>
    </div>
  `;
}

// Switch tabs
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  const listingsSection = document.getElementById('listingsSection');
  const sectionHeader = listingsSection.querySelector('.section-header span:first-child');
  
  switch(tabName) {
    case 'buy':
      sectionHeader.textContent = '🛒 Active Listings';
      renderListings();
      break;
    case 'sell':
      sectionHeader.textContent = '💰 My Items for Sale';
      listingsSection.querySelector('.listings-grid').innerHTML = '';
      break;
    case 'my-listings':
      sectionHeader.textContent = '📋 My Listings';
      renderMyListings();
      break;
    case 'history':
      sectionHeader.textContent = '📜 Transaction History';
      loadTransactionHistory();
      break;
    case 'favorites':
      sectionHeader.textContent = '⭐ Favorite Items';
      loadFavoritesListings();
      break;
  }
}

// Load transaction history
async function loadTransactionHistory() {
  const grid = document.getElementById('listingsGrid');
  grid.innerHTML = '<div style="text-align: center; padding: 40px;">Loading...</div>';
  
  try {
    const { data } = await sb
      .from('market_transactions')
      .select(`
        *,
        buyer:players!market_transactions_buyer_id_fkey (username),
        seller:players!market_transactions_seller_id_fkey (username),
        item:items (*)
      `)
      .or(`buyer_id.eq.${currentPlayer.id},seller_id.eq.${currentPlayer.id}`)
      .order('created_at', { ascending: false })
      .limit(50);
    
    if (!data || data.length === 0) {
      grid.innerHTML = '<div style="text-align: center; padding: 40px;">No transactions yet</div>';
      return;
    }
    
    grid.innerHTML = data.map(t => {
      const isBuyer = t.buyer_id === currentPlayer.id;
      
      return `
        <div class="listing-card">
          <div class="listing-header">
            <span class="listing-item">${t.item.icon || '📦'} ${t.item.name}</span>
            <span class="listing-quantity">x${t.quantity}</span>
          </div>
          <div>${isBuyer ? 'Bought from' : 'Sold to'}: ${isBuyer ? t.seller.username : t.buyer.username}</div>
          <div class="listing-price ${isBuyer ? '' : 'profit'}">
            ${isBuyer ? '-' : '+'}₹${t.total_price.toLocaleString()}
          </div>
          <div style="font-size: 0.8rem; color: #666;">
            ${new Date(t.created_at).toLocaleString()}
          </div>
        </div>
      `;
    }).join('');
  } catch (error) {
    console.error('Error loading history:', error);
    grid.innerHTML = '<div style="text-align: center; padding: 40px;">Error loading history</div>';
  }
}

// Load favorites listings
async function loadFavoritesListings() {
  const grid = document.getElementById('listingsGrid');
  
  if (favorites.length === 0) {
    grid.innerHTML = '<div style="text-align: center; padding: 40px;">No favorite items</div>';
    return;
  }
  
  const favoriteListings = activeListings.filter(l => favorites.includes(l.item_id));
  
  if (favoriteListings.length === 0) {
    grid.innerHTML = '<div style="text-align: center; padding: 40px;">No listings for your favorite items</div>';
    return;
  }
  
  grid.innerHTML = favoriteListings.map(listing => {
    return `
      <div class="listing-card">
        <div class="listing-header">
          <span class="listing-item">${listing.item.icon || '📦'} ${listing.item.name}</span>
          <span class="listing-quantity">x${listing.quantity}</span>
        </div>
        <div class="listing-seller">Seller: ${listing.seller.username}</div>
        <div class="listing-price">
          ₹${listing.price_per_unit.toLocaleString()} <small>each</small>
        </div>
        <div class="listing-price">
          Total: ₹${listing.total_price.toLocaleString()}
        </div>
        <button class="buy-btn" onclick="openBuyModal('${listing.id}')">Buy</button>
      </div>
    `;
  }).join('');
}

// Navigation
function goToDashboard() {
  window.location.href = "dashboard.html";
}

// Initialize
loadPlayerData();

// Refresh every 30 seconds
setInterval(() => {
  if (document.querySelector('.tab-btn.active').textContent.includes('Buy')) {
    loadActiveListings();
  }
}, 30000);
</script>
