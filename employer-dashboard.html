<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard - Rheoa RPG</title>
    <style>
        /* same as before */
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .order-card { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .order-status { font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        .status-pending { background: #ff9800; color: white; }
        .status-assigned { background: #2196F3; color: white; }
        .status-completed { background: #4CAF50; color: white; }
        .status-released { background: #9c27b0; color: white; }
        .status-revision { background: #f44336; color: white; }
        button { background: #4CAF50; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 5px; }
        .chat-area { border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; }
        .chat-messages { height: 200px; overflow-y: auto; padding: 10px; background: #fafafa; }
        .chat-message { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        .message-sender { font-weight: bold; }
        .message-time { font-size: 0.7rem; color: #666; margin-left: 10px; }
        .message-text { margin-top: 3px; }
        .chat-input { display: flex; gap: 10px; padding: 10px; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 8px; }
        .back-btn { display: block; width: 200px; margin: 30px auto; text-align: center; background: #666; color: white; padding: 10px; border-radius: 8px; text-decoration: none; }
        .summary { display: flex; gap: 20px; margin-bottom: 20px; }
        .summary-card { background: #e3f2fd; padding: 15px; border-radius: 8px; text-align: center; flex: 1; }
        .summary-card h3 { margin: 0; color: #2196F3; }
        .summary-card p { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        .past-orders { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 15px; }
        .past-orders summary { font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .past-order { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadein 0.5s; }
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employer Dashboard</h1>
        <div class="summary">
            <div class="summary-card"><h3>💰 Total Spent</h3><p id="totalSpent">$0</p></div>
            <div class="summary-card"><h3>📦 Pending Value</h3><p id="pendingValue">$0</p></div>
        </div>
        <div id="ordersList">Loading your orders...</div>
        <div class="past-orders">
            <details>
                <summary>📜 Past Orders (click to expand)</summary>
                <div id="pastOrdersList"></div>
            </details>
        </div>
    </div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
        const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let employerEmail = null;
        let orders = [];
        let chatSubscriptions = {};

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function loadEmployerOrders() {
            let storedEmail = localStorage.getItem('freelance_employer_email');
            if (storedEmail) {
                employerEmail = storedEmail;
            } else {
                employerEmail = prompt("Enter your email address used when ordering:");
                if (!employerEmail) return;
                localStorage.setItem('freelance_employer_email', employerEmail);
            }
            const emailLower = employerEmail.toLowerCase();
            const { data, error } = await sb
                .from('freelance_orders')
                .select('*, freelance_templates(title), freelancers(name)')
                .eq('employer_email', emailLower)
                .order('created_at', { ascending: false });
            if (error) {
                alert('Error loading orders');
                return;
            }
            orders = data || [];
            renderOrders();
            orders.forEach(order => {
                subscribeToOrderChat(order.id);
                subscribeToOrderStatus(order.id);
            });

            // Calculate totals
            const totalSpent = orders.reduce((sum, o) => sum + o.amount, 0);
            const pendingValue = orders.filter(o => o.status === 'assigned' || o.status === 'revision').reduce((sum, o) => sum + o.amount, 0);
            document.getElementById('totalSpent').innerText = `$${totalSpent.toFixed(2)}`;
            document.getElementById('pendingValue').innerText = `$${pendingValue.toFixed(2)}`;

            // Past orders (completed or released)
            const pastOrders = orders.filter(o => o.status === 'completed' || o.status === 'released');
            renderPastOrders(pastOrders);
        }

        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!orders.length) {
                container.innerHTML = '<p>No orders found.</p>';
                return;
            }
            container.innerHTML = orders.map(order => `
                <div class="order-card" id="order-${order.id}">
                    <h3>Order #${order.id.slice(0,8)}</h3>
                    <p><strong>Template:</strong> ${order.freelance_templates?.title || 'Unknown'}</p>
                    <p><strong>Amount:</strong> $${order.amount} USDT</p>
                    <p><strong>Status:</strong> <span class="order-status status-${order.status}">${order.status}</span></p>
                    <p><strong>Instructions:</strong> ${order.customization_data?.instructions || 'None'}</p>
                    <div id="chat-${order.id}"></div>
                    ${order.status === 'completed' ? `<button onclick="rejectOrder('${order.id}')">Request Revision</button>` : ''}
                    ${order.status === 'revision' ? '<p style="color:red;">Revision requested – waiting for freelancer to update.</p>' : ''}
                </div>
            `).join('');
            orders.forEach(order => attachChatUI(order.id));
        }

        function renderPastOrders(pastOrders) {
            const container = document.getElementById('pastOrdersList');
            if (!pastOrders.length) {
                container.innerHTML = '<p>No past orders.</p>';
                return;
            }
            container.innerHTML = pastOrders.map(order => `
                <div class="past-order">
                    <strong>${order.freelance_templates?.title || 'Template'}</strong><br>
                    Amount: $${order.amount}<br>
                    Status: ${order.status}<br>
                    Completed: ${order.completed_at ? new Date(order.completed_at).toLocaleString() : 'N/A'}
                </div>
            `).join('');
        }

        function attachChatUI(orderId) {
            const chatContainer = document.getElementById(`chat-${orderId}`);
            if (!chatContainer) return;
            chatContainer.innerHTML = `
                <div class="chat-area">
                    <div class="chat-messages" id="chatMessages-${orderId}"></div>
                    <div class="chat-input">
                        <input type="text" id="chatInput-${orderId}" placeholder="Type your message...">
                        <button onclick="sendMessage('${orderId}')">Send</button>
                    </div>
                </div>
            `;
            loadChatMessages(orderId);
        }

        async function loadChatMessages(orderId) {
            const { data, error } = await sb
                .from('freelance_order_messages')
                .select('*')
                .eq('order_id', orderId)
                .order('created_at', { ascending: true });
            if (error) console.error(error);
            else data.forEach(msg => addMessageToChat(orderId, msg));
        }

        function subscribeToOrderChat(orderId) {
            const channel = sb.channel(`order-messages-${orderId}`);
            channel.on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'freelance_order_messages',
                filter: `order_id=eq.${orderId}`
            }, (payload) => {
                addMessageToChat(orderId, payload.new);
            }).subscribe();
            chatSubscriptions[orderId] = channel;
        }

        function subscribeToOrderStatus(orderId) {
            sb.channel(`order-status-${orderId}`)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'freelance_orders',
                    filter: `id=eq.${orderId}`
                }, (payload) => {
                    if (payload.new.status === 'completed' && payload.old.status !== 'completed') {
                        showToast('📢 Job completed! Review and confirm receipt.');
                        loadEmployerOrders(); // refresh
                    } else if (payload.new.status === 'revision' && payload.old.status !== 'revision') {
                        showToast('🔄 Revision requested. Waiting for freelancer.');
                        loadEmployerOrders();
                    }
                })
                .subscribe();
        }

        function addMessageToChat(orderId, msg) {
            const container = document.getElementById(`chatMessages-${orderId}`);
            if (!container) return;
            const order = orders.find(o => o.id === orderId);
            const freelancerName = order?.freelancers?.name || 'Freelancer';
            const senderLabel = msg.sender_type === 'employer' ? `Employer (${employerEmail})` : `Freelancer (${freelancerName})`;
            const time = new Date(msg.created_at).toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `
                <div class="message-sender">${senderLabel} <span class="message-time">${time}</span></div>
                <div class="message-text">${escapeHtml(msg.message)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage(orderId) {
            const input = document.getElementById(`chatInput-${orderId}`);
            const text = input.value.trim();
            if (!text) return;
            const { error } = await sb.from('freelance_order_messages').insert({
                order_id: orderId,
                sender_type: 'employer',
                sender_id: employerEmail,
                message: text
            });
            if (error) console.error(error);
            else input.value = '';
        }

        async function rejectOrder(orderId) {
            if (!confirm('Request revision? The freelancer will be notified and must update the work. Only one revision allowed.')) return;
            const { data, error } = await sb.rpc('reject_order', { p_order_id: orderId, p_employer_email: employerEmail });
            if (error || !data.success) {
                alert(error?.message || data?.error);
            } else {
                alert('Revision requested.');
                loadEmployerOrders(); // refresh
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadEmployerOrders();
    </script>
</body>
</html>
