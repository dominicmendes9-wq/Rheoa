<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Portal - Rheoa RPG</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #f8f8f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .login-container { max-width: 400px; margin: 100px auto; text-align: center; }
        .order-card { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .order-status { font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        .status-pending { background: #ff9800; color: white; }
        .status-assigned { background: #2196F3; color: white; }
        .status-completed { background: #4CAF50; color: white; }
        .status-released { background: #9c27b0; color: white; }
        .status-revision { background: #f44336; color: white; }
        button { background: #4CAF50; color: white; border: none; padding: 8px 16px; cursor: pointer; margin: 5px; border-radius: 5px; }
        .chat-area { border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; }
        .chat-messages { height: 200px; overflow-y: auto; padding: 10px; background: #fafafa; }
        .chat-message { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        .message-sender { font-weight: bold; }
        .message-time { font-size: 0.7rem; color: #666; margin-left: 10px; }
        .message-text { margin-top: 3px; }
        .chat-input { display: flex; gap: 10px; padding: 10px; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 8px; }
        .back-btn { display: inline-block; background: #666; color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .summary { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .summary-card { background: #e3f2fd; padding: 15px; border-radius: 8px; text-align: center; flex: 1; }
        .summary-card h3 { margin: 0; color: #2196F3; }
        .summary-card p { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        .past-orders { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 15px; }
        .past-orders summary { font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .past-order { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        .logout-btn { background: #f44336; margin-left: 10px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadein 0.5s; }
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
        input, button { font-family: inherit; }
        .error { color: red; margin-top: 10px; }
        .debug-info { background: #f0f0f0; padding: 10px; margin: 10px 0; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    const supabaseUrl = 'https://mtiwodvsrwvrujbhmmrn.supabase.co';
    const supabaseKey = 'sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    let employerEmail = null;
    let orders = [];
    let chatSubscriptions = {};

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ---------- LOGIN PAGE ----------
    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-container">
                <div style="background: white; padding: 30px; border-radius: 10px;">
                    <h1>👔 Employer Login</h1>
                    <p>Enter the email you used when creating the order:</p>
                    <input type="email" id="loginEmail" placeholder="you@example.com" style="width:100%; padding:10px; margin:10px 0;">
                    <button onclick="login()">Login & Go to Dashboard</button>
                    <div id="loginError" class="error"></div>
                </div>
            </div>
        `;
    }

    window.login = function() {
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) {
            document.getElementById('loginError').innerText = 'Please enter your email';
            return;
        }
        localStorage.setItem('freelance_employer_email', email);
        loadEmployerOrders(); // will re-render dashboard
    };

    // ---------- DASHBOARD WITH DEBUG ----------
    async function loadEmployerOrders() {
        let storedEmail = localStorage.getItem('freelance_employer_email');
        if (!storedEmail) {
            renderLogin();
            return;
        }
        employerEmail = storedEmail;
        const emailLower = employerEmail.toLowerCase();

        // DEBUG: Show loading state
        document.getElementById('app').innerHTML = `<div class="container"><p>Loading orders for ${escapeHtml(employerEmail)}...</p></div>`;

        try {
            // First, test a simple query without joins
            const { data: testData, error: testError } = await sb
                .from('freelance_orders')
                .select('id, employer_email, status')
                .eq('employer_email', emailLower);

            if (testError) {
                throw new Error(`Simple query failed: ${testError.message}`);
            }
            console.log('Simple query result:', testData);

            // Now the full query with template join
            const { data, error } = await sb
                .from('freelance_orders')
                .select(`
                    *,
                    freelance_templates (title)
                `)
                .eq('employer_email', emailLower)
                .order('created_at', { ascending: false });

            if (error) {
                throw new Error(`Full query failed: ${error.message}`);
            }

            orders = data || [];
            renderDashboard();
            orders.forEach(order => {
                subscribeToOrderChat(order.id);
                subscribeToOrderStatus(order.id);
            });
        } catch (err) {
            console.error('Error loading orders:', err);
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <h2>Error Loading Orders</h2>
                    <div class="debug-info">
                        <strong>Error details:</strong><br>
                        ${escapeHtml(err.message)}
                    </div>
                    <p>Possible causes:</p>
                    <ul>
                        <li>The table 'freelance_orders' does not have an 'employer_email' column (check your schema).</li>
                        <li>The table 'freelance_templates' does not have a 'title' column.</li>
                        <li>Your Supabase RLS policies are blocking access.</li>
                    </ul>
                    <button onclick="logout()">Logout</button>
                </div>
            `;
        }
    }

    function renderDashboard() {
        const totalSpent = orders.reduce((sum, o) => sum + (o.amount || 0), 0);
        const pendingValue = orders.filter(o => o.status === 'assigned' || o.status === 'revision')
                                   .reduce((sum, o) => sum + (o.amount || 0), 0);
        const pastOrders = orders.filter(o => o.status === 'completed' || o.status === 'released');

        let ordersHtml = '';
        if (orders.length === 0) {
            ordersHtml = '<p>No orders found for this email.</p>';
        } else {
            ordersHtml = orders.map(order => `
                <div class="order-card" id="order-${order.id}">
                    <h3>Order #${order.id.slice(0,8)}</h3>
                    <p><strong>Template:</strong> ${escapeHtml(order.freelance_templates?.title || 'Unknown')}</p>
                    <p><strong>Amount:</strong> $${order.amount} USDT</p>
                    <p><strong>Status:</strong> <span class="order-status status-${order.status}">${order.status}</span></p>
                    <p><strong>Instructions:</strong> ${escapeHtml(order.customization_data?.instructions || 'None')}</p>
                    <div id="chat-${order.id}"></div>
                    ${order.status === 'completed' ? `<button onclick="rejectOrder('${order.id}')">Request Revision</button>` : ''}
                    ${order.status === 'revision' ? '<p style="color:red;">Revision requested – waiting for freelancer to update.</p>' : ''}
                </div>
            `).join('');
        }

        const pastHtml = pastOrders.length === 0 ? '<p>No past orders.</p>' : pastOrders.map(order => `
            <div class="past-order">
                <strong>${escapeHtml(order.freelance_templates?.title || 'Template')}</strong><br>
                Amount: $${order.amount}<br>
                Status: ${order.status}<br>
                Completed: ${order.completed_at ? new Date(order.completed_at).toLocaleString() : 'N/A'}
            </div>
        `).join('');

        document.getElementById('app').innerHTML = `
            <div class="container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>Employer Dashboard</h1>
                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
                <div class="summary">
                    <div class="summary-card"><h3>💰 Total Spent</h3><p>$${totalSpent.toFixed(2)}</p></div>
                    <div class="summary-card"><h3>📦 Pending Value</h3><p>$${pendingValue.toFixed(2)}</p></div>
                </div>
                <div id="ordersList">${ordersHtml}</div>
                <div class="past-orders">
                    <details>
                        <summary>📜 Past Orders (click to expand)</summary>
                        <div id="pastOrdersList">${pastHtml}</div>
                    </details>
                </div>
            </div>
        `;

        // Attach chat UI for each order
        orders.forEach(order => attachChatUI(order.id));
    }

    function attachChatUI(orderId) {
        const chatContainer = document.getElementById(`chat-${orderId}`);
        if (!chatContainer) return;
        chatContainer.innerHTML = `
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages-${orderId}"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput-${orderId}" placeholder="Type your message...">
                    <button onclick="sendMessage('${orderId}')">Send</button>
                </div>
            </div>
        `;
        loadChatMessages(orderId);
    }

    async function loadChatMessages(orderId) {
        const { data, error } = await sb
            .from('freelance_order_messages')
            .select('*')
            .eq('order_id', orderId)
            .order('created_at', { ascending: true });
        if (error) console.error(error);
        else data.forEach(msg => addMessageToChat(orderId, msg));
    }

    function subscribeToOrderChat(orderId) {
        const channel = sb.channel(`order-messages-${orderId}`);
        channel.on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'freelance_order_messages',
            filter: `order_id=eq.${orderId}`
        }, (payload) => {
            addMessageToChat(orderId, payload.new);
        }).subscribe();
        chatSubscriptions[orderId] = channel;
    }

    function subscribeToOrderStatus(orderId) {
        sb.channel(`order-status-${orderId}`)
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'freelance_orders',
                filter: `id=eq.${orderId}`
            }, (payload) => {
                if (payload.new.status === 'completed' && payload.old.status !== 'completed') {
                    showToast('📢 Job completed! Review and confirm receipt.');
                    loadEmployerOrders();
                } else if (payload.new.status === 'revision' && payload.old.status !== 'revision') {
                    showToast('🔄 Revision requested. Waiting for freelancer.');
                    loadEmployerOrders();
                }
            })
            .subscribe();
    }

    function addMessageToChat(orderId, msg) {
        const container = document.getElementById(`chatMessages-${orderId}`);
        if (!container) return;
        const order = orders.find(o => o.id === orderId);
        const freelancerName = 'Freelancer';
        const senderLabel = msg.sender_type === 'employer' ? `Employer (${employerEmail})` : `Freelancer (${freelancerName})`;
        const time = new Date(msg.created_at).toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'chat-message';
        div.innerHTML = `
            <div class="message-sender">${escapeHtml(senderLabel)} <span class="message-time">${time}</span></div>
            <div class="message-text">${escapeHtml(msg.message)}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    window.sendMessage = async function(orderId) {
        const input = document.getElementById(`chatInput-${orderId}`);
        const text = input.value.trim();
        if (!text) return;
        const { error } = await sb.from('freelance_order_messages').insert({
            order_id: orderId,
            sender_type: 'employer',
            sender_id: employerEmail,
            message: text
        });
        if (error) console.error(error);
        else input.value = '';
    };

    window.rejectOrder = async function(orderId) {
        if (!confirm('Request revision? The freelancer will be notified and must update the work. Only one revision allowed.')) return;
        const { data, error } = await sb.rpc('reject_order', { p_order_id: orderId, p_employer_email: employerEmail });
        if (error || !data.success) {
            alert(error?.message || data?.error);
        } else {
            alert('Revision requested.');
            loadEmployerOrders();
        }
    };

    window.logout = function() {
        localStorage.removeItem('freelance_employer_email');
        renderLogin();
    };

    // Initialize
    loadEmployerOrders();
</script>
</body>
</html>
