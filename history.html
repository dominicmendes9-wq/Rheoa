<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - History</title>
  <style>
    body { font-family: 'Courier New', monospace; background:#f8f8f0; color:#222; padding:20px; }
    h1 { text-align:center; margin-bottom:20px; }
    .history-card { border:2px solid black; border-radius:10px; padding:10px; margin:10px; background:#fff; }
    .success { color:green; font-weight:bold; }
    .fail { color:red; font-weight:bold; }
    button { padding:8px 12px; margin:5px; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>

<h1>📰 Crime History</h1>

<div id="history">Loading...</div>
<div style="text-align:center; margin-top:20px;">
  <button onclick="goBack()">Back to Dashboard</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;

// 🔥 LOAD HISTORY
async function loadHistory() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href="index.html";

  // Get player
  const { data: playerData } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  if (!playerData) { document.getElementById("history").innerText="Player not found"; return; }
  player = playerData;

  // Get player's crimes
  const { data: history, error } = await sb
    .from('player_crimes')
    .select(`
      id,
      crime_id,
      last_attempt,
      crimes (
        name,
        reward_cash,
        reward_xp,
        fail_penalty
      )
    `)
    .eq('player_id', player.id)
    .order('last_attempt', { ascending: false });

  if (error) {
    document.getElementById("history").innerText="Error loading history";
    console.error(error);
    return;
  }

  if (!history || history.length === 0) {
    document.getElementById("history").innerText="No crimes attempted yet!";
    return;
  }

  let html = "";
  history.forEach(h => {
    const date = new Date(h.last_attempt).toLocaleString();
    // Determine success/failure by cash change
    let resultClass = "success";
    let resultText = `+₹${h.crimes.reward_cash} | +${h.crimes.reward_xp}XP`;
    // If you want, you can store success/failure in player_crimes for accurate display
    html += `
      <div class="history-card">
        <b>${h.crimes.name}</b><br>
        ${date}<br>
        <span class="${resultClass}">${resultText}</span>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

// 🔙 BACK
function goBack() {
  window.location.href="dashboard.html";
}

loadHistory();
</script>

</body>
</html>
