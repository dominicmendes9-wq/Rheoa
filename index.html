<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rheoa RPG - Welcome</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #222; 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background particles */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-10px, -10px) scale(1.05); }
      75% { transform: translate(10px, 10px) scale(0.95); }
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    
    .welcome-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.1);
      animation: slideUp 0.6s ease-out, glow 3s infinite;
      position: relative;
      overflow: hidden;
    }

    .welcome-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
      50% { box-shadow: 0 20px 80px rgba(102, 126, 234, 0.5); }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }
    
    .logo h1 {
      font-size: 3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      animation: pulse 2s infinite;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    .tagline {
      text-align: center;
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 40px;
      font-style: italic;
      animation: fadeIn 1s ease-out 0.2s both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    
    .feature {
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 12px;
      transition: all 0.3s;
      animation: fadeInFeature 0.5s ease-out;
      animation-fill-mode: both;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .feature:nth-child(1) { animation-delay: 0.1s; }
    .feature:nth-child(2) { animation-delay: 0.2s; }
    .feature:nth-child(3) { animation-delay: 0.3s; }
    .feature:nth-child(4) { animation-delay: 0.4s; }
    .feature:nth-child(5) { animation-delay: 0.5s; }
    .feature:nth-child(6) { animation-delay: 0.6s; }

    @keyframes fadeInFeature {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .feature:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #667eea;
      background: white;
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
    }
    
    .feature-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .feature-text {
      font-size: 0.9rem;
      font-weight: bold;
      color: #333;
      transition: color 0.2s;
    }

    .feature:hover .feature-text {
      color: #667eea;
    }
    
    .login-section {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .login-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      width: 100%;
      max-width: 300px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      animation: slideInButton 0.8s ease-out 0.7s both;
    }

    @keyframes slideInButton {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.8);
    }
    
    .login-btn:active {
      transform: translateY(0) scale(0.95);
    }

    .login-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .login-btn:hover::after {
      width: 300px;
      height: 300px;
    }
    
    .login-btn img {
      width: 24px;
      height: 24px;
      transition: transform 0.3s;
    }

    .login-btn:hover img {
      transform: rotate(360deg);
    }
    
    .status-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f5f5f5;
      color: #333;
      font-size: 1rem;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeInMessage 0.3s ease-out;
      position: relative;
      z-index: 1;
    }
    
    .status-message.show {
      display: flex;
    }
    
    .status-message.success {
      background: #e8f5e8;
      color: #2e7d32;
      border: 1px solid #4CAF50;
    }
    
    .status-message.info {
      background: #e3f2fd;
      color: #1976D2;
      border: 1px solid #2196F3;
    }
    
    .status-message.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #f44336;
    }

    @keyframes fadeInMessage {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .footer {
      margin-top: 30px;
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
      animation: fadeIn 1s ease-out 1s both;
      position: relative;
      z-index: 1;
    }
    
    .footer a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.2s;
      position: relative;
    }
    
    .footer a:hover {
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    .footer a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: white;
      transition: width 0.3s;
    }

    .footer a:hover::after {
      width: 100%;
    }
    
    /* Loading state for button */
    .login-btn.loading {
      opacity: 0.8;
      cursor: not-allowed;
      pointer-events: none;
    }
    
    .login-btn.loading .btn-text {
      display: none;
    }
    
    .login-btn.loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 3px solid white;
      border-top: 3px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* User info card */
    .user-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    .user-info.show {
      display: block;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-info p {
      margin: 5px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info strong {
      color: #ffd700;
    }

    /* Quick guide link */
    .guide-link {
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .guide-link a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: all 0.2s;
    }

    .guide-link a:hover {
      color: white;
      text-decoration: underline;
    }
    
    /* Mobile styles */
    @media (max-width: 600px) {
      .welcome-card {
        padding: 30px 20px;
      }
      
      .logo h1 {
        font-size: 2.5rem;
      }
      
      .features {
        gap: 10px;
      }
      
      .feature {
        padding: 10px;
      }
      
      .feature-icon {
        font-size: 1.5rem;
      }
      
      .feature-text {
        font-size: 0.8rem;
      }
      
      .login-btn {
        padding: 14px 30px;
        font-size: 1rem;
      }

      .user-info {
        font-size: 0.9rem;
      }
    }

    /* Print styles */
    @media print {
      body {
        background: white;
      }
      
      .welcome-card {
        box-shadow: none;
        border: 1px solid #ddd;
      }
      
      .login-btn, .footer {
        display: none;
      }
    }

    /* Focus styles for accessibility */
    .login-btn:focus-visible,
    .feature:focus-visible {
      outline: 3px solid white;
      outline-offset: 2px;
    }

    /* Confetti animation for login success */
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
      animation: confettiFade 2s ease-out forwards;
    }

    @keyframes confettiFade {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="container">
  <div class="welcome-card">
    <div class="logo">
      <h1>Rheoa RPG</h1>
    </div>
    
    <div class="tagline">
      🎮 Begin Your Criminal Empire 🎮
    </div>
    
    <div class="features" id="featuresGrid">
      <div class="feature" tabindex="0" onclick="showFeatureTip('Earn Cash', '💰 Start with jobs to build your wealth!')">
        <div class="feature-icon">💰</div>
        <div class="feature-text">Earn Cash</div>
      </div>
      <div class="feature" tabindex="0" onclick="showFeatureTip('Level Up', '⭐ Gain XP from crimes and jobs to level up!')">
        <div class="feature-icon">⭐</div>
        <div class="feature-text">Level Up</div>
      </div>
      <div class="feature" tabindex="0" onclick="showFeatureTip('Commit Crimes', '🔫 Higher risk = higher reward!')">
        <div class="feature-icon">🔫</div>
        <div class="feature-text">Commit Crimes</div>
      </div>
      <div class="feature" tabindex="0" onclick="showFeatureTip('Work Jobs', '💼 Safe income for beginners')">
        <div class="feature-icon">💼</div>
        <div class="feature-text">Work Jobs</div>
      </div>
      <div class="feature" tabindex="0" onclick="showFeatureTip('Shop & Items', '🎒 Buy items to restore stats')">
        <div class="feature-icon">🎒</div>
        <div class="feature-text">Shop & Items</div>
      </div>
      <div class="feature" tabindex="0" onclick="showFeatureTip('Track History', '📜 Monitor your progress')">
        <div class="feature-icon">📜</div>
        <div class="feature-text">Track History</div>
      </div>
    </div>
    
    <div class="login-section">
      <button class="login-btn" id="loginBtn">
        <span class="btn-text">🚀 Login with Google</span>
      </button>
      
      <!-- User info display (shown when already logged in) -->
      <div class="user-info" id="userInfo"></div>
      
      <p id="status" style="margin-top: 15px; color: #666;"></p>
      
      <div class="guide-link">
        <a href="guide.html" onclick="navigateToGuide(event)">📚 New here? Check out the Guide →</a>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <p>© 2024 Rheoa RPG. All rights reserved.</p>
    <p>Ready to start your journey? <a href="#" onclick="triggerLogin(); return false;">Login now!</a></p>
  </div>
</div>

<!-- Include shared utilities -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="toast.js"></script>
<script src="loading.js"></script>
<script src="error-handler.js"></script>

<script>
// Initialize Supabase client (using shared instance)
const sb = window.supabaseClient;

// ORIGINAL LOGIN FUNCTION - Enhanced with loading states
async function login() {
  const loginBtn = document.getElementById('loginBtn');
  
  try {
    // Show loading state
    loginBtn.classList.add('loading');
    showToast('🔄 Redirecting to Google...', 'info', 3000);
    
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + "/dashboard.html"
      }
    });
  } catch (error) {
    console.error('Login error:', error);
    loginBtn.classList.remove('loading');
    
    // Use error handler
    const friendlyMessage = ErrorHandler.handleSupabaseError(error, 'Login failed');
    showToast(friendlyMessage, 'error', 5000);
  }
}

// Trigger login from footer link
function triggerLogin() {
  document.getElementById('loginBtn').click();
}

// Show feature tips when clicking features
function showFeatureTip(feature, tip) {
  showToast(`💡 ${feature}: ${tip}`, 'info', 4000);
  
  // Add highlight animation to clicked feature
  const featureElement = event.currentTarget;
  featureElement.style.animation = 'none';
  featureElement.offsetHeight; // Trigger reflow
  featureElement.style.animation = 'pulse 0.5s ease';
  setTimeout(() => {
    featureElement.style.animation = '';
  }, 500);
}

// ORIGINAL AUTH STATE HANDLER - Enhanced with animations
sb.auth.onAuthStateChange((event, session) => {
  console.log('Auth event:', event);
  
  if (event === "SIGNED_IN") {
    // Show success message
    showToast('✅ Login successful!', 'success', 3000);
    
    // Create confetti effect
    createConfetti();
    
    // Redirect after a short delay
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1500);
  } else if (event === "SIGNED_OUT") {
    showToast('👋 Signed out successfully', 'info', 3000);
    document.getElementById('userInfo').classList.remove('show');
  } else if (event === "TOKEN_REFRESHED") {
    console.log('Token refreshed');
  }
});

// Create confetti effect
function createConfetti() {
  const confetti = document.createElement('div');
  confetti.className = 'confetti';
  document.body.appendChild(confetti);
  
  // Create canvas confetti if available
  if (typeof confetti !== 'undefined' && window.confetti) {
    window.confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
  
  setTimeout(() => {
    confetti.remove();
  }, 2000);
}

// ORIGINAL CHECK USER FUNCTION - Enhanced
async function checkUser() {
  return ErrorHandler.withErrorHandling(async () => {
    const { data: { user }, error } = await sb.auth.getUser();

    if (error) throw error;

    if (user) {
      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `✓ Logged in as: ${user.email}`;
      statusEl.style.color = '#4CAF50';
      
      // Show user info card
      const userInfo = document.getElementById('userInfo');
      userInfo.innerHTML = `
        <p><strong>👤 Welcome back!</strong></p>
        <p>📧 ${user.email}</p>
        <p>🆔 ${user.id.substring(0, 8)}...</p>
      `;
      userInfo.classList.add('show');
      
      showToast(`Welcome back, ${user.email}!`, 'success', 4000);
      
      // Auto-redirect after 3 seconds if on welcome page
      setTimeout(() => {
        if (window.location.pathname.includes('index') || window.location.pathname === '/') {
          showToast('🔄 Redirecting to dashboard...', 'info', 2000);
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 2000);
        }
      }, 3000);
    } else {
      document.getElementById("status").innerHTML = "🔐 Not logged in";
    }
  }, null, 'Failed to check login status');
}

// Navigate to guide with loading state
function navigateToGuide(event) {
  if (event) event.preventDefault();
  
  showToast('📚 Loading guide...', 'info', 2000);
  setTimeout(() => {
    window.location.href = "guide.html";
  }, 500);
}

// Page initialization
document.addEventListener('DOMContentLoaded', async function() {
  try {
    // Check login status
    await checkUser();
    
    // Show welcome toast
    setTimeout(() => {
      showToast('👋 Welcome to Rheoa RPG!', 'info', 4000);
    }, 500);
    
    // Add click handlers to features
    document.querySelectorAll('.feature').forEach(feature => {
      feature.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          feature.click();
        }
      });
    });
    
    // Prefetch guide page for faster navigation
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => {
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = 'guide.html';
        document.head.appendChild(link);
      });
    }
    
  } catch (error) {
    console.error('Initialization error:', error);
    showToast('Failed to initialize', 'error', 5000);
  }
});

// Handle redirect after OAuth
async function handleRedirect() {
  const { data, error } = await sb.auth.getSession();
  
  if (error) {
    console.error('Session error:', error);
    showToast('Error getting session', 'error');
    return;
  }
  
  if (data.session) {
    showToast('✅ Login successful!', 'success');
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1500);
  }
}

// Check if we're returning from OAuth redirect
if (window.location.hash || window.location.search.includes('access_token')) {
  handleRedirect();
}

// Export functions for global use
window.login = login;
window.triggerLogin = triggerLogin;
window.showFeatureTip = showFeatureTip;
window.navigateToGuide = navigateToGuide;

// Add keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Press 'L' to login
  if (e.key === 'l' || e.key === 'L') {
    if (!e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      login();
    }
  }
  
  // Press 'G' to go to guide
  if (e.key === 'g' || e.key === 'G') {
    if (!e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      navigateToGuide(e);
    }
  }
  
  // Press 'Esc' to clear status
  if (e.key === 'Escape') {
    const statusEl = document.getElementById('status');
    statusEl.innerHTML = '';
  }
});

// Handle visibility change (tab focus)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    // Tab became visible, refresh user status
    checkUser();
  }
});

// Add loading manager integration
window.showLoading = function(show = true) {
  const loginBtn = document.getElementById('loginBtn');
  if (show) {
    loginBtn.classList.add('loading');
  } else {
    loginBtn.classList.remove('loading');
  }
};
</script>

</body>
</html>
