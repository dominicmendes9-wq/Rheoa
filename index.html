<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG</title>
</head>
<body>

<h1>Rheoa RPG</h1>
<button id="loginBtn">Login with Google</button>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

// ✅ FIXED LOGIN
async function login() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: "https://dominicmendes9-wq.github.io/Rheoa/dashboard.html"
    }
  });
}

document.getElementById("loginBtn").addEventListener("click", login);

// ✅ Handle login return
sb.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN") {
    window.location.href = "dashboard.html";
  }
});

// ✅ Check existing session
async function checkUser() {
  const { data } = await sb.auth.getUser();

  if (data.user) {
    document.getElementById("status").innerText =
      "Already logged in: " + data.user.email;
  }
}

checkUser();
</script>

</body>
</html>
