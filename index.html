<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG</title>
</head>
<body>

<h1>Rheoa RPG</h1>
<button id="loginBtn">Login with Google</button>

<p id="status"></p>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// ✅ Create client (ONLY ONCE)
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

// ✅ Login
async function login() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + "/dashboard.html"
    }
  });

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = "Login error";
  }
}

// ✅ Button event
document.getElementById("loginBtn").addEventListener("click", login);

// ✅ Handle session AFTER redirect (VERY IMPORTANT)
sb.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN") {
    window.location.href = "dashboard.html";
  }
});

// ✅ Check existing session on load
async function checkUser() {
  const { data } = await sb.auth.getUser();

  if (data.user) {
    document.getElementById("status").innerText =
      "Already logged in: " + data.user.email;
  }
}

// ✅ CALL IT (you missed this)
checkUser();

</script>

</body>
</html>
