<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Supabase RPG · Google Sign‑In</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; margin: 0; padding: 0; }
    body { background: #e9f0f5; color: #1e2b37; min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { background: #2c3e50; color: #ecf0f1; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: 500; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .app-header small { font-size: 0.9rem; display: block; color: #b0c4de; }
    .container { flex: 1; padding: 15px; max-width: 600px; margin: 0 auto; width: 100%; }
    .card { background: #ffffff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #d4e0e9; }
    h2 { color: #2c3e50; font-size: 1.3rem; margin-bottom: 15px; border-bottom: 2px solid #b0c4de; padding-bottom: 5px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; }
    .stat-item { background: #f4f9ff; padding: 12px; border-radius: 14px; text-align: center; border: 1px solid #cbd7e6; }
    .stat-label { font-size: 0.8rem; color: #4b637a; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 1.6rem; font-weight: 600; color: #1e3b5c; line-height: 1.2; }
    button { background: #3498db; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-size: 1rem; font-weight: 500; width: 100%; margin: 8px 0; box-shadow: 0 2px 5px rgba(52,152,219,0.3); transition: 0.2s; cursor: pointer; border: 1px solid #2980b9; }
    button.secondary { background: #95a5a6; border-color: #7f8c8d; box-shadow: none; }
    button:active { transform: scale(0.98); }
    input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #cbd7e6; border-radius: 30px; font-size: 1rem; background: white; }
    .nav-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
    .nav-row button { flex: 1 1 80px; padding: 10px 0; font-size: 0.9rem; }
    .hidden { display: none !important; }
    .message { background: #d1ecf1; color: #0c5460; padding: 12px; border-radius: 40px; margin: 10px 0; text-align: center; }
    .error { background: #f8d7da; color: #721c24; }
    .location-item { background: #f0f7fe; border-radius: 40px; padding: 12px 18px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #bacfdf; }
    .location-name { font-weight: 600; }
  </style>
  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-header">
    🏰 Supabase RPG
    <small>Sign in with Google</small>
  </div>
  <div class="container" id="app">
    <!-- LOGIN VIEW (Google Sign‑In) -->
    <div id="loginView" class="card">
      <h2>🔐 Welcome</h2>
      <p style="text-align:center; margin-bottom:20px;">Sign in to start your adventure</p>
      <button id="googleSignInBtn">Sign in with Google</button>
    </div>

    <!-- PROFILE SETUP VIEW (for first‑time users) -->
    <div id="profileSetupView" class="card hidden">
      <h2>📝 Complete Your Profile</h2>
      <form id="profileForm">
        <input type="text" id="fullName" placeholder="Full Name (from Google)" readonly>
        <input type="text" id="username" placeholder="Username (display name)" required>
        <select id="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
        <input type="number" id="age" placeholder="Age" min="1" max="120" required>
        <input type="text" id="location" placeholder="Location (e.g., New York)" required>
        <textarea id="bio" placeholder="Tell us about yourself" rows="3"></textarea>
        <button type="submit">Save & Enter Game</button>
      </form>
    </div>

    <!-- MAIN GAME VIEW (dashboard + map + inventory + bank) -->
    <div id="gameView" class="hidden">
      <!-- Dashboard -->
      <div id="dashboardView">
        <div class="card">
          <h2>📊 Dashboard</h2>
          <div class="stat-grid" id="playerStats"></div>
        </div>
        <div class="nav-row">
          <button class="secondary" data-view="map">🗺️ Map</button>
          <button class="secondary" data-view="inventory">🎒 Inventory</button>
          <button class="secondary" data-view="bank">🏦 Bank</button>
          <button class="secondary" id="logoutBtn">🚪 Logout</button>
        </div>
      </div>

      <!-- Map View -->
      <div id="mapView" class="hidden">
        <div class="card">
          <h2>🗺️ Explore Locations</h2>
          <div id="locationList"></div>
          <div id="exploreResult" class="message hidden"></div>
          <button class="secondary" data-view="dashboard">⬅️ Back</button>
        </div>
      </div>

      <!-- Inventory View -->
      <div id="inventoryView" class="hidden">
        <div class="card">
          <h2>🎒 Inventory</h2>
          <div id="inventoryList">Loading...</div>
          <button class="secondary" data-view="dashboard">⬅️ Back</button>
        </div>
      </div>

      <!-- Bank View -->
      <div id="bankView" class="hidden">
        <div class="card">
          <h2>🏦 Bank</h2>
          <div id="bankStats"></div>
          <input type="number" id="bankAmount" placeholder="Amount">
          <button id="depositBtn">Deposit</button>
          <button id="withdrawBtn">Withdraw</button>
          <div id="bankMessage" class="message hidden"></div>
          <button class="secondary" data-view="dashboard">⬅️ Back</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== SUPABASE INIT ==========
    const SUPABASE_URL = 'https://xovtjaqxujtsexvlhjbx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvdnRqYXF4dWp0c2V4dmxoamJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTI1MjAsImV4cCI6MjA4OTIyODUyMH0.F9eQX58DyHDii5hX1P4I2cCJGZ8HQlXeScWhgSAVoKY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { autoRefreshToken: true, persistSession: true }
    });

    // ========== STATE ==========
    let currentPlayer = null;  // player record from 'players' table

    // ========== VIEW TOGGLING ==========
    function showLogin() {
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('profileSetupView').classList.add('hidden');
      document.getElementById('gameView').classList.add('hidden');
    }
    function showProfileSetup() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('profileSetupView').classList.remove('hidden');
      document.getElementById('gameView').classList.add('hidden');
    }
    function showGame() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('profileSetupView').classList.add('hidden');
      document.getElementById('gameView').classList.remove('hidden');
      showDashboard();
    }
    function showDashboard() {
      hideAllSubViews();
      document.getElementById('dashboardView').classList.remove('hidden');
      loadDashboard();
    }
    function showMap() {
      hideAllSubViews();
      document.getElementById('mapView').classList.remove('hidden');
      loadMap();
    }
    function showInventory() {
      hideAllSubViews();
      document.getElementById('inventoryView').classList.remove('hidden');
      loadInventory();
    }
    function showBank() {
      hideAllSubViews();
      document.getElementById('bankView').classList.remove('hidden');
      loadBank();
    }
    function hideAllSubViews() {
      document.getElementById('dashboardView').classList.add('hidden');
      document.getElementById('mapView').classList.add('hidden');
      document.getElementById('inventoryView').classList.add('hidden');
      document.getElementById('bankView').classList.add('hidden');
    }

    // ========== GOOGLE SIGN‑IN ==========
    document.getElementById('googleSignInBtn').addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }  // back to this page
      });
      if (error) alert('Google sign‑in error: ' + error.message);
    });

    // ========== CHECK SESSION AND PLAYER ON LOAD ==========
    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        showLogin();
        return;
      }

      // User is logged in – fetch player record
      const { data: player, error } = await supabase
        .from('players')
        .select('*')
        .eq('auth_id', session.user.id)
        .single();

      if (error && error.code === 'PGRST116') {
        // No player record – first time user
        // Pre‑fill full name from Google if available
        const fullName = session.user.user_metadata?.full_name || session.user.user_metadata?.name || '';
        document.getElementById('fullName').value = fullName;
        showProfileSetup();
      } else if (player) {
        currentPlayer = player;
        showGame();
      } else {
        // Other error
        console.error('Error fetching player:', error);
        showLogin();
      }
    }

    // ========== PROFILE SETUP SUBMISSION ==========
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        alert('You must be logged in');
        return;
      }

      const fullName = document.getElementById('fullName').value;
      const username = document.getElementById('username').value.trim();
      const gender = document.getElementById('gender').value;
      const age = parseInt(document.getElementById('age').value);
      const location = document.getElementById('location').value.trim();
      const bio = document.getElementById('bio').value.trim();

      if (!username || !gender || !age || !location) {
        alert('Please fill all required fields');
        return;
      }

      // Insert into players table
      const { error } = await supabase
        .from('players')
        .insert([{
          auth_id: session.user.id,
          full_name: fullName,
          username: username,
          gender: gender,
          age: age,
          location: location,
          bio: bio,
          cash: 5000,          // starting cash (from game settings)
          energy: 100,
          health: 100,
          hunger: 100,
          happiness: 100,
          reputation: 50
        }]);

      if (error) {
        if (error.code === '23505' && error.message.includes('username')) {
          alert('Username already taken. Please choose another.');
        } else {
          alert('Error creating profile: ' + error.message);
        }
        return;
      }

      // Fetch the newly created player
      const { data: player } = await supabase
        .from('players')
        .select('*')
        .eq('auth_id', session.user.id)
        .single();
      currentPlayer = player;
      showGame();
    });

    // ========== FETCH / REFRESH CURRENT PLAYER ==========
    async function fetchPlayer() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return null;
      const { data, error } = await supabase
        .from('players')
        .select('*')
        .eq('auth_id', user.id)
        .single();
      if (error) {
        console.error('Error fetching player:', error);
        return null;
      }
      currentPlayer = data;
      return data;
    }

    // ========== DASHBOARD ==========
    async function loadDashboard() {
      await fetchPlayer();
      if (!currentPlayer) return;
      const statsHtml = `
        <div class="stat-item"><div class="stat-label">Level</div><div class="stat-value">${currentPlayer.level}</div></div>
        <div class="stat-item"><div class="stat-label">XP</div><div class="stat-value">${currentPlayer.xp}</div></div>
        <div class="stat-item"><div class="stat-label">Cash</div><div class="stat-value">$${currentPlayer.cash}</div></div>
        <div class="stat-item"><div class="stat-label">Bank</div><div class="stat-value">$${currentPlayer.bank_balance}</div></div>
        <div class="stat-item"><div class="stat-label">Energy</div><div class="stat-value">${currentPlayer.energy}/100</div></div>
        <div class="stat-item"><div class="stat-label">Hunger</div><div class="stat-value">${currentPlayer.hunger}</div></div>
      `;
      document.getElementById('playerStats').innerHTML = statsHtml;
    }

    // ========== MAP ==========
    async function loadMap() {
      const { data: locations, error } = await supabase
        .from('map_locations')
        .select('*');
      if (error) {
        alert('Error loading locations');
        return;
      }
      let html = '';
      locations.forEach(loc => {
        html += `<div class="location-item">
          <span class="location-name">${loc.location_name}</span>
          <button class="explore-btn" data-id="${loc.location_id}">Explore</button>
        </div>`;
      });
      document.getElementById('locationList').innerHTML = html;
      document.querySelectorAll('.explore-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const locId = e.target.dataset.id;
          exploreLocation(locId);
        });
      });
    }

    async function exploreLocation(locationId) {
      const { data, error } = await supabase.rpc('explore_location', { p_location_id: locationId });
      if (error) {
        alert('Explore error: ' + error.message);
        return;
      }
      if (data.success) {
        document.getElementById('exploreResult').classList.remove('hidden');
        document.getElementById('exploreResult').innerText = data.message;
        await loadDashboard(); // refresh stats
      } else {
        alert(data.error);
      }
    }

    // ========== INVENTORY ==========
    async function loadInventory() {
      if (!currentPlayer) await fetchPlayer();
      const { data: items, error } = await supabase
        .from('player_inventory')
        .select('*')
        .eq('player_id', currentPlayer.player_id);
      if (error) {
        document.getElementById('inventoryList').innerHTML = '<p>Error loading inventory</p>';
        return;
      }
      if (items.length === 0) {
        document.getElementById('inventoryList').innerHTML = '<p>Your inventory is empty.</p>';
      } else {
        let html = '<ul style="list-style:none;">';
        items.forEach(item => {
          html += `<li style="background:#f0f4f9; margin:8px 0; padding:12px; border-radius:30px;">📦 ${item.item_type} x${item.quantity} (Durability: ${item.durability})</li>`;
        });
        html += '</ul>';
        document.getElementById('inventoryList').innerHTML = html;
      }
    }

    // ========== BANK ==========
    async function loadBank() {
      if (!currentPlayer) await fetchPlayer();
      document.getElementById('bankStats').innerHTML = `
        <p><strong>Cash:</strong> $${currentPlayer.cash}</p>
        <p><strong>Bank Balance:</strong> $${currentPlayer.bank_balance}</p>
      `;
    }

    async function deposit() {
      const amount = parseInt(document.getElementById('bankAmount').value);
      if (isNaN(amount) || amount <= 0) {
        alert('Enter a valid amount');
        return;
      }
      const { data, error } = await supabase.rpc('deposit_bank', { amount });
      if (error) {
        alert('Deposit error: ' + error.message);
        return;
      }
      if (data.success) {
        currentPlayer.cash = data.new_cash;
        currentPlayer.bank_balance = data.new_bank;
        document.getElementById('bankStats').innerHTML = `
          <p><strong>Cash:</strong> $${data.new_cash}</p>
          <p><strong>Bank Balance:</strong> $${data.new_bank}</p>
        `;
        document.getElementById('bankMessage').innerText = 'Deposit successful';
        document.getElementById('bankMessage').classList.remove('hidden');
      } else {
        alert(data.error);
      }
    }

    async function withdraw() {
      const amount = parseInt(document.getElementById('bankAmount').value);
      if (isNaN(amount) || amount <= 0) {
        alert('Enter a valid amount');
        return;
      }
      const { data, error } = await supabase.rpc('withdraw_bank', { amount });
      if (error) {
        alert('Withdraw error: ' + error.message);
        return;
      }
      if (data.success) {
        currentPlayer.cash = data.new_cash;
        currentPlayer.bank_balance = data.new_bank;
        document.getElementById('bankStats').innerHTML = `
          <p><strong>Cash:</strong> $${data.new_cash}</p>
          <p><strong>Bank Balance:</strong> $${data.new_bank}</p>
        `;
        document.getElementById('bankMessage').innerText = 'Withdrawal successful';
        document.getElementById('bankMessage').classList.remove('hidden');
      } else {
        alert(data.error);
      }
    }

    // ========== LOGOUT ==========
    async function logout() {
      await supabase.auth.signOut();
      currentPlayer = null;
      showLogin();
    }

    // ========== EVENT LISTENERS ==========
    document.addEventListener('DOMContentLoaded', () => {
      init();

      // Navigation
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const view = e.target.dataset.view;
          if (view === 'dashboard') showDashboard();
          else if (view === 'map') showMap();
          else if (view === 'inventory') showInventory();
          else if (view === 'bank') showBank();
        });
      });

      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('depositBtn').addEventListener('click', deposit);
      document.getElementById('withdrawBtn').addEventListener('click', withdraw);

      // Listen for auth changes (e.g., after OAuth redirect)
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN') {
          // After redirect, session is set – run init again
          init();
        } else if (event === 'SIGNED_OUT') {
          showLogin();
        }
      });
    });
  </script>
</body>
</html>
