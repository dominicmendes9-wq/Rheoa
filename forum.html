<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Forum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    /* ─── CSS Variables & Themes (same as before) ─── */
    :root {
      --bg-body: #f0f4fa;
      --card-bg: #fff;
      --card-border: rgba(148,163,184,0.2);
      --card-shadow: 0 12px 30px rgba(0,0,0,0.05);
      --header-bg: linear-gradient(135deg,#1e2f5e 0%,#1a4b7a 100%);
      --header-text: #fff;
      --accent: #2c6e9e;
      --accent-hover: #1f5480;
      --btn-primary: #2c6e9e;
      --btn-primary-hover: #1f5480;
      --btn-secondary: #475569;
      --btn-ghost: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #334155;
      --border-light: #e2e8f0;
      --card-header-bg: #f8fafc;
      --avatar-bg: #e0f2fe;
      --font-family: 'Courier New', monospace;
      --border-radius-card: 24px;
      --transition: all 0.2s ease;
    }

    body.theme-dusk {
      --bg-body: #0f1722;
      --card-bg: #1e293b;
      --card-border: rgba(51,65,85,0.6);
      --card-shadow: 0 15px 35px rgba(0,0,0,0.3);
      --header-bg: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      --header-text: #e2e8f0;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-secondary: #334155;
      --btn-ghost: #334155;
      --text-main: #f1f5f9;
      --text-muted: #cbd5e1;
      --border-light: #334155;
      --card-header-bg: #0f172a;
      --avatar-bg: #334155;
    }

    body.theme-meadow {
      --bg-body: #eef4e6;
      --card-bg: #ffffffea;
      --card-border: #cbd5b0;
      --card-shadow: 0 12px 24px rgba(60,70,40,0.08);
      --header-bg: linear-gradient(135deg,#2b5e3b 0%,#4a7c59 100%);
      --header-text: #fef9e6;
      --accent: #4b6b3e;
      --accent-hover: #3a5530;
      --btn-primary: #4b6b3e;
      --btn-primary-hover: #3a5530;
      --btn-secondary: #7f6b4a;
      --btn-ghost: #e9e1c7;
      --text-main: #2c2b26;
      --text-muted: #5b5a4c;
      --border-light: #d9d2b0;
      --card-header-bg: #fef6e0;
      --avatar-bg: #e2e9cf;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-family);
      color: var(--text-main);
      padding: 28px 20px;
      transition: background .25s, color .2s;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding: 0 8px;
    }
    .back-link {
      background: var(--card-bg);
      padding: 8px 18px;
      border-radius: 60px;
      text-decoration: none;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--border-light);
      transition: var(--transition);
      font-size: .9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(2px);
    }
    .back-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .theme-switcher, .font-switcher {
      display: flex;
      gap: 6px;
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      backdrop-filter: blur(4px);
      align-items: center;
    }
    .theme-btn, .font-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: .8rem;
      cursor: pointer;
      transition: .2s;
      color: var(--text-muted);
      font-family: var(--font-family);
    }
    .theme-btn.active, .font-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .theme-btn:hover:not(.active), .font-btn:hover:not(.active) {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .font-btn {
      font-size: .75rem;
      padding: 4px 12px;
    }

    .forum-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) {
      .forum-container { grid-template-columns: 1fr; }
    }

    /* ─── Sidebar ─── */
    .sidebar {
      background: var(--card-bg);
      border-radius: var(--border-radius-card);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      height: fit-content;
    }
    .sidebar-header {
      background: var(--card-header-bg);
      padding: 18px 20px;
      font-weight: 700;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .community-list { list-style: none; padding: 8px 0; }
    .community-item {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .community-item:hover { background: var(--btn-ghost); }
    .community-item.active { background: var(--accent); color: #fff; border-left-color: var(--accent); }
    .community-icon { font-size: 1.4rem; }
    .community-info { flex: 1; }
    .community-name { font-weight: 600; }
    .community-stats { font-size: 0.7rem; opacity: 0.7; }

    .create-community-btn {
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      padding: 12px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
      font-size: .9rem;
    }
    .create-community-btn:hover {
      background: var(--btn-primary-hover);
      transform: scale(1.02);
    }

    /* ─── Main content ─── */
    .main-content {
      background: var(--card-bg);
      border-radius: var(--border-radius-card);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      padding: 24px;
      min-height: 500px;
    }

    .community-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-light);
    }
    .community-header-icon { font-size: 3rem; }
    .community-header-info h2 { margin-bottom: 4px; font-size: 1.8rem; }
    .community-header-desc { color: var(--text-muted); }

    /* ─── Post form ─── */
    .post-form {
      background: var(--card-header-bg);
      border-radius: 16px;
      padding: 16px 20px 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border-light);
    }
    .post-form .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .post-form .toolbar button {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-main);
      transition: .15s;
      font-family: var(--font-family);
    }
    .post-form .toolbar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .post-form .toolbar button:active {
      transform: scale(0.95);
    }
    .post-form .toolbar .separator {
      width: 1px;
      background: var(--border-light);
      margin: 0 4px;
    }

    .post-form .editor {
      min-height: 100px;
      padding: 12px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 1rem;
      outline: none;
      transition: border .2s;
      word-wrap: break-word;
    }
    .post-form .editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
    }
    .post-form .editor[contenteditable="true"] {
      white-space: pre-wrap;
    }
    .post-form textarea.editor {
      resize: vertical;
      min-height: 100px;
      font-family: var(--font-family);
    }
    .post-form .post-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .post-form .post-actions button {
      padding: 10px 24px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
    }
    .post-form .post-actions button:hover {
      background: var(--btn-primary-hover);
    }
    .post-form .post-actions .cancel-btn {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .post-form .post-actions .cancel-btn:hover {
      background: var(--btn-secondary);
      color: #fff;
    }

    .join-btn {
      padding: 10px 24px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-family);
      transition: .2s;
      margin-bottom: 16px;
    }
    .join-btn:hover { background: var(--btn-primary-hover); }

    /* ─── Post item ─── */
    .post-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background .15s;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .post-item:hover {
      background: var(--card-header-bg);
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
      border-radius: 12px;
    }
    .post-content {
      flex: 1;
    }
    .post-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .post-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .post-stats {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .post-stats .stat-pill {
      background: var(--btn-ghost);
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .post-stats .stat-pill .icon { font-size: 0.8rem; }

    /* ─── Post detail ─── */
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }

    .post-detail-card {
      background: var(--card-header-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-light);
    }
    .post-detail-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .post-detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .post-detail-meta .stat-pill {
      background: var(--btn-ghost);
      padding: 2px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .post-detail-content {
      margin: 20px 0;
      line-height: 1.7;
      word-wrap: break-word;
    }
    .post-detail-content img {
      max-width: 100%;
      height: auto;
    }

    .post-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }
    .post-actions .action-btn {
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .post-actions .action-btn:hover {
      background: var(--btn-ghost);
    }
    .post-actions .action-btn.edit-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .post-actions .action-btn.delete-btn:hover {
      background: #f44336;
      color: #fff;
      border-color: #f44336;
    }

    /* ─── Reaction bar ─── */
    .reaction-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0 8px;
    }
    .reaction-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 2px 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-family);
      color: var(--text-main);
    }
    .reaction-btn:hover { background: var(--btn-ghost); }
    .reaction-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .reaction-btn .count {
      font-size: 0.7rem;
      font-weight: 600;
      opacity: 0.7;
    }

    /* ─── Comments ─── */
    .comment-form {
      margin: 24px 0;
    }
    .comment-form textarea {
      width: 100%;
      padding: 12px 16px;
      font-family: var(--font-family);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text-main);
      resize: vertical;
      min-height: 80px;
      margin-bottom: 12px;
      transition: border .2s;
    }
    .comment-form textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
    }
    .comment-form button {
      padding: 8px 24px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
    }
    .comment-form button:hover { background: var(--btn-primary-hover); }

    .comment {
      margin: 12px 0;
      padding-left: 20px;
      border-left: 2px solid var(--border-light);
    }
    .comment-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .comment-author { font-weight: 600; color: var(--accent); }
    .comment-time { font-size: 0.7rem; color: var(--text-muted); }
    .comment-content { margin: 6px 0; word-wrap: break-word; }
    .comment-actions {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .comment-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-family: var(--font-family);
      font-size: 0.8rem;
    }
    .comment-actions button:hover {
      color: var(--accent);
      text-decoration: underline;
    }
    .comment-actions .vote-btn {
      font-size: 1rem;
    }
    .reply-btn { color: var(--accent); }

    .reply-form {
      display: none;
      margin-top: 8px;
    }
    .reply-form textarea {
      width: 100%;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--border-light);
      font-family: var(--font-family);
      resize: vertical;
      min-height: 60px;
      background: var(--card-bg);
      color: var(--text-main);
    }
    .reply-form .reply-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .reply-form .reply-actions button {
      padding: 4px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: var(--font-family);
      transition: .2s;
    }
    .reply-form .reply-actions button.cancel-reply {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
    }
    .reply-form .reply-actions button.cancel-reply:hover {
      background: var(--btn-ghost);
    }

    /* ─── Modal ─── */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--card-bg);
      padding: 28px;
      border-radius: 24px;
      width: 90%;
      max-width: 500px;
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
    }
    .modal h3 { margin-bottom: 16px; color: var(--text-main); }
    .modal input, .modal textarea, .modal select {
      width: 100%;
      margin: 8px 0 16px;
      padding: 10px 14px;
      font-family: var(--font-family);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text-main);
    }
    .modal button {
      padding: 8px 20px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-family);
      margin-right: 8px;
      transition: .2s;
    }
    .modal button:first-of-type {
      background: var(--btn-primary);
      color: #fff;
    }
    .modal button:first-of-type:hover {
      background: var(--btn-primary-hover);
    }
    .modal button:last-of-type {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .modal button:last-of-type:hover {
      background: var(--btn-secondary);
      color: #fff;
    }

    /* ─── Toast ─── */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 24px;
      border-radius: 40px;
      color: #fff;
      font-weight: 500;
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      backdrop-filter: blur(4px);
      font-size: 0.9rem;
    }
    .toast.success { background: #4CAF50; }
    .toast.error { background: #f44336; }
    .toast.info { background: #2196F3; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      .top-bar { flex-direction: column; align-items: stretch; }
      .controls { justify-content: center; }
      .forum-container { grid-template-columns: 1fr; }
      .community-header { flex-direction: column; text-align: center; }
      .post-form .toolbar button { font-size: 0.8rem; padding: 2px 8px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <a href="dashboard.html" class="back-link">← Dashboard</a>
    <div class="controls">
      <div class="theme-switcher" id="themeSwitcher">
        <button data-theme="default" class="theme-btn active">✨ Aurora</button>
        <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
        <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
      </div>
      <div class="font-switcher" id="fontSwitcher">
        <button data-font="monospace" class="font-btn active">Courier</button>
        <button data-font="sans-serif" class="font-btn">Inter</button>
        <button data-font="serif" class="font-btn">Georgia</button>
      </div>
    </div>
  </div>

  <div class="forum-container">
    <div class="sidebar">
      <div class="sidebar-header">🌐 Communities</div>
      <ul class="community-list" id="communityList"></ul>
      <button class="create-community-btn" onclick="showCreateCommunityModal()">+ Create Community</button>
    </div>
    <div class="main-content" id="mainContent"></div>
  </div>
</div>

<!-- Create Community Modal -->
<div id="createCommunityModal" class="modal">
  <div class="modal-content">
    <h3>Create a New Community</h3>
    <input type="text" id="newCommunityName" placeholder="Name (unique, lowercase, no spaces)" maxlength="20">
    <input type="text" id="newCommunityDisplayName" placeholder="Display Name">
    <textarea id="newCommunityDesc" placeholder="Description"></textarea>
    <input type="text" id="newCommunityIcon" placeholder="Icon (emoji)" value="🌐">
    <input type="color" id="newCommunityColor" value="#2196F3">
    <select id="newCommunityParent">
      <option value="">None (Main Community)</option>
    </select>
    <button onclick="createCommunity()">Create</button>
    <button onclick="closeModal('createCommunityModal')">Cancel</button>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// ─────────────────────────────────────────────
// SUPABASE INIT
// ─────────────────────────────────────────────
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentUser = null;
let currentPlayer = null;
let currentCommunity = null;
let currentPost = null;
let communities = [];
let forumChannel = null;

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ─────────────────────────────────────────────
// XSS ESCAPE (for plain text)
// ─────────────────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

// ─────────────────────────────────────────────
// THEME & FONT (localStorage)
// ─────────────────────────────────────────────
function setTheme(themeName) {
  const body = document.body;
  body.classList.remove('theme-dusk', 'theme-meadow');
  if (themeName === 'dusk') body.classList.add('theme-dusk');
  else if (themeName === 'meadow') body.classList.add('theme-meadow');
  localStorage.setItem('forum_theme', themeName);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
  });
}

function setFont(fontName) {
  const root = document.documentElement;
  if (fontName === 'monospace') root.style.setProperty('--font-family', "'Courier New', monospace");
  else if (fontName === 'sans-serif') root.style.setProperty('--font-family', "'Inter', sans-serif");
  else if (fontName === 'serif') root.style.setProperty('--font-family', "'Georgia', serif");
  localStorage.setItem('forum_font', fontName);
  document.querySelectorAll('.font-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-font') === fontName);
  });
}

function initThemeAndFont() {
  const savedTheme = localStorage.getItem('forum_theme') || 'default';
  setTheme(savedTheme);
  const savedFont = localStorage.getItem('forum_font') || 'monospace';
  setFont(savedFont);

  document.getElementById('themeSwitcher').addEventListener('click', (e) => {
    const btn = e.target.closest('.theme-btn');
    if (btn) setTheme(btn.getAttribute('data-theme'));
  });
  document.getElementById('fontSwitcher').addEventListener('click', (e) => {
    const btn = e.target.closest('.font-btn');
    if (btn) setFont(btn.getAttribute('data-font'));
  });
}

// ─────────────────────────────────────────────
// AUTH & INIT
// ─────────────────────────────────────────────
async function init() {
  initThemeAndFont();

  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href = 'index.html';
  currentUser = user;

  const { data: player } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  currentPlayer = player;

  await loadCommunities();

  const params = new URLSearchParams(window.location.search);
  const communityName = params.get('c');
  const postId = params.get('p');

  if (postId) {
    await loadPostView(postId);
  } else if (communityName) {
    const comm = communities.find(c => c.name === communityName);
    if (comm) await selectCommunity(comm);
  } else {
    await loadFeed();
  }
}

// ─────────────────────────────────────────────
// COMMUNITIES
// ─────────────────────────────────────────────
async function loadCommunities() {
  const { data } = await sb.from('communities').select('*').order('name');
  communities = data || [];
  renderCommunitySidebar();
}

function renderCommunitySidebar() {
  const list = document.getElementById('communityList');
  list.innerHTML = communities.map(c => `
    <li class="community-item ${currentCommunity && currentCommunity.id === c.id ? 'active' : ''}" 
        onclick="selectCommunityById('${c.id}')">
      <span class="community-icon">${c.icon || '🌐'}</span>
      <div class="community-info">
        <div class="community-name">${escapeHtml(c.display_name)}</div>
        <div class="community-stats">${c.member_count || 0} members</div>
      </div>
    </li>
  `).join('');

  const select = document.getElementById('newCommunityParent');
  if (select) {
    select.innerHTML = '<option value="">None (Main Community)</option>' +
      communities.filter(c => !c.parent_id).map(c => 
        `<option value="${c.id}">${escapeHtml(c.display_name)}</option>`
      ).join('');
  }
}

async function selectCommunityById(id) {
  const comm = communities.find(c => c.id === id);
  if (comm) await selectCommunity(comm);
}

async function selectCommunity(community) {
  currentCommunity = community;
  currentPost = null;
  window.history.pushState({}, '', `?c=${community.name}`);
  renderCommunitySidebar();
  await loadCommunityView();
  subscribeToCommunity(community.id);
}

// ─────────────────────────────────────────────
// COMMUNITY VIEW
// ─────────────────────────────────────────────
async function loadCommunityView() {
  if (!currentCommunity) return;

  const { data: posts, error } = await sb
    .from('posts')
    .select(`*, author:players(username)`)
    .eq('community_id', currentCommunity.id)
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Error loading posts:', error);
    showToast('Error loading posts', 'error');
    return;
  }

  const isMember = await checkMembership(currentCommunity.id);
  const isBlackOrFounder = currentPlayer && ['black', 'founder'].includes(currentPlayer.subscription_tier?.toLowerCase());

  let html = `
    <div class="community-header" style="border-bottom-color: ${currentCommunity.banner_color || '#2196F3'};">
      <div class="community-header-icon">${currentCommunity.icon || '🌐'}</div>
      <div class="community-header-info">
        <h2>${escapeHtml(currentCommunity.display_name)}</h2>
        <div class="community-header-desc">${escapeHtml(currentCommunity.description || '')}</div>
      </div>
    </div>
  `;

  if (isMember) {
    // Build post form
    let postFormHtml = `
      <div class="post-form">
        <input type="text" id="postTitle" placeholder="Post title" maxlength="200" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid var(--border-light);border-radius:12px;background:var(--card-bg);color:var(--text-main);font-family:var(--font-family);">
    `;

    if (isBlackOrFounder) {
      // Rich text toolbar
      postFormHtml += `
        <div class="toolbar">
          <button type="button" onclick="execCmd('bold')"><b>B</b></button>
          <button type="button" onclick="execCmd('italic')"><i>I</i></button>
          <button type="button" onclick="execCmd('insertUnorderedList')">• Bullet</button>
          <button type="button" onclick="execCmd('indent')">↗ Indent</button>
          <button type="button" onclick="execCmd('outdent')">↘ Outdent</button>
          <button type="button" onclick="execCmd('formatBlock', 'h1')">H1</button>
          <button type="button" onclick="execCmd('formatBlock', 'h2')">H2</button>
          <button type="button" onclick="execCmd('formatBlock', 'p')">Text</button>
          <button type="button" onclick="insertLink()">🔗 Link</button>
          <button type="button" onclick="openEmojiPicker()">😊 Emoji</button>
        </div>
        <div id="postEditor" class="editor" contenteditable="true" placeholder="What's on your mind?"></div>
      `;
    } else {
      // Plain textarea for non-Black/Founder
      postFormHtml += `
        <textarea id="postEditor" class="editor" placeholder="What's on your mind?" rows="5"></textarea>
      `;
    }

    postFormHtml += `
        <div class="post-actions">
          <button onclick="createPost()">Create Post</button>
          <button class="cancel-btn" onclick="clearPostEditor()">Clear</button>
        </div>
      </div>
    `;

    html += postFormHtml;
  } else {
    html += `<button class="join-btn" onclick="joinCommunity('${currentCommunity.id}')">Join Community</button>`;
  }

  html += `<div id="postsList">`;
  if (!posts || posts.length === 0) {
    html += '<p style="padding:20px;text-align:center;color:var(--text-muted);">No posts yet. Be the first!</p>';
  } else {
    posts.forEach(post => {
      const readTime = estimateReadTime(post.content || '');
      html += `
        <div class="post-item" onclick="viewPost('${post.id}')">
          <div class="post-content">
            <div class="post-title">${escapeHtml(post.title)}</div>
            <div class="post-meta">Posted by ${escapeHtml(post.author?.username || 'Unknown')} • ${new Date(post.created_at).toLocaleString()}</div>
            <div class="post-stats">
              <span class="stat-pill"><span class="icon">👁️</span> ${post.view_count || 0}</span>
              <span class="stat-pill"><span class="icon">📖</span> ${readTime}</span>
              <span>💬 ${post.comment_count || 0} comments</span>
            </div>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;

  document.getElementById('mainContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// FEED (latest posts)
// ─────────────────────────────────────────────
async function loadFeed() {
  currentCommunity = null;
  currentPost = null;
  window.history.pushState({}, '', window.location.pathname);
  renderCommunitySidebar();

  if (forumChannel) forumChannel.unsubscribe();

  const { data: posts, error } = await sb
    .from('posts')
    .select(`*, author:players(username), community:communities(name, display_name, icon)`)
    .order('created_at', { ascending: false })
    .limit(50);

  if (error) {
    console.error('Error loading feed:', error);
    showToast('Error loading feed', 'error');
    return;
  }

  let html = `<h2 style="margin-bottom:20px;">📰 Latest Posts</h2>`;
  if (!posts || posts.length === 0) {
    html += '<p style="padding:20px;text-align:center;color:var(--text-muted);">No posts yet. Join a community and create one!</p>';
  } else {
    html += `<div id="postsList">`;
    posts.forEach(post => {
      const readTime = estimateReadTime(post.content || '');
      html += `
        <div class="post-item" onclick="viewPost('${post.id}')">
          <div class="post-content">
            <div class="post-title">${escapeHtml(post.title)}</div>
            <div class="post-meta">
              Posted in ${post.community?.icon || '🌐'} ${escapeHtml(post.community?.display_name || 'Unknown')} 
              by ${escapeHtml(post.author?.username || 'Unknown')} • ${new Date(post.created_at).toLocaleString()}
            </div>
            <div class="post-stats">
              <span class="stat-pill"><span class="icon">👁️</span> ${post.view_count || 0}</span>
              <span class="stat-pill"><span class="icon">📖</span> ${readTime}</span>
              <span>💬 ${post.comment_count || 0} comments</span>
            </div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// VIEW SINGLE POST
// ─────────────────────────────────────────────
async function viewPost(postId) {
  currentPost = postId;
  const params = new URLSearchParams(window.location.search);
  params.set('p', postId);
  window.history.pushState({}, '', `?${params.toString()}`);

  // Increment view count
  await sb.rpc('increment_post_view', { p_post_id: postId });

  await loadPostView(postId);
}

async function loadPostView(postId) {
  const { data: post, error } = await sb
    .from('posts')
    .select(`*, author:players(username), community:communities(*)`)
    .eq('id', postId)
    .single();

  if (error || !post) {
    document.getElementById('mainContent').innerHTML = '<p>Post not found</p>';
    return;
  }

  currentCommunity = post.community;
  currentPost = post;
  renderCommunitySidebar();

  subscribeToPostComments(postId);

  const comments = await loadComments(postId);
  const reactions = await loadPostReactions(postId);
  const userReaction = reactions.find(r => r.user_id === currentPlayer?.id)?.reaction_type || null;
  const reactionCounts = {};
  reactions.forEach(r => { reactionCounts[r.reaction_type] = (reactionCounts[r.reaction_type] || 0) + 1; });

  const readTime = estimateReadTime(post.content || '');
  const sanitizedContent = DOMPurify.sanitize(post.content || '');

  let html = `
    <div class="back-link" onclick="selectCommunityById('${post.community.id}')">← Back to ${escapeHtml(post.community.display_name)}</div>
    <div class="post-detail-card">
      <div class="post-detail-title">${escapeHtml(post.title)}</div>
      <div class="post-detail-meta">
        <span>Posted by ${escapeHtml(post.author?.username)} • ${new Date(post.created_at).toLocaleString()}</span>
        <span class="stat-pill"><span class="icon">👁️</span> ${post.view_count || 0}</span>
        <span class="stat-pill"><span class="icon">📖</span> ${readTime}</span>
      </div>
      <div class="post-detail-content">${sanitizedContent}</div>
      <div class="reaction-bar" id="reactionBar-${post.id}">
        ${['👍','👎','🤣','🤬','🎉','💝'].map(emoji => {
          const count = reactionCounts[emoji] || 0;
          const active = userReaction === emoji;
          return `<button class="reaction-btn ${active ? 'active' : ''}" onclick="toggleReaction('${post.id}','${emoji}')">${emoji} <span class="count">${count}</span></button>`;
        }).join('')}
      </div>
      <div class="post-actions">
        ${post.author_id === currentPlayer.id ? `
          <button class="action-btn edit-btn" onclick="editPost('${post.id}')">✏️ Edit</button>
          <button class="action-btn delete-btn" onclick="deletePost('${post.id}')">🗑️ Delete</button>
        ` : ''}
      </div>
    </div>
    <h3>Comments (${comments.length})</h3>
    <div class="comment-form">
      <textarea id="commentContent" placeholder="Write a comment..."></textarea>
      <button onclick="submitComment(null)">Post Comment</button>
    </div>
    <div id="commentsContainer">${renderComments(comments)}</div>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// COMMENTS
// ─────────────────────────────────────────────
async function loadComments(postId) {
  try {
    const { data, error } = await sb
      .from('comments')
      .select(`
        *,
        author:players(username)
      `)
      .eq('post_id', postId)
      .is('is_deleted', false)
      .order('depth', { ascending: true })
      .order('created_at', { ascending: true });

    if (error) throw error;

    return (data || []).map(c => ({
      ...c,
      author_name: c.author?.username || 'Unknown',
      user_vote: 0
    }));
  } catch (err) {
    console.error('Error loading comments:', err);
    showToast('Error loading comments', 'error');
    return [];
  }
}

function renderComments(comments, parentId = null) {
  if (!comments || comments.length === 0) return '';

  const filtered = comments.filter(c => c.parent_id === parentId);
  if (filtered.length === 0) return '';

  return filtered.map(c => {
    const childrenHtml = renderComments(comments, c.id);
    const score = (c.upvotes || 0) - (c.downvotes || 0);

    return `
      <div class="comment" style="margin-left: ${(c.depth || 0) * 20}px;">
        <div class="comment-header">
          <span class="comment-author">${escapeHtml(c.author_name || 'Unknown')}</span>
          <span class="comment-time">${new Date(c.created_at).toLocaleString()}</span>
        </div>
        <div class="comment-content">${escapeHtml(c.content || '').replace(/\n/g, '<br>')}</div>
        <div class="comment-actions">
          <button class="vote-btn" onclick="vote('comment', '${c.id}', 1)">▲</button>
          <span>${score}</span>
          <button class="vote-btn" onclick="vote('comment', '${c.id}', -1)">▼</button>
          <button class="reply-btn" onclick="showReplyForm('${c.id}')">Reply</button>
          ${c.author_id === currentPlayer?.id ? `
            <button onclick="editComment('${c.id}')">Edit</button>
            <button onclick="deleteComment('${c.id}')">Delete</button>
          ` : ''}
        </div>
        <div class="reply-form" id="reply-form-${c.id}">
          <textarea id="reply-content-${c.id}" rows="2" placeholder="Write a reply..."></textarea>
          <div class="reply-actions">
            <button onclick="submitComment('${c.id}')">Reply</button>
            <button class="cancel-reply" onclick="hideReplyForm('${c.id}')">Cancel</button>
          </div>
        </div>
        ${childrenHtml}
      </div>
    `;
  }).join('');
}

// ─────────────────────────────────────────────
// REACTIONS (post only)
// ─────────────────────────────────────────────
async function loadPostReactions(postId) {
  const { data, error } = await sb
    .from('post_reactions')
    .select('*')
    .eq('post_id', postId);
  if (error) {
    console.error('Error loading reactions:', error);
    return [];
  }
  return data || [];
}

async function toggleReaction(postId, emoji) {
  if (!currentPlayer) return showToast('Please log in', 'error');

  // Check if user already reacted with this emoji
  const existing = await sb
    .from('post_reactions')
    .select('*')
    .eq('post_id', postId)
    .eq('user_id', currentPlayer.id)
    .maybeSingle();

  if (existing.data && existing.data.reaction_type === emoji) {
    // Remove reaction
    await sb
      .from('post_reactions')
      .delete()
      .eq('id', existing.data.id);
  } else {
    // If user had a different reaction, remove it first (toggle)
    if (existing.data) {
      await sb
        .from('post_reactions')
        .delete()
        .eq('id', existing.data.id);
    }
    // Insert new reaction
    await sb
      .from('post_reactions')
      .insert({
        post_id: postId,
        user_id: currentPlayer.id,
        reaction_type: emoji
      });
  }

  // Reload the post view to reflect changes
  await loadPostView(postId);
}

// ─────────────────────────────────────────────
// VOTE (only for comments now)
// ─────────────────────────────────────────────
async function vote(targetType, targetId, value) {
  // Only allow voting on comments
  if (targetType !== 'comment') {
    showToast('Voting only available on comments', 'info');
    return;
  }
  const { error } = await sb.rpc('handle_vote', {
    p_player_id: currentPlayer.id,
    p_target_type: targetType,
    p_target_id: targetId,
    p_vote_value: value
  });
  if (error) return showToast(error.message, 'error');

  if (currentPost) await loadPostView(currentPost.id);
  else if (currentCommunity) await loadCommunityView();
  else await loadFeed();
}

// ─────────────────────────────────────────────
// RICH TEXT HELPERS
// ─────────────────────────────────────────────
function execCmd(cmd, value = null) {
  document.execCommand(cmd, false, value);
  document.getElementById('postEditor').focus();
}

function insertLink() {
  const url = prompt('Enter URL:', 'https://');
  if (url) execCmd('createLink', url);
}

function openEmojiPicker() {
  const emojis = ['😊', '😂', '🤔', '🔥', '💯', '✨', '🎉', '👏', '👍', '❤️'];
  const picker = document.createElement('div');
  picker.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: var(--card-bg); border: 1px solid var(--border-light);
    border-radius: 16px; padding: 16px; z-index: 9999;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  `;
  emojis.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.style.cssText = 'font-size: 2rem; border: none; background: transparent; cursor: pointer; padding: 8px; border-radius: 8px;';
    btn.onclick = () => {
      document.execCommand('insertText', false, emoji);
      document.body.removeChild(picker);
    };
    picker.appendChild(btn);
  });
  const close = document.createElement('button');
  close.textContent = 'Close';
  close.style.cssText = 'grid-column: span 5; padding: 8px; background: var(--btn-ghost); border: none; border-radius: 8px; cursor: pointer;';
  close.onclick = () => document.body.removeChild(picker);
  picker.appendChild(close);
  document.body.appendChild(picker);
}

function clearPostEditor() {
  const editor = document.getElementById('postEditor');
  if (editor.tagName === 'DIV') {
    editor.innerHTML = '';
  } else if (editor.tagName === 'TEXTAREA') {
    editor.value = '';
  }
  document.getElementById('postTitle').value = '';
}

// ─────────────────────────────────────────────
// CREATE POST
// ─────────────────────────────────────────────
async function createPost() {
  const title = document.getElementById('postTitle').value.trim();
  const editor = document.getElementById('postEditor');
  let content;

  if (editor.tagName === 'DIV') {
    // Rich text editor (contentEditable)
    content = editor.innerHTML.trim();
    if (!content || content === '<br>') return showToast('Content cannot be empty', 'error');
    content = DOMPurify.sanitize(content);
  } else if (editor.tagName === 'TEXTAREA') {
    // Plain text
    content = editor.value.trim();
    if (!content) return showToast('Content cannot be empty', 'error');
    // Escape HTML to prevent injection
    content = escapeHtml(content);
  }

  if (!title) return showToast('Title required', 'error');

  const { error } = await sb.from('posts').insert({
    title,
    content,
    community_id: currentCommunity.id,
    author_id: currentPlayer.id
  });
  if (error) return showToast(error.message, 'error');
  showToast('Post created!', 'success');
  clearPostEditor();
  loadCommunityView();
}

// ─────────────────────────────────────────────
// SUBMIT COMMENT
// ─────────────────────────────────────────────
async function submitComment(parentId) {
  const content = parentId
    ? document.getElementById(`reply-content-${parentId}`).value.trim()
    : document.getElementById('commentContent').value.trim();
  if (!content) return showToast('Comment cannot be empty', 'error');

  let depth = 0;
  if (parentId) {
    const parentDepth = await getParentDepth(parentId);
    depth = parentDepth + 1;
  }

  const { error } = await sb.from('comments').insert({
    content,
    post_id: currentPost.id,
    author_id: currentPlayer.id,
    parent_id: parentId || null,
    depth: depth,
    is_deleted: false
  });
  if (error) return showToast(error.message, 'error');
  showToast('Comment posted', 'success');
  loadPostView(currentPost.id);
}

async function getParentDepth(parentId) {
  const { data } = await sb.from('comments').select('depth').eq('id', parentId).single();
  return data?.depth || 0;
}

function showReplyForm(commentId) {
  document.getElementById(`reply-form-${commentId}`).style.display = 'block';
}
function hideReplyForm(commentId) {
  document.getElementById(`reply-form-${commentId}`).style.display = 'none';
}

// ─────────────────────────────────────────────
// EDIT / DELETE POST
// ─────────────────────────────────────────────
async function editPost(postId) {
  const newContent = prompt('Edit your post content (HTML allowed):', currentPost.content);
  if (newContent !== null) {
    const sanitized = DOMPurify.sanitize(newContent);
    await sb.from('posts').update({ content: sanitized }).eq('id', postId);
    loadPostView(postId);
  }
}
async function deletePost(postId) {
  if (confirm('Delete this post?')) {
    await sb.from('posts').delete().eq('id', postId);
    if (currentCommunity) loadCommunityView();
    else loadFeed();
  }
}
async function editComment(commentId) {
  const newContent = prompt('Edit your comment:');
  if (newContent) {
    await sb.from('comments').update({ content: newContent }).eq('id', commentId);
    loadPostView(currentPost.id);
  }
}
async function deleteComment(commentId) {
  if (confirm('Delete this comment?')) {
    await sb.from('comments').delete().eq('id', commentId);
    loadPostView(currentPost.id);
  }
}

// ─────────────────────────────────────────────
// COMMUNITY MANAGEMENT
// ─────────────────────────────────────────────
function showCreateCommunityModal() {
  document.getElementById('createCommunityModal').style.display = 'flex';
}
async function createCommunity() {
  const name = document.getElementById('newCommunityName').value.trim().toLowerCase().replace(/\s+/g, '');
  const display_name = document.getElementById('newCommunityDisplayName').value.trim();
  if (!name || !display_name) return showToast('Name and display name required', 'error');

  const { error } = await sb.from('communities').insert({
    name, display_name,
    description: document.getElementById('newCommunityDesc').value,
    icon: document.getElementById('newCommunityIcon').value,
    banner_color: document.getElementById('newCommunityColor').value,
    parent_id: document.getElementById('newCommunityParent').value || null,
    created_by: currentPlayer.id
  });
  if (error) return showToast(error.message, 'error');
  showToast('Community created!', 'success');
  closeModal('createCommunityModal');
  loadCommunities();
}

async function checkMembership(communityId) {
  const { count } = await sb.from('community_members')
    .select('*', { count: 'exact', head: true })
    .eq('community_id', communityId)
    .eq('player_id', currentPlayer.id);
  return count > 0;
}

async function joinCommunity(communityId) {
  const { error } = await sb.from('community_members').insert({
    community_id: communityId, player_id: currentPlayer.id
  });
  if (error) return showToast(error.message, 'error');
  showToast('Joined community!', 'success');
  loadCommunityView();
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// ─────────────────────────────────────────────
// UTILITY: Estimate read time
// ─────────────────────────────────────────────
function estimateReadTime(html) {
  if (!html) return '0 min';
  const text = html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  const words = text.split(' ').length;
  const minutes = Math.ceil(words / 200);
  return `${minutes} min read`;
}

// ─────────────────────────────────────────────
// REAL-TIME SUBSCRIPTIONS
// ─────────────────────────────────────────────
function subscribeToCommunity(communityId) {
  if (forumChannel) {
    forumChannel.unsubscribe();
    forumChannel = null;
  }

  forumChannel = sb.channel(`forum-${communityId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'posts',
      filter: `community_id=eq.${communityId}`
    }, (payload) => {
      if (currentCommunity && currentCommunity.id === communityId) {
        loadCommunityView();
      }
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('Subscribed to community posts');
    });
}

function subscribeToPostComments(postId) {
  if (forumChannel) {
    forumChannel.unsubscribe();
    forumChannel = null;
  }

  forumChannel = sb.channel(`post-${postId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'comments',
      filter: `post_id=eq.${postId}`
    }, (payload) => {
      if (currentPost && currentPost.id === postId) {
        loadPostView(postId);
      }
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('Subscribed to post comments');
    });
}
