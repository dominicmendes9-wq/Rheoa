<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rheoa - Forum</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ─── Variables & Reset ─── */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-body: #f1f5f9;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.04);
      --header-bg: linear-gradient(135deg,#1e2f5e 0%,#1a4b7a 100%);
      --header-text: #fff;
      --accent: #2c6e9e;
      --accent-hover: #1f5480;
      --btn-primary: #2c6e9e;
      --btn-primary-hover: #1f5480;
      --btn-secondary: #64748b;
      --btn-ghost: #f1f5f9;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --card-header-bg: #f8fafc;
      --font-family: 'Inter', system-ui, sans-serif;
      --radius: 12px;
      --transition: all 0.2s ease;
    }
    body.theme-dusk {
      --bg-body: #0f1722;
      --card-bg: #1e293b;
      --card-border: #334155;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
      --header-bg: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      --header-text: #e2e8f0;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-secondary: #475569;
      --btn-ghost: #334155;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-light: #334155;
      --card-header-bg: #0f172a;
    }
    body.theme-meadow {
      --bg-body: #eef4e6;
      --card-bg: #ffffffea;
      --card-border: #cbd5b0;
      --card-shadow: 0 4px 12px rgba(60,70,40,0.08);
      --header-bg: linear-gradient(135deg,#2b5e3b 0%,#4a7c59 100%);
      --header-text: #fef9e6;
      --accent: #4b6b3e;
      --accent-hover: #3a5530;
      --btn-primary: #4b6b3e;
      --btn-primary-hover: #3a5530;
      --btn-secondary: #7f6b4a;
      --btn-ghost: #e9e1c7;
      --text-main: #2c2b26;
      --text-muted: #5b5a4c;
      --border-light: #d9d2b0;
      --card-header-bg: #fef6e0;
    }
    body {
      background: var(--bg-body);
      font-family: var(--font-family);
      color: var(--text-main);
      padding: 20px;
      transition: background .25s, color .2s;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin:0 auto; }

    /* ─── Top Bar ─── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding: 12px 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
    }
    .top-bar .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar .left a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    .top-bar .left a:hover { color: var(--text-main); }
    .top-bar .left h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-main);
    }
    .top-bar .right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .theme-btn, .font-btn {
      background: var(--btn-ghost);
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
      font-family: var(--font-family);
    }
    .theme-btn.active, .font-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .theme-btn:hover:not(.active), .font-btn:hover:not(.active) {
      background: var(--btn-secondary);
      color: var(--text-main);
    }

    /* ─── Main Grid ─── */
    .forum-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }
    @media (max-width: 820px) {
      .forum-grid { grid-template-columns: 1fr; }
    }

    /* ─── Sidebar ─── */
    .sidebar {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      height: fit-content;
      position: sticky;
      top: 20px;
    }
    .sidebar-header {
      padding: 16px 20px;
      background: var(--card-header-bg);
      font-weight: 700;
      font-size: 1.1rem;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .community-list {
      list-style: none;
      padding: 4px 0;
      max-height: 400px;
      overflow-y: auto;
    }
    .community-item {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
      border-left: 3px solid transparent;
      font-size: 0.95rem;
    }
    .community-item:hover { background: var(--btn-ghost); }
    .community-item.active {
      background: var(--accent);
      color: #fff;
      border-left-color: var(--accent);
    }
    .community-item .icon { font-size: 1.3rem; }
    .community-item .name { flex:1; }
    .community-item .count { font-size:0.7rem; opacity:0.7; }
    .create-community-btn {
      width: calc(100% - 32px);
      margin: 12px 16px 16px;
      padding: 10px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-family);
      font-size: 0.9rem;
    }
    .create-community-btn:hover { background: var(--btn-primary-hover); transform: scale(1.02); }

    /* ─── Main Content ─── */
    .main-content {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      padding: 24px;
      min-height: 500px;
    }

    /* ─── Community Header ─── */
    .community-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-light);
    }
    .community-header .icon { font-size: 2.6rem; }
    .community-header .info h2 { font-size: 1.6rem; font-weight: 700; }
    .community-header .info .desc { color: var(--text-muted); font-size: 0.9rem; }

    /* ─── Search ─── */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .search-bar input {
      flex:1;
      padding: 10px 16px;
      border: 1px solid var(--border-light);
      border-radius: 40px;
      background: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .search-bar input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
    }
    .search-bar button {
      padding: 10px 20px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-family);
    }
    .search-bar button:hover { background: var(--btn-primary-hover); }

    /* ─── Post Form ─── */
    .post-form {
      background: var(--card-header-bg);
      border-radius: var(--radius);
      padding: 16px 20px 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border-light);
    }
    .post-form input[type="text"] {
      width:100%;
      padding:10px 14px;
      border:1px solid var(--border-light);
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text-main);
      font-family: var(--font-family);
      font-size:1rem;
      margin-bottom:10px;
    }
    .post-form input[type="text"]:focus { outline:none; border-color:var(--accent); }
    .post-form .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .post-form .toolbar button {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-main);
      transition: var(--transition);
      font-family: var(--font-family);
    }
    .post-form .toolbar button:hover { background: var(--accent); color:#fff; border-color:var(--accent); }
    .post-form .toolbar .separator { width:1px; background:var(--border-light); margin:0 4px; }
    .post-form .editor {
      width:100%;
      min-height:100px;
      padding:12px 14px;
      background:var(--card-bg);
      border:1px solid var(--border-light);
      border-radius:var(--radius);
      color:var(--text-main);
      font-family:var(--font-family);
      font-size:1rem;
      outline:none;
      transition:var(--transition);
      word-wrap:break-word;
      resize:vertical;
    }
    .post-form .editor:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(44,110,158,0.15); }
    .post-form .editor[contenteditable="true"] { white-space:pre-wrap; }
    .post-form .post-actions {
      display:flex;
      gap:10px;
      margin-top:12px;
      justify-content:flex-end;
    }
    .post-form .post-actions button {
      padding:8px 20px;
      background:var(--btn-primary);
      color:#fff;
      border:none;
      border-radius:40px;
      font-weight:600;
      cursor:pointer;
      transition:var(--transition);
      font-family:var(--font-family);
    }
    .post-form .post-actions button:hover { background:var(--btn-primary-hover); }
    .post-form .post-actions .cancel-btn {
      background:var(--btn-ghost);
      color:var(--text-main);
    }
    .post-form .post-actions .cancel-btn:hover { background:var(--btn-secondary); color:#fff; }

    .join-btn {
      padding:10px 24px;
      background:var(--btn-primary);
      color:#fff;
      border:none;
      border-radius:40px;
      font-weight:600;
      cursor:pointer;
      font-family:var(--font-family);
      transition:var(--transition);
      margin-bottom:16px;
    }
    .join-btn:hover { background:var(--btn-primary-hover); }

    /* ─── Post List ─── */
    .post-item {
      padding:16px 0;
      border-bottom:1px solid var(--border-light);
      cursor:pointer;
      transition:var(--transition);
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .post-item:hover { background:var(--card-header-bg); margin:0 -8px; padding-left:8px; padding-right:8px; border-radius:var(--radius); }
    .post-content { flex:1; }
    .post-title { font-size:1.2rem; font-weight:600; margin-bottom:4px; }
    .post-meta { font-size:0.8rem; color:var(--text-muted); }
    .post-meta .author-link {
      color:var(--accent);
      cursor:pointer;
      font-weight:500;
    }
    .post-meta .author-link:hover { text-decoration:underline; }
    .post-stats {
      display:flex;
      gap:16px;
      margin-top:6px;
      font-size:0.8rem;
      color:var(--text-muted);
      flex-wrap:wrap;
    }
    .post-stats .stat-pill {
      background:var(--btn-ghost);
      padding:2px 10px;
      border-radius:20px;
      display:inline-flex;
      align-items:center;
      gap:4px;
    }

    /* ─── Post Detail ─── */
    .back-link {
      display:inline-block;
      margin-bottom:16px;
      color:var(--accent);
      cursor:pointer;
      font-weight:500;
    }
    .back-link:hover { text-decoration:underline; }
    .post-detail-card {
      background:var(--card-header-bg);
      border-radius:var(--radius);
      padding:24px;
      margin-bottom:24px;
      border:1px solid var(--border-light);
    }
    .post-detail-title { font-size:1.8rem; font-weight:700; margin-bottom:8px; }
    .post-detail-meta {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
      color:var(--text-muted);
      font-size:0.9rem;
    }
    .post-detail-meta .stat-pill {
      background:var(--btn-ghost);
      padding:2px 12px;
      border-radius:20px;
      display:inline-flex;
      align-items:center;
      gap:4px;
    }
    .post-detail-meta .author-link {
      color:var(--accent);
      cursor:pointer;
      font-weight:500;
    }
    .post-detail-meta .author-link:hover { text-decoration:underline; }
    .post-detail-content {
      margin:20px 0;
      line-height:1.7;
      word-wrap:break-word;
    }
    .post-detail-content img { max-width:100%; height:auto; }
    .post-actions-row {
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid var(--border-light);
    }
    .post-actions-row .action-btn {
      padding:6px 16px;
      border-radius:30px;
      border:1px solid var(--border-light);
      background:transparent;
      color:var(--text-main);
      cursor:pointer;
      transition:var(--transition);
      font-family:var(--font-family);
      font-size:0.85rem;
      font-weight:500;
    }
    .post-actions-row .action-btn:hover { background:var(--btn-ghost); }
    .post-actions-row .action-btn.danger:hover { background:#ef4444; color:#fff; border-color:#ef4444; }

    /* ─── Comments ─── */
    .comment-form { margin:24px 0; }
    .comment-form textarea {
      width:100%;
      padding:12px 16px;
      font-family:var(--font-family);
      border:1px solid var(--border-light);
      border-radius:var(--radius);
      background:var(--card-bg);
      color:var(--text-main);
      resize:vertical;
      min-height:80px;
      margin-bottom:12px;
      transition:var(--transition);
    }
    .comment-form textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(44,110,158,0.15); }
    .comment-form button {
      padding:8px 24px;
      background:var(--btn-primary);
      color:#fff;
      border:none;
      border-radius:40px;
      font-weight:600;
      cursor:pointer;
      transition:var(--transition);
      font-family:var(--font-family);
    }
    .comment-form button:hover { background:var(--btn-primary-hover); }

    .comment {
      margin:12px 0;
      padding-left:20px;
      border-left:2px solid var(--border-light);
    }
    .comment-header {
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:4px;
      flex-wrap:wrap;
    }
    .comment-author {
      font-weight:600;
      color:var(--accent);
      cursor:pointer;
    }
    .comment-author:hover { text-decoration:underline; }
    .comment-time { font-size:0.7rem; color:var(--text-muted); }
    .comment-content { margin:6px 0; word-wrap:break-word; }
    .comment-actions {
      display:flex;
      gap:12px;
      font-size:0.8rem;
      margin-top:4px;
    }
    .comment-actions button {
      background:none;
      border:none;
      color:var(--text-muted);
      cursor:pointer;
      padding:0;
      font-family:var(--font-family);
      font-size:0.8rem;
    }
    .comment-actions button:hover { color:var(--accent); text-decoration:underline; }
    .reply-btn { color:var(--accent); }

    .reply-form {
      display:none;
      margin-top:8px;
    }
    .reply-form textarea {
      width:100%;
      padding:8px 12px;
      border-radius:var(--radius);
      border:1px solid var(--border-light);
      font-family:var(--font-family);
      resize:vertical;
      min-height:60px;
      background:var(--card-bg);
      color:var(--text-main);
    }
    .reply-form .reply-actions {
      display:flex;
      gap:8px;
      margin-top:6px;
    }
    .reply-form .reply-actions button {
      padding:4px 16px;
      border-radius:30px;
      font-size:0.8rem;
      background:var(--btn-primary);
      color:#fff;
      border:none;
      cursor:pointer;
      font-family:var(--font-family);
      transition:var(--transition);
    }
    .reply-form .reply-actions button.cancel-reply {
      background:transparent;
      border:1px solid var(--border-light);
      color:var(--text-muted);
    }
    .reply-form .reply-actions button.cancel-reply:hover { background:var(--btn-ghost); }

    /* ─── Load More ─── */
    .load-more-btn {
      display:block;
      width:100%;
      padding:12px;
      background:var(--btn-ghost);
      border:1px solid var(--border-light);
      border-radius:var(--radius);
      font-weight:600;
      cursor:pointer;
      transition:var(--transition);
      font-family:var(--font-family);
      color:var(--text-main);
      margin-top:16px;
    }
    .load-more-btn:hover { background:var(--accent); color:#fff; }

    /* ─── Modal ─── */
    .modal {
      display:none;
      position:fixed;
      top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.5);
      z-index:1000;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(4px);
    }
    .modal-content {
      background:var(--card-bg);
      padding:28px;
      border-radius:var(--radius);
      width:90%;
      max-width:500px;
      border:1px solid var(--card-border);
      box-shadow:var(--card-shadow);
    }
    .modal h3 { margin-bottom:16px; color:var(--text-main); }
    .modal input, .modal textarea, .modal select {
      width:100%;
      margin:8px 0 16px;
      padding:10px 14px;
      font-family:var(--font-family);
      border:1px solid var(--border-light);
      border-radius:var(--radius);
      background:var(--card-bg);
      color:var(--text-main);
    }
    .modal button {
      padding:8px 20px;
      border-radius:40px;
      border:none;
      font-weight:600;
      cursor:pointer;
      font-family:var(--font-family);
      margin-right:8px;
      transition:var(--transition);
    }
    .modal button:first-of-type { background:var(--btn-primary); color:#fff; }
    .modal button:first-of-type:hover { background:var(--btn-primary-hover); }
    .modal button:last-of-type { background:var(--btn-ghost); color:var(--text-main); }
    .modal button:last-of-type:hover { background:var(--btn-secondary); color:#fff; }

    /* ─── Toast ─── */
    .toast-container {
      position:fixed;
      top:20px;
      right:20px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .toast {
      padding:12px 24px;
      border-radius:40px;
      color:#fff;
      font-weight:500;
      animation:slideIn 0.3s ease-out;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
      backdrop-filter:blur(4px);
      font-size:0.9rem;
    }
    .toast.success { background:#22c55e; }
    .toast.error { background:#ef4444; }
    .toast.info { background:var(--accent); }

    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

    /* ─── Responsive ─── */
    @media (max-width:600px) {
      body { padding:12px; }
      .top-bar { flex-direction:column; align-items:stretch; }
      .top-bar .left { justify-content:space-between; }
      .top-bar .right { justify-content:center; }
      .forum-grid { grid-template-columns:1fr; }
      .sidebar { position:static; }
      .post-item { flex-direction:column; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="left">
      <a href="dashboard.html">← Dashboard</a>
      <h1>💬 Forum</h1>
    </div>
    <div class="right">
      <div class="theme-switcher" id="themeSwitcher">
        <button data-theme="default" class="theme-btn active">✨ Aurora</button>
        <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
        <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
      </div>
      <div class="font-switcher" id="fontSwitcher">
        <button data-font="inter" class="font-btn active">Inter</button>
        <button data-font="monospace" class="font-btn">Courier</button>
        <button data-font="serif" class="font-btn">Georgia</button>
      </div>
    </div>
  </div>

  <!-- Forum Grid -->
  <div class="forum-grid">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">🌐 Communities</div>
      <ul class="community-list" id="communityList"></ul>
      <button class="create-community-btn" onclick="showCreateCommunityModal()">+ Create Community</button>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent"></div>
  </div>
</div>

<!-- Create Community Modal -->
<div id="createCommunityModal" class="modal">
  <div class="modal-content">
    <h3>Create a Community</h3>
    <input type="text" id="newCommunityName" placeholder="Name (unique, lowercase, no spaces)" maxlength="20">
    <input type="text" id="newCommunityDisplayName" placeholder="Display Name">
    <textarea id="newCommunityDesc" placeholder="Description"></textarea>
    <input type="text" id="newCommunityIcon" placeholder="Icon (emoji)" value="🌐">
    <input type="color" id="newCommunityColor" value="#2196F3">
    <button onclick="createCommunity()">Create</button>
    <button onclick="closeModal('createCommunityModal')">Cancel</button>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // SUPABASE INIT
  const sb = window.supabase.createClient(
    "https://mtiwodvsrwvrujbhmmrn.supabase.co",
    "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
  );

  // ─── State ──────────────────────────────────────────────
  let currentUser = null;
  let currentPlayer = null;
  let currentCommunity = null;
  let currentPost = null;
  let communities = [];
  let posts = [];
  let comments = [];
  let postOffset = 0;
  const POSTS_PER_PAGE = 10;
  let searchQuery = '';
  let forumChannel = null;

  // ─── Utilities ──────────────────────────────────────────
  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  function showToast(msg, type='info', duration=3000) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
  }

  // ─── Theme & Font ──────────────────────────────────────
  function setTheme(name) {
    document.body.classList.remove('theme-dusk', 'theme-meadow');
    if (name === 'dusk') document.body.classList.add('theme-dusk');
    else if (name === 'meadow') document.body.classList.add('theme-meadow');
    localStorage.setItem('forum_theme', name);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
  }

  function setFont(name) {
    const root = document.documentElement;
    const map = { 'inter': "'Inter', system-ui, sans-serif", 'monospace': "'Courier New', monospace", 'serif': "'Georgia', serif" };
    root.style.setProperty('--font-family', map[name] || map.inter);
    localStorage.setItem('forum_font', name);
    document.querySelectorAll('.font-btn').forEach(b => b.classList.toggle('active', b.dataset.font === name));
  }

  function initThemeAndFont() {
    const savedTheme = localStorage.getItem('forum_theme') || 'default';
    setTheme(savedTheme);
    const savedFont = localStorage.getItem('forum_font') || 'inter';
    setFont(savedFont);
    document.getElementById('themeSwitcher').addEventListener('click', e => {
      const btn = e.target.closest('.theme-btn');
      if (btn) setTheme(btn.dataset.theme);
    });
    document.getElementById('fontSwitcher').addEventListener('click', e => {
      const btn = e.target.closest('.font-btn');
      if (btn) setFont(btn.dataset.font);
    });
  }

  // ─── Auth ──────────────────────────────────────────────
  async function init() {
    initThemeAndFont();
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    const { data: player } = await sb.from('players').select('id, username, subscription_tier').eq('auth_id', user.id).single();
    currentPlayer = player;
    await loadCommunities();
    const params = new URLSearchParams(window.location.search);
    const communityName = params.get('c');
    const postId = params.get('p');
    if (postId) {
      await loadPostView(postId);
    } else if (communityName) {
      const comm = communities.find(c => c.name === communityName);
      if (comm) await selectCommunity(comm);
    } else {
      await loadFeed();
    }
  }

  // ─── Communities ───────────────────────────────────────
  async function loadCommunities() {
    const { data } = await sb.from('communities').select('*').order('name');
    communities = data || [];
    renderCommunitySidebar();
  }

  function renderCommunitySidebar() {
    const list = document.getElementById('communityList');
    list.innerHTML = communities.map(c => `
      <li class="community-item ${currentCommunity && currentCommunity.id === c.id ? 'active' : ''}"
          onclick="selectCommunityById('${c.id}')">
        <span class="icon">${c.icon || '🌐'}</span>
        <span class="name">${escapeHtml(c.display_name)}</span>
        <span class="count">${c.member_count || 0}</span>
      </li>
    `).join('');
  }

  async function selectCommunityById(id) {
    const comm = communities.find(c => c.id === id);
    if (comm) await selectCommunity(comm);
  }

  async function selectCommunity(community) {
    currentCommunity = community;
    currentPost = null;
    postOffset = 0;
    searchQuery = '';
    window.history.pushState({}, '', `?c=${community.name}`);
    renderCommunitySidebar();
    await loadCommunityView();
    subscribeToCommunity(community.id);
  }

  // ─── Feed ──────────────────────────────────────────────
  async function loadFeed() {
    currentCommunity = null;
    currentPost = null;
    postOffset = 0;
    searchQuery = '';
    window.history.pushState({}, '', window.location.pathname);
    renderCommunitySidebar();
    if (forumChannel) forumChannel.unsubscribe();

    const { data, error } = await sb
      .from('posts')
      .select(`*, author:players(username), community:communities(name, display_name, icon)`)
      .order('created_at', { ascending: false })
      .limit(POSTS_PER_PAGE);
    if (error) { showToast('Error loading feed', 'error'); return; }
    posts = data || [];
    renderPostList('📰 Latest Posts', posts);
  }

  // ─── Community View ────────────────────────────────────
  async function loadCommunityView() {
    if (!currentCommunity) return;
    const isMember = await checkMembership(currentCommunity.id);

    const { data, error } = await sb
      .from('posts')
      .select(`*, author:players(username)`)
      .eq('community_id', currentCommunity.id)
      .order('created_at', { ascending: false })
      .limit(POSTS_PER_PAGE);
    if (error) { showToast('Error loading posts', 'error'); return; }
    posts = data || [];

    let html = `
      <div class="community-header" style="border-bottom-color: ${currentCommunity.banner_color || '#2196F3'};">
        <span class="icon">${currentCommunity.icon || '🌐'}</span>
        <div class="info">
          <h2>${escapeHtml(currentCommunity.display_name)}</h2>
          <div class="desc">${escapeHtml(currentCommunity.description || '')}</div>
        </div>
      </div>
    `;

    if (isMember) {
      html += buildPostForm();
    } else {
      html += `<button class="join-btn" onclick="joinCommunity('${currentCommunity.id}')">Join Community</button>`;
    }

    html += `<div id="postsList"></div>`;
    document.getElementById('mainContent').innerHTML = html;
    renderPostList('', posts);
  }

  // ─── Render Post List ──────────────────────────────────
  function renderPostList(title, postsData) {
    const container = document.getElementById('postsList') || document.getElementById('mainContent');
    if (title && container.id === 'mainContent') {
      container.innerHTML = `<h2 style="margin-bottom:20px;">${title}</h2><div id="postsList"></div>`;
    }
    const list = document.getElementById('postsList') || container;
    if (!postsData || postsData.length === 0) {
      list.innerHTML = '<p style="padding:20px;text-align:center;color:var(--text-muted);">No posts yet.</p>';
      return;
    }

    list.innerHTML = postsData.map(p => `
      <div class="post-item" onclick="viewPost('${p.id}')">
        <div class="post-content">
          <div class="post-title">${escapeHtml(p.title)}</div>
          <div class="post-meta">
            ${p.community ? `${p.community.icon || '🌐'} ${escapeHtml(p.community.display_name)} • ` : ''}
            by <span class="author-link" onclick="event.stopPropagation(); viewProfile('${p.author_id}')">${escapeHtml(p.author?.username || 'Unknown')}</span>
            • ${new Date(p.created_at).toLocaleString()}
          </div>
          <div class="post-stats">
            <span class="stat-pill">💬 ${p.comment_count || 0}</span>
            <span class="stat-pill">👁️ ${p.view_count || 0}</span>
          </div>
        </div>
      </div>
    `).join('');

    // Load more button
    if (postsData.length >= POSTS_PER_PAGE) {
      const btn = document.createElement('button');
      btn.className = 'load-more-btn';
      btn.textContent = 'Load More';
      btn.onclick = loadMorePosts;
      list.parentNode.appendChild(btn);
    }
  }

  // ─── Load More Posts ───────────────────────────────────
  async function loadMorePosts() {
    postOffset += POSTS_PER_PAGE;
    let query = sb.from('posts').select(`*, author:players(username), community:communities(name, display_name, icon)`);
    if (currentCommunity) {
      query = query.eq('community_id', currentCommunity.id);
    }
    if (searchQuery) {
      query = query.ilike('title', `%${searchQuery}%`);
    }
    const { data, error } = await query
      .order('created_at', { ascending: false })
      .range(postOffset, postOffset + POSTS_PER_PAGE - 1);
    if (error) { showToast('Error loading more', 'error'); return; }
    if (!data || data.length === 0) {
      showToast('No more posts', 'info');
      return;
    }
    const newPosts = data || [];
    posts = posts.concat(newPosts);
    const list = document.getElementById('postsList');
    const oldBtn = list.parentNode.querySelector('.load-more-btn');
    if (oldBtn) oldBtn.remove();
    renderPostList('', posts);
  }

  // ─── View Single Post ──────────────────────────────────
  async function viewPost(postId) {
    currentPost = postId;
    window.history.pushState({}, '', `?p=${postId}`);
    await sb.rpc('increment_post_view', { p_post_id: postId });
    await loadPostView(postId);
  }

  async function loadPostView(postId) {
    const { data: post, error } = await sb
      .from('posts')
      .select(`*, author:players(username), community:communities(*)`)
      .eq('id', postId)
      .single();
    if (error || !post) {
      document.getElementById('mainContent').innerHTML = '<p>Post not found</p>';
      return;
    }
    currentCommunity = post.community;
    currentPost = post;
    renderCommunitySidebar();
    subscribeToPostComments(postId);

    const commentsData = await loadComments(postId);

    let html = `
      <div class="back-link" onclick="selectCommunityById('${post.community.id}')">← Back to ${escapeHtml(post.community.display_name)}</div>
      <div class="post-detail-card">
        <div class="post-detail-title">${escapeHtml(post.title)}</div>
        <div class="post-detail-meta">
          <span>by <span class="author-link" onclick="viewProfile('${post.author_id}')">${escapeHtml(post.author?.username)}</span></span>
          <span>• ${new Date(post.created_at).toLocaleString()}</span>
          <span class="stat-pill">👁️ ${post.view_count || 0}</span>
        </div>
        <div class="post-detail-content">${post.content || ''}</div>
        <div class="post-actions-row">
          ${post.author_id === currentPlayer?.id ? `
            <button class="action-btn" onclick="editPost('${post.id}')">✏️ Edit</button>
            <button class="action-btn danger" onclick="deletePost('${post.id}')">🗑️ Delete</button>
          ` : ''}
        </div>
      </div>
      <h3>Comments (${commentsData.length})</h3>
      <div class="comment-form">
        <textarea id="commentContent" placeholder="Write a comment..."></textarea>
        <button onclick="submitComment(null)">Post Comment</button>
      </div>
      <div id="commentsContainer">${renderComments(commentsData)}</div>
    `;
    document.getElementById('mainContent').innerHTML = html;
  }

  // ─── Load Comments ─────────────────────────────────────
  async function loadComments(postId) {
    const { data, error } = await sb
      .from('comments')
      .select(`*, author:players(username)`)
      .eq('post_id', postId)
      .is('is_deleted', false)
      .order('depth', { ascending: true })
      .order('created_at', { ascending: true });
    if (error) { console.error(error); return []; }
    return (data || []).map(c => ({
      ...c,
      author_name: c.author?.username || 'Unknown'
    }));
  }

  // ─── Render Comments (threaded) ──────────────────────
  function renderComments(commentsData, parentId = null) {
    if (!commentsData || !commentsData.length) return '';
    const filtered = commentsData.filter(c => c.parent_id === parentId);
    if (!filtered.length) return '';
    return filtered.map(c => {
      const children = renderComments(commentsData, c.id);
      return `
        <div class="comment" style="margin-left: ${(c.depth || 0) * 20}px;">
          <div class="comment-header">
            <span class="comment-author" onclick="viewProfile('${c.author_id}')">${escapeHtml(c.author_name)}</span>
            <span class="comment-time">${new Date(c.created_at).toLocaleString()}</span>
          </div>
          <div class="comment-content">${escapeHtml(c.content || '').replace(/\n/g, '<br>')}</div>
          <div class="comment-actions">
            <button class="reply-btn" onclick="showReplyForm('${c.id}')">Reply</button>
            ${c.author_id === currentPlayer?.id ? `
              <button onclick="editComment('${c.id}')">Edit</button>
              <button onclick="deleteComment('${c.id}')">Delete</button>
            ` : ''}
          </div>
          <div class="reply-form" id="reply-form-${c.id}">
            <textarea id="reply-content-${c.id}" rows="2" placeholder="Write a reply..."></textarea>
            <div class="reply-actions">
              <button onclick="submitComment('${c.id}')">Reply</button>
              <button class="cancel-reply" onclick="hideReplyForm('${c.id}')">Cancel</button>
            </div>
          </div>
          ${children}
        </div>
      `;
    }).join('');
  }

  // ─── Submit Comment ────────────────────────────────────
  async function submitComment(parentId) {
    if (!currentPlayer) return showToast('Please log in', 'error');
    const content = parentId
      ? document.getElementById(`reply-content-${parentId}`).value.trim()
      : document.getElementById('commentContent').value.trim();
    if (!content) return showToast('Comment cannot be empty', 'error');

    let depth = 0;
    if (parentId) {
      const { data } = await sb.from('comments').select('depth').eq('id', parentId).single();
      depth = (data?.depth || 0) + 1;
    }
    const { error } = await sb.from('comments').insert({
      content,
      post_id: currentPost.id,
      author_id: currentPlayer.id,
      parent_id: parentId || null,
      depth: depth,
      is_deleted: false
    });
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Comment posted', 'success');
    if (parentId) hideReplyForm(parentId);
    await loadPostView(currentPost.id);
  }

  // ─── Helpers ────────────────────────────────────────────
  function showReplyForm(commentId) {
    document.getElementById(`reply-form-${commentId}`).style.display = 'block';
  }
  function hideReplyForm(commentId) {
    document.getElementById(`reply-form-${commentId}`).style.display = 'none';
  }

  async function checkMembership(communityId) {
    if (!currentPlayer) return false;
    const { count } = await sb
      .from('community_members')
      .select('*', { count: 'exact', head: true })
      .eq('community_id', communityId)
      .eq('player_id', currentPlayer.id);
    return count > 0;
  }

  async function joinCommunity(communityId) {
    const { error } = await sb.from('community_members').insert({ community_id: communityId, player_id: currentPlayer.id });
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Joined community!', 'success');
    await loadCommunityView();
  }

  function buildPostForm() {
    // Rich text editor for all users (using contenteditable)
    return `
      <div class="post-form">
        <input type="text" id="postTitle" placeholder="Post title" maxlength="200">
        <div class="toolbar">
          <button onclick="execCmd('bold')"><b>B</b></button>
          <button onclick="execCmd('italic')"><i>I</i></button>
          <button onclick="execCmd('insertUnorderedList')">• Bullet</button>
          <button onclick="execCmd('formatBlock','h2')">H2</button>
          <button onclick="insertLink()">🔗 Link</button>
        </div>
        <div id="postEditor" class="editor" contenteditable="true" placeholder="What's on your mind?"></div>
        <div class="post-actions">
          <button onclick="createPost()">Create Post</button>
          <button class="cancel-btn" onclick="clearPostEditor()">Clear</button>
        </div>
      </div>
    `;
  }

  // ─── Create Post ────────────────────────────────────────
  async function createPost() {
    const title = document.getElementById('postTitle').value.trim();
    if (!title) return showToast('Title required', 'error');
    const editor = document.getElementById('postEditor');
    const content = editor.innerHTML.trim();
    if (!content || content === '<br>') return showToast('Content cannot be empty', 'error');

    const { error } = await sb.from('posts').insert({
      title,
      content,
      community_id: currentCommunity.id,
      author_id: currentPlayer.id
    });
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Post created!', 'success');
    clearPostEditor();
    await loadCommunityView();
  }

  function clearPostEditor() {
    document.getElementById('postTitle').value = '';
    document.getElementById('postEditor').innerHTML = '';
  }

  function execCmd(cmd, value = null) {
    document.execCommand(cmd, false, value);
    document.getElementById('postEditor').focus();
  }
  function insertLink() {
    const url = prompt('Enter URL:', 'https://');
    if (url) execCmd('createLink', url);
  }

  // ─── Edit / Delete Post ─────────────────────────────────
  async function editPost(postId) {
    const newContent = prompt('Edit content:', currentPost.content);
    if (newContent !== null) {
      const { error } = await sb.from('posts').update({ content: newContent }).eq('id', postId);
      if (error) { showToast(error.message, 'error'); return; }
      await loadPostView(postId);
    }
  }
  async function deletePost(postId) {
    if (!confirm('Delete this post?')) return;
    const { error } = await sb.from('posts').delete().eq('id', postId);
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Post deleted', 'success');
    if (currentCommunity) await loadCommunityView();
    else await loadFeed();
  }
  async function editComment(commentId) {
    const newContent = prompt('Edit comment:');
    if (newContent) {
      await sb.from('comments').update({ content: newContent }).eq('id', commentId);
      await loadPostView(currentPost.id);
    }
  }
  async function deleteComment(commentId) {
    if (!confirm('Delete this comment?')) return;
    await sb.from('comments').delete().eq('id', commentId);
    await loadPostView(currentPost.id);
  }

  // ─── Search ─────────────────────────────────────────────
  function searchPosts() {
    const query = document.getElementById('searchInput').value.trim();
    searchQuery = query;
    if (!query) {
      if (currentCommunity) loadCommunityView();
      else loadFeed();
      return;
    }
    const container = document.getElementById('mainContent');
    container.innerHTML = `<h2 style="margin-bottom:20px;">🔍 Results for "${escapeHtml(query)}"</h2><div id="postsList"></div>`;
    sb.from('posts')
      .select(`*, author:players(username), community:communities(name, display_name, icon)`)
      .ilike('title', `%${query}%`)
      .order('created_at', { ascending: false })
      .limit(POSTS_PER_PAGE)
      .then(({ data }) => {
        posts = data || [];
        renderPostList('', posts);
      });
  }

  // ─── Create Community ──────────────────────────────────
  function showCreateCommunityModal() {
    document.getElementById('createCommunityModal').style.display = 'flex';
  }
  async function createCommunity() {
    const name = document.getElementById('newCommunityName').value.trim().toLowerCase().replace(/\s+/g, '');
    const display_name = document.getElementById('newCommunityDisplayName').value.trim();
    if (!name || !display_name) return showToast('Name and display name required', 'error');
    const { error } = await sb.from('communities').insert({
      name, display_name,
      description: document.getElementById('newCommunityDesc').value,
      icon: document.getElementById('newCommunityIcon').value,
      banner_color: document.getElementById('newCommunityColor').value,
      created_by: currentPlayer.id
    });
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Community created!', 'success');
    closeModal('createCommunityModal');
    await loadCommunities();
  }
  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
  }

  // ─── Realtime Subscriptions ─────────────────────────────
  function subscribeToCommunity(communityId) {
    if (forumChannel) forumChannel.unsubscribe();
    forumChannel = sb.channel(`forum-${communityId}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'posts',
        filter: `community_id=eq.${communityId}`
      }, () => {
        if (currentCommunity && currentCommunity.id === communityId) loadCommunityView();
      })
      .subscribe();
  }

  function subscribeToPostComments(postId) {
    if (forumChannel) forumChannel.unsubscribe();
    forumChannel = sb.channel(`post-${postId}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'comments',
        filter: `post_id=eq.${postId}`
      }, () => {
        if (currentPost && currentPost.id === postId) loadPostView(postId);
      })
      .subscribe();
  }

  // ─── Profile navigation ──────────────────────────────────
  function viewProfile(userId) {
    window.location.href = `profile.html?id=${userId}`;
  }

  // ─── Expose globals ──────────────────────────────────────
  window.selectCommunityById = selectCommunityById;
  window.viewPost = viewPost;
  window.createPost = createPost;
  window.submitComment = submitComment;
  window.showReplyForm = showReplyForm;
  window.hideReplyForm = hideReplyForm;
  window.showCreateCommunityModal = showCreateCommunityModal;
  window.createCommunity = createCommunity;
  window.joinCommunity = joinCommunity;
  window.editPost = editPost;
  window.deletePost = deletePost;
  window.editComment = editComment;
  window.deleteComment = deleteComment;
  window.closeModal = closeModal;
  window.execCmd = execCmd;
  window.insertLink = insertLink;
  window.clearPostEditor = clearPostEditor;
  window.searchPosts = searchPosts;
  window.viewProfile = viewProfile;
  window.loadMorePosts = loadMorePosts;

  // ─── Start ──────────────────────────────────────────────
  init();
</script>
</body>
</html>
