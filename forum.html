<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Forum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    /* ─── same CSS as before ─── */
    :root {
      --bg-body: #f0f4fa;
      --card-bg: #fff;
      --card-border: rgba(148,163,184,0.2);
      --card-shadow: 0 12px 30px rgba(0,0,0,0.05);
      --header-bg: linear-gradient(135deg,#1e2f5e 0%,#1a4b7a 100%);
      --header-text: #fff;
      --accent: #2c6e9e;
      --accent-hover: #1f5480;
      --btn-primary: #2c6e9e;
      --btn-primary-hover: #1f5480;
      --btn-secondary: #475569;
      --btn-ghost: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #334155;
      --border-light: #e2e8f0;
      --card-header-bg: #f8fafc;
      --avatar-bg: #e0f2fe;
      --font-family: 'Courier New', monospace;
      --border-radius-card: 24px;
      --transition: all 0.2s ease;
    }

    body.theme-dusk {
      --bg-body: #0f1722;
      --card-bg: #1e293b;
      --card-border: rgba(51,65,85,0.6);
      --card-shadow: 0 15px 35px rgba(0,0,0,0.3);
      --header-bg: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      --header-text: #e2e8f0;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-secondary: #334155;
      --btn-ghost: #334155;
      --text-main: #f1f5f9;
      --text-muted: #cbd5e1;
      --border-light: #334155;
      --card-header-bg: #0f172a;
      --avatar-bg: #334155;
    }

    body.theme-meadow {
      --bg-body: #eef4e6;
      --card-bg: #ffffffea;
      --card-border: #cbd5b0;
      --card-shadow: 0 12px 24px rgba(60,70,40,0.08);
      --header-bg: linear-gradient(135deg,#2b5e3b 0%,#4a7c59 100%);
      --header-text: #fef9e6;
      --accent: #4b6b3e;
      --accent-hover: #3a5530;
      --btn-primary: #4b6b3e;
      --btn-primary-hover: #3a5530;
      --btn-secondary: #7f6b4a;
      --btn-ghost: #e9e1c7;
      --text-main: #2c2b26;
      --text-muted: #5b5a4c;
      --border-light: #d9d2b0;
      --card-header-bg: #fef6e0;
      --avatar-bg: #e2e9cf;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-family);
      color: var(--text-main);
      padding: 28px 20px;
      transition: background .25s, color .2s;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding: 0 8px;
    }
    .back-link {
      background: var(--card-bg);
      padding: 8px 18px;
      border-radius: 60px;
      text-decoration: none;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--border-light);
      transition: var(--transition);
      font-size: .9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(2px);
    }
    .back-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .theme-switcher, .font-switcher {
      display: flex;
      gap: 6px;
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      backdrop-filter: blur(4px);
      align-items: center;
    }
    .theme-btn, .font-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: .8rem;
      cursor: pointer;
      transition: .2s;
      color: var(--text-muted);
      font-family: var(--font-family);
    }
    .theme-btn.active, .font-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .theme-btn:hover:not(.active), .font-btn:hover:not(.active) {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .font-btn {
      font-size: .75rem;
      padding: 4px 12px;
    }

    .forum-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) {
      .forum-container { grid-template-columns: 1fr; }
    }

    /* ─── Sidebar ─── */
    .sidebar {
      background: var(--card-bg);
      border-radius: var(--border-radius-card);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      height: fit-content;
    }
    .sidebar-header {
      background: var(--card-header-bg);
      padding: 18px 20px;
      font-weight: 700;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .sidebar-header .toggle-icon {
      margin-left: auto;
      font-size: 0.8rem;
      opacity: 0.6;
    }
    .sidebar-section {
      border-bottom: 1px solid var(--border-light);
    }
    .sidebar-section:last-child {
      border-bottom: none;
    }
    .community-list {
      list-style: none;
      padding: 8px 0;
      max-height: 300px;
      overflow-y: auto;
    }
    .community-item {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .community-item:hover { background: var(--btn-ghost); }
    .community-item.active { background: var(--accent); color: #fff; border-left-color: var(--accent); }
    .community-icon { font-size: 1.4rem; }
    .community-info { flex: 1; }
    .community-name { font-weight: 600; }
    .community-stats { font-size: 0.7rem; opacity: 0.7; }
    .community-follow-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px;
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .community-follow-btn:hover { transform: scale(1.2); }
    .community-follow-btn.following { color: #fbbf24; }

    .create-community-btn {
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      padding: 12px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
      font-size: .9rem;
    }
    .create-community-btn:hover {
      background: var(--btn-primary-hover);
      transform: scale(1.02);
    }

    .empty-favorites {
      padding: 12px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
    }

    /* ─── Scheduled Posts Section ─── */
    .scheduled-section {
      margin: 16px 20px 20px;
      padding: 12px;
      background: var(--card-header-bg);
      border-radius: 12px;
      border: 1px solid var(--border-light);
      display: none;
    }
    .scheduled-section h4 {
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .scheduled-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.85rem;
    }
    .scheduled-item:last-child { border-bottom: none; }
    .scheduled-item .time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ─── Main content ─── */
    .main-content {
      background: var(--card-bg);
      border-radius: var(--border-radius-card);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      padding: 24px;
      min-height: 500px;
    }

    .community-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-light);
      flex-wrap: wrap;
    }
    .community-header-icon { font-size: 3rem; }
    .community-header-info { flex: 1; }
    .community-header-info h2 { margin-bottom: 4px; font-size: 1.8rem; }
    .community-header-desc { color: var(--text-muted); }
    .community-follow-header-btn {
      background: none;
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 1rem;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
      color: var(--text-main);
      background: var(--btn-ghost);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .community-follow-header-btn:hover {
      background: var(--btn-secondary);
      color: #fff;
    }
    .community-follow-header-btn.following {
      background: #fbbf24;
      border-color: #fbbf24;
      color: #0f172a;
    }

    /* ─── Post form ─── */
    .post-form {
      background: var(--card-header-bg);
      border-radius: 16px;
      padding: 16px 20px 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border-light);
    }
    .post-form .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .post-form .toolbar button {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-main);
      transition: .15s;
      font-family: var(--font-family);
    }
    .post-form .toolbar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .post-form .toolbar button:active {
      transform: scale(0.95);
    }
    .post-form .toolbar .separator {
      width: 1px;
      background: var(--border-light);
      margin: 0 4px;
    }
    .post-form .toolbar .affiliate-btn.active {
      background: #fbbf24;
      color: #0f172a;
      border-color: #fbbf24;
    }

    .post-form .editor {
      width: 100%;
      box-sizing: border-box;
      min-height: 100px;
      padding: 12px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 1rem;
      outline: none;
      transition: border .2s;
      word-wrap: break-word;
      resize: vertical;
    }
    .post-form .editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
    }
    .post-form .editor[contenteditable="true"] {
      white-space: pre-wrap;
    }

    .post-form .post-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .post-form .post-actions button {
      padding: 10px 24px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
    }
    .post-form .post-actions button:hover {
      background: var(--btn-primary-hover);
    }
    .post-form .post-actions .cancel-btn {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .post-form .post-actions .cancel-btn:hover {
      background: var(--btn-secondary);
      color: #fff;
    }

    .post-form .schedule-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
    }
    .post-form .schedule-controls label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .post-form .schedule-controls input[type="datetime-local"] {
      padding: 6px 10px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.9rem;
      display: none;
    }
    .post-form .schedule-controls select {
      padding: 6px 10px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.9rem;
      flex: 1 1 auto;
      min-width: 120px;
    }

    .join-btn {
      padding: 10px 24px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-family);
      transition: .2s;
      margin-bottom: 16px;
    }
    .join-btn:hover { background: var(--btn-primary-hover); }

    /* ─── Post item ─── */
    .post-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background .15s;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .post-item:hover {
      background: var(--card-header-bg);
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
      border-radius: 12px;
    }
    .post-content {
      flex: 1;
    }
    .post-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .post-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 10px;
    }
    .post-meta .author-link {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }
    .post-meta .author-link:hover {
      text-decoration: underline;
    }
    .post-stats {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .post-stats .stat-pill {
      background: var(--btn-ghost);
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .post-stats .stat-pill .icon { font-size: 0.8rem; }

    /* ─── Post detail ─── */
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }

    .post-detail-card {
      background: var(--card-header-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-light);
    }
    .post-detail-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .post-detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .post-detail-meta .author-link {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }
    .post-detail-meta .author-link:hover {
      text-decoration: underline;
    }
    .post-detail-meta .stat-pill {
      background: var(--btn-ghost);
      padding: 2px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .post-detail-meta .stat-pill.affiliate-pill {
      cursor: pointer;
      position: relative;
    }
    .affiliate-bubble {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: var(--text-main);
      box-shadow: var(--card-shadow);
      max-width: 300px;
      line-height: 1.5;
      white-space: normal;
      z-index: 100;
    }
    .affiliate-bubble.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-4px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .post-detail-content {
      margin: 20px 0;
      line-height: 1.7;
      word-wrap: break-word;
    }
    .post-detail-content img {
      max-width: 100%;
      height: auto;
    }
    .img-small { width: 300px; max-width: 100%; }
    .img-medium { width: 500px; max-width: 100%; }
    .img-large { width: 700px; max-width: 100%; }
    .img-original { width: 100%; }

    .post-editor-wrapper {
      margin: 12px 0;
    }
    .post-editor-wrapper .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .post-editor-wrapper .toolbar button {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-main);
      transition: .15s;
      font-family: var(--font-family);
    }
    .post-editor-wrapper .toolbar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .post-editor-wrapper .toolbar .affiliate-btn.active {
      background: #fbbf24;
      color: #0f172a;
      border-color: #fbbf24;
    }
    .post-editor-wrapper .editor {
      width: 100%;
      min-height: 120px;
      padding: 12px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 1rem;
      outline: none;
      transition: border .2s;
      word-wrap: break-word;
      resize: vertical;
    }
    .post-editor-wrapper .editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
    }
    .post-editor-wrapper .editor-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .post-editor-wrapper .editor-actions button {
      padding: 6px 16px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-family);
      transition: .2s;
    }
    .post-editor-wrapper .editor-actions .save-btn {
      background: var(--btn-primary);
      color: #fff;
    }
    .post-editor-wrapper .editor-actions .save-btn:hover {
      background: var(--btn-primary-hover);
    }
    .post-editor-wrapper .editor-actions .cancel-btn {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .post-editor-wrapper .editor-actions .cancel-btn:hover {
      background: var(--btn-secondary);
      color: #fff;
    }

    .post-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }
    .post-actions .action-btn {
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-family);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .post-actions .action-btn:hover {
      background: var(--btn-ghost);
    }
    .post-actions .action-btn.edit-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .post-actions .action-btn.delete-btn:hover {
      background: #f44336;
      color: #fff;
      border-color: #f44336;
    }

    /* ─── Reaction bar ─── */
    .reaction-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0 8px;
    }
    .reaction-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 2px 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-family);
      color: var(--text-main);
    }
    .reaction-btn:hover { background: var(--btn-ghost); }
    .reaction-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .reaction-btn .count {
      font-size: 0.7rem;
      font-weight: 600;
      opacity: 0.7;
    }

    /* ─── Comments ─── */
    .comment-form {
      margin: 24px 0;
    }
    .comment-form textarea {
      width: 100%;
      padding: 12px 16px;
      font-family: var(--font-family);

<script>
// ─────────────────────────────────────────────
// SUPABASE INIT
// ─────────────────────────────────────────────
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentUser = null;
let currentPlayer = null;
let currentCommunity = null;
let currentPost = null;
let editingPostId = null;
let editingCommentId = null;
let communities = [];
let followedCommunityIds = new Set();
let forumChannel = null;
let aiMembers = [];
let affiliateEnabled = false;
let submittingComment = false;

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ─────────────────────────────────────────────
// XSS ESCAPE (for plain text only – NOT for HTML content)
// ─────────────────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

// ─────────────────────────────────────────────
// THEME & FONT
// ─────────────────────────────────────────────
function setTheme(themeName) {
  const body = document.body;
  body.classList.remove('theme-dusk', 'theme-meadow');
  if (themeName === 'dusk') body.classList.add('theme-dusk');
  else if (themeName === 'meadow') body.classList.add('theme-meadow');
  localStorage.setItem('forum_theme', themeName);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
  });
}

function setFont(fontName) {
  const root = document.documentElement;
  if (fontName === 'monospace') root.style.setProperty('--font-family', "'Courier New', monospace");
  else if (fontName === 'sans-serif') root.style.setProperty('--font-family', "'Inter', sans-serif");
  else if (fontName === 'serif') root.style.setProperty('--font-family', "'Georgia', serif");
  localStorage.setItem('forum_font', fontName);
  document.querySelectorAll('.font-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-font') === fontName);
  });
}

function initThemeAndFont() {
  const savedTheme = localStorage.getItem('forum_theme') || 'default';
  setTheme(savedTheme);
  const savedFont = localStorage.getItem('forum_font') || 'monospace';
  setFont(savedFont);

  document.getElementById('themeSwitcher').addEventListener('click', (e) => {
    const btn = e.target.closest('.theme-btn');
    if (btn) setTheme(btn.getAttribute('data-theme'));
  });
  document.getElementById('fontSwitcher').addEventListener('click', (e) => {
    const btn = e.target.closest('.font-btn');
    if (btn) setFont(btn.getAttribute('data-font'));
  });
}

// ─────────────────────────────────────────────
// SIDEBAR COLLAPSE TOGGLE
// ─────────────────────────────────────────────
function toggleSidebarSection(header) {
  const list = header.nextElementSibling;
  if (list && list.classList.contains('community-list')) {
    list.style.display = list.style.display === 'none' ? '' : 'none';
    const icon = header.querySelector('.toggle-icon');
    if (icon) icon.textContent = list.style.display === 'none' ? '▶' : '▼';
  }
}

// ─────────────────────────────────────────────
// AFFILIATE TOGGLE
// ─────────────────────────────────────────────
function toggleAffiliate() {
  affiliateEnabled = !affiliateEnabled;
  document.querySelectorAll('.affiliate-btn').forEach(btn => {
    btn.classList.toggle('active', affiliateEnabled);
  });
  if (affiliateEnabled) showToast('Affiliate tag added to post.', 'info');
  else showToast('Affiliate tag removed.', 'info');
}

function showAffiliateBubble(event) {
  const pill = event.currentTarget;
  const bubble = pill.querySelector('.affiliate-bubble');
  if (!bubble) return;
  bubble.classList.add('show');
  clearTimeout(bubble._hideTimer);
  bubble._hideTimer = setTimeout(() => bubble.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────
// DEVICE INFO TRACKING
// ─────────────────────────────────────────────
async function trackDeviceInfo() {
  if (!currentPlayer) return;
  let ip = '0.0.0.0', city = '', region = '', isp = '';
  try {
    const ipRes = await fetch('https://ipinfo.io/json');
    const ipData = await ipRes.json();
    ip = ipData.ip || '0.0.0.0';
    city = ipData.city || '';
    region = ipData.region || '';
    isp = ipData.org || '';
  } catch (e) { console.warn('Failed to fetch IP from ipinfo.io', e); }
  const parser = new UAParser();
  const uaResult = parser.getResult();
  const browser = (uaResult.browser.name || '') + (uaResult.browser.version ? ' ' + uaResult.browser.version : '');
  const os = (uaResult.os.name || '') + (uaResult.os.version ? ' ' + uaResult.os.version : '');
  const deviceType = uaResult.device.type || 'desktop';
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown';
  const language = navigator.language || 'unknown';
  const userAgent = navigator.userAgent || 'unknown';
  const screenResolution = `${window.screen.width}x${window.screen.height}`;
  const viewport = `${window.innerWidth}x${window.innerHeight}`;
  const referrer = document.referrer || '';
  const networkConnection = navigator.connection?.effectiveType || 'unknown';
  const currentInfo = { ip, city, region, isp, timezone, language, user_agent: userAgent, browser, os, device_type: deviceType, screen_resolution: screenResolution, viewport, referrer, network_connection: networkConnection };
  const storedInfo = currentPlayer.device_info || {};
  const hasChanged = JSON.stringify(storedInfo) !== JSON.stringify(currentInfo);
  const now = new Date().toISOString();
  const updatePayload = { last_seen: now, current_page: window.location.pathname.split('/').pop() || 'forum.html', total_visits: (currentPlayer.total_visits || 0) + 1, device_info_updated_at: now };
  if (hasChanged) updatePayload.device_info = currentInfo;
  const { error } = await sb.from('players').update(updatePayload).eq('id', currentPlayer.id);
  if (error) { console.error('Failed to update device info:', error); } else { if (hasChanged) currentPlayer.device_info = currentInfo; currentPlayer.last_seen = now; currentPlayer.total_visits = updatePayload.total_visits; currentPlayer.device_info_updated_at = now; currentPlayer.current_page = updatePayload.current_page; }
}

// ─────────────────────────────────────────────
// AFFILIATE LINK TRACKING
// ─────────────────────────────────────────────
function addAffiliateAttributes(html) {
  if (!html) return html;
  const temp = document.createElement('div');
  temp.innerHTML = html;
  temp.querySelectorAll('a').forEach(a => a.setAttribute('data-affiliate', 'true'));
  return temp.innerHTML;
}
async function logAffiliateClick(linkElement) {
  if (!currentPlayer) { console.warn('Affiliate click not logged – user not authenticated.'); return; }
  const url = linkElement.href;
  const referrer = window.location.pathname;
  const userAgent = navigator.userAgent;
  const linkText = linkElement.textContent.trim() || '';
  try {
    let ip = '0.0.0.0';
    try { const ipRes = await fetch('https://ipinfo.io/json'); const ipData = await ipRes.json(); ip = ipData.ip || '0.0.0.0'; } catch (e) {}
    const { data, error } = await sb.rpc('log_affiliate_click', { p_url: url, p_referrer: referrer, p_user_agent: userAgent, p_ip_address: ip, p_link_text: linkText });
    if (error) console.error('❌ Affiliate click logging failed (RPC error):', error);
  } catch (err) { console.error('❌ Affiliate click logging failed (exception):', err); }
}

// ─────────────────────────────────────────────
// AUTH & INIT
// ─────────────────────────────────────────────
async function init() {
  initThemeAndFont();

  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href = 'index.html';
  currentUser = user;

  const { data: player } = await sb.from('players').select('*').eq('auth_id', user.id).single();
  currentPlayer = player;

  await loadCommunities();
  await loadFollowedCommunities();
  await loadAIMembers();
  await trackDeviceInfo();

  document.addEventListener('click', function(e) {
    const link = e.target.closest('a[data-affiliate="true"]');
    if (link) logAffiliateClick(link);
  });

  const params = new URLSearchParams(window.location.search);
  const communityName = params.get('c');
  const postId = params.get('p');

  if (postId) {
    await loadPostView(postId);
  } else if (communityName) {
    const comm = communities.find(c => c.name === communityName);
    if (comm) await selectCommunity(comm);
  } else {
    await loadFeed();
  }
  if (currentPlayer) await loadScheduledPosts();
}

// ─────────────────────────────────────────────
// LOAD AI MEMBERS
// ─────────────────────────────────────────────
async function loadAIMembers() {
  const { data, error } = await sb.from('ai_members').select('*').order('name');
  if (error) { console.error('Error loading AI members:', error); return; }
  aiMembers = data || [];
  populateAISelects();
}

function populateAISelects() {
  const selects = document.querySelectorAll('.post-as-select');
  selects.forEach(select => {
    while (select.options.length > 1) { select.remove(1); }
    aiMembers.forEach(ai => {
      const opt = document.createElement('option');
      opt.value = 'ai_' + ai.id;
      opt.textContent = `${ai.avatar_url} ${ai.name} (${ai.country})`;
      select.appendChild(opt);
    });
  });
}

// ─────────────────────────────────────────────
// LOAD SCHEDULED POSTS
// ─────────────────────────────────────────────
async function loadScheduledPosts() {
  if (!currentPlayer) return;
  const { data, error } = await sb
    .from('posts')
    .select('id, title, published_at')
    .eq('author_id', currentPlayer.id)
    .gt('published_at', new Date().toISOString())
    .order('published_at', { ascending: true })
    .limit(10);

  const section = document.getElementById('scheduledSection');
  const list = document.getElementById('scheduledPostsList');
  if (error || !data || data.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  list.innerHTML = data.map(post => `
    <div class="scheduled-item">
      <strong>${escapeHtml(post.title)}</strong><br>
      <span class="time">📅 ${new Date(post.published_at).toLocaleString()}</span>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// COMMUNITIES
// ─────────────────────────────────────────────
async function loadCommunities() {
  const { data } = await sb.from('communities').select('*').order('name');
  communities = data || [];
  renderCommunitySidebar();
  renderFavoritesSidebar();
  const select = document.getElementById('newCommunityParent');
  if (select) {
    select.innerHTML = '<option value="">None (Main Community)</option>' +
      communities.filter(c => !c.parent_id).map(c => `<option value="${c.id}">${escapeHtml(c.display_name)}</option>`).join('');
  }
}
async function loadFollowedCommunities() {
  if (!currentPlayer) return;
  const { data, error } = await sb.rpc('get_followed_community_ids', { p_user_id: currentPlayer.id });
  if (error) { console.error('Error loading followed communities:', error); return; }
  followedCommunityIds = new Set(data.map(r => r.community_id));
  renderCommunitySidebar();
  renderFavoritesSidebar();
}
function renderCommunitySidebar() {
  const list = document.getElementById('communityList');
  list.innerHTML = communities.map(c => {
    const isFollowed = followedCommunityIds.has(c.id);
    return `
      <li class="community-item ${currentCommunity && currentCommunity.id === c.id ? 'active' : ''}" onclick="selectCommunityById('${c.id}')">
        <span class="community-icon">${c.icon || '🌐'}</span>
        <div class="community-info">
          <div class="community-name">${escapeHtml(c.display_name)}</div>
          <div class="community-stats">${c.member_count || 0} members</div>
        </div>
        <button class="community-follow-btn ${isFollowed ? 'following' : ''}" onclick="event.stopPropagation(); toggleFollowCommunity('${c.id}')" title="${isFollowed ? 'Unfollow' : 'Follow'}">${isFollowed ? '⭐' : '☆'}</button>
      </li>
    `;
  }).join('');
}
function renderFavoritesSidebar() {
  const list = document.getElementById('favoritesList');
  const followed = communities.filter(c => followedCommunityIds.has(c.id));

// PASTE HANDLER – forces HTML paste
// ─────────────────────────────────────────────
function setupPasteHandler() {
    const editor = document.getElementById('postEditor');
    if (!editor) return;
    
    editor.addEventListener('paste', function(e) {
        // 1. Prevent default paste
        e.preventDefault();
        
        // 2. Get the clipboard content as HTML
        const clipboardData = e.clipboardData || window.clipboardData;
        if (!clipboardData) return;
        
        // 3. Try to get HTML content
        let html = clipboardData.getData('text/html');
        if (!html) {
            // Fallback: get plain text and wrap as HTML
            const text = clipboardData.getData('text/plain');
            if (!text) return;
            html = text.replace(/\n/g, '<br>');
        }
        
        // 4. Insert the HTML at the cursor position
        document.execCommand('insertHTML', false, html);
    });
}

function insertTable() {
  const rows = prompt('Enter number of rows:', '3');
  if (!rows) return;
  const cols = prompt('Enter number of columns:', '3');
  if (!cols) return;
  let tableHtml = '<table border="1" style="border-collapse:collapse; width:100%;">';
  for (let i = 0; i < parseInt(rows); i++) {
    tableHtml += '<tr>';
    for (let j = 0; j < parseInt(cols); j++) {
      tableHtml += `<td style="padding:8px; border:1px solid #ccc;">Cell ${i+1}${String.fromCharCode(65+j)}</td>`;
    }
    tableHtml += '</tr>';
  }
  tableHtml += '</table><br>';
  document.execCommand('insertHTML', false, tableHtml);
}

async function createOrSchedulePost() {
  const title = document.getElementById('postTitle').value.trim();
  const editor = document.getElementById('postEditor');
  let content;

  if (editor.tagName === 'DIV') {
    // contenteditable – store HTML (not escaped)
    content = editor.innerHTML.trim();
    if (!content || content === '<br>') return showToast('Content cannot be empty', 'error');
    if (affiliateEnabled) content += `<div class="affiliate-pill">🔗 Affiliate links included</div>`;
    // Sanitize with DOMPurify but keep HTML tags
    content = DOMPurify.sanitize(content, {
      ALLOWED_TAGS: [
        'h1','h2','h3','h4','h5','h6',
        'p','strong','em','u','s','strike',
        'ul','ol','li',
        'blockquote','pre','code',
        'table','thead','tbody','tr','th','td',
        'a','img','br','hr','div','span',
        'b','i','sub','sup'
      ],
      ALLOWED_ATTR: ['href','src','alt','class','style','target','rel','border','cellpadding','cellspacing']
    });
  } else if (editor.tagName === 'TEXTAREA') {
    content = editor.value.trim();
    if (!content) return showToast('Content cannot be empty', 'error');
    content = escapeHtml(content);
  }
  if (!title) return showToast('Title required', 'error');

  const communityId = currentCommunity.id;
  const authorId = currentPlayer.id;

  const isFounder = currentPlayer && currentPlayer.subscription_tier?.toLowerCase() === 'founder';
  let isAI = false;
  let aiMemberId = null;

  if (isFounder) {
    const select = document.getElementById('postAsSelect');
    const selectedValue = select.value;
    if (selectedValue && selectedValue.startsWith('ai_')) {
      isAI = true;
      aiMemberId = selectedValue.replace('ai_', '');
    }
  }

  const isScheduled = isFounder && document.getElementById('scheduleToggle').checked;
  let publishedAt = null;
  if (isScheduled) {
    const dtValue = document.getElementById('scheduleDatetime').value;
    if (!dtValue) { showToast('Please select a date and time', 'error'); return; }
    publishedAt = new Date(dtValue).toISOString();
    const maxDate = new Date();
    maxDate.setFullYear(maxDate.getFullYear() + 3);
    if (new Date(publishedAt) > maxDate) { showToast('Cannot schedule more than 3 years in advance', 'error'); return; }
  }

  const { data, error } = await sb.rpc('create_post_with_schedule', {
    p_title: title,
    p_content: content,
    p_community_id: communityId,
    p_author_id: authorId,
    p_is_ai: isAI,
    p_ai_member_id: aiMemberId,
    p_published_at: publishedAt
  });

  if (error) {
    showToast('Error: ' + error.message, 'error');
    console.error(error);
  } else {
    const message = publishedAt ? `Post scheduled for ${new Date(publishedAt).toLocaleString()}` : 'Post created!';
    showToast(message, 'success');
    clearPostEditor();
    // Immediately reload the view to show the new post
    await loadCommunityView();
    if (publishedAt) {
      loadScheduledPosts();
      document.getElementById('scheduledSection').style.display = 'block';
    }
  }
}

function insertImageWithSize(editorId) {
  const url = prompt('Enter the direct image URL (e.g., https://i.postimg.cc/...):', '');
  if (!url) return;
  const size = prompt('Choose size:\n1 - Small (300px)\n2 - Medium (500px)\n3 - Large (700px)\n4 - Original (full width)', '2');
  const editor = document.getElementById(editorId);
  if (!editor) return;
  editor.focus();
  let sizeClass = 'img-original';
  switch(size) {
    case '1': sizeClass = 'img-small'; break;
    case '2': sizeClass = 'img-medium'; break;
    case '3': sizeClass = 'img-large'; break;
    default: sizeClass = 'img-original'; break;
  }
  const imgHtml = `<img src="${escapeHtml(url)}" class="${sizeClass}" alt="Image">`;
  document.execCommand('insertHTML', false, imgHtml);
}
function insertLink() {
  const url = prompt('Enter URL:', 'https://');
  if (!url) return;
  const editor = document.getElementById('postEditor');
  if (!editor) return;
  editor.focus();
  document.execCommand('createLink', false, url);
  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    const range = selection.getRangeAt(0);
    const container = range.commonAncestorContainer;
    let node = container;
    while (node && node.nodeName !== 'A') node = node.parentNode;
    if (node && node.nodeName === 'A') node.setAttribute('data-affiliate', 'true');
  }
}
function execCmd(cmd, value = null) {
  document.execCommand(cmd, false, value);
  document.getElementById('postEditor').focus();
}

  if (post.is_ai_post && post.ai_member) {
    displayName = post.ai_member.name;
    isAiPost = true;
  } else {
    displayName = post.author?.username || 'Unknown';
    isAiPost = false;
  }
  const profileUserId = post.author_id;

  let html = `
    <div class="back-link" onclick="selectCommunityById('${post.community.id}')">← Back to ${escapeHtml(post.community.display_name)}</div>
    <div class="post-detail-card">
      <div class="post-detail-title">${escapeHtml(post.title)}</div>
      <div class="post-detail-meta">
        <span>
          Posted by 
          ${isAiPost ? `<span>${escapeHtml(displayName)}</span>` : `<span class="author-link" onclick="viewProfile('${profileUserId}')">${escapeHtml(displayName)}</span>`}
        </span>
        <span>• ${new Date(post.created_at).toLocaleString()}</span>
        <span class="stat-pill"><span class="icon">👁️</span> ${post.view_count || 0}</span>
        <span class="stat-pill"><span class="icon">📖</span> ${readTime}</span>
        ${hasAffiliate ? `<span class="stat-pill affiliate-pill" onclick="showAffiliateBubble(event)">🔗 Affiliate<span class="affiliate-bubble">This post contains affiliate links. As an Amazon Associate, I earn from qualifying purchases at no extra cost to you.</span></span>` : ''}
      </div>
  `;

  // ── POST CONTENT (view or edit) ──
  if (editingPostId === post.id) {
    const isBlackOrFounder = currentPlayer && ['black', 'founder'].includes(currentPlayer.subscription_tier?.toLowerCase());
    const isFounderEditor = currentPlayer && currentPlayer.subscription_tier?.toLowerCase() === 'founder';
    let toolbarHtml = `
      <div class="toolbar">
        <!-- Text Formatting -->
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'bold')"><b>B</b></button>
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'italic')"><i>I</i></button>
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'strikeThrough')"><s>S</s></button>
        <span class="separator"></span>
        <!-- Lists -->
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'insertUnorderedList')">• Bullet</button>
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'insertOrderedList')">1. List</button>
        <span class="separator"></span>
        <!-- Indent -->
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'indent')">↗ Indent</button>
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'outdent')">↘ Outdent</button>
        <span class="separator"></span>
        <!-- Headings -->
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'formatBlock', 'h1')">H1</button>
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'formatBlock', 'h2')">H2</button>
        <button type="button" onclick="execCmdOnEditor('postEditEditor', 'formatBlock', 'p')">Text</button>
        <span class="separator"></span>
        <!-- Links & Emoji -->
        <button type="button" onclick="insertLinkOnEditor('postEditEditor')">🔗 Link</button>
        <button type="button" onclick="openEmojiPickerForEditor('postEditEditor')">😊 Emoji</button>
        <span class="separator"></span>
        <!-- Image & Affiliate (founder only) -->
        <button type="button" onclick="insertImageWithSize('postEditEditor')">🖼️ Image</button>
    `;
    if (isBlackOrFounder) {
      toolbarHtml += `
        <button type="button" class="affiliate-btn ${affiliateEnabled ? 'active' : ''}" onclick="toggleAffiliate()">🔗 Affiliate</button>
      `;
    }
    if (isFounderEditor) {
      toolbarHtml += `
        <button type="button" onclick="insertTableOnEditor('postEditEditor')">⊞ Table</button>
      `;
    }
    toolbarHtml += `</div>`;
    if (hasAffiliate) affiliateEnabled = true;
    else affiliateEnabled = false;
    document.querySelectorAll('.affiliate-btn').forEach(btn => { btn.classList.toggle('active', affiliateEnabled); });

    html += `
      <div class="post-editor-wrapper">
        ${toolbarHtml}
        <div id="postEditEditor" class="editor" contenteditable="true">${sanitizedContent}</div>
        <div class="editor-actions">
          <button class="save-btn" onclick="savePostEdit('${post.id}')">Save</button>
          <button class="cancel-btn" onclick="cancelPostEdit()">Cancel</button>
        </div>
      </div>
    `;
  } else {
    // Render the HTML content (not escaped)
    html += `<div class="post-detail-content">${sanitizedContent}</div>`;
  }

  // ── REACTION BAR ──
  html += `
    <div class="reaction-bar" id="reactionBar-${post.id}">
      ${['👍','👎','🤣','🤬','🎉','💝'].map(emoji => {
        const count = reactionCounts[emoji] || 0;
        const active = userReaction === emoji;
        return `<button class="reaction-btn ${active ? 'active' : ''}" onclick="toggleReaction('${post.id}','${emoji}')">${emoji} <span class="count">${count}</span></button>`;
      }).join('')}
    </div>
    <div class="post-actions">
      ${post.author_id === currentPlayer.id ? `
        ${editingPostId === post.id ? '' : `<button class="action-btn edit-btn" onclick="startPostEdit('${post.id}')">✏️ Edit</button>`}
        <button class="action-btn delete-btn" onclick="deletePost('${post.id}')">🗑️ Delete</button>
      ` : ''}
    </div>
  </div>
  <h3>Comments (${comments.length})</h3>
  <div class="comment-form">
    <textarea id="commentContent" placeholder="Write a comment..."></textarea>
    <button onclick="submitComment(null)">Post Comment</button>
  </div>
  <div id="commentsContainer">${renderComments(comments)}</div>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

// ─── POST EDITING ─────────────────────────────────────
function startPostEdit(postId) {
  if (editingCommentId) { showToast('Please finish editing the comment first.', 'info'); return; }
  editingPostId = postId;
  affiliateEnabled = false;
  loadPostView(postId);
}
function cancelPostEdit() {
  editingPostId = null;
  affiliateEnabled = false;
  if (currentPost) loadPostView(currentPost.id);
}
async function savePostEdit(postId) {
  const editor = document.getElementById('postEditEditor');
  if (!editor) return;
  let content = editor.innerHTML.trim();
  if (!content || content === '<br>') return showToast('Content cannot be empty', 'error');
  if (affiliateEnabled) content += `<div class="affiliate-pill">🔗 Affiliate links included</div>`;
  content = DOMPurify.sanitize(content, {
    ALLOWED_TAGS: [
      'h1','h2','h3','h4','h5','h6',
      'p','strong','em','u','s','strike',
      'ul','ol','li',
      'blockquote','pre','code',
      'table','thead','tbody','tr','th','td',
      'a','img','br','hr','div','span',
      'b','i','sub','sup'
    ],
    ALLOWED_ATTR: ['href','src','alt','class','style','target','rel','border','cellpadding','cellspacing']
  });
  const { error } = await sb.from('posts').update({ content }).eq('id', postId);
  if (error) { showToast('Error saving post: ' + error.message, 'error'); return; }
  showToast('Post updated!', 'success');
  editingPostId = null;
  affiliateEnabled = false;
  await loadPostView(postId);
}

// ─── TABLE INSERT FOR EDITOR ──────────────────────────
function insertTableOnEditor(editorId) {
  const rows = prompt('Enter number of rows:', '3');
  if (!rows) return;
  const cols = prompt('Enter number of columns:', '3');
  if (!cols) return;
  let tableHtml = '<table border="1" style="border-collapse:collapse; width:100%;">';
  for (let i = 0; i < parseInt(rows); i++) {
    tableHtml += '<tr>';
    for (let j = 0; j < parseInt(cols); j++) {
      tableHtml += `<td style="padding:8px; border:1px solid #ccc;">Cell ${i+1}${String.fromCharCode(65+j)}</td>`;
    }
    tableHtml += '</tr>';
  }
  tableHtml += '</table><br>';
  const editor = document.getElementById(editorId);
  if (!editor) return;
  editor.focus();
  document.execCommand('insertHTML', false, tableHtml);
}

// ─── COMMENT EDITING & DELETION ────────────────────────
function startCommentEdit(commentId) {
  if (editingPostId) { showToast('Please finish editing the post first.', 'info'); return; }
  editingCommentId = commentId;
  if (currentPost) loadPostView(currentPost.id);
}
function cancelCommentEdit() {
  editingCommentId = null;
  if (currentPost) loadPostView(currentPost.id);
}
async function saveCommentEdit(commentId) {
  const textarea = document.getElementById('commentEditTextarea-' + commentId);
  if (!textarea) { showToast('Error: Could not find comment editor.', 'error'); editingCommentId = null; if (currentPost) loadPostView(currentPost.id); return; }
  const content = textarea.value.trim();
  if (!content) { showToast('Comment cannot be empty', 'error'); return; }
  try {
    const { data, error } = await sb.from('comments').update({ content }).eq('id', commentId).select();
    if (error) { console.error('Update error:', error); showToast('Error saving comment: ' + error.message, 'error'); return; }
    if (!data || data.length === 0) { showToast('Comment not found or you do not have permission to edit it.', 'error'); return; }
    showToast('Comment updated!', 'success');
    editingCommentId = null;
    if (currentPost) await loadPostView(currentPost.id);
  } catch (err) { console.error('Unexpected error:', err); showToast('Error saving comment.', 'error'); editingCommentId = null; if (currentPost) loadPostView(currentPost.id); }
}
async function deleteComment(commentId) {
  if (!confirm('Delete this comment?')) return;
  try {
    const { data, error } = await sb.from('comments').delete().eq('id', commentId).select();
    if (error) { console.error('Delete error:', error); showToast('Error deleting comment: ' + error.message, 'error'); return; }
    if (!data || data.length === 0) { showToast('Comment not found or you do not have permission to delete it.', 'error'); return; }
    showToast('Comment deleted.', 'success');
    if (currentPost) await loadPostView(currentPost.id);
  } catch (err) { console.error('Delete error:', err); showToast('Error deleting comment.', 'error'); }
}

// ─── RICH TEXT HELPERS FOR EDITOR ──────────────────────
function execCmdOnEditor(editorId, cmd, value = null) {
  const editor = document.getElementById(editorId);
  if (!editor) return;
  editor.focus();
  document.execCommand(cmd, false, value);
}
function insertLinkOnEditor(editorId) {
  const url = prompt('Enter URL:', 'https://');
  if (!url) return;
  const editor = document.getElementById(editorId);
  if (!editor) return;
  editor.focus();
  document.execCommand('createLink', false, url);
  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    const range = selection.getRangeAt(0);
    const container = range.commonAncestorContainer;
    let node = container;
    while (node && node.nodeName !== 'A') node = node.parentNode;
    if (node && node.nodeName === 'A') node.setAttribute('data-affiliate', 'true');
  }
}
function openEmojiPickerForEditor(editorId) {
  const emojis = ['😊', '😂', '🤔', '🔥', '💯', '✨', '🎉', '👏', '👍', '❤️'];

// ─── LOAD COMMENTS ──────────────────────────────────────
async function loadComments(postId) {
  try {
    const { data: commentsData, error } = await sb
      .from('comments')
      .select(`*, author:players(username)`)
      .eq('post_id', postId)
      .is('is_deleted', false)
      .order('depth', { ascending: true })
      .order('created_at', { ascending: true });
    if (error) throw error;
    if (!commentsData || commentsData.length === 0) return [];
    const commentIds = commentsData.map(c => c.id);
    let userVotes = {};
    if (currentPlayer) {
      const { data: voteData } = await sb
        .from('votes')
        .select('target_id, vote_value')
        .eq('player_id', currentPlayer.id)
        .eq('target_type', 'comment')
        .in('target_id', commentIds);
      if (voteData) {
        voteData.forEach(v => { userVotes[v.target_id] = v.vote_value; });
      }
    }
    return commentsData.map(c => ({
      ...c,
      author_name: c.author?.username || 'Unknown',
      user_vote: userVotes[c.id] || 0
    }));
  } catch (err) {
    console.error('Error loading comments:', err);
    showToast('Error loading comments', 'error');
    return [];
  }
}

// ─── RENDER COMMENTS ────────────────────────────────────
function renderComments(comments, parentId = null) {
  if (!comments || comments.length === 0) return '';
  const filtered = comments.filter(c => c.parent_id === parentId);
  if (filtered.length === 0) return '';

  return filtered.map(c => {
    const childrenHtml = renderComments(comments, c.id);
    const score = (c.upvotes || 0) - (c.downvotes || 0);
    const userVote = c.user_vote || 0;
    const isEditing = (editingCommentId === c.id);

    let commentContentHtml;
    let commentContent = c.content || '';
    if (!isEditing) {
      commentContent = escapeHtml(commentContent).replace(/\n/g, '<br>');
      commentContent = addAffiliateAttributes(commentContent);
    }

    if (isEditing) {
      commentContentHtml = `
        <div class="comment-content">
          <textarea id="commentEditTextarea-${c.id}" class="comment-edit-textarea" rows="3">${escapeHtml(c.content || '')}</textarea>
          <div class="comment-edit-actions">
            <button class="save-btn" onclick="saveCommentEdit('${c.id}')">Save</button>
            <button class="cancel-btn" onclick="cancelCommentEdit()">Cancel</button>
          </div>
        </div>
      `;
    } else {
      commentContentHtml = `<div class="comment-content">${commentContent}</div>`;
    }

    return `
      <div class="comment" style="margin-left: ${(c.depth || 0) * 20}px;">
        <div class="comment-header">
          <span class="comment-author" onclick="viewProfile('${c.author_id}')">${escapeHtml(c.author_name || 'Unknown')}</span>
          <span class="comment-time">${new Date(c.created_at).toLocaleString()}</span>
        </div>
        ${commentContentHtml}
        <div class="comment-actions">
          <button class="vote-btn ${userVote === 1 ? 'upvoted' : ''}" onclick="vote('comment', '${c.id}', 1)">▲</button>
          <span>${score}</span>
          <button class="vote-btn ${userVote === -1 ? 'downvoted' : ''}" onclick="vote('comment', '${c.id}', -1)">▼</button>
          <button class="reply-btn" onclick="showReplyForm('${c.id}')">Reply</button>
          ${c.author_id === currentPlayer?.id ? `
            ${isEditing ? '' : `<button onclick="startCommentEdit('${c.id}')">Edit</button>`}
            <button onclick="deleteComment('${c.id}')">Delete</button>
          ` : ''}
        </div>
        <div class="reply-form" id="reply-form-${c.id}">
          <textarea id="reply-content-${c.id}" rows="2" placeholder="Write a reply..."></textarea>
          <div class="reply-actions">
            <button onclick="submitComment('${c.id}')">Reply</button>
            <button class="cancel-reply" onclick="hideReplyForm('${c.id}')">Cancel</button>
          </div>
        </div>
        ${childrenHtml}
      </div>
    `;
  }).join('');
}

async function loadPostReactions(postId) {
  const { data, error } = await sb.from('post_reactions').select('*').eq('post_id', postId);

}
async function toggleReaction(postId, emoji) {
  if (!currentPlayer) return showToast('Please log in', 'error');
  const existing = await sb.from('post_reactions').select('*').eq('post_id', postId).eq('user_id', currentPlayer.id).maybeSingle();
  if (existing.data && existing.data.reaction_type === emoji) {
    await sb.from('post_reactions').delete().eq('id', existing.data.id);
  } else {
    if (existing.data) await sb.from('post_reactions').delete().eq('id', existing.data.id);
    await sb.from('post_reactions').insert({ post_id: postId, user_id: currentPlayer.id, reaction_type: emoji });
  }
  await loadPostView(postId);
}

// ─── SUBMIT COMMENT ────────────────────────────────────────
async function submitComment(parentId) {
  if (submittingComment) return;
  submittingComment = true;
  try {
    const content = parentId
      ? document.getElementById(`reply-content-${parentId}`).value.trim()
      : document.getElementById('commentContent').value.trim();
    if (!content) { showToast('Comment cannot be empty', 'error'); return; }

    let depth = 0;
    if (parentId) {
      const parentDepth = await getParentDepth(parentId);
      depth = parentDepth + 1;
    }
    const { error } = await sb.from('comments').insert({
      content,
      post_id: currentPost.id,
      author_id: currentPlayer.id,
      parent_id: parentId || null,
      depth: depth,
      is_deleted: false
    });
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Comment posted', 'success');
    if (parentId) hideReplyForm(parentId);
    else document.getElementById('commentContent').value = '';
    await loadPostView(currentPost.id);
  } catch (e) {
    console.error(e);
    showToast('Error posting comment', 'error');
  } finally {
    setTimeout(() => { submittingComment = false; }, 500);
  }
}
async function getParentDepth(parentId) {
  const { data } = await sb.from('comments').select('depth').eq('id', parentId).single();
  return data?.depth || 0;
}
function showReplyForm(commentId) {
  document.getElementById(`reply-form-${commentId}`).style.display = 'block';
}
function hideReplyForm(commentId) {
  document.getElementById(`reply-form-${commentId}`).style.display = 'none';
}

    showToast('Post deleted successfully.', 'success');

    else await loadFeed();
  } catch (err) { console.error('Delete exception:', err); showToast('Error deleting post.', 'error'); }
}

// ─── UTILITY: Estimate read time ───────────────────────────
function estimateReadTime(html) {
  if (!html) return '0 min';
  const text = html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  const words = text.split(' ').length;
  const minutes = Math.ceil(words / 200);
  return `${minutes} min read`;
}

// ─── REAL-TIME SUBSCRIPTIONS ──────────────────────────────
function subscribeToCommunity(communityId) {
  // Unsubscribe from existing channel
  if (forumChannel) {
    forumChannel.unsubscribe();
    forumChannel = null;
  }

  forumChannel = sb.channel(`forum-${communityId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'posts',
      filter: `community_id=eq.${communityId}`
    }, (payload) => {
      // Reload view on new post
      if (currentCommunity && currentCommunity.id === communityId) {
        loadCommunityView();
      }
    })
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'posts',
      filter: `community_id=eq.${communityId}`
    }, (payload) => {
      // Reload view on post update
      if (currentCommunity && currentCommunity.id === communityId) {
        loadCommunityView();
      }
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('Subscribed to community posts');
    });
}

function subscribeToPostComments(postId) {
  if (forumChannel) {
    forumChannel.unsubscribe();
    forumChannel = null;
  }

  forumChannel = sb.channel(`post-${postId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'comments',
      filter: `post_id=eq.${postId}`
    }, (payload) => {
      if (currentPost && currentPost.id === postId) {
        loadPostView(postId);
      }
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('Subscribed to post comments');
    });
}
