<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Gangs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
    }
    
    h1 { 
      text-align: center; 
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #333;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    /* Main Container */
    .gangs-container {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    /* Sidebar */
    .sidebar {
      background: white;
      border: 3px solid black;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .sidebar-header {
      background: #333;
      color: white;
      padding: 15px;
      font-weight: bold;
      font-size: 1.2rem;
    }
    
    .player-gang-info {
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #eee;
    }
    
    .no-gang {
      padding: 30px 20px;
      text-align: center;
    }
    
    .gang-tag {
      display: inline-block;
      background: #9c27b0;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .gang-name {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .gang-level {
      color: #666;
      margin-bottom: 15px;
    }
    
    .gang-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }
    
    .gang-stat {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    
    .gang-stat-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .gang-stat-value {
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    
    .progress-fill {
      height: 100%;
      background: #9c27b0;
      transition: width 0.3s;
    }
    
    /* Members List */
    .members-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .member-item {
      display: grid;
      grid-template-columns: 30px 1fr 80px;
      padding: 10px 15px;
      border-bottom: 1px solid #eee;
      align-items: center;
    }
    
    .member-rank {
      font-weight: bold;
      color: #ff9800;
    }
    
    .member-name {
      font-weight: bold;
    }
    
    .member-role {
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 10px;
      text-align: center;
    }
    
    .role-leader { background: #f44336; color: white; }
    .role-co-leader { background: #2196F3; color: white; }
    .role-captain { background: #4CAF50; color: white; }
    .role-member { background: #9c27b0; color: white; }
    .role-recruit { background: #ff9800; color: white; }
    
    /* Main Content */
    .main-content {
      background: white;
      border: 3px solid black;
      border-radius: 15px;
      padding: 20px;
    }
    
    /* Tabs */
    .gang-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    
    .tab-btn {
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1rem;
      color: #666;
    }
    
    .tab-btn:hover {
      color: #333;
    }
    
    .tab-btn.active {
      color: #9c27b0;
      border-bottom: 3px solid #9c27b0;
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Create Gang Form */
    .create-gang-form {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .form-input {
      width: 100%;
      padding: 10px;
      font-family: 'Courier New', monospace;
      border: 2px solid black;
      border-radius: 8px;
      font-size: 1rem;
    }
    
    .form-textarea {
      width: 100%;
      padding: 10px;
      font-family: 'Courier New', monospace;
      border: 2px solid black;
      border-radius: 8px;
      font-size: 1rem;
      min-height: 100px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      font-size: 1.1rem;
    }
    
    .submit-btn:hover {
      background: #45a049;
    }
    
    /* Invites List */
    .invites-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .invite-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #eee;
    }
    
    .invite-info {
      flex: 1;
    }
    
    .invite-gang {
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .invite-meta {
      color: #666;
      font-size: 0.9rem;
    }
    
    .invite-actions {
      display: flex;
      gap: 10px;
    }
    
    .accept-btn {
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .decline-btn {
      padding: 8px 16px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    /* Perks Grid */
    .perks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .perk-card {
      border: 2px solid #9c27b0;
      border-radius: 10px;
      padding: 15px;
      background: #f9f0ff;
    }
    
    .perk-card.unlocked {
      background: #e8f5e8;
      border-color: #4CAF50;
    }
    
    .perk-icon {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 10px;
    }
    
    .perk-name {
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }
    
    .perk-desc {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 10px;
    }
    
    .perk-cost {
      font-size: 0.9rem;
      font-weight: bold;
      color: #f44336;
    }
    
    .unlock-btn {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    /* Search Results */
    .search-results {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .gang-result {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #eee;
    }
    
    .gang-result-info {
      flex: 1;
    }
    
    .gang-result-name {
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .gang-result-tag {
      color: #9c27b0;
      font-size: 0.9rem;
    }
    
    .request-btn {
      padding: 8px 16px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    /* Chat */
    .chat-container {
      height: 400px;
      display: flex;
      flex-direction: column;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    .chat-message {
      margin-bottom: 10px;
    }
    
    .chat-sender {
      font-weight: bold;
      color: #2196F3;
    }
    
    .chat-time {
      font-size: 0.7rem;
      color: #666;
      margin-left: 10px;
    }
    
    .chat-text {
      margin-left: 10px;
    }
    
    .chat-input-area {
      display: flex;
      gap: 10px;
    }
    
    .chat-input {
      flex: 1;
      padding: 10px;
      font-family: 'Courier New', monospace;
      border: 2px solid black;
      border-radius: 8px;
    }
    
    .chat-send {
      padding: 10px 20px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    
    /* Back Button */
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: #666;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.02);
    }
    
    /* Toast Notifications */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    
    .toast {
      padding: 15px 25px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      animation: slideIn 0.3s ease-out;
    }
    
    .toast.success { background: #4CAF50; }
    .toast.error { background: #f44336; }
    .toast.info { background: #2196F3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @media (max-width: 900px) {
      .gangs-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<h1>🏢 Gangs</h1>
<div class="subtitle">Join forces with other players!</div>

<!-- Main Container -->
<div class="gangs-container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">🏢 Your Gang</div>
    <div id="playerGangInfo" class="player-gang-info">
      <div class="no-gang">
        <p>You're not in a gang yet!</p>
        <button class="submit-btn" onclick="switchTab('create')">Create a Gang</button>
        <p style="margin: 10px 0;">or</p>
        <button class="submit-btn" style="background:#2196F3;" onclick="switchTab('search')">Find a Gang</button>
      </div>
    </div>
  </div>
  
  <!-- Main Content -->
  <div class="main-content">
    <!-- Tabs -->
    <div class="gang-tabs" id="gangTabs">
      <button class="tab-btn active" onclick="switchTab('overview')">📊 Overview</button>
      <button class="tab-btn" onclick="switchTab('members')">👥 Members</button>
      <button class="tab-btn" onclick="switchTab('perks')">✨ Perks</button>
      <button class="tab-btn" onclick="switchTab('chat')">💬 Chat</button>
      <button class="tab-btn" onclick="switchTab('invites')">📨 Invites</button>
      <button class="tab-btn" onclick="switchTab('search')">🔍 Search</button>
      <button class="tab-btn" onclick="switchTab('create')">➕ Create</button>
    </div>
    
    <!-- Overview Tab -->
    <div id="overview" class="tab-content active">
      <h3>Gang Overview</h3>
      <p>Select a tab to get started!</p>
    </div>
    
    <!-- Members Tab -->
    <div id="members" class="tab-content">
      <h3>Gang Members</h3>
      <div id="membersList" class="members-list"></div>
    </div>
    
    <!-- Perks Tab -->
    <div id="perks" class="tab-content">
      <h3>Gang Perks</h3>
      <div id="perksGrid" class="perks-grid"></div>
    </div>
    
    <!-- Chat Tab -->
    <div id="chat" class="tab-content">
      <h3>Gang Chat</h3>
      <div class="chat-container">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" class="chat-input" placeholder="Type a message...">
          <button class="chat-send" onclick="sendChatMessage()">Send</button>
        </div>
      </div>
    </div>
    
    <!-- Invites Tab -->
    <div id="invites" class="tab-content">
      <h3>Pending Invites</h3>
      <div id="invitesList" class="invites-list"></div>
    </div>
    
    <!-- Search Tab -->
    <div id="search" class="tab-content">
      <h3>Search Gangs</h3>
      <div class="form-group">
        <input type="text" id="searchInput" class="form-input" placeholder="Search by name or tag...">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
    
    <!-- Create Tab -->
    <div id="create" class="tab-content">
      <h3>Create a Gang</h3>
      <div class="create-gang-form">
        <div class="form-group">
          <label class="form-label">Gang Name</label>
          <input type="text" id="gangName" class="form-input" maxlength="50">
        </div>
        <div class="form-group">
          <label class="form-label">Gang Tag (2-4 characters)</label>
          <input type="text" id="gangTag" class="form-input" maxlength="4" style="text-transform:uppercase;">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="gangDescription" class="form-textarea" maxlength="500"></textarea>
        </div>
        <button class="submit-btn" onclick="createGang()">Create Gang</button>
      </div>
    </div>
  </div>
</div>

<button class="back-button" onclick="goToDashboard()">← Back to Dashboard</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);
// XSS protection – turns dangerous characters into safe text
function escapeHtml(str) {
    if (!str) return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
let currentPlayer = null;
let currentGang = null;
let gangMembers = [];
let pendingInvites = [];
let gangPerks = [];
let unlockedPerks = [];
let chatMessages = [];
let chatSubscription = null;

// Toast notification
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('fade-out');
    setTimeout(() => {
      if (toast.parentNode) {
        container.removeChild(toast);
      }
    }, 300);
  }, duration);
}

// Load player data
async function loadPlayerData() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return window.location.href = "index.html";
    
    const { data: player } = await sb
      .from('players')
      .select('*')
      .eq('auth_id', user.id)
      .single();
    
    if (player) {
      currentPlayer = player;
      await loadPlayerGang();
      await loadPendingInvites();
    }
  } catch (error) {
    console.error('Error loading player:', error);
  }
}

// Load player's gang
async function loadPlayerGang() {
  try {
    // Check if player is in a gang
    const { data: membership } = await sb
      .from('gang_members')
      .select('gang_id, role')
      .eq('player_id', currentPlayer.id)
      .single();
    
    if (membership) {
      // Load gang details
      const { data: gang } = await sb
        .from('gangs')
        .select('*')
        .eq('id', membership.gang_id)
        .single();
      
      currentGang = gang;
      
      // Load members
      const { data: members } = await sb
        .from('gang_members')
        .select(`
          *,
          players!inner (
            username,
            level
          )
        `)
        .eq('gang_id', membership.gang_id)
        .order('role', { ascending: true });
      
      gangMembers = members || [];
      
      // Load perks
      await loadGangPerks();
      
      // Update UI
      updateGangSidebar();
      updateMembersList();
      
      // Subscribe to chat
      subscribeToChat();
    } else {
      currentGang = null;
      gangMembers = [];
      updateGangSidebar();
    }
  } catch (error) {
    console.error('Error loading gang:', error);
  }
}

// Update gang sidebar
function updateGangSidebar() {
  const sidebar = document.getElementById('playerGangInfo');
  
  if (!currentGang) {
    sidebar.innerHTML = `
      <div class="no-gang">
        <p>You're not in a gang yet!</p>
        <button class="submit-btn" onclick="switchTab('create')">Create a Gang</button>
        <p style="margin: 10px 0;">or</p>
        <button class="submit-btn" style="background:#2196F3;" onclick="switchTab('search')">Find a Gang</button>
      </div>
    `;
    return;
  }
  
  // Calculate XP progress
  const nextLevelXP = Math.pow(currentGang.level, 2) * 1000;
  const prevLevelXP = Math.pow(currentGang.level - 1, 2) * 1000;
  const xpProgress = ((currentGang.xp - prevLevelXP) / (nextLevelXP - prevLevelXP)) * 100;
  
  sidebar.innerHTML = `
    <div class="gang-tag">[${currentGang.tag}]</div>
    <div class="gang-name">${currentGang.name}</div>
    <div class="gang-level">Level ${currentGang.level}</div>
    
    <div class="progress-bar">
      <div class="progress-fill" style="width: ${xpProgress}%"></div>
    </div>
    
    <div class="gang-stats">
      <div class="gang-stat">
        <div class="gang-stat-label">Members</div>
        <div class="gang-stat-value">${gangMembers.length}/${currentGang.max_members}</div>
      </div>
      <div class="gang-stat">
        <div class="gang-stat-label">Gang Cash</div>
        <div class="gang-stat-value">₹${currentGang.cash.toLocaleString()}</div>
      </div>
    </div>
    
    <div class="gang-stats">
      <div class="gang-stat">
        <div class="gang-stat-label">Your Role</div>
        <div class="gang-stat-value">${getRoleBadge(gangMembers.find(m => m.player_id === currentPlayer.id).role)}</div>
      </div>
    </div>
  `;
}

// Get role badge HTML
function getRoleBadge(role) {
  const badges = {
    'leader': '<span class="member-role role-leader">Leader</span>',
    'co-leader': '<span class="member-role role-co-leader">Co-Leader</span>',
    'captain': '<span class="member-role role-captain">Captain</span>',
    'member': '<span class="member-role role-member">Member</span>',
    'recruit': '<span class="member-role role-recruit">Recruit</span>'
  };
  return badges[role] || role;
}

// Update members list
function updateMembersList() {
  const list = document.getElementById('membersList');
  
  if (!gangMembers.length) {
    list.innerHTML = '<p style="text-align: center; padding: 20px;">No members</p>';
    return;
  }
  
  list.innerHTML = gangMembers.map((member, index) => `
    <div class="member-item">
      <div class="member-rank">#${index + 1}</div>
      <div>
        <div class="member-name">${escapeHtml(member.players.username)}</div>
        <div style="font-size: 0.8rem; color: #666;">Lvl ${member.players.level}</div>
      </div>
      <div>${getRoleBadge(member.role)}</div>
    </div>
  `).join('');
}

// Load gang perks
async function loadGangPerks() {
  try {
    const { data: perks } = await sb
      .from('gang_perks')
      .select('*')
      .order('level_required');
    
    gangPerks = perks || [];
    
    const { data: unlocked } = await sb
      .from('gang_unlocked_perks')
      .select('perk_id')
      .eq('gang_id', currentGang.id);
    
    unlockedPerks = (unlocked || []).map(u => u.perk_id);
    
    renderPerks();
  } catch (error) {
    console.error('Error loading perks:', error);
  }
}

// Render perks
function renderPerks() {
  const container = document.getElementById('perksGrid');
  
  if (!gangPerks.length) {
    container.innerHTML = '<p style="text-align: center; padding: 20px;">No perks available</p>';
    return;
  }
  
  container.innerHTML = gangPerks.map(perk => {
    const isUnlocked = unlockedPerks.includes(perk.id);
    const canUnlock = currentGang.level >= perk.level_required && !isUnlocked;
    
    return `
      <div class="perk-card ${isUnlocked ? 'unlocked' : ''}">
        <div class="perk-icon">${perk.icon || '✨'}</div>
        <div class="perk-name">${perk.name}</div>
        <div class="perk-desc">${perk.description}</div>
        <div class="perk-cost">Required Level: ${perk.level_required}</div>
        ${!isUnlocked && canUnlock ? `
          <button class="unlock-btn" onclick="unlockPerk('${perk.id}')">
            Unlock (${perk.cost_amount} ${perk.cost_type})
          </button>
        ` : ''}
        ${isUnlocked ? '<div style="color: #4CAF50; text-align: center;">✓ Unlocked</div>' : ''}
      </div>
    `;
  }).join('');
}

// Load pending invites
async function loadPendingInvites() {
  try {
    const { data: invites } = await sb
      .from('gang_invites')
      .select(`
        *,
        gangs!inner (
          name,
          tag,
          level
        ),
        players!gang_invites_invited_by_fkey (
          username
        )
      `)
      .eq('player_id', currentPlayer.id)
      .eq('status', 'pending');
    
    pendingInvites = invites || [];
    renderInvites();
  } catch (error) {
    console.error('Error loading invites:', error);
  }
}

// Render invites
function renderInvites() {
  const container = document.getElementById('invitesList');
  
  if (!pendingInvites.length) {
    container.innerHTML = '<p style="text-align: center; padding: 20px;">No pending invites</p>';
    return;
  }
  
  container.innerHTML = pendingInvites.map(invite => `
    <div class="invite-item">
      <div class="invite-info">
        <div class="invite-gang">[${invite.gangs.tag}] ${invite.gangs.name}</div>
        <div class="invite-meta">
          Level ${invite.gangs.level} • Invited by ${invite.players.username}
        </div>
      </div>
      <div class="invite-actions">
        <button class="accept-btn" onclick="acceptInvite('${invite.id}')">Accept</button>
        <button class="decline-btn" onclick="declineInvite('${invite.id}')">Decline</button>
      </div>
    </div>
  `).join('');
}

// Create gang
async function createGang() {
  const name = document.getElementById('gangName').value.trim();
  const tag = document.getElementById('gangTag').value.trim().toUpperCase();
  const description = document.getElementById('gangDescription').value.trim();
  
  if (!name || !tag) {
    showToast('Please fill in all fields', 'error');
    return;
  }
  
  if (tag.length < 2 || tag.length > 4) {
    showToast('Tag must be 2-4 characters', 'error');
    return;
  }
  
  try {
    const { data, error } = await sb.rpc('create_gang', {
      p_name: name,
      p_tag: tag,
      p_description: description
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast('Gang created successfully!', 'success');
      await loadPlayerGang();
      switchTab('overview');
    } else {
      showToast(data.error || 'Failed to create gang', 'error');
    }
  } catch (error) {
    console.error('Error creating gang:', error);
    showToast('Error creating gang', 'error');
  }
}

// Accept invite
async function acceptInvite(inviteId) {
  try {
    const { data, error } = await sb.rpc('join_gang', {
      p_invite_id: inviteId
    });
    
    if (error) throw error;
    
    if (data.success) {
      showToast('Joined gang!', 'success');
      await loadPlayerGang();
      switchTab('overview');
    } else {
      showToast(data.error || 'Failed to join', 'error');
    }
  } catch (error) {
    console.error('Error accepting invite:', error);
    showToast('Error joining gang', 'error');
  }
}

// Decline invite
async function declineInvite(inviteId) {
  try {
    await sb
      .from('gang_invites')
      .update({ status: 'declined' })
      .eq('id', inviteId);
    
    showToast('Invite declined', 'info');
    await loadPendingInvites();
  } catch (error) {
    console.error('Error declining invite:', error);
  }
}

// Search gangs
async function searchGangs() {
  const searchTerm = document.getElementById('searchInput').value.trim();
  
  if (!searchTerm) return;
  
  try {
    const { data } = await sb
      .from('gangs')
      .select(`
        *,
        gang_members(count)
      `)
      .or(`name.ilike.%${searchTerm}%,tag.ilike.%${searchTerm}%`)
      .limit(20);
    
    const results = document.getElementById('searchResults');
    
    if (!data || data.length === 0) {
      results.innerHTML = '<p style="text-align: center; padding: 20px;">No gangs found</p>';
      return;
    }
    
    results.innerHTML = data.map(gang => `
      <div class="gang-result">
        <div class="gang-result-info">
          <div class="gang-result-name">[${gang.tag}] ${gang.name}</div>
          <div>Level ${gang.level} • ${gang.gang_members[0].count}/${gang.max_members} members</div>
        </div>
        <button class="request-btn" onclick="requestToJoin('${gang.id}')">Request</button>
      </div>
    `).join('');
  } catch (error) {
    console.error('Error searching gangs:', error);
  }
}

// Request to join gang
async function requestToJoin(gangId) {
  try {
    const { error } = await sb
      .from('gang_requests')
      .insert({
        gang_id: gangId,
        player_id: currentPlayer.id
      });
    
    if (error) throw error;
    
    showToast('Join request sent!', 'success');
  } catch (error) {
    console.error('Error requesting to join:', error);
    showToast('Error sending request', 'error');
  }
}

// Subscribe to gang chat
function subscribeToChat() {
  if (!currentGang) return;
  
  if (chatSubscription) {
    chatSubscription.unsubscribe();
  }
  
  chatSubscription = sb
    .channel('gang-chat')
    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'gang_messages',
        filter: `gang_id=eq.${currentGang.id}`
      },
      (payload) => {
        loadChatMessages();
      }
    )
    .subscribe();
  
  loadChatMessages();
}

// Load chat messages
async function loadChatMessages() {
  try {
    const { data } = await sb
      .from('gang_messages')
      .select(`
        *,
        players!inner (
          username
        )
      `)
      .eq('gang_id', currentGang.id)
      .order('created_at', { ascending: false })
      .limit(50);
    
    chatMessages = (data || []).reverse();
    renderChatMessages();
  } catch (error) {
    console.error('Error loading chat:', error);
  }
}

// Render chat messages
function renderChatMessages() {
  const container = document.getElementById('chatMessages');
  
  container.innerHTML = chatMessages.map(msg => `
    <div class="chat-message">
      <span class="chat-sender">${msg.players.username}</span>
      <span class="chat-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
      <div class="chat-text">${escapeHtml(msg.message)}</div>
    </div>
  `).join('');
  
  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

// Send chat message
async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  
  if (!message || !currentGang) return;
  
  try {
    await sb
      .from('gang_messages')
      .insert({
        gang_id: currentGang.id,
        player_id: currentPlayer.id,
        message: message
      });
    
    input.value = '';
  } catch (error) {
    console.error('Error sending message:', error);
  }
}

// Switch tabs
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.classList.remove('active');
  });
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  document.getElementById(tabName).classList.add('active');
  
  // Find and activate the corresponding tab button
  const buttons = document.querySelectorAll('.tab-btn');
  for (let btn of buttons) {
    if (btn.textContent.toLowerCase().includes(tabName)) {
      btn.classList.add('active');
      break;
    }
  }
  
  // Load tab-specific data
  if (tabName === 'invites') {
    loadPendingInvites();
  } else if (tabName === 'members') {
    updateMembersList();
  } else if (tabName === 'perks' && currentGang) {
    renderPerks();
  }
}

// Navigation
function goToDashboard() {
  window.location.href = "dashboard.html";
}

// Debounce search
let searchTimeout;
document.getElementById('searchInput')?.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(searchGangs, 500);
});

// Initialize
loadPlayerData();

// Clean up
window.addEventListener('beforeunload', () => {
  if (chatSubscription) {
    chatSubscription.unsubscribe();
  }
});
</script>
