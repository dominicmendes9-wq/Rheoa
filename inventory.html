<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rheoa RPG - Inventory & Shop</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Courier New', monospace; 
      background: #f8f8f0; 
      color: #222; 
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }
    
    h1, h2 { 
      text-align: center; 
      margin: 30px 0 20px;
    }
    
    h1 { 
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      animation: fadeInDown 0.6s ease-out;
    }
    
    h2 { 
      font-size: clamp(1.3rem, 4vw, 2rem); 
      color: #333;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .section {
      max-width: 1400px;
      margin: 0 auto 40px;
      animation: fadeIn 0.6s ease-out 0.2s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 10px;
    }
    
    .item-card { 
      border: 2px solid black; 
      border-radius: 12px; 
      padding: 20px; 
      background: white;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 380px;
      animation: cardFadeIn 0.5s ease-out;
      cursor: pointer;
    }

    .item-card:nth-child(odd) {
      animation: cardFadeInLeft 0.5s ease-out;
    }

    .item-card:nth-child(even) {
      animation: cardFadeInRight 0.5s ease-out;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes cardFadeInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes cardFadeInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .item-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    
    .item-icon {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 2.5rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .item-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    .badge-energy { background: linear-gradient(135deg, #4CAF50, #45a049); }
    .badge-health { background: linear-gradient(135deg, #f44336, #d32f2f); }
    .badge-hunger { background: linear-gradient(135deg, #ff9800, #f57c00); }
    .badge-happiness { background: linear-gradient(135deg, #9c27b0, #7b1fa2); }
    .badge-boost { background: linear-gradient(135deg, #2196F3, #1976D2); }
    .badge-temporary { background: linear-gradient(135deg, #ff9800, #f57c00); }
    .badge-permanent { background: linear-gradient(135deg, #9c27b0, #7b1fa2); }
    .badge-multi { background: linear-gradient(135deg, #795548, #5d4037); }
    
    .item-name {
      font-size: 1.4rem;
      font-weight: bold;
      text-align: center;
      margin: 30px 0 15px;
      padding-top: 10px;
      color: #333;
    }
    
    .item-description {
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 20px;
      font-style: italic;
      padding: 0 10px;
    }
    
    .item-details {
      flex-grow: 1;
      margin-bottom: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
    }
    
    .item-details p {
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px dashed #eee;
    }
    
    .item-details p:last-child {
      border-bottom: none;
    }
    
    .item-details p span {
      font-weight: bold;
    }
    
    .price { color: #4CAF50; font-size: 1.1rem; }
    .effect { color: #2196F3; font-size: 1.1rem; }
    .duration { color: #ff9800; }
    .quantity { color: #9c27b0; font-size: 1.2rem; }
    .current-stat { color: #666; font-size: 0.9rem; }
    
    .button-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    button {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid black;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    button:hover::after {
      width: 300px;
      height: 300px;
    }
    
    button.buy {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
    }
    
    button.use {
      background: linear-gradient(135deg, #2196F3, #1976D2);
      color: white;
    }
    
    button.use-all {
      background: linear-gradient(135deg, #9c27b0, #7b1fa2);
      color: white;
    }
    
    button.buy:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
    }
    
    button.use:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
    }
    
    button.use-all:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(156, 39, 176, 0.4);
    }
    
    button:disabled {
      background: #ccc;
      color: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      background: #666;
      color: white;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    
    .back-button:hover {
      background: #555;
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    /* Active Boosts Section */
    .boosts-section {
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      border: 2px solid #2196F3;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      animation: slideIn 0.5s ease-out;
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.2);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .boosts-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #1976D2;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .boosts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .boost-card {
      background: white;
      border: 2px solid #2196F3;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: all 0.2s;
      animation: pulse 2s infinite;
    }

    .boost-card:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
    }
    
    .boost-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: #1976D2;
    }
    
    .boost-timer {
      font-size: 0.9rem;
      color: #666;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    
    /* Player Stats Summary */
    .stats-summary {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px auto 30px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      border: 2px solid black;
      max-width: 1000px;
      flex-wrap: wrap;
      animation: slideInDown 0.5s ease-out;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .stat-item {
      text-align: center;
      min-width: 90px;
      padding: 10px;
      border-radius: 8px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .stat-item:hover {
      background: #f5f5f5;
      transform: scale(1.05);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 5px;
    }
    
    .stat-value {
      font-size: 1.3rem;
      font-weight: bold;
    }
    
    .stat-value.warning {
      color: #ff9800;
    }
    
    .stat-value.critical {
      color: #f44336;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Search Bar */
    .search-container {
      max-width: 400px;
      margin: 20px auto;
      position: relative;
      animation: fadeIn 0.6s ease-out 0.15s both;
    }

    .search-input {
      width: 100%;
      padding: 12px 20px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      border: 2px solid #667eea;
      border-radius: 50px;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
      transform: scale(1.02);
    }

    .search-button {
      position: absolute;
      right: 5px;
      top: 5px;
      padding: 7px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      transition: all 0.2s;
    }

    .search-button:hover {
      background: #764ba2;
      transform: scale(1.05);
    }
    
    /* Quick Stats Tabs */
    .stats-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .stats-tab {
      padding: 8px 16px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .stats-tab.active {
      background: #667eea;
      color: white;
    }
    
    .stats-tab:hover {
      background: #764ba2;
      color: white;
    }
    
    /* Realtime status */
    .realtime-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 15px;
      background: rgba(0,0,0,0.8);
      color: white;
      border-radius: 30px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9997;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      animation: slideInRight 0.5s ease-out;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4CAF50;
      animation: pulse 2s infinite;
    }
    
    /* Scroll to top button */
    .scroll-top {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      display: none;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: all 0.2s;
      z-index: 1000;
      animation: fadeInScale 0.3s ease-out;
    }

    .scroll-top:hover {
      transform: scale(1.1);
      background: #764ba2;
    }

    .scroll-top.visible {
      display: flex;
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .empty-message {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1.2rem;
      background: white;
      border-radius: 12px;
      border: 2px dashed #ccc;
      grid-column: 1 / -1;
      animation: fadeIn 0.5s ease-out;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
      font-size: 1.2rem;
      grid-column: 1 / -1;
    }
    
    /* Progress bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2, #4CAF50, #2196F3);
      z-index: 1001;
      transition: width 0.1s;
    }
    
    /* Item count badge */
    .item-count {
      background: #f0f0f0;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-left: 10px;
      color: #333;
    }
    
    @media (max-width: 600px) {
      body { padding: 10px; }
      
      .items-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .item-card {
        padding: 15px;
        min-height: 350px;
      }
      
      .item-icon {
        font-size: 2rem;
      }
      
      .item-name {
        font-size: 1.2rem;
        margin: 25px 0 12px;
      }
      
      .button-container {
        flex-direction: column;
      }
      
      .back-button {
        width: 100%;
      }
      
      .stats-summary {
        gap: 10px;
        padding: 15px;
      }
      
      .stat-item {
        min-width: 70px;
        padding: 5px;
      }
      
      .stat-value {
        font-size: 1rem;
      }

      .realtime-status {
        bottom: 10px;
        right: 10px;
        padding: 5px 10px;
        font-size: 0.75rem;
      }

      .scroll-top {
        bottom: 10px;
        left: 10px;
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }

    /* Print styles */
    @media print {
      .back-button, .realtime-status, .scroll-top, .search-container {
        display: none !important;
      }
      
      .item-card {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #000;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<!-- Reading progress bar -->
<div class="reading-progress" id="readingProgress"></div>

<!-- Scroll to top button -->
<button class="scroll-top" onclick="scrollToTop()" id="scrollTopBtn" aria-label="Scroll to top">↑</button>

<div class="toast-container" id="toast-container"></div>
<div class="realtime-status" id="realtimeStatus">
  <span class="status-dot"></span>
  <span id="realtimeText">Live Updates Active</span>
</div>

<h1>🎒 Inventory & Shop</h1>

<!-- Search Bar -->
<div class="search-container">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search items..." onkeyup="if(event.key==='Enter') searchItems()">
  <button class="search-button" onclick="searchItems()">Search</button>
</div>

<!-- Quick Stats Tabs -->
<div class="stats-tabs">
  <button class="stats-tab active" onclick="filterItems('all')" id="filterAll">📋 All</button>
  <button class="stats-tab" onclick="filterItems('shop')" id="filterShop">🛒 Shop</button>
  <button class="stats-tab" onclick="filterItems('inventory')" id="filterInventory">📦 Inventory</button>
  <button class="stats-tab" onclick="filterItems('usable')" id="filterUsable">✨ Usable Now</button>
</div>

<!-- Player Stats Summary -->
<div id="playerStats" class="stats-summary" style="display: none;"></div>

<!-- Active Boosts Section -->
<div id="activeBoostsSection" class="boosts-section" style="display: none;">
  <div class="boosts-title">
    <span>✨</span>
    <span>Active Boosts</span>
    <span>✨</span>
  </div>
  <div id="activeBoosts" class="boosts-grid"></div>
</div>

<div class="section">
  <h2>🛒 Shop <span class="item-count" id="shopCount">0</span></h2>
  <div id="shop" class="items-grid"></div>
</div>

<hr>

<div class="section">
  <h2>📦 Your Inventory <span class="item-count" id="inventoryCount">0</span></h2>
  <div id="inventory" class="items-grid"></div>
</div>

<button class="back-button" onclick="goBack()">← Back to Dashboard</button>

<!-- Include shared utilities -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="toast.js"></script>
<script src="loading.js"></script>
<script src="error-handler.js"></script>

<script>
// Initialize Supabase client
const sb = window.supabaseClient;

let player = null;
let playerChannel = null;
let boostInterval = null;
let currentFilter = 'all';
let shopItems = [];
let inventoryItems = [];

// Page initialization
document.addEventListener('DOMContentLoaded', async function() {
    await initializePage();
    setupScrollToTop();
    setupReadingProgress();
    setupKeyboardNavigation();
});

// Initialize page
async function initializePage() {
    return ErrorHandler.withErrorHandling(async () => {
        // Check authentication
        const user = await getCurrentUser();
        if (!user) {
            showToast('Please log in to access inventory', 'warning', 3000);
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
            return;
        }

        // Load player data
        player = await getCurrentPlayer();
        if (!player) {
            showToast('Player data not found', 'error');
            return;
        }

        // Show loading states
        LoadingManager.showSpinner('shop', 'Loading shop items...');
        LoadingManager.showSpinner('inventory', 'Loading inventory...');

        // Load all data
        await Promise.all([
            loadPlayerStats(),
            loadActiveBoosts(),
            loadShop(),
            loadInventory()
        ]);

        // Setup realtime
        setupRealtimeSubscription();
        startBoostTimer();

        // Show welcome toast
        showToast(`Welcome to the shop, ${player.username || 'Commander'}!`, 'success', 3000);

        // Update counts
        updateItemCounts();
    }, null, 'Failed to initialize inventory');
}

// Get badge class based on item type
function getItemBadgeClass(type) {
    const badges = {
        'energy': 'badge-energy',
        'health': 'badge-health',
        'hunger': 'badge-hunger',
        'happiness': 'badge-happiness',
        'success_boost': 'badge-boost',
        'temporary_boost': 'badge-temporary',
        'permanent_boost': 'badge-permanent',
        'multi_use': 'badge-multi'
    };
    return badges[type] || 'badge-boost';
}

// Get icon based on item type
function getItemIcon(type) {
    const icons = {
        'energy': '⚡',
        'health': '❤️',
        'hunger': '🍽️',
        'happiness': '😊',
        'success_boost': '⭐',
        'temporary_boost': '✨',
        'permanent_boost': '💪',
        'multi_use': '📦'
    };
    return icons[type] || '📦';
}

// Format effect description
function getEffectDescription(item) {
    switch(item.type) {
        case 'energy': return `Restores ${item.effect_value} energy`;
        case 'health': return `Restores ${item.effect_value} health`;
        case 'hunger': return `Reduces hunger by ${item.effect_value}`;
        case 'happiness': return `Increases happiness by ${item.effect_value}`;
        case 'success_boost': return `+${item.effect_value}% success rate`;
        case 'temporary_boost': return `+${item.effect_value}% for ${item.duration_minutes} min`;
        case 'permanent_boost': return `Permanently +${item.effect_value}%`;
        case 'multi_use': return `${item.max_uses} uses, +${item.effect_value} each`;
        default: return '';
    }
}

// Check if item can be used
function canUseItem(item) {
    if (!player) return false;
    
    switch(item.type) {
        case 'energy': return player.energy < 100;
        case 'health': return player.health < 100;
        case 'hunger': return player.hunger > 0;
        case 'happiness': return player.happiness < 100;
        default: return true;
    }
}

// Get use disabled reason
function getUseDisabledReason(item) {
    if (!player) return 'Not logged in';
    
    switch(item.type) {
        case 'energy': return player.energy >= 100 ? 'Energy full' : '';
        case 'health': return player.health >= 100 ? 'Health full' : '';
        case 'hunger': return player.hunger <= 0 ? 'Hunger empty' : '';
        case 'happiness': return player.happiness >= 100 ? 'Happiness full' : '';
        default: return '';
    }
}

// Load player stats
async function loadPlayerStats() {
    return ErrorHandler.withErrorHandling(async () => {
        const statsDiv = document.getElementById('playerStats');
        statsDiv.style.display = 'flex';
        
        const getStatClass = (value, max = 100) => {
            if (value <= 10) return 'critical';
            if (value <= 30) return 'warning';
            return '';
        };
        
        statsDiv.innerHTML = `
            <div class="stat-item" onclick="filterItemsByStat('cash')" title="Click to filter items you can afford">
                <div class="stat-label">💰 Cash</div>
                <div class="stat-value">₹${player.cash.toLocaleString()}</div>
            </div>
            <div class="stat-item" onclick="filterItemsByStat('energy')" title="Click to see energy items">
                <div class="stat-label">⚡ Energy</div>
                <div class="stat-value ${getStatClass(player.energy)}">${player.energy}/100</div>
            </div>
            <div class="stat-item" onclick="filterItemsByStat('health')" title="Click to see health items">
                <div class="stat-label">❤️ Health</div>
                <div class="stat-value ${getStatClass(player.health)}">${player.health || 100}/100</div>
            </div>
            <div class="stat-item" onclick="filterItemsByStat('hunger')" title="Click to see food items">
                <div class="stat-label">🍽️ Hunger</div>
                <div class="stat-value ${getStatClass(100 - player.hunger)}">${player.hunger || 100}/100</div>
            </div>
            <div class="stat-item" onclick="filterItemsByStat('happiness')" title="Click to see happiness items">
                <div class="stat-label">😊 Happiness</div>
                <div class="stat-value ${getStatClass(player.happiness)}">${player.happiness || 100}/100</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⭐ Boost</div>
                <div class="stat-value">${player.success_boost || 0}%</div>
            </div>
        `;
    }, null, 'Failed to load player stats');
}

// Load active boosts
async function loadActiveBoosts() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data, error } = await sb.rpc('get_player_active_boosts', {
            p_player_id: player.id
        });
        
        if (error) throw error;
        
        const boostsDiv = document.getElementById('activeBoosts');
        const boostsSection = document.getElementById('activeBoostsSection');
        
        if (data && data.length > 0) {
            boostsSection.style.display = 'block';
            boostsDiv.innerHTML = data.map(boost => `
                <div class="boost-card">
                    <div class="boost-value">+${boost.boost_value}% Success Rate</div>
                    <div class="boost-timer">
                        <span>⏳</span>
                        <span>${Math.ceil(boost.minutes_remaining)} min remaining</span>
                    </div>
                </div>
            `).join('');
        } else {
            boostsSection.style.display = 'none';
        }
    }, null, 'Failed to load boosts');
}

// Load shop items
async function loadShop() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data: items, error } = await sb
            .from('items')
            .select('*')
            .order('type')
            .order('price');
        
        if (error) throw error;
        
        shopItems = items || [];
        const shopDiv = document.getElementById("shop");
        
        if (!shopItems.length) {
            shopDiv.innerHTML = '<div class="empty-message">No items in shop</div>';
            return;
        }

        shopDiv.innerHTML = shopItems.map(item => createShopCard(item)).join('');
        updateItemCounts();
    }, 'shop', 'Failed to load shop');
}

// Create shop card HTML
function createShopCard(item) {
    const badgeClass = getItemBadgeClass(item.type);
    const icon = item.icon || getItemIcon(item.type);
    const effectDesc = getEffectDescription(item);
    
    return `
        <div class="item-card" onclick="showItemDetails('${item.id}', 'shop')">
            <div class="item-icon">${icon}</div>
            <span class="item-badge ${badgeClass}">${item.type.replace('_', ' ')}</span>
            <div class="item-name">${item.name}</div>
            <div class="item-description">${item.description || effectDesc}</div>
            <div class="item-details">
                <p>Effect <span class="effect">+${item.effect_value}</span></p>
                ${item.duration_minutes > 0 ? `<p>Duration <span class="duration">${item.duration_minutes} min</span></p>` : ''}
                ${item.max_uses > 1 ? `<p>Max Uses <span class="duration">${item.max_uses}</span></p>` : ''}
                <p>Price <span class="price">₹${item.price.toLocaleString()}</span></p>
            </div>
            <button class="buy" onclick="buyItem('${item.id}', ${item.price}); event.stopPropagation()" 
                    ${player.cash < item.price ? 'disabled' : ''}>
                ${player.cash < item.price ? '❌ Insufficient Funds' : '🛒 Buy'}
            </button>
        </div>
    `;
}

// Load inventory
async function loadInventory() {
    return ErrorHandler.withErrorHandling(async () => {
        const { data: items, error } = await sb
            .from('player_items')
            .select('item_id, quantity, items(*)')
            .eq('player_id', player.id);

        if (error) throw error;
        
        inventoryItems = items || [];
        const inventoryDiv = document.getElementById("inventory");
        
        if (!inventoryItems.length) {
            inventoryDiv.innerHTML = '<div class="empty-message">Your inventory is empty. Visit the shop!</div>';
            return;
        }

        inventoryDiv.innerHTML = inventoryItems.map(i => createInventoryCard(i)).join('');
        updateItemCounts();
    }, 'inventory', 'Failed to load inventory');
}

// Create inventory card HTML
function createInventoryCard(invItem) {
    const item = invItem.items;
    const badgeClass = getItemBadgeClass(item.type);
    const icon = item.icon || getItemIcon(item.type);
    const effectDesc = getEffectDescription(item);
    const canUse = canUseItem(item);
    const disabledReason = getUseDisabledReason(item);
    
    return `
        <div class="item-card" onclick="showItemDetails('${item.id}', 'inventory')">
            <div class="item-icon">${icon}</div>
            <span class="item-badge ${badgeClass}">${item.type.replace('_', ' ')}</span>
            <div class="item-name">${item.name}</div>
            <div class="item-description">${item.description || effectDesc}</div>
            <div class="item-details">
                <p>Quantity <span class="quantity">x${invItem.quantity}</span></p>
                <p>Effect <span class="effect">+${item.effect_value}</span></p>
                ${item.duration_minutes > 0 ? `<p>Duration <span class="duration">${item.duration_minutes} min</span></p>` : ''}
                ${item.max_uses > 1 ? `<p>Max Uses <span class="duration">${item.max_uses}</span></p>` : ''}
                ${item.type === 'energy' ? `<p class="current-stat">⚡ ${player.energy}/100</p>` : ''}
                ${item.type === 'health' ? `<p class="current-stat">❤️ ${player.health || 100}/100</p>` : ''}
                ${item.type === 'hunger' ? `<p class="current-stat">🍽️ ${player.hunger || 100}/100</p>` : ''}
                ${item.type === 'happiness' ? `<p class="current-stat">😊 ${player.happiness || 100}/100</p>` : ''}
            </div>
            <div class="button-container">
                <button class="use" onclick="useItem('${item.id}', 1); event.stopPropagation()" 
                        ${!canUse ? 'disabled' : ''}
                        title="${disabledReason}">
                    ${!canUse ? '❌ ' + disabledReason : '✨ Use'}
                </button>
                ${invItem.quantity > 1 && item.stackable ? `
                    <button class="use-all" onclick="useItem('${item.id}', ${invItem.quantity}); event.stopPropagation()" 
                            ${!canUse ? 'disabled' : ''}>
                        Use All (${invItem.quantity})
                    </button>
                ` : ''}
            </div>
        </div>
    `;
}

// Buy item
async function buyItem(itemId, price) {
    return ErrorHandler.withErrorHandling(async () => {
        if (player.cash < price) { 
            showToast("❌ Not enough cash!", 'error'); 
            return; 
        }

        // Update player cash
        const { error: updateError } = await sb
            .from('players')
            .update({ cash: player.cash - price })
            .eq('id', player.id);
            
        if (updateError) throw updateError;
        
        player.cash -= price;

        // Check existing inventory
        const { data: existing, error: checkError } = await sb
            .from('player_items')
            .select('*')
            .eq('player_id', player.id)
            .eq('item_id', itemId)
            .maybeSingle();

        if (checkError) throw checkError;

        if (existing) {
            const { error: updateInvError } = await sb
                .from('player_items')
                .update({ quantity: existing.quantity + 1 })
                .eq('id', existing.id);
            
            if (updateInvError) throw updateInvError;
        } else {
            const { error: insertError } = await sb
                .from('player_items')
                .insert({ player_id: player.id, item_id: itemId, quantity: 1 });
            
            if (insertError) throw insertError;
        }

        showToast("✅ Purchase successful!", 'success');
        
        // Reload data
        await Promise.all([
            loadPlayerStats(),
            loadShop(),
            loadInventory()
        ]);
        
        updateItemCounts();
        
    }, null, 'Error purchasing item');
}

// Use item
async function useItem(itemId, quantity = 1) {
    return ErrorHandler.withErrorHandling(async () => {
        if (!player) return;

        const { data, error } = await sb.rpc('use_item', {
            p_item_id: itemId,
            p_quantity: quantity
        });

        if (error) throw error;

        if (!data.success) {
            showToast(`❌ ${data.error}`, 'error');
            return;
        }

        // Show success message with animation
        showToast(data.message, 'success');
        
        // Reload all data
        await Promise.all([
            loadPlayerStats(),
            loadInventory(),
            loadActiveBoosts()
        ]);
        
        updateItemCounts();

        // Show special effect for permanent items
        if (data.message.includes('permanent')) {
            createConfetti();
        }

    }, null, 'Error using item');
}

// Create confetti effect for permanent items
function createConfetti() {
    if (typeof confetti !== 'undefined' && window.confetti) {
        window.confetti({
            particleCount: 50,
            spread: 60,
            origin: { y: 0.6 }
        });
    }
}

// Show item details in toast
function showItemDetails(itemId, source) {
    let item;
    if (source === 'shop') {
        item = shopItems.find(i => i.id === itemId);
    } else {
        const invItem = inventoryItems.find(i => i.item_id === itemId);
        item = invItem ? invItem.items : null;
    }
    
    if (!item) return;
    
    showToast(`
        📦 ${item.name}
        ${item.description || ''}
        Type: ${item.type}
        Effect: +${item.effect_value}
        ${item.duration_minutes ? `Duration: ${item.duration_minutes} min` : ''}
    `, 'info', 5000);
}

// Set up realtime subscription
function setupRealtimeSubscription() {
    if (!player) return;
    
    if (playerChannel) playerChannel.unsubscribe();
    
    playerChannel = sb
        .channel('player-changes')
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'players',
                filter: `id=eq.${player.id}`
            },
            async (payload) => {
                player = payload.new;
                await loadPlayerStats();
                await loadInventory(); // Reload to update disabled states
                updateItemCounts();
                
                // Update realtime status
                document.getElementById('realtimeText').textContent = 'Updated just now';
                setTimeout(() => {
                    document.getElementById('realtimeText').textContent = 'Live Updates Active';
                }, 3000);
            }
        )
        .subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                document.getElementById('realtimeStatus').style.opacity = '1';
            }
        });
}

// Boost timer update
function startBoostTimer() {
    boostInterval = setInterval(() => {
        loadActiveBoosts(); // Update boost timers every minute
    }, 60000);
}

// Search items
function searchItems() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!query || query.length < 2) {
        showToast('Please enter at least 2 characters', 'warning', 2000);
        return;
    }

    // Search in shop
    const shopResults = shopItems.filter(item => 
        item.name.toLowerCase().includes(query) ||
        item.type.toLowerCase().includes(query) ||
        (item.description && item.description.toLowerCase().includes(query))
    );

    // Search in inventory
    const inventoryResults = inventoryItems.filter(invItem => 
        invItem.items.name.toLowerCase().includes(query) ||
        invItem.items.type.toLowerCase().includes(query) ||
        (invItem.items.description && invItem.items.description.toLowerCase().includes(query))
    );

    displaySearchResults(shopResults, inventoryResults);
    showToast(`Found ${shopResults.length} shop items, ${inventoryResults.length} inventory items`, 'info', 3000);
}

// Display search results
function displaySearchResults(shopResults, inventoryResults) {
    const shopDiv = document.getElementById('shop');
    const inventoryDiv = document.getElementById('inventory');

    if (shopResults.length === 0) {
        shopDiv.innerHTML = '<div class="empty-message">No matching shop items</div>';
    } else {
        shopDiv.innerHTML = shopResults.map(item => createShopCard(item)).join('');
    }

    if (inventoryResults.length === 0) {
        inventoryDiv.innerHTML = '<div class="empty-message">No matching inventory items</div>';
    } else {
        inventoryDiv.innerHTML = inventoryResults.map(invItem => createInventoryCard(invItem)).join('');
    }
}

// Filter items by type
function filterItems(filter) {
    currentFilter = filter;
    
    // Update active tab
    document.querySelectorAll('.stats-tab').forEach(tab => {
        tab.classList.remove('active');
    });
    document.getElementById(`filter${filter.charAt(0).toUpperCase() + filter.slice(1)}`).classList.add('active');
    
    // Apply filter
    switch(filter) {
        case 'all':
            loadShop();
            loadInventory();
            break;
        case 'shop':
            document.getElementById('inventory').innerHTML = '<div class="empty-message">Showing shop only</div>';
            loadShop();
            break;
        case 'inventory':
            document.getElementById('shop').innerHTML = '<div class="empty-message">Showing inventory only</div>';
            loadInventory();
            break;
        case 'usable':
            filterUsableItems();
            break;
    }
    
    showToast(`Showing: ${filter} items`, 'info', 1500);
}

// Filter usable items
function filterUsableItems() {
    const usableInventory = inventoryItems.filter(invItem => canUseItem(invItem.items));
    const shopDiv = document.getElementById('shop');
    const inventoryDiv = document.getElementById('inventory');
    
    shopDiv.innerHTML = '<div class="empty-message">Showing usable items only</div>';
    
    if (usableInventory.length === 0) {
        inventoryDiv.innerHTML = '<div class="empty-message">No usable items found</div>';
    } else {
        inventoryDiv.innerHTML = usableInventory.map(invItem => createInventoryCard(invItem)).join('');
    }
}

// Filter items by stat
function filterItemsByStat(stat) {
    let filteredShop = [];
    let filteredInventory = [];
    
    switch(stat) {
        case 'cash':
            filteredShop = shopItems.filter(item => item.price <= player.cash);
            showToast(`Showing items you can afford (₹${player.cash.toLocaleString()})`, 'info', 3000);
            break;
        case 'energy':
            filteredShop = shopItems.filter(item => item.type === 'energy');
            filteredInventory = inventoryItems.filter(invItem => invItem.items.type === 'energy');
            break;
        case 'health':
            filteredShop = shopItems.filter(item => item.type === 'health');
            filteredInventory = inventoryItems.filter(invItem => invItem.items.type === 'health');
            break;
        case 'hunger':
            filteredShop = shopItems.filter(item => item.type === 'hunger');
            filteredInventory = inventoryItems.filter(invItem => invItem.items.type === 'hunger');
            break;
        case 'happiness':
            filteredShop = shopItems.filter(item => item.type === 'happiness');
            filteredInventory = inventoryItems.filter(invItem => invItem.items.type === 'happiness');
            break;
    }
    
    displaySearchResults(filteredShop, filteredInventory);
}

// Update item counts
function updateItemCounts() {
    document.getElementById('shopCount').textContent = shopItems.length;
    document.getElementById('inventoryCount').textContent = inventoryItems.length;
}

// Navigation
function goBack() {
    showToast('Returning to dashboard...', 'info', 1000);
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 500);
}

// Scroll to top functionality
function setupScrollToTop() {
    const scrollBtn = document.getElementById('scrollTopBtn');
    
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            scrollBtn.classList.add('visible');
        } else {
            scrollBtn.classList.remove('visible');
        }
    });
}

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}

// Reading progress bar
function setupReadingProgress() {
    const progressBar = document.getElementById('readingProgress');
    
    window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        progressBar.style.width = scrolled + '%';
    });
}

// Keyboard navigation
function setupKeyboardNavigation() {
    document.addEventListener('keydown', (e) => {
        // 1,2,3,4 for filters
        if (e.key === '1') {
            e.preventDefault();
            filterItems('all');
        } else if (e.key === '2') {
            e.preventDefault();
            filterItems('shop');
        } else if (e.key === '3') {
            e.preventDefault();
            filterItems('inventory');
        } else if (e.key === '4') {
            e.preventDefault();
            filterItems('usable');
        }
        
        // Ctrl + F for search
        if (e.ctrlKey && e.key === 'f') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
        
        // Esc to clear search
        if (e.key === 'Escape') {
            document.getElementById('searchInput').value = '';
            loadShop();
            loadInventory();
        }
        
        // R to refresh
        if (e.key === 'r' || e.key === 'R') {
            if (!e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                showToast('Refreshing...', 'info', 1000);
                Promise.all([loadShop(), loadInventory(), loadActiveBoosts()]);
            }
        }
    });
}

// Clean up
window.addEventListener('beforeunload', () => {
    if (playerChannel) playerChannel.unsubscribe();
    if (boostInterval) clearInterval(boostInterval);
});

// Export functions for global use
window.buyItem = buyItem;
window.useItem = useItem;
window.goBack = goBack;
window.scrollToTop = scrollToTop;
window.searchItems = searchItems;
window.filterItems = filterItems;
window.filterItemsByStat = filterItemsByStat;
window.showItemDetails = showItemDetails;
