<!DOCTYPE html>
<html>
<head>
  <title>Rheoa RPG - Inventory & Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Variables & Themes ─── */
    :root {
      --bg-body: #f0f4fa;
      --card-bg: #fff;
      --card-border: rgba(148,163,184,0.2);
      --card-shadow: 0 12px 30px rgba(0,0,0,0.05);
      --header-bg: linear-gradient(135deg,#1e2f5e 0%,#1a4b7a 100%);
      --header-text: #fff;
      --accent: #2c6e9e;
      --accent-hover: #1f5480;
      --btn-primary: #2c6e9e;
      --btn-primary-hover: #1f5480;
      --btn-secondary: #475569;
      --btn-ghost: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #334155;
      --border-light: #e2e8f0;
      --card-header-bg: #f8fafc;
      --font-family: 'Inter', system-ui, sans-serif;
      --border-radius-card: 24px;
      --transition: all 0.2s ease;
      --color-success: #16a34a;
      --color-warning: #f59e0b;
      --color-danger: #dc2626;
      --color-energy: #2563eb;
      --color-xp: #7c3aed;
      --color-cash: #16a34a;
    }

    body.theme-dusk {
      --bg-body: #0f1722;
      --card-bg: #1e293b;
      --card-border: rgba(51,65,85,0.6);
      --card-shadow: 0 15px 35px rgba(0,0,0,0.3);
      --header-bg: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      --header-text: #e2e8f0;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-secondary: #334155;
      --btn-ghost: #334155;
      --text-main: #f1f5f9;
      --text-muted: #cbd5e1;
      --border-light: #334155;
      --card-header-bg: #0f172a;
    }

    body.theme-meadow {
      --bg-body: #eef4e6;
      --card-bg: #ffffffea;
      --card-border: #cbd5b0;
      --card-shadow: 0 12px 24px rgba(60,70,40,0.08);
      --header-bg: linear-gradient(135deg,#2b5e3b 0%,#4a7c59 100%);
      --header-text: #fef9e6;
      --accent: #4b6b3e;
      --accent-hover: #3a5530;
      --btn-primary: #4b6b3e;
      --btn-primary-hover: #3a5530;
      --btn-secondary: #7f6b4a;
      --btn-ghost: #e9e1c7;
      --text-main: #2c2b26;
      --text-muted: #5b5a4c;
      --border-light: #d9d2b0;
      --card-header-bg: #fef6e0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-family);
      color: var(--text-main);
      padding: 28px 20px;
      transition: background .25s, color .2s;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding: 0 8px;
    }
    .back-link {
      background: var(--card-bg);
      padding: 8px 18px;
      border-radius: 60px;
      text-decoration: none;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--border-light);
      transition: var(--transition);
      font-size: .9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(2px);
    }
    .back-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .theme-switcher, .font-switcher {
      display: flex;
      gap: 6px;
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      backdrop-filter: blur(4px);
      align-items: center;
    }
    .theme-btn, .font-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: .8rem;
      cursor: pointer;
      transition: .2s;
      color: var(--text-muted);
      font-family: var(--font-family);
    }
    .theme-btn.active, .font-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .theme-btn:hover:not(.active), .font-btn:hover:not(.active) {
      background: var(--btn-ghost);
      color: var(--text-main);
    }
    .font-btn { font-size: .75rem; padding: 4px 12px; }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-main);
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-style: italic;
    }

    .player-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--header-bg);
      color: var(--header-text);
      padding: 15px 25px;
      border-radius: var(--border-radius-card);
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .stat-group { display: flex; gap: 30px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-label { font-size: 0.8rem; opacity: 0.9; }
    .stat-value { font-size: 1.3rem; font-weight: bold; }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 20px;
      transition: var(--transition);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    .item-icon { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
    .item-name { font-size: 1.2rem; font-weight: 600; text-align: center; margin-bottom: 6px; }
    .item-description { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px; }
    .item-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin: 8px 0 16px;
      font-size: 0.9rem;
    }
    .item-detail { display: flex; justify-content: space-between; }
    .item-detail .label { color: var(--text-muted); font-weight: 500; }
    .item-detail .value { font-weight: 600; }
    .item-detail .value.price { color: var(--color-cash); }
    .item-detail .value.effect { color: var(--color-energy); }
    .item-detail .value.duration { color: var(--color-warning); }
    .item-detail .value.quantity { color: var(--color-xp); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }
    .badge-energy { background: var(--color-energy); color: white; }
    .badge-health { background: var(--color-danger); color: white; }
    .badge-hunger { background: var(--color-warning); color: white; }
    .badge-happiness { background: #7c3aed; color: white; }
    .badge-boost { background: #f59e0b; color: white; }
    .badge-temporary { background: #f59e0b; color: white; }
    .badge-permanent { background: #7c3aed; color: white; }
    .badge-multi { background: #8b5cf6; color: white; }
    .badge-cash { background: var(--color-cash); color: white; }

    .btn {
      padding: 10px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-family: var(--font-family);
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      width: 100%;
    }
    .btn-primary { background: var(--btn-primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--btn-primary-hover); transform: scale(1.01); }
    .btn-success { background: var(--color-success); color: white; }
    .btn-success:hover:not(:disabled) { background: #15803d; transform: scale(1.01); }
    .btn-warning { background: var(--color-warning); color: white; }
    .btn-warning:hover:not(:disabled) { background: #d97706; transform: scale(1.01); }
    .btn-secondary { background: var(--btn-secondary); color: white; }
    .btn-secondary:hover:not(:disabled) { background: #1e293b; transform: scale(1.01); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .button-group { display: flex; gap: 8px; margin-top: auto; }
    .button-group .btn { flex: 1; }

    .empty-message { text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.1rem; grid-column: 1 / -1; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border-light); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .loading { text-align: center; padding: 40px; color: var(--text-muted); grid-column: 1 / -1; }

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      font-weight: 500;
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      max-width: 400px;
      word-wrap: break-word;
      backdrop-filter: blur(4px);
    }
    .toast.success { background: var(--color-success); }
    .toast.error { background: var(--color-danger); }
    .toast.info { background: var(--btn-primary); }
    .toast.warning { background: var(--color-warning); }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .back-button {
      display: block;
      width: 200px;
      margin: 40px auto;
      padding: 12px 24px;
      font-family: var(--font-family);
      font-weight: 600;
      border: none;
      border-radius: 60px;
      background: var(--btn-secondary);
      color: white;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }
    .back-button:hover { background: #1e293b; transform: scale(1.02); }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .player-stats { flex-direction: column; text-align: center; }
      .stat-group { justify-content: center; }
      .items-grid { grid-template-columns: 1fr; }
      .item-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="container">
  <!-- Top Bar -->
  <div class="top-bar">
    <a href="dashboard.html" class="back-link">← Dashboard</a>
    <div class="controls">
      <div class="theme-switcher" id="themeSwitcher">
        <button data-theme="default" class="theme-btn active">✨ Aurora</button>
        <button data-theme="dusk" class="theme-btn">🌙 Dusk</button>
        <button data-theme="meadow" class="theme-btn">🌿 Meadow</button>
      </div>
      <div class="font-switcher" id="fontSwitcher">
        <button data-font="inter" class="font-btn active">Inter</button>
        <button data-font="monospace" class="font-btn">Courier</button>
        <button data-font="serif" class="font-btn">Georgia</button>
      </div>
    </div>
  </div>

  <h1>🎒 Inventory & Shop</h1>
  <div class="subtitle">Buy, sell, and use items to boost your stats</div>

  <!-- Player Stats -->
  <div id="playerStats" class="player-stats" style="display: none;"></div>

  <!-- Shop Section -->
  <h2 style="margin: 30px 0 20px; font-weight: 600;">🛒 Shop</h2>
  <div id="shop" class="items-grid">
    <div class="loading"><div class="spinner"></div><p>Loading shop...</p></div>
  </div>

  <hr style="margin: 40px 0; border: 0; border-top: 2px solid var(--border-light);">

  <!-- Inventory Section -->
  <h2 style="margin: 0 0 20px; font-weight: 600;">📦 Your Inventory</h2>
  <div id="inventory" class="items-grid">
    <div class="loading"><div class="spinner"></div><p>Loading inventory...</p></div>
  </div>

  <button class="back-button" onclick="goBack()">← Back to Dashboard</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const sb = window.supabase.createClient(
    "https://mtiwodvsrwvrujbhmmrn.supabase.co",
    "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
  );

  // ─── Utilities ────────────────────────────────────────────
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  function showToast(message, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      setTimeout(() => {
        if (toast.parentNode) container.removeChild(toast);
      }, 300);
    }, duration);
  }

  // ─── Theme & Font ──────────────────────────────────────
  function setTheme(themeName) {
    const body = document.body;
    body.classList.remove('theme-dusk', 'theme-meadow');
    if (themeName === 'dusk') body.classList.add('theme-dusk');
    else if (themeName === 'meadow') body.classList.add('theme-meadow');
    localStorage.setItem('inv_theme', themeName);
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-theme') === themeName);
    });
  }

  function setFont(fontName) {
    const root = document.documentElement;
    if (fontName === 'inter') root.style.setProperty('--font-family', "'Inter', system-ui, sans-serif");
    else if (fontName === 'monospace') root.style.setProperty('--font-family', "'Courier New', monospace");
    else if (fontName === 'serif') root.style.setProperty('--font-family', "'Georgia', serif");
    localStorage.setItem('inv_font', fontName);
    document.querySelectorAll('.font-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-font') === fontName);
    });
  }

  function initThemeAndFont() {
    const savedTheme = localStorage.getItem('inv_theme') || 'default';
    setTheme(savedTheme);
    const savedFont = localStorage.getItem('inv_font') || 'inter';
    setFont(savedFont);
    document.getElementById('themeSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.theme-btn');
      if (btn) setTheme(btn.getAttribute('data-theme'));
    });
    document.getElementById('fontSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.font-btn');
      if (btn) setFont(btn.getAttribute('data-font'));
    });
  }

  // ─── State ──────────────────────────────────────────────
  let currentPlayer = null;
  let playerInventory = [];
  let shopItems = [];

  // ─── Load Player & Data ──────────────────────────────
  async function loadPlayerData() {
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = "index.html"; return; }
      const { data: player, error } = await sb
        .from('players')
        .select('*')
        .eq('auth_id', user.id)
        .single();
      if (error) throw error;
      currentPlayer = player;
      updatePlayerStats();
      await loadShopItems();
      await loadInventory();
    } catch (err) {
      console.error('Error loading player:', err);
      showToast('Error loading player data', 'error');
    }
  }

  function updatePlayerStats() {
    if (!currentPlayer) return;
    const statsDiv = document.getElementById('playerStats');
    statsDiv.style.display = 'flex';
    statsDiv.innerHTML = `
      <div class="stat-group">
        <div class="stat">
          <div class="stat-label">💰 Cash</div>
          <div class="stat-value">₹${currentPlayer.cash.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="stat-label">⚡ Energy</div>
          <div class="stat-value">${currentPlayer.energy}/100</div>
        </div>
        <div class="stat">
          <div class="stat-label">⭐ Level</div>
          <div class="stat-value">${currentPlayer.level}</div>
        </div>
        <div class="stat">
          <div class="stat-label">❤️ Health</div>
          <div class="stat-value">${currentPlayer.health || 100}</div>
        </div>
        <div class="stat">
          <div class="stat-label">🍽️ Hunger</div>
          <div class="stat-value">${currentPlayer.hunger || 100}</div>
        </div>
        <div class="stat">
          <div class="stat-label">😊 Happiness</div>
          <div class="stat-value">${currentPlayer.happiness || 100}</div>
        </div>
      </div>
    `;
  }

  // ─── Load Shop Items ──────────────────────────────────
  async function loadShopItems() {
    try {
      const { data, error } = await sb
        .from('items')
        .select('*')
        .order('price');
      if (error) throw error;
      shopItems = data || [];
      renderShop();
    } catch (err) {
      console.error('Error loading shop:', err);
      document.getElementById('shop').innerHTML = '<div class="empty-message">Error loading shop</div>';
    }
  }

  // ─── Load Inventory (safe manual join) ───────────────
  async function loadInventory() {
    try {
      // 1. Get player_items
      const { data: playerItems, error: pError } = await sb
        .from('player_items')
        .select('id, player_id, item_id, quantity')
        .eq('player_id', currentPlayer.id);
      if (pError) throw pError;

      if (!playerItems || playerItems.length === 0) {
        playerInventory = [];
        renderInventory();
        return;
      }

      // 2. Get items
      const itemIds = playerItems.map(pi => pi.item_id);
      const { data: items, error: iError } = await sb
        .from('items')
        .select('*')
        .in('id', itemIds);
      if (iError) throw iError;

      // 3. Merge
      const itemMap = {};
      items.forEach(item => { itemMap[item.id] = item; });

      playerInventory = playerItems.map(pi => ({
        ...pi,
        items: itemMap[pi.item_id] || null
      }));

      renderInventory();
    } catch (err) {
      console.error('Error loading inventory:', err);
      document.getElementById('inventory').innerHTML = '<div class="empty-message">Error loading inventory</div>';
    }
  }

  // ─── Render Shop ──────────────────────────────────────
  function renderShop() {
    const container = document.getElementById('shop');
    if (!shopItems.length) {
      container.innerHTML = '<div class="empty-message">No items in shop</div>';
      return;
    }
    container.innerHTML = shopItems.map(item => {
      const badgeClass = getBadgeClass(item.type);
      const icon = item.icon || '📦';
      const effectDesc = getEffectDescription(item);
      return `
        <div class="item-card">
          <div class="item-icon">${icon}</div>
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-description">${escapeHtml(item.description || effectDesc)}</div>
          <span class="badge ${badgeClass}">${item.type.replace('_', ' ')}</span>
          <div class="item-details">
            <div class="item-detail"><span class="label">💰 Price</span><span class="value price">₹${item.price.toLocaleString()}</span></div>
            <div class="item-detail"><span class="label">⚡ Effect</span><span class="value effect">+${item.effect_value}</span></div>
            ${item.duration_minutes > 0 ? `<div class="item-detail"><span class="label">⏱️ Duration</span><span class="value duration">${item.duration_minutes} min</span></div>` : ''}
            ${item.max_uses > 1 ? `<div class="item-detail"><span class="label">📦 Max Uses</span><span class="value duration">${item.max_uses}</span></div>` : ''}
          </div>
          <button class="btn btn-primary" onclick="buyItem('${item.id}', ${item.price})" ${currentPlayer.cash < item.price ? 'disabled' : ''}>
            ${currentPlayer.cash < item.price ? '❌ Insufficient Funds' : '🛒 Buy'}
          </button>
        </div>
      `;
    }).join('');
  }

  // ─── Render Inventory ──────────────────────────────────
  function renderInventory() {
    const container = document.getElementById('inventory');
    if (!playerInventory.length) {
      container.innerHTML = '<div class="empty-message">Your inventory is empty. Visit the shop!</div>';
      return;
    }
    container.innerHTML = playerInventory.map(entry => {
      const item = entry.items;
      if (!item) return '';
      const badgeClass = getBadgeClass(item.type);
      const icon = item.icon || '📦';
      const effectDesc = getEffectDescription(item);
      const canUse = canUseItem(item);
      const useDisabledReason = canUse ? '' : getUseDisabledReason(item);

      return `
        <div class="item-card">
          <div class="item-icon">${icon}</div>
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-description">${escapeHtml(item.description || effectDesc)}</div>
          <span class="badge ${badgeClass}">${item.type.replace('_', ' ')}</span>
          <div class="item-details">
            <div class="item-detail"><span class="label">📦 Quantity</span><span class="value quantity">x${entry.quantity}</span></div>
            <div class="item-detail"><span class="label">⚡ Effect</span><span class="value effect">+${item.effect_value}</span></div>
            ${item.duration_minutes > 0 ? `<div class="item-detail"><span class="label">⏱️ Duration</span><span class="value duration">${item.duration_minutes} min</span></div>` : ''}
            ${item.type === 'energy' ? `<div class="item-detail"><span class="label">Current</span><span class="value">${currentPlayer.energy}/100</span></div>` : ''}
            ${item.type === 'health' ? `<div class="item-detail"><span class="label">Current</span><span class="value">${currentPlayer.health || 100}/100</span></div>` : ''}
            ${item.type === 'hunger' ? `<div class="item-detail"><span class="label">Current</span><span class="value">${currentPlayer.hunger || 100}/100</span></div>` : ''}
            ${item.type === 'happiness' ? `<div class="item-detail"><span class="label">Current</span><span class="value">${currentPlayer.happiness || 100}/100</span></div>` : ''}
          </div>
          <div class="button-group">
            <button class="btn btn-success" onclick="useItem('${item.id}', 1)" ${!canUse ? 'disabled' : ''} title="${useDisabledReason}">
              ${!canUse ? '❌ ' + useDisabledReason : '✨ Use'}
            </button>
            ${entry.quantity > 1 && item.stackable ? `
              <button class="btn btn-warning" onclick="useItem('${item.id}', ${entry.quantity})" ${!canUse ? 'disabled' : ''}>
                Use All
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ─── Helpers ──────────────────────────────────────────
  function getBadgeClass(type) {
    const map = {
      'energy': 'badge-energy',
      'health': 'badge-health',
      'hunger': 'badge-hunger',
      'happiness': 'badge-happiness',
      'success_boost': 'badge-boost',
      'temporary_boost': 'badge-temporary',
      'permanent_boost': 'badge-permanent',
      'multi_use': 'badge-multi',
      'cash': 'badge-cash'
    };
    return map[type] || 'badge-energy';
  }

  function getEffectDescription(item) {
    switch(item.type) {
      case 'energy': return `Restores ${item.effect_value} energy`;
      case 'health': return `Restores ${item.effect_value} health`;
      case 'hunger': return `Reduces hunger by ${item.effect_value}`;
      case 'happiness': return `Increases happiness by ${item.effect_value}`;
      case 'success_boost': return `+${item.effect_value}% success rate`;
      case 'temporary_boost': return `+${item.effect_value}% for ${item.duration_minutes} min`;
      case 'permanent_boost': return `Permanently +${item.effect_value}%`;
      case 'multi_use': return `${item.max_uses} uses, +${item.effect_value} each`;
      case 'cash': return `Gain ₹${item.effect_value}`;
      default: return '';
    }
  }

  function canUseItem(item) {
    if (!currentPlayer) return false;
    if (item.type === 'energy' && currentPlayer.energy >= 100) return false;
    if (item.type === 'health' && currentPlayer.health >= 100) return false;
    if (item.type === 'hunger' && currentPlayer.hunger <= 0) return false;
    if (item.type === 'happiness' && currentPlayer.happiness >= 100) return false;
    return true;
  }

  function getUseDisabledReason(item) {
    if (item.type === 'energy' && currentPlayer.energy >= 100) return 'Energy full';
    if (item.type === 'health' && currentPlayer.health >= 100) return 'Health full';
    if (item.type === 'hunger' && currentPlayer.hunger <= 0) return 'Hunger empty';
    if (item.type === 'happiness' && currentPlayer.happiness >= 100) return 'Happiness full';
    return '';
  }

  // ─── Buy Item ──────────────────────────────────────────
  async function buyItem(itemId, price) {
    if (currentPlayer.cash < price) {
      showToast('❌ Not enough cash!', 'error');
      return;
    }

    try {
      // Deduct cash
      const { error: updateError } = await sb
        .from('players')
        .update({ cash: currentPlayer.cash - price })
        .eq('id', currentPlayer.id);
      if (updateError) throw updateError;
      currentPlayer.cash -= price;
      updatePlayerStats();

      // Add to inventory (upsert)
      const existing = playerInventory.find(p => p.item_id === itemId);
      if (existing) {
        const { error } = await sb
          .from('player_items')
          .update({ quantity: existing.quantity + 1 })
          .eq('id', existing.id);
        if (error) throw error;
        existing.quantity += 1;
        // Re-fetch inventory to get the updated item details (optional, but we already have the item)
        // For simplicity, we'll just update local and re-render.
        renderInventory();
      } else {
        const { error } = await sb
          .from('player_items')
          .insert({ player_id: currentPlayer.id, item_id: itemId, quantity: 1 });
        if (error) throw error;
        // Re-fetch inventory to get the new item details
        await loadInventory();
      }

      showToast('✅ Purchase successful!', 'success');
      renderShop();
    } catch (err) {
      console.error('Buy error:', err);
      showToast('Error purchasing item', 'error');
    }
  }

  // ─── Use Item ──────────────────────────────────────────
  async function useItem(itemId, quantity) {
    try {
      const { data, error } = await sb.rpc('use_item', {
        p_item_id: itemId,
        p_quantity: quantity
      });
      if (error) throw error;
      if (!data.success) {
        showToast(`❌ ${data.error}`, 'error');
        return;
      }
      showToast(data.message, 'success');
      // Refresh player data and inventory
      await loadPlayerData();
    } catch (err) {
      console.error('Use item error:', err);
      showToast('Error using item', 'error');
    }
  }

  // ─── Navigation ────────────────────────────────────────
  function goBack() { window.location.href = 'dashboard.html'; }

  // ─── Init ──────────────────────────────────────────────
  initThemeAndFont();
  loadPlayerData();

  // Auto-refresh inventory every 30 seconds
  setInterval(() => {
    if (currentPlayer) loadInventory();
  }, 30000);

  // Expose globals
  window.buyItem = buyItem;
  window.useItem = useItem;
  window.goBack = goBack;
</script>
</body>
</html>
