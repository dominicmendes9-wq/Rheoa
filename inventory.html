<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>
</head>
<body>

<h1>Inventory & Shop</h1>

<h2>🛒 Shop</h2>
<div id="shop"></div>

<hr>

<h2>🎒 Your Inventory</h2>
<div id="inventory"></div>

<hr>
<div id="status"></div>

<button onclick="goBack()">Back</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;

// 🚀 INIT
async function init() {
  const { data: { user } } = await sb.auth.getUser();

  if (!user) {
    document.body.innerHTML = "Not logged in";
    return;
  }

  const { data: playerData } = await sb
    .from('players')
    .select('*')
    .eq('auth_id', user.id)
    .single();

  if (!playerData) {
    document.body.innerHTML = "Player not found";
    return;
  }

  player = playerData;

  loadShop();
  loadInventory();
}

// 🛒 LOAD SHOP
async function loadShop() {
  const { data, error } = await sb.from('items').select('*');

  if (!data || data.length === 0) {
    document.getElementById("shop").innerText = "No shop items found";
    return;
  }

  let html = "";
  data.forEach(item => {
    html += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <b>${item.name}</b><br>
        ₹${item.price}<br>
        ${item.type}<br>
        <button onclick="buy('${item.id}', ${item.price})">Buy</button>
      </div>
    `;
  });

  document.getElementById("shop").innerHTML = html;
}

// 💰 BUY ITEM
async function buy(itemId, price) {
  if (player.cash < price) {
    alert("Not enough cash");
    return;
  }

  await sb.from('players')
    .update({ cash: player.cash - price })
    .eq('id', player.id);

  // Check existing
  const { data: existing } = await sb
    .from('player_items')
    .select('*')
    .eq('player_id', player.id)
    .eq('item_id', itemId)
    .maybeSingle();

  if (existing) {
    await sb.from('player_items')
      .update({ quantity: existing.quantity + 1 })
      .eq('id', existing.id);
  } else {
    await sb.from('player_items').insert({
      player_id: player.id,
      item_id: itemId,
      quantity: 1
    });
  }

  alert("Purchased!");
  loadInventory(); // reload inventory only
}

// 🎒 LOAD INVENTORY
async function loadInventory() {
  const { data, error } = await sb
    .from('player_items')
    .select(`
      item_id,
      quantity,
      items (name, type, effect_value)
    `)
    .eq('player_id', player.id);

  let html = "";

  if (!data || data.length === 0) {
    html = "No items yet";
  } else {
    data.forEach(i => {
      const type = i.items.type || "none";
      const value = i.items.effect_value || 0;

      html += `
        <div style="border:1px solid black; margin:5px; padding:5px;">
          <b>${i.items.name}</b> x${i.quantity}
          <br>
          <button onclick="useItem('${i.item_id}', '${type}', ${value})">
            Use
          </button>
        </div>
      `;
    });
  }

  document.getElementById("inventory").innerHTML = html;
}

// 🧪 USE ITEM
async function useItem(itemId, type, value) {
  if (!player) return;

  // Apply effect
  if (type === "energy") {
    player.energy = (player.energy || 0) + value;
    await sb.from('players')
      .update({ energy: player.energy })
      .eq('id', player.id);
  }

  if (type === "success_boost") {
    player.success_boost = (player.success_boost || 0) + value;
    await sb.from('players')
      .update({ success_boost: player.success_boost })
      .eq('id', player.id);
  }

  // Reduce item quantity
  const { data: existing } = await sb
    .from('player_items')
    .select('*')
    .eq('player_id', player.id)
    .eq('item_id', itemId)
    .maybeSingle();

  if (!existing) return;

  if (existing.quantity > 1) {
    await sb.from('player_items')
      .update({ quantity: existing.quantity - 1 })
      .eq('id', existing.id);
  } else {
    await sb.from('player_items')
      .delete()
      .eq('id', existing.id);
  }

  loadInventory(); // reload inventory after use
}

// 🔙 BACK BUTTON
function goBack() {
  window.location.href = "dashboard.html";
}

// Expose functions globally so HTML buttons can call them
window.useItem = useItem;
window.buy = buy;
window.goBack = goBack;

init();
</script>

</body>
</html>
