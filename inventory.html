<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>
</head>
<body>

<h1>Inventory & Shop</h1>

<h2>🛒 Shop</h2>
<div id="shop"></div>

<hr>

<h2>🎒 Your Inventory</h2>
<div id="inventory"></div>

<hr>
<div id="status"></div>

<button onclick="goBack()">Back</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const sb = window.supabase.createClient(
  "https://mtiwodvsrwvrujbhmmrn.supabase.co",
  "sb_publishable_noi80_djvhHDAuQ14hJKQQ_NppeGehp"
);

let player = null;

// 🚀 INIT
async function init() {

  const { data: { user } } = await sb.auth.getUser();
  console.log("USER:", user);

  if (!user) {
    document.body.innerHTML = "Not logged in";
    return;
  }

  let res = await sb
    .from('players')
    .select('*')
    .eq('auth_id', user.id)
    .single();

  console.log("PLAYER:", res);

  if (!res.data) {
    document.body.innerHTML = "Player not found";
    return;
  }

  player = res.data;

  loadShop();
  loadInventory();
}

// 🛒 LOAD SHOP
async function loadShop() {
  let { data, error } = await sb.from('items').select('*');

  console.log("SHOP:", data, error);

  if (!data || data.length === 0) {
    document.getElementById("shop").innerText = "No shop items found";
    return;
  }

  let html = "";

  data.forEach(item => {
    html += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <b>${item.name}</b><br>
        ₹${item.price}<br>
        ${item.type}<br>
        <button onclick="buy('${item.id}', ${item.price})">Buy</button>
      </div>
    `;
  });

  document.getElementById("shop").innerHTML = html;
}

// 💰 BUY
async function buy(itemId, price) {

  if (player.cash < price) {
    alert("Not enough cash");
    return;
  }

  // update cash
  await sb.from('players')
    .update({ cash: player.cash - price })
    .eq('id', player.id);

  // check existing
  let { data: existing } = await sb
    .from('player_items')
    .select('*')
    .eq('player_id', player.id)
    .eq('item_id', itemId)
    .maybeSingle();

  if (existing) {
    await sb.from('player_items')
      .update({ quantity: existing.quantity + 1 })
      .eq('id', existing.id);
  } else {
    await sb.from('player_items').insert({
      player_id: player.id,
      item_id: itemId,
      quantity: 1
    });
  }

  alert("Purchased!");
  init(); // reload everything
}

// 🎒 LOAD INVENTORY
async function loadInventory() {
  let { data, error } = await sb
    .from('player_items')
    .select(`
      item_id,
      quantity,
      items (name, type, effect_value)
    `)
    .eq('player_id', player.id);

  console.log("INVENTORY:", data, error);

  let html = "";

  if (!data || data.length === 0) {
    html = "No items yet";
  } else {
    data.forEach(i => {

      const type = i.items.type || "none";
      const value = i.items.effect_value || 0;

      html += `
        <div style="border:1px solid black; margin:5px; padding:5px;">
          <b>${i.items.name}</b> x${i.quantity}
          <br>
          <button onclick="useItem('${i.item_id}', '${type}', ${value})">
            Use
          </button>
        </div>
      `;
    });
  }

  document.getElementById("inventory").innerHTML = html;
}

  console.log("INVENTORY:", data, error);

  let html = "";

  if (!data || data.length === 0) {
    html = "No items yet";
  } else {
    data.forEach(i => {

      const value = i.items.effect_value || 0;

      html += `

          <br>
          <button onclick="useItem('${i.item_id}', '${type}', ${value})">

  document.getElementById("inventory").innerHTML = html;

  // Use Item

  async function useItem(itemId, type, value) {

  console.log("USING ITEM:", itemId, type, value);

  if (!player) return;

  // 🧠 APPLY EFFECT
  if (type === "energy") {
    let newEnergy = (player.energy || 0) + value;

    let { error } = await sb.from('players')
      .update({ energy: newEnergy })
      .eq('id', player.id);

    console.log("ENERGY UPDATE:", error);

    if (!error) {
      player.energy = newEnergy;
    }
  }

  if (type === "success_boost") {
    let newBoost = (player.success_boost || 0) + value;

    let { error } = await sb.from('players')
      .update({ success_boost: newBoost })
      .eq('id', player.id);

    console.log("BOOST UPDATE:", error);

    if (!error) {
      player.success_boost = newBoost;
    }
  }

  // 🔽 REDUCE ITEM
  let { data: existing, error: fetchError } = await sb
    .from('player_items')
    .select('*')
    .eq('player_id', player.id)
    .eq('item_id', itemId)
    .maybeSingle();

  console.log("FETCH ITEM:", existing, fetchError);

  if (!existing) return;

  if (existing.quantity > 1) {
    let { error } = await sb.from('player_items')
      .update({ quantity: existing.quantity - 1 })
      .eq('id', existing.id);

    console.log("UPDATE QTY:", error);

  } else {
    let { error } = await sb.from('player_items')
      .delete()
      .eq('id', existing.id);

    console.log("DELETE ITEM:", error);
  }

  setTimeout(() => init(), 300);
}
// 🔙
function goBack() {
  window.location.href = "dashboard.html";
}

init();
</script>

</body>
</html>
